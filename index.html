n\t\tgo func() {\n\t\t\tdefer wg.Done()\n\t\t\tmu.Lock()\n\t\t\tstorage[i] = i * 2\n\t\t\tmu.Unlock()\n\t\t}()\n\t}\n\twg.Wait()\n\n\t// ążą░ąĘą░ čćčéąĄąĮąĖčÅ\n\twg.Add(writes)\n\tfor i := 0; i < writes; i++ {\n\t\ti := i\n\t\tgo func() {\n\t\t\tdefer wg.Done()\n\t\t\tmu.RLock()\n\t\t\t_, _ = storage[i]\n\t\t\tmu.RUnlock()\n\t\t}()\n\t}\n\twg.Wait()\n\tfmt.Println(\"map size:\", len(storage))\n}","rust":"// ąŚą░ą┤ą░ąĮąĖąĄ 4: ą¤ąŠčéąŠą║ąŠą▒ąĄąĘąŠą┐ą░čüąĮą░čÅ HashMap (ą░ąĮą░ą╗ąŠą│ sync.Map / concurrent map ą▓ Go)\n\nuse std::collections::HashMap;\nuse std::sync::{Arc, RwLock};\nuse std::thread;\n\nstruct ConcurrentMap<V: Clone + Send> {\n    data: Arc<RwLock<HashMap<String, V>>>,\n}\n\nimpl<V: Clone + Send + 'static> ConcurrentMap<V> {\n    fn new() -> Self {\n        ConcurrentMap {\n            data: Arc::new(RwLock::new(HashMap::new())),\n        }\n    }\n\n    fn insert(&self, key: String, value: V) {\n        let mut map = self.data.write().unwrap();\n        map.insert(key, value);\n    }\n\n    fn get(&self, key: &str) -> Option<V> {\n        let map = self.data.read().unwrap(); // read lock\n        map.get(key).cloned()\n    }\n\n    fn delete(&self, key: &str) -> Option<V> {\n        let mut map = self.data.write().unwrap();\n        map.remove(key)\n    }\n\n    fn len(&self) -> usize {\n        let map = self.data.read().unwrap();\n        map.len()\n    }\n\n    fn contains(&self, key: &str) -> bool {\n        let map = self.data.read().unwrap();\n        map.contains_key(key)\n    }\n\n    fn keys(&self) -> Vec<String> {\n        let map = self.data.read().unwrap();\n        map.keys().cloned().collect()\n    }\n\n    // ąØčāąČąĄąĮ clone ą┤ą╗čÅ ą╝ąĮąŠą│ąŠą┐ąŠčéąŠčćąĮąŠčüčéąĖ\n    fn clone(&self) -> ConcurrentMap<V> {\n        ConcurrentMap {\n            data: Arc::clone(&self.data),\n        }\n    }\n}\n\nfn main() {\n    let map = ConcurrentMap::<i32>::new();\n\n    let mut handles = Vec::new();\n\n    // 4 ą┐ąŠčéąŠą║ą░ ą┐ąĖčłčāčé\n    for t in 0..4 {\n        let map_clone = map.clone();\n        let handle = thread::spawn(move || {\n            for i in 0..5 {\n                let key = format!(\"t{}_key{}\", t, i);\n                map_clone.insert(key.clone(), t * 100 + i);\n                println!(\"  inserted {}\", key);\n            }\n        });\n        handles.push(handle);\n    }\n\n    for h in handles {\n        h.join().unwrap();\n    }\n\n    println!(\"\\nmap size: {}\", map.len());\n    println!(\"contains t0_key0: {}\", map.contains(\"t0_key0\"));\n    println!(\"get t2_key3: {:?}\", map.get(\"t2_key3\"));\n    println!(\"keys count: {}\", map.keys().len());\n\n    // ąŻą┤ą░ą╗ąĄąĮąĖąĄ\n    let removed = map.delete(\"t0_key0\");\n    println!(\"removed t0_key0: {:?}\", removed);\n    println!(\"map size after delete: {}\", map.len());\n}","info":"## Summary\nBuild a map that is safely shared across many goroutines/threads. The program spawns N concurrent writers that populate the map, waits for them, then spawns N concurrent readers, and finally reports the map size. Output is the final element count (and, in the Rust variant, sample lookups).\n\n## Why it matters\nGo maps and most language hash maps are not safe for concurrent writes; an unguarded concurrent map write panics or corrupts state. Guarding shared state with a read-write lock is the foundational pattern behind in-memory caches, registries, and session stores.\n\n## Idea\n- Wrap the map with a `sync.RWMutex` (Go) / `RwLock` (Rust).\n- Take the exclusive write lock (`Lock` / `write()`) around every mutation so only one writer touches the map at a time.\n- Take the shared read lock (`RLock` / `read()`) around lookups so many readers can proceed in parallel while no writer holds the lock.\n- A `sync.WaitGroup` (Go) or joining thread handles (Rust) ensures all writers finish before reads begin and that `main` does not exit early.\n- The RWMutex is correct because writes are mutually exclusive with everything, while concurrent reads of immutable data are harmless.\n\n## Complexity\nO(N) total work for N operations, each lock acquire/release is O(1); space O(N) for the stored entries plus O(1) lock overhead. Concurrency is bounded by lock contention: writers serialize, readers run in parallel.\n\n## Pitfalls\n- Method name is `RLock`, not `Rlock`; the lowercase variant does not compile.\n- Capture the loop variable per iteration (`i := i`) or every goroutine sees the same final `i`.\n- Forgetting `wg.Wait()` (or joining handles) lets `main` exit before goroutines finish, losing writes or causing a data race.\n- Never read or write the map outside the lock, even for a \"harmless\" length check."},{"t":"ąĀąĄą░ą╗ąĖąĘą░čåąĖčÅ čüčéąĄą║ą░","d":"medium","desc":"ąĀąĄą░ą╗ąĖąĘą░čåąĖčÅ čüčéąĄą║ą░","go":"package main\n\nimport \"fmt\"\n\n// ąŚą░ą┤ą░ąĮąĖąĄ 5: ąĀąĄą░ą╗ąĖąĘą░čåąĖčÅ čüčéąĄą║ą░\n\ntype Stack struct {\n\titems []string\n}\n\nfunc (s *Stack) Push(data string) {\n\ts.items = append(s.items, data)\n}\n\nfunc (s *Stack) Pop() (string, bool) {\n\tif s.IsEmpty() {\n\t\treturn \"\", false\n\t}\n\ttop := s.items[len(s.items)-1]\n\ts.items = s.items[:len(s.items)-1]\n\treturn top, true\n}\n\nfunc (s *Stack) IsEmpty() bool {\n\treturn len(s.items) == 0\n}\n\nfunc (s *Stack) Top() (string, bool) {\n\tif s.IsEmpty() {\n\t\treturn \"\", false\n\t}\n\treturn s.items[len(s.items)-1], true\n}\n\nfunc main() {\n\ts := Stack{}\n\ts.Push(\"A\")\n\ts.Push(\"B\")\n\ts.Push(\"C\")\n\n\ttop, _ := s.Top()\n\tfmt.Println(\"Top:\", top) // C\n\n\tval, _ := s.Pop()\n\tfmt.Println(\"Popped:\", val) // C\n\n\ttop, _ = s.Top()\n\tfmt.Println(\"Top after pop:\", top) // B\n}","rust":"// ąŚą░ą┤ą░ąĮąĖąĄ 5: Generic Stack\n\n#[derive(Debug)]\nstruct Stack<T> {\n    items: Vec<T>,\n    max_size: usize,\n}\n\n#[derive(Debug)]\nenum StackError {\n    Overflow,\n    Underflow,\n}\n\nimpl std::fmt::Display for StackError {\n    fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {\n        match self {\n            StackError::Overflow => write!(f, \"stack overflow\"),\n            StackError::Underflow => write!(f, \"stack underflow\"),\n        }\n    }\n}\n\nimpl<T: std::fmt::Debug> Stack<T> {\n    fn new(max_size: usize) -> Self {\n        Stack {\n            items: Vec::new(),\n            max_size: max_size,\n        }\n    }\n\n    fn push(&mut self, item: T) -> Result<(), StackError> {\n        if self.items.len() >= self.max_size {\n            return Err(StackError::Overflow);\n        }\n        self.items.push(item);\n        Ok(())\n    }\n\n    fn pop(&mut self) -> Result<T, StackError> {\n        self.items.pop().ok_or(StackError::Underflow)\n    }\n\n    fn peek(&self) -> Option<&T> {\n        self.items.last()\n    }\n\n    fn is_empty(&self) -> bool {\n        self.items.is_empty()\n    }\n\n    fn len(&self) -> usize {\n        self.items.len()\n    }\n\n    fn clear(&mut self) {\n        self.items.clear();\n    }\n}\n\n// ąśčéąĄčĆą░čéąŠčĆ ą┤ą╗čÅ Stack ŌĆö ą┤ąŠčüčéą░čæą╝ čü ą▓ąĄčĆčłąĖąĮčŗ\nimpl<T: std::fmt::Debug> Iterator for Stack<T> {\n    type Item = T;\n    fn next(&mut self) -> Option<T> {\n        self.items.pop()\n    }\n}\n\n// ąĪąŠąĘą┤ą░ąĮąĖąĄ čüčéąĄą║ą░ ąĖąĘ ą▓ąĄą║čéąŠčĆą░\nimpl<T: std::fmt::Debug> From<Vec<T>> for Stack<T> {\n    fn from(items: Vec<T>) -> Self {\n        let max_size = items.len() * 2;\n        Stack {\n            items,\n            max_size: max_size,\n        }\n    }\n}\n\nfn main() {\n    let mut stack = Stack::new(5);\n\n    // Push\n    for i in 1..=5 {\n        stack.push(i).unwrap();\n        println!(\"pushed {}, len={}\", i, stack.len());\n    }\n\n    // Overflow\n    match stack.push(6) {\n        Ok(_) => println!(\"pushed 6\"),\n        Err(e) => println!(\"error: {}\", e),\n    }\n\n    // Peek\n    println!(\"\\npeek: {:?}\", stack.peek());\n\n    // Pop\n    while !stack.is_empty() {\n        let val = stack.pop().unwrap();\n        println!(\"popped: {}\", val);\n    }\n\n    // Underflow\n    match stack.pop() {\n        Ok(v) => println!(\"got: {}\", v),\n        Err(e) => println!(\"error: {}\", e),\n    }\n\n    // From vec\n    println!();\n    let mut stack2: Stack<&str> = Stack::from(vec![\"hello\", \"world\", \"rust\"]);\n    println!(\"stack from vec: {:?}\", stack2);\n\n    // ąśčéąĄčĆą░čéąŠčĆ\n    println!(\"iterating:\");\n    for item in stack2 {\n        println!(\"  {}\", item);\n    }\n}","info":"## Summary\nImplement a LIFO stack supporting push, pop, peek/top, and emptiness check. The Go version stores strings; the Rust version is generic over `T` with an optional capacity limit and typed errors. Output is the sequence of pushes, peeks, and pops demonstrating last-in-first-out order.\n\n## Why it matters\nThe stack is one of the most reused abstractions in software: call frames, expression evaluation, undo history, backtracking, DFS, and balanced-bracket checks all rely on it. Knowing how to back it with a dynamic array is interview-table-stakes.\n\n## Idea\n- Back the stack with a growable slice (`[]string`) or `Vec<T>`; the end of the array is the top.\n- `Push` appends to the end in amortized O(1).\n- `Pop` removes and returns the last element, signaling emptiness via an `ok` bool (Go) or `Result`/`Option` (Rust).\n- `Top`/`peek` returns the last element without removing it.\n- The Rust variant adds a `max_size` for overflow detection, a `From<Vec>` constructor, and an `Iterator` impl that drains from the top.\n\n## Complexity\nPush/pop/peek are amortized O(1) time (occasional O(n) reallocation on growth); space O(n) for n stored items.\n\n## Pitfalls\n- Always check emptiness before indexing `items[len-1]` to avoid an index-out-of-range panic.\n- Re-slicing on pop (`items[:len-1]`) keeps the backing array; the dropped element is not zeroed, which can retain references in pointer-typed stacks.\n- In Rust, the `Iterator` impl consumes the stack by value, so you cannot reuse it afterward.\n- A bounded stack must reject pushes once `len >= max_size` rather than silently growing."},{"t":"Thread-safe čłą░čĆą┤ąĖčĆąŠą▓ą░ąĮąĮčŗą╣ ą║ąĄčł","d":"medium","desc":"Thread-safe čłą░čĆą┤ąĖčĆąŠą▓ą░ąĮąĮčŗą╣ ą║ąĄčł","go":"package main\n\nimport (\n\t\"fmt\"\n\t\"hash/fnv\"\n\t\"sync\"\n)\n\n// ąŚą░ą┤ą░ąĮąĖąĄ 10: Thread-safe čłą░čĆą┤ąĖčĆąŠą▓ą░ąĮąĮčŗą╣ ą║ąĄčł\n\ntype shard struct {\n\tmu   sync.RWMutex\n\tdata map[string]string\n}\n\nfunc newShard() *shard {\n\treturn &shard{data: map[string]string{}}\n}\n\nfunc (s *shard) set(key, value string) {\n\ts.mu.Lock()\n\tdefer s.mu.Unlock()\n\ts.data[key] = value\n}\n\nfunc (s *shard) get(key string) (string, bool) {\n\ts.mu.RLock()\n\tdefer s.mu.RUnlock()\n\tv, ok := s.data[key]\n\treturn v, ok\n}\n\ntype ShardedCache struct {\n\tshards []*shard\n\tn      int\n}\n\nfunc NewCache(numShards int) *ShardedCache {\n\tshards := make([]*shard, numShards)\n\tfor i := range shards {\n\t\tshards[i] = newShard()\n\t}\n\treturn &ShardedCache{shards: shards, n: numShards}\n}\n\nfunc (c *ShardedCache) shardFor(key string) *shard {\n\th := fnv.New64()\n\th.Write([]byte(key))\n\tidx := int(h.Sum64() % uint64(c.n))\n\treturn c.shards[idx]\n}\n\nfunc (c *ShardedCache) Set(key, value string) {\n\ts := c.shardFor(key)\n\ts.set(key, value)\n}\n\nfunc (c *ShardedCache) Get(key string) (string, bool) {\n\ts := c.shardFor(key)\n\treturn s.get(key)\n}\n\nfunc main() {\n\tcache := NewCache(4)\n\n\tvar wg sync.WaitGroup\n\t// ą¤ą░čĆą░ą╗ą╗ąĄą╗čīąĮą░čÅ ąĘą░ą┐ąĖčüčī\n\tfor i := 0; i < 100; i++ {\n\t\twg.Add(1)\n\t\tgo func(i int) {\n\t\t\tdefer wg.Done()\n\t\t\tkey := fmt.Sprintf(\"key_%d\", i)\n\t\t\tval := fmt.Sprintf(\"val_%d\", i)\n\t\t\tcache.Set(key, val)\n\t\t}(i)\n\t}\n\twg.Wait()\n\n\t// ą¤čĆąŠą▓ąĄčĆą║ą░\n\tif v, ok := cache.Get(\"key_42\"); ok {\n\t\tfmt.Println(\"Found:\", v)\n\t}\n}","rust":"// ąŚą░ą┤ą░ąĮąĖąĄ 10: Sharded Cache (ą░ąĮą░ą╗ąŠą│ Go sharded cache čü RWMutex)\n//\n// ą©ą░čĆą┤ąĖčĆąŠą▓ą░ąĮąĖąĄ: ą▓ą╝ąĄčüčéąŠ ąŠą┤ąĮąŠą│ąŠ ą▒ąŠą╗čīčłąŠą│ąŠ ą╗ąŠą║ą░ ŌĆö N ą╝ą░ą╗ąĄąĮčīą║ąĖčģ.\n// ąÜą╗čÄčć čģąĄčłąĖčĆčāąĄčéčüčÅ ŌåÆ ą▓čŗą▒ąĖčĆą░ąĄčéčüčÅ čłą░čĆą┤ ŌåÆ ą╗ąŠčćąĖčéčüčÅ čéąŠą╗čīą║ąŠ ąŠąĮ.\n\nuse std::collections::HashMap;\nuse std::hash::{Hash, Hasher};\nuse std::sync::{Arc, RwLock};\nuse std::thread;\nuse std::time::{Duration, Instant};\n\nconst NUM_SHARDS: usize = 16;\n\nstruct Shard<V> {\n    data: RwLock<HashMap<String, V>>,\n}\n\nstruct ShardedCache<V: Clone + Send + Sync> {\n    shards: Vec<Shard<V>>,\n}\n\nimpl<V: Clone + Send + Sync> ShardedCache<V> {\n    fn new() -> Self {\n        let mut shards = Vec::with_capacity(NUM_SHARDS);\n        for _ in 0..NUM_SHARDS {\n            shards.push(Shard {\n                data: RwLock::new(HashMap::new()),\n            });\n        }\n        ShardedCache { shards }\n    }\n\n    fn get_shard_index(&self, key: &str) -> usize {\n        let mut hasher = std::collections::hash_map::DefaultHasher::new();\n        key.hash(&mut hasher);\n        (hasher.finish() as usize) % NUM_SHARDS\n    }\n\n    fn get(&self, key: &str) -> Option<V> {\n        let idx = self.get_shard_index(key);\n        let shard = self.shards[idx].data.read().unwrap();\n        shard.get(key).cloned()\n    }\n\n    fn insert(&self, key: String, value: V) {\n        let idx = self.get_shard_index(&key);\n        let mut shard = self.shards[idx].data.write().unwrap();\n        shard.insert(key, value);\n    }\n\n    fn delete(&self, key: &str) -> Option<V> {\n        let idx = self.get_shard_index(key);\n        let mut shard = self.shards[idx].data.write().unwrap();\n        shard.remove(key)\n    }\n\n    fn len(&self) -> usize {\n        self.shards\n            .iter()\n            .map(|s| s.data.read().unwrap().len())\n            .sum()\n    }\n\n    fn keys(&self) -> Vec<String> {\n        let mut all_keys = Vec::new();\n        for shard in &self.shards {\n            let data = shard.data.read().unwrap();\n            for key in data.keys() {\n                all_keys.push(key.clone());\n            }\n        }\n        all_keys\n    }\n}\n\nfn main() {\n    let cache = Arc::new(ShardedCache::<i32>::new());\n\n    let start = Instant::now();\n\n    // ą¤ą░čĆą░ą╗ą╗ąĄą╗čīąĮą░čÅ ąĘą░ą┐ąĖčüčī ąĖąĘ 8 ą┐ąŠčéąŠą║ąŠą▓\n    let mut handles = Vec::new();\n\n    for t in 0..8 {\n        let cache_clone = Arc::clone(&cache);\n        let handle = thread::spawn(move || {\n            for i in 0..1000 {\n                let key = format!(\"key_{}_{}\", t, i);\n                cache_clone.insert(key, (t * 1000 + i) as i32);\n            }\n        });\n        handles.push(handle);\n    }\n\n    for h in handles {\n        h.join().unwrap();\n    }\n\n    let write_time = start.elapsed();\n    println!(\"wrote {} entries in {:?}\", cache.len(), write_time);\n\n    // ą¤ą░čĆą░ą╗ą╗ąĄą╗čīąĮąŠąĄ čćčéąĄąĮąĖąĄ\n    let start = Instant::now();\n    let mut read_handles = Vec::new();\n\n    for t in 0..8 {\n        let cache_clone = Arc::clone(&cache);\n        let handle = thread::spawn(move || {\n            let mut found = 0;\n            for i in 0..1000 {\n                let key = format!(\"key_{}_{}\", t, i);\n                if cache_clone.get(&key).is_some() {\n                    found += 1;\n                }\n            }\n            found\n        });\n        read_handles.push(handle);\n    }\n\n    let mut total_found = 0;\n    for h in read_handles {\n        total_found += h.join().unwrap();\n    }\n\n    println!(\"read {} entries in {:?}\", total_found, start.elapsed());\n    println!(\"total keys: {}\", cache.keys().len());\n\n    // Delete\n    cache.delete(\"key_0_0\");\n    println!(\"after delete: {} entries\", cache.len());\n\n    let _ = Duration::from_secs(0);\n}","info":"## Summary\nBuild a thread-safe key/value cache that scales under concurrent access by splitting storage into N independent shards. A key is hashed to choose a shard, and only that shard's lock is taken. Output demonstrates parallel writes/reads and a successful lookup of a stored key.\n\n## Why it matters\nA single global mutex around a shared map becomes a contention bottleneck under high concurrency. Sharding (lock striping) is the standard scaling trick used by concurrent hash maps, connection pools, and in-memory caches to let unrelated keys proceed in parallel.\n\n## Idea\n- Create an array of shards, each holding its own `map`/`HashMap` guarded by its own `sync.RWMutex` / `RwLock`.\n- For each operation, hash the key (FNV in Go, `DefaultHasher` in Rust) and reduce it modulo the shard count to pick a shard.\n- Lock only the selected shard, so operations on keys landing in different shards never block each other.\n- Use the write lock for `Set`/`insert`/`delete` and the read lock for `Get`, maximizing read parallelism.\n- Distribution quality depends on the hash spreading keys roughly uniformly across shards.\n\n## Complexity\nO(1) average per operation (hash + single-shard map access); space O(total entries) plus O(numShards) lock overhead. Expected contention drops by roughly a factor of numShards versus one global lock.\n\n## Pitfalls\n- Computing the shard index as `int(h.Sum64()) % n` is a bug: converting a large `uint64` to `int` can yield a negative value, and Go's `%` keeps the sign, producing a negative index and a panic. Do the modulo in unsigned arithmetic: `int(h.Sum64() % uint64(n))`.\n- A non-power-of-two shard count is fine with modulo, but masking (`& (n-1)`) only works when n is a power of two.\n- Cross-shard operations like total `len()`/`keys()` are not a consistent snapshot; entries can change between shard reads.\n- Capturing the loop variable in the writer goroutine is required (`func(i int)` or `i := i`)."},{"t":"ą×ą┤ąĮąŠčüą▓čÅąĘąĮčŗą╣ čüą┐ąĖčüąŠą║","d":"medium","desc":"ą×ą┤ąĮąŠčüą▓čÅąĘąĮčŗą╣ čüą┐ąĖčüąŠą║","go":"package main\n\nimport \"fmt\"\n\n// ąŚą░ą┤ą░ąĮąĖąĄ 15: ą×ą┤ąĮąŠčüą▓čÅąĘąĮčŗą╣ čüą┐ąĖčüąŠą║\n\ntype Node struct {\n\tValue int\n\tNext  *Node\n}\n\ntype LinkedList struct {\n\tHead *Node\n\tSize int\n}\n\nfunc (l *LinkedList) PushFront(val int) {\n\tnode := &Node{Value: val, Next: l.Head}\n\tl.Head = node\n\tl.Size++\n}\n\nfunc (l *LinkedList) PushBack(val int) {\n\tnode := &Node{Value: val}\n\tif l.Head == nil {\n\t\tl.Head = node\n\t\tl.Size++\n\t\treturn\n\t}\n\tcurrent := l.Head\n\tfor current.Next != nil {\n\t\tcurrent = current.Next\n\t}\n\tcurrent.Next = node\n\tl.Size++\n}\n\nfunc (l *LinkedList) PopFront() (int, bool) {\n\tif l.Head == nil {\n\t\treturn 0, false\n\t}\n\tval := l.Head.Value\n\tl.Head = l.Head.Next\n\tl.Size--\n\treturn val, true\n}\n\nfunc (l *LinkedList) Find(val int) bool {\n\tcurrent := l.Head\n\tfor current != nil {\n\t\tif current.Value == val {\n\t\t\treturn true\n\t\t}\n\t\tcurrent = current.Next\n\t}\n\treturn false\n}\n\nfunc (l *LinkedList) Print() {\n\tcurrent := l.Head\n\tfor current != nil {\n\t\tfmt.Printf(\"%d -> \", current.Value)\n\t\tcurrent = current.Next\n\t}\n\tfmt.Println(\"nil\")\n}\n\nfunc main() {\n\tlist := &LinkedList{}\n\n\tlist.PushBack(1)\n\tlist.PushBack(2)\n\tlist.PushBack(3)\n\tlist.PushFront(0)\n\n\tlist.Print() // 0 -> 1 -> 2 -> 3 -> nil\n\n\tfmt.Println(\"Size:\", list.Size)\n\tfmt.Println(\"Find 2:\", list.Find(2))\n\n\tval, _ := list.PopFront()\n\tfmt.Println(\"Popped:\", val) // 0\n\tlist.Print()                // 1 -> 2 -> 3 -> nil\n}","info":"## Summary\nImplement a singly linked list of integer nodes supporting PushFront, PushBack, PopFront, Find, and Print, while tracking Size. Each node holds a value and a pointer to the next node; the list keeps a head pointer. Output shows the list contents after insertions and a front removal.\n\n## Why it matters\nLinked lists are the canonical pointer-manipulation exercise and underpin queues, adjacency lists, LRU caches, and any structure needing O(1) head insertion without array reallocation. They sharpen reasoning about nil/null pointers and aliasing.\n\n## Idea\n- A `Node` has a `Value` and a `Next` pointer; the `LinkedList` holds `Head` and a `Size` counter.\n- `PushFront` allocates a node whose `Next` is the current head, then makes it the new head ŌĆö O(1).\n- `PushBack` walks from head following `Next` until the last node and links the new node there; an empty list sets head directly.\n- `PopFront` returns the head value and advances head to `Head.Next`, signaling emptiness with an `ok` bool.\n- `Find` and `Print` traverse linearly from head until the `nil` terminator.\n\n## Complexity\nPushFront and PopFront are O(1); PushBack, Find, and Print are O(n) because they traverse to the tail/match. Space is O(n) for n nodes.\n\n## Pitfalls\n- Handle the empty-list case in PushBack (head is nil) before dereferencing `current.Next`.\n- PopFront on an empty list must return the not-ok flag instead of dereferencing a nil head.\n- Keep `Size` consistent with every mutation, or it drifts from the real count.\n- Without a tail pointer, repeated PushBack is O(n) each; add a tail field if frequent appends are needed."}]},{"name":"ą×ą×ą¤ / ą¤ą░čéčéąĄčĆąĮčŗ","icon":"­¤¦®","problems":[{"t":"ą¤ą░čéčéąĄčĆąĮčŗ ą┐čĆąŠąĄą║čéąĖčĆąŠą▓ą░ąĮąĖčÅ ŌĆö Singleton, Observer, Strategy, Chain of Responsibility","d":"medium","desc":"ą¤ą░čéčéąĄčĆąĮčŗ ą┐čĆąŠąĄą║čéąĖčĆąŠą▓ą░ąĮąĖčÅ ŌĆö Singleton, Observer, Strategy, Chain of Responsibility","python":"# ąŚą░ą┤ą░ąĮąĖąĄ 12: ą¤ą░čéčéąĄčĆąĮčŗ ą┐čĆąŠąĄą║čéąĖčĆąŠą▓ą░ąĮąĖčÅ ŌĆö Singleton, Observer, Strategy, Chain of Responsibility\n\nfrom __future__ import annotations\nfrom abc import ABC, abstractmethod\nfrom typing import Any, Callable\n\n# ========== Singleton čćąĄčĆąĄąĘ __new__ ==========\n\nclass Singleton:\n    _instance: Singleton | None = None\n\n    def __new__(cls, *args, **kwargs):\n        if cls._instance is None:\n            cls._instance = super().__new__( cls)\n        return cls._instance\n\n    def __init__(self, value: str = \"default\"):\n        self.value = value\n\n# ========== Singleton čćąĄčĆąĄąĘ ą┤ąĄą║ąŠčĆą░čéąŠčĆ ==========\n\ndef singleton(cls: type) -> Callable:\n    instances: dict = {}\n\n    def get_instance(*args, **kwargs):\n        if cls not in instances:\n            instances[cls] = cls(*args, **kwargs)\n        return instances[cls]\n\n    return get_instance\n\n@singleton\nclass Config:\n    def __init__(self):\n        self.settings: dict[str, Any] = {}\n\n    def set(self, key: str, value: Any):\n        self.settings[key] = value\n\n    def get(self, key: str, default: Any = None) -> Any:\n        return self.settings.get(key, default)\n\n# ========== Chain of Responsibility ==========\n\nclass Handler(ABC):\n    def __init__(self):\n        self._next: Handler | None = None\n\n    def set_next(self, handler: Handler) -> Handler:\n        self._next = handler\n        return handler  # ą┤ą╗čÅ čåąĄą┐ąŠčćą║ąĖ: h1.set_next(h2).set_next(h3)\n\n    @abstractmethod\n    def handle(self, request: dict) -> str | None:\n        ...\n\n    def pass_next(self, request: dict) -> str | None:\n        if self._next is not None:\n            return self._next.handle(request)\n        return None\n\nclass AuthHandler(Handler):\n    def handle(self, request: dict) -> str | None:\n        token = request.get(\"token\")\n        if not token:\n            return \"ERROR: no auth token\"\n        if token != \"valid-token\":\n            return \"ERROR: invalid token\"\n        print(\"  [auth] Ō£ō token valid\")\n        return self.pass_next(request)\n\nclass RateLimitHandler(Handler):\n    def __init__(self):\n        super().__init__()\n        self._count = 0\n        self._max = 3\n\n    def handle(self, request: dict) -> str | None:\n        self._count += 1\n        if self._count > self._max:\n            return \"ERROR: rate limit exceeded\"\n        print(f\"  [rate] Ō£ō {self._count}/{self._max}\")\n        return self.pass_next(request)\n\nclass LogHandler(Handler):\n    def handle(self, request: dict) -> str | None:\n        method = request.get(\"method\", \"???\")\n        path = request.get(\"path\", \"???\")\n        print(f\"  [log] {method} {path}\")\n        return self.pass_next(request)\n\nclass BusinessHandler(Handler):\n    def handle(self, request: dict) -> str | None:\n        return f\"OK: processed {request.get('path', '/')}\"\n\n# ========== Strategy čćąĄčĆąĄąĘ callable ==========\n\nclass Processor:\n    def __init__(self, strategy: Callable[[str], str]):\n        self._strategy = strategy\n\n    def set_strategy(self, strategy: Callable[[str], str]):\n        self._strategy = strategy\n\n    def process(self, data: str) -> str:\n        return self._strategy(data)\n\ndef uppercase_strategy(data: str) -> str:\n    return data.upper()\n\ndef reverse_strategy(data: str) -> str:\n    return data[::-1]\n\ndef censor_strategy(data: str) -> str:\n    bad_words = [\"bad\", \"evil\"]\n    result = data\n    for word in bad_words:\n        result = result.replace(word, \"***\")\n    return result\n\nif __name__ == \"__main__\":\n    # Singleton\n    print(\"=== Singleton ===\")\n    s1 = Singleton(\"first\")\n    s2 = Singleton(\"second\")\n    print(f\"s1 is s2: {s1 is s2}\")\n    print(f\"s1.value: {s1.value}\")  # \"second\" ŌĆö __init__ ą▓čŗąĘčŗą▓ą░ąĄčéčüčÅ ą┤ą▓ą░ąČą┤čŗ!\n    print()\n\n    # Singleton čćąĄčĆąĄąĘ ą┤ąĄą║ąŠčĆą░čéąŠčĆ\n    print(\"=== Config Singleton ===\")\n    c1 = Config()\n    c1.set(\"debug\", True)\n    c2 = Config()\n    print(f\"c1 is c2: {c1 is c2}\")\n    print(f\"c2.get('debug'): {c2.get('debug')}\")\n    print()\n\n    # Chain of Responsibility\n    print(\"=== Chain of Responsibility ===\")\n    auth = AuthHandler()\n    rate = RateLimitHandler()\n    log = LogHandler()\n    biz = BusinessHandler()\n\n    auth.set_next(rate).set_next(log).set_next(biz)\n\n    requests = [\n        {\"method\": \"GET\", \"path\": \"/api/data\", \"token\": \"valid-token\"},\n        {\"method\": \"POST\", \"path\": \"/api/submit\", \"token\": \"valid-token\"},\n        {\"method\": \"GET\", \"path\": \"/api/data\"},  # ąĮąĄčé čéąŠą║ąĄąĮą░\n        {\"method\": \"GET\", \"path\": \"/api/data\", \"token\": \"valid-token\"},  # 3-ą╣\n        {\"method\": \"GET\", \"path\": \"/api/data\", \"token\": \"valid-token\"},  # 4-ą╣ ŌĆö rate limit\n    ]\n\n    for i, req in enumerate(requests, 1):\n        print(f\"\\nRequest {i}:\")\n        result = auth.handle(req)\n        print(f\"  ŌåÆ {result}\")\n    print()\n\n    # Strategy\n    print(\"=== Strategy ===\")\n    proc = Processor(uppercase_strategy)\n\n    print(proc.process(\"hello world\"))\n\n    proc.set_strategy(reverse_strategy)\n    print(proc.process(\"hello world\"))\n\n    proc.set_strategy( censor_strategy)\n    print(proc.process(\"this is bad and evil stuff\"))","info":"## Summary\nImplement and demonstrate four classic design patterns in Python: Singleton (both via `__new__` and via a decorator), Chain of Responsibility, and Strategy. The \"input\" is a series of requests/data items; the output is the processed result produced by routing them through a chain of handlers or applying a swappable strategy function.\n\n## Why it matters\nThese patterns are the vocabulary of object-oriented design: Singleton centralizes shared config, Chain of Responsibility models middleware pipelines (auth, rate limiting, logging), and Strategy decouples an algorithm from its caller. They show up directly in web frameworks, request pipelines, and pluggable processing code.\n\n## Idea\n- Singleton via `__new__` caches the single instance in a class attribute and returns it on every construction; note `__init__` still runs each time, so the stored value reflects the last constructor call.\n- Singleton via decorator wraps the class in a closure that memoizes instances in a dict keyed by class, returning the cached one.\n- Chain of Responsibility: each `Handler` holds a reference to the next handler; `set_next` returns the next handler so links can be fluently chained, and each handler either short-circuits with an error or calls `pass_next` to delegate.\n- Strategy: `Processor` stores a callable and `process` simply invokes it; swapping behavior is just reassigning the callable, which works because functions are first-class objects.\n\n## Complexity\nSingleton lookup is O(1); a chain of n handlers processes one request in O(n); Strategy dispatch is O(1) plus the cost of the chosen function. Space is O(1) for singletons and O(n) for the handler chain.\n\n## Pitfalls\n- Singleton via `__new__` does not prevent `__init__` from re-running, so mutable state can be silently overwritten on each call.\n- The `__new__`/decorator singletons are not thread-safe; concurrent first construction can create two instances without a lock.\n- Forgetting to return the next handler from `set_next` breaks fluent chaining; forgetting to call `pass_next` silently drops the request.\n- Strategy functions must share the same signature, or swapping them at runtime will raise at call time."},{"t":"ąśąĮčéąĄčĆčäąĄą╣čüčŗ ąĖ ą┐ąŠą╗ąĖą╝ąŠčĆčäąĖąĘą╝","d":"medium","desc":"ąśąĮčéąĄčĆčäąĄą╣čüčŗ ąĖ ą┐ąŠą╗ąĖą╝ąŠčĆčäąĖąĘą╝","go":"package main\n\nimport (\n\t\"fmt\"\n\t\"math\"\n)\n\n// ąŚą░ą┤ą░ąĮąĖąĄ 18: ąśąĮčéąĄčĆčäąĄą╣čüčŗ ąĖ ą┐ąŠą╗ąĖą╝ąŠčĆčäąĖąĘą╝\n\ntype Shape interface {\n\tArea() float64\n\tPerimeter() float64\n\tName() string\n}\n\ntype Rectangle struct {\n\tWidth  float64\n\tHeight float64\n}\n\nfunc (r Rectangle) Area() float64 {\n\treturn r.Width * r.Height\n}\n\nfunc (r Rectangle) Perimeter() float64 {\n\treturn 2 * (r.Width + r.Height)\n}\n\nfunc (r Rectangle) Name() string {\n\treturn \"Rectangle\"\n}\n\ntype Circle struct {\n\tRadius float64\n}\n\nfunc (c Circle) Area() float64 {\n\treturn math.Pi * c.Radius * c.Radius\n}\n\nfunc (c Circle) Perimeter() float64 {\n\treturn 2 * math.Pi * c.Radius\n}\n\nfunc (c Circle) Name() string {\n\treturn \"Circle\"\n}\n\ntype Triangle struct {\n\tA, B, C float64 // čüčéąŠčĆąŠąĮčŗ\n}\n\nfunc (t Triangle) Area() float64 {\n\ts := t.Perimeter() / 2\n\treturn math.Sqrt(s * (s - t.A) * (s - t.B) * (s - t.C))\n}\n\nfunc (t Triangle) Perimeter() float64 {\n\treturn t.A + t.B + t.C\n}\n\nfunc (t Triangle) Name() string {\n\treturn \"Triangle\"\n}\n\nfunc NewShape(kind string, params ...float64) (Shape, error) {\n\tswitch kind {\n\tcase \"rectangle\":\n\t\tif len(params) != 2 {\n\t\t\treturn nil, fmt.Errorf(\"rectangle needs 2 params\")\n\t\t}\n\t\treturn Rectangle{Width: params[0], Height: params[1]}, nil\n\tcase \"circle\":\n\t\tif len(params) != 1 {\n\t\t\treturn nil, fmt.Errorf(\"circle needs 1 param\")\n\t\t}\n\t\treturn Circle{Radius: params[0]}, nil\n\tcase \"triangle\":\n\t\tif len(params) != 3 {\n\t\t\treturn nil, fmt.Errorf(\"triangle needs 3 params\")\n\t\t}\n\t\treturn Triangle{A: params[0], B: params[1], C: params[2]}, nil\n\tdefault:\n\t\treturn nil, fmt.Errorf(\"unknown shape: %s\", kind)\n\t}\n}\n\nfunc PrintInfo(s Shape) {\n\tfmt.Printf(\"%s: area=%.2f perimeter=%.2f\\n\", s.Name(), s.Area(), s.Perimeter())\n}\n\nfunc main() {\n\tshapes := []Shape{\n\t\tRectangle{Width: 10, Height: 5},\n\t\tCircle{Radius: 7},\n\t\tTriangle{A: 3, B: 4, C: 5},\n\t}\n\n\tfor _, s := range shapes {\n\t\tPrintInfo(s)\n\t}\n\n\tfmt.Println(\"\\n--- Factory ---\")\n\tsh, err := NewShape(\"circle\", 3.0)\n\tif err != nil {\n\t\tfmt.Println(\"Error:\", err)\n\t} else {\n\t\tPrintInfo(sh)\n\t}\n}","info":"## Summary\nDefine a `Shape` interface (`Area`, `Perimeter`, `Name`) in Go and implement it for `Rectangle`, `Circle`, and `Triangle`. A factory `NewShape` builds a concrete shape from a kind string plus parameters, and a polymorphic `PrintInfo` prints any shape's name, area, and perimeter.\n\n## Why it matters\nInterfaces are Go's primary abstraction mechanism: they let you write code against behavior instead of concrete types. A factory plus interface is the standard way to construct one of several implementations chosen at runtime, common in plugin systems, parsers, and config-driven object creation.\n\n## Idea\n- Declare `Shape` as a set of methods; any type whose value receivers define all three methods implicitly satisfies it.\n- Each struct implements the geometry: rectangle is width times height, circle uses pi r squared, triangle uses Heron's formula via half the perimeter.\n- `NewShape` validates the parameter count per kind and returns the concrete struct as a `Shape` interface value, or an error for bad input.\n- `PrintInfo` accepts the interface, so it works uniformly for every shape via dynamic dispatch.\n\n## Complexity\nAll area/perimeter computations are O(1) time and O(1) space; iterating and printing a slice of n shapes is O(n).\n\n## Pitfalls\n- Returning `nil` as a `Shape` from the factory on error must be paired with a non-nil error, and callers must check the error before using the value.\n- Heron's formula returns NaN for invalid triangles where a side exceeds the sum of the others; validate the triangle inequality if correctness matters.\n- All methods use value receivers, so they must be consistent; mixing pointer and value receivers can make a type fail to satisfy the interface for value instances.\n- The factory's parameter-count checks are the only guard against malformed input; missing them causes index-out-of-range panics."},{"t":"ąÆčüčéčĆą░ąĖą▓ą░ąĮąĖąĄ (embedding) ŌĆö \"ąĮą░čüą╗ąĄą┤ąŠą▓ą░ąĮąĖąĄ\" ą▓ Go","d":"medium","desc":"ąÆ Go ąĮąĄčé ą║ą╗ą░čüčüąŠą▓ ąĖ ąĮą░čüą╗ąĄą┤ąŠą▓ą░ąĮąĖčÅ. ąÆą╝ąĄčüčéąŠ čŹčéąŠą│ąŠ ŌĆö ą▓čüčéčĆą░ąĖą▓ą░ąĮąĖąĄ čüčéčĆčāą║čéčāčĆ. ąÆčüčéčĆąŠąĄąĮąĮą░čÅ čüčéčĆčāą║čéčāčĆą░ \"ą┐čĆąŠą┤ą▓ąĖą│ą░ąĄčé\" čüą▓ąŠąĖ ą┐ąŠą╗čÅ ąĖ ą╝ąĄčéąŠą┤čŗ ąĮą░ą▓ąĄčĆčģ.","go":"package main\n\nimport \"fmt\"\n\n// ąŚą░ą┤ą░ąĮąĖąĄ 27: ąÆčüčéčĆą░ąĖą▓ą░ąĮąĖąĄ (embedding) ŌĆö \"ąĮą░čüą╗ąĄą┤ąŠą▓ą░ąĮąĖąĄ\" ą▓ Go\n//\n// ąÆ Go ąĮąĄčé ą║ą╗ą░čüčüąŠą▓ ąĖ ąĮą░čüą╗ąĄą┤ąŠą▓ą░ąĮąĖčÅ. ąÆą╝ąĄčüčéąŠ čŹčéąŠą│ąŠ ŌĆö ą▓čüčéčĆą░ąĖą▓ą░ąĮąĖąĄ čüčéčĆčāą║čéčāčĆ.\n// ąÆčüčéčĆąŠąĄąĮąĮą░čÅ čüčéčĆčāą║čéčāčĆą░ \"ą┐čĆąŠą┤ą▓ąĖą│ą░ąĄčé\" čüą▓ąŠąĖ ą┐ąŠą╗čÅ ąĖ ą╝ąĄčéąŠą┤čŗ ąĮą░ą▓ąĄčĆčģ.\n\n// ąæą░ąĘąŠą▓ą░čÅ \"čüčāčēąĮąŠčüčéčī\"\ntype Entity struct {\n\tID   int\n\tName string\n}\n\nfunc (e Entity) String() string {\n\treturn fmt.Sprintf(\"[%d] %s\", e.ID, e.Name)\n}\n\n// User \"ąĮą░čüą╗ąĄą┤čāąĄčé\" Entity čćąĄčĆąĄąĘ ą▓čüčéčĆą░ąĖą▓ą░ąĮąĖąĄ\ntype User struct {\n\tEntity // ą▓čüčéčĆą░ąĖą▓ą░ąĄą╝ Entity (ą▒ąĄąĘ ąĖą╝ąĄąĮąĖ ą┐ąŠą╗čÅ ŌĆö čŹčéąŠ embedding)\n\tEmail  string\n\tRole   string\n}\n\n// ą¤ąĄčĆąĄąŠą┐čĆąĄą┤ąĄą╗čÅąĄą╝ String() ŌĆö \"override\"\nfunc (u User) String() string {\n\treturn fmt.Sprintf(\"%s <%s> role=%s\", u.Entity.String(), u.Email, u.Role)\n}\n\n// Admin \"ąĮą░čüą╗ąĄą┤čāąĄčé\" User\ntype Admin struct {\n\tUser        // ą▓čüčéčĆą░ąĖą▓ą░ąĄą╝ User\n\tPermissions []string\n}\n\nfunc (a Admin) HasPermission(perm string) bool {\n\tfor _, p := range a.Permissions {\n\t\tif p == perm {\n\t\t\treturn true\n\t\t}\n\t}\n\treturn false\n}\n\n// ą¤ąĄčĆąĄąŠą┐čĆąĄą┤ąĄą╗čÅąĄą╝ String() ąĄčēčæ čĆą░ąĘ\nfunc (a Admin) String() string {\n\treturn fmt.Sprintf(\"ADMIN: %s perms=%v\", a.User.String(), a.Permissions)\n}\n\nfunc main() {\n\tuser := User{\n\t\tEntity: Entity{ID: 1, Name: \"Alice\"},\n\t\tEmail:  \"alice@example.com\",\n\t\tRole:   \"editor\",\n\t}\n\n\tadmin := Admin{\n\t\tUser: User{\n\t\t\tEntity: Entity{ID: 2, Name: \"Bob\"},\n\t\t\tEmail:  \"bob@example.com\",\n\t\t\tRole:   \"admin\",\n\t\t},\n\t\tPermissions: []string{\"read\", \"write\", \"delete\"},\n\t}\n\n\t// ąöąŠčüčéčāą┐ ą║ ą┐ąŠą╗čÅą╝ Entity ą┐čĆčÅą╝ąŠ čćąĄčĆąĄąĘ Admin (ą┐čĆąŠą┤ą▓ąĖąČąĄąĮąĖąĄ ą┐ąŠą╗ąĄą╣)\n\tfmt.Println(admin.ID)    // 2 ŌĆö ą┐ąŠą╗ąĄ Entity.ID ą┤ąŠčüčéčāą┐ąĮąŠ ąĮą░ą┐čĆčÅą╝čāčÄ\n\tfmt.Println(admin.Name)  // Bob ŌĆö ą┐ąŠą╗ąĄ Entity.Name ą┤ąŠčüčéčāą┐ąĮąŠ ąĮą░ą┐čĆčÅą╝čāčÄ\n\tfmt.Println(admin.Email) // bob@example.com ŌĆö ą┐ąŠą╗ąĄ User.Email\n\n\tfmt.Println(user)                         // ą▓čŗąĘąŠą▓ąĄčé User.String()\n\tfmt.Println(admin)                        // ą▓čŗąĘąŠą▓ąĄčé Admin.String()\n\tfmt.Println(admin.HasPermission(\"write\")) // true\n\tfmt.Println(admin.HasPermission(\"sudo\"))  // false\n}","info":"## Summary\nDemonstrate Go struct embedding as a substitute for inheritance. `Entity` is embedded in `User`, which is embedded in `Admin`; embedded fields and methods are promoted to the outer type, and each level can override `String()`. The program prints promoted fields and the correctly dispatched `String()` output.\n\n## Why it matters\nGo has no classes or inheritance; embedding is how you reuse and compose behavior. It powers idioms like embedding `sync.Mutex`, wrapping `io.Reader`, or layering domain types, and understanding method promotion versus overriding is a frequent interview topic.\n\n## Idea\n- Embedding a type with no field name promotes its exported fields and methods to the outer struct, so `admin.ID` reaches `Entity.ID` through two levels.\n- When the outer type defines a method with the same name (`String`), it shadows the promoted one; the outer method can still call the inner via the qualified path `u.Entity.String()`.\n- Because `User` and `Admin` each define `String()`, they satisfy `fmt.Stringer`, so `fmt.Println` invokes their custom formatting.\n- This is composition, not inheritance: there is no polymorphic substitutability of `Admin` for `User` unless an interface is involved.\n\n## Complexity\nField and method promotion is resolved at compile time, so access is O(1); `HasPermission` scans the permissions slice in O(n).\n\n## Pitfalls\n- Method promotion is not virtual dispatch: a method on `Entity` that calls `String()` would call `Entity.String()`, not the outer override, since Go embedding has no dynamic binding to the outer type.\n- Ambiguous field/method names at the same embedding depth cause a compile error; the shallowest name wins only when depths differ.\n- An embedded value type cannot be assigned to a variable of the outer type's interface unless the methods are present at that level.\n- Forgetting to qualify (`u.Entity.String()`) inside the override causes infinite recursion if you accidentally call the promoted name."},{"t":"ąśąĮčéąĄčĆčäąĄą╣čüčŗ ąĖ ą┐ąŠą╗ąĖą╝ąŠčĆčäąĖąĘą╝","d":"medium","desc":"ąśąĮčéąĄčĆčäąĄą╣čü ą▓ Go ŌĆö ąĮą░ą▒ąŠčĆ ą╝ąĄčéąŠą┤ąŠą▓. ąøčÄą▒ąŠą╣ čéąĖą┐, čā ą║ąŠčéąŠčĆąŠą│ąŠ ąĄčüčéčī čŹčéąĖ ą╝ąĄčéąŠą┤čŗ, ą░ą▓čéąŠą╝ą░čéąĖčćąĄčüą║ąĖ čĆąĄą░ą╗ąĖąĘčāąĄčé ąĖąĮčéąĄčĆčäąĄą╣čü (ąĮąĄčÅą▓ąĮą░čÅ čĆąĄą░ą╗ąĖąĘą░čåąĖčÅ, duck typing).","go":"package main\n\nimport (\n\t\"fmt\"\n\t\"math\"\n)\n\n// ąŚą░ą┤ą░ąĮąĖąĄ 28: ąśąĮčéąĄčĆčäąĄą╣čüčŗ ąĖ ą┐ąŠą╗ąĖą╝ąŠčĆčäąĖąĘą╝\n//\n// ąśąĮčéąĄčĆčäąĄą╣čü ą▓ Go ŌĆö ąĮą░ą▒ąŠčĆ ą╝ąĄčéąŠą┤ąŠą▓. ąøčÄą▒ąŠą╣ čéąĖą┐, čā ą║ąŠčéąŠčĆąŠą│ąŠ ąĄčüčéčī čŹčéąĖ ą╝ąĄčéąŠą┤čŗ,\n// ą░ą▓čéąŠą╝ą░čéąĖčćąĄčüą║ąĖ čĆąĄą░ą╗ąĖąĘčāąĄčé ąĖąĮčéąĄčĆčäąĄą╣čü (ąĮąĄčÅą▓ąĮą░čÅ čĆąĄą░ą╗ąĖąĘą░čåąĖčÅ, duck typing).\n\ntype Shape interface {\n\tArea() float64\n\tPerimeter() float64\n\tString() string\n}\n\n// Circle čĆąĄą░ą╗ąĖąĘčāąĄčé Shape\ntype Circle struct {\n\tRadius float64\n}\n\nfunc (c Circle) Area() float64 {\n\treturn math.Pi * c.Radius * c.Radius\n}\n\nfunc (c Circle) Perimeter() float64 {\n\treturn 2 * math.Pi * c.Radius\n}\n\nfunc (c Circle) String() string {\n\treturn fmt.Sprintf(\"Circle(r=%.1f)\", c.Radius)\n}\n\n// Rectangle čĆąĄą░ą╗ąĖąĘčāąĄčé Shape\ntype Rectangle struct {\n\tWidth, Height float64\n}\n\nfunc (r Rectangle) Area() float64 {\n\treturn r.Width * r.Height\n}\n\nfunc (r Rectangle) Perimeter() float64 {\n\treturn 2 * (r.Width + r.Height)\n}\n\nfunc (r Rectangle) String() string {\n\treturn fmt.Sprintf(\"Rect(%.1fx%.1f)\", r.Width, r.Height)\n}\n\n// Triangle čĆąĄą░ą╗ąĖąĘčāąĄčé Shape\ntype Triangle struct {\n\tA, B, C float64 // čüčéąŠčĆąŠąĮčŗ\n}\n\nfunc (t Triangle) Perimeter() float64 {\n\treturn t.A + t.B + t.C\n}\n\nfunc (t Triangle) Area() float64 {\n\t// čäąŠčĆą╝čāą╗ą░ ąōąĄčĆąŠąĮą░\n\ts := t.Perimeter() / 2\n\treturn math.Sqrt(s * (s - t.A) * (s - t.B) * (s - t.C))\n}\n\nfunc (t Triangle) String() string {\n\treturn fmt.Sprintf(\"Triangle(%.1f,%.1f,%.1f)\", t.A, t.B, t.C)\n}\n\n// ą¤ąŠą╗ąĖą╝ąŠčĆčäąĮą░čÅ čäčāąĮą║čåąĖčÅ ŌĆö ą┐čĆąĖąĮąĖą╝ą░ąĄčé ą╗čÄą▒ąŠą╣ Shape\nfunc printShapeInfo(s Shape) {\n\tfmt.Printf(\"%-25s area=%.2f  perim=%.2f\\n\", s, s.Area(), s.Perimeter())\n}\n\n// ąĪčāą╝ą╝ą░ ą┐ą╗ąŠčēą░ą┤ąĄą╣ ŌĆö čüą╗ą░ą╣čü ąĖąĮčéąĄčĆčäąĄą╣čüąŠą▓\nfunc totalArea(shapes []Shape) float64 {\n\ttotal := 0.0\n\tfor _, s := range shapes {\n\t\ttotal += s.Area()\n\t}\n\treturn total\n}\n\nfunc main() {\n\tshapes := []Shape{\n\t\tCircle{Radius: 5},\n\t\tRectangle{Width: 3, Height: 4},\n\t\tTriangle{A: 3, B: 4, C: 5},\n\t}\n\n\tfor _, s := range shapes {\n\t\tprintShapeInfo(s)\n\t}\n\n\tfmt.Printf(\"\\nTotal area: %.2f\\n\", totalArea(shapes))\n\n\t// Type assertion ŌĆö ą┐čĆąŠą▓ąĄčĆą║ą░ ą║ąŠąĮą║čĆąĄčéąĮąŠą│ąŠ čéąĖą┐ą░\n\tvar s Shape = Circle{Radius: 10}\n\n\tif circle, ok := s.(Circle); ok {\n\t\tfmt.Printf(\"It's a circle with radius %.1f\\n\", circle.Radius)\n\t}\n\n\t// Type switch\n\tswitch v := s.(type) {\n\tcase Circle:\n\t\tfmt.Println(\"circle:\", v.Radius)\n\tcase Rectangle:\n\t\tfmt.Println(\"rect:\", v.Width)\n\tcase Triangle:\n\t\tfmt.Println(\"triangle:\", v.A)\n\t}\n}","info":"## Summary\nDefine a `Shape` interface (`Area`, `Perimeter`, `String`) and implement it for `Circle`, `Rectangle`, and `Triangle`. Demonstrate polymorphism by printing a slice of shapes, summing their areas, and inspecting concrete types with a type assertion and a type switch.\n\n## Why it matters\nImplicit interface satisfaction (duck typing) is central to Go: a type implements an interface just by having the right methods, with no explicit declaration. Type assertions and type switches are the standard way to recover concrete behavior from interface values, used everywhere in decoders, error handling, and visitor-style dispatch.\n\n## Idea\n- `Shape` lists three methods; each struct satisfies it implicitly by defining all three with value receivers.\n- `printShapeInfo` and `totalArea` operate on the interface, so adding a new shape type requires no changes to them, which is the polymorphism payoff.\n- A type assertion `s.(Circle)` with the comma-ok form safely tests whether the dynamic type is `Circle` without panicking.\n- A type switch `s.(type)` branches on the concrete dynamic type, binding `v` to the typed value in each case.\n\n## Complexity\nEach area/perimeter is O(1); `totalArea` over n shapes is O(n) time and O(1) extra space. Type assertion and type switch are O(1).\n\n## Pitfalls\n- A type assertion without the comma-ok form panics if the dynamic type does not match; always use `v, ok := s.(T)` when unsure.\n- Implementing `String()` makes the type a `fmt.Stringer`, so `%s` and `Println` use it; an accidental recursive call inside `String()` causes a stack overflow.\n- Value vs pointer receivers must be consistent, or the value form may not satisfy the interface.\n- Heron's formula yields NaN for degenerate triangles; the type switch must list every case you care about or fall through silently."},{"t":"ą¤ą░čéčéąĄčĆąĮ ąĪčéčĆą░čéąĄą│ąĖčÅ čćąĄčĆąĄąĘ ąĖąĮčéąĄčĆčäąĄą╣čüčŗ","d":"medium","desc":"ąĪčéčĆą░čéąĄą│ąĖčÅ ŌĆö ą┐ąŠą▓ąĄą┤ąĄąĮąĖąĄ ą┐ąĄčĆąĄą┤ą░čæčéčüčÅ ą║ą░ą║ ąĖąĮčéąĄčĆčäąĄą╣čü. ą£ąŠąČąĮąŠ ą╝ąĄąĮčÅčéčī ą░ą╗ą│ąŠčĆąĖčéą╝ ąĮą░ ą╗ąĄčéčā ą▒ąĄąĘ ąĖąĘą╝ąĄąĮąĄąĮąĖčÅ ąŠčüąĮąŠą▓ąĮąŠą│ąŠ ą║ąŠą┤ą░.","go":"package main\n\nimport (\n\t\"fmt\"\n\t\"sort\"\n\t\"strings\"\n)\n\n// ąŚą░ą┤ą░ąĮąĖąĄ 29: ą¤ą░čéčéąĄčĆąĮ ąĪčéčĆą░čéąĄą│ąĖčÅ čćąĄčĆąĄąĘ ąĖąĮčéąĄčĆčäąĄą╣čüčŗ\n//\n// ąĪčéčĆą░čéąĄą│ąĖčÅ ŌĆö ą┐ąŠą▓ąĄą┤ąĄąĮąĖąĄ ą┐ąĄčĆąĄą┤ą░čæčéčüčÅ ą║ą░ą║ ąĖąĮčéąĄčĆčäąĄą╣čü.\n// ą£ąŠąČąĮąŠ ą╝ąĄąĮčÅčéčī ą░ą╗ą│ąŠčĆąĖčéą╝ ąĮą░ ą╗ąĄčéčā ą▒ąĄąĘ ąĖąĘą╝ąĄąĮąĄąĮąĖčÅ ąŠčüąĮąŠą▓ąĮąŠą│ąŠ ą║ąŠą┤ą░.\n\n// ąśąĮčéąĄčĆčäąĄą╣čü čüčéčĆą░čéąĄą│ąĖąĖ čüąŠčĆčéąĖčĆąŠą▓ą║ąĖ\ntype SortStrategy interface {\n\tSort(items []string)\n\tName() string\n}\n\n// ąĪčéčĆą░čéąĄą│ąĖčÅ 1: ą┐ąŠ ą░ą╗čäą░ą▓ąĖčéčā\ntype AlphaSort struct{}\n\nfunc (a AlphaSort) Sort(items []string) {\n\tsort.Strings(items)\n}\n\nfunc (a AlphaSort) Name() string {\n\treturn \"alphabetical\"\n}\n\n// ąĪčéčĆą░čéąĄą│ąĖčÅ 2: ą┐ąŠ ą┤ą╗ąĖąĮąĄ čüčéčĆąŠą║ąĖ\ntype LengthSort struct{}\n\nfunc (l LengthSort) Sort(items []string) {\n\tsort.Slice(items, func(i, j int) bool {\n\t\treturn len(items[i]) < len(items[j])\n\t})\n}\n\nfunc (l LengthSort) Name() string {\n\treturn \"by length\"\n}\n\n// ąĪčéčĆą░čéąĄą│ąĖčÅ 3: ą┐ąŠ ą░ą╗čäą░ą▓ąĖčéčā ą▓ ąŠą▒čĆą░čéąĮąŠą╝ ą┐ąŠčĆčÅą┤ą║ąĄ\ntype ReversSort struct{}\n\nfunc (r ReversSort) Sort(items []string) {\n\tsort.Slice(items, func(i, j int) bool {\n\t\treturn items[i] > items[j]\n\t})\n}\n\nfunc (r ReversSort) Name() string {\n\treturn \"reverse alphabetical\"\n}\n\n// ąÜąŠąĮčéąĄą║čüčé ŌĆö ąĖčüą┐ąŠą╗čīąĘčāąĄčé čüčéčĆą░čéąĄą│ąĖčÄ\ntype Sorter struct {\n\tstrategy SortStrategy\n\titems    []string\n}\n\nfunc NewSorter(strategy SortStrategy) *Sorter {\n\treturn &Sorter{strategy: strategy}\n}\n\nfunc (s *Sorter) SetStrategy(strategy SortStrategy) {\n\ts.strategy = strategy\n}\n\nfunc (s *Sorter) AddItems(items ...string) {\n\ts.items = append(s.items, items...)\n}\n\nfunc (s *Sorter) Sort() {\n\ts.strategy.Sort(s.items)\n}\n\nfunc (s *Sorter) Print() {\n\tfmt.Printf(\"[%s]: %s\\n\", s.strategy.Name(), strings.Join(s.items, \", \"))\n}\n\n// --- ąĢčēčæ ą┐čĆąĖą╝ąĄčĆ: čüčéčĆą░čéąĄą│ąĖčÅ čäąĖą╗čīčéčĆą░čåąĖąĖ ---\n\ntype FilterStrategy interface {\n\tFilter(items []string) []string\n}\n\n// ążąĖą╗čīčéčĆ: čéąŠą╗čīą║ąŠ čüčéčĆąŠą║ąĖ ą┤ą╗ąĖąĮąĮąĄąĄ N\ntype MinLengthFilter struct {\n\tMinLen int\n}\n\nfunc (f MinLengthFilter) Filter(items []string) []string {\n\t// ą▓ąĄčĆąĮčāčéčī čéąŠą╗čīą║ąŠ čéąĄ items, čā ą║ąŠčéąŠčĆčŗčģ len >= f.MinLen\n\tresult := make([]string, 0, len(items))\n\tfor _, item := range items {\n\t\tif len(item) >= f.MinLen {\n\t\t\tresult = append(result, item)\n\t\t}\n\t}\n\treturn result\n}\n\n// ążąĖą╗čīčéčĆ: čéąŠą╗čīą║ąŠ čüčéčĆąŠą║ąĖ čüąŠą┤ąĄčĆąČą░čēąĖąĄ ą┐ąŠą┤čüčéčĆąŠą║čā\ntype ContainsFilter struct {\n\tSubstr string\n}\n\nfunc (f ContainsFilter) Filter(items []string) []string {\n\t// ą▓ąĄčĆąĮčāčéčī čéąŠą╗čīą║ąŠ čéąĄ items, ą║ąŠčéąŠčĆčŗąĄ čüąŠą┤ąĄčĆąČą░čé f.Substr\n\tresult := make([]string, 0, len(items))\n\tfor _, item := range items {\n\t\tif strings.Contains(item, f.Substr) {\n\t\t\tresult = append(result, item)\n\t\t}\n\t}\n\treturn result\n}\n\nfunc applyFilter(items []string, f FilterStrategy) []string {\n\treturn f.Filter(items)\n}\n\nfunc main() {\n\tsorter := NewSorter(AlphaSort{})\n\tsorter.AddItems(\"banana\", \"apple\", \"cherry\", \"date\", \"elderberry\")\n\n\tsorter.Sort()\n\tsorter.Print() // [alphabetical]: apple, banana, cherry, date, elderberry\n\n\tsorter.SetStrategy(LengthSort{})\n\tsorter.Sort()\n\tsorter.Print() // [by length]: date, apple, banana, cherry, elderberry\n\n\tsorter.SetStrategy(ReversSort{})\n\tsorter.Sort()\n\tsorter.Print() // [reverse alphabetical]: elderberry, date, cherry, banana, apple\n\n\t// ążąĖą╗čīčéčĆą░čåąĖčÅ\n\twords := []string{\"go\", \"rust\", \"python\", \"c\", \"javascript\", \"ruby\"}\n\n\tlong := applyFilter(words, MinLengthFilter{MinLen: 4})\n\tfmt.Println(\"long:\", long) // [rust, python, javascript, ruby]\n\n\twithR := applyFilter(words, ContainsFilter{\"r\"})\n\tfmt.Println(\"with r:\", withR) // [rust, ruby]\n}","info":"## Summary\nImplement the Strategy pattern in Go: define a `SortStrategy` interface (`Sort([]string)` + `Name()`) with interchangeable implementations (alphabetical, by length, reverse), plus a `Sorter` context that holds a strategy and can swap it at runtime via `SetStrategy`. A parallel `FilterStrategy` interface shows filtering by minimum length or by substring. Input is a slice of strings; output is the slice sorted/filtered according to the currently selected strategy.\n\n## Why it matters\nThe Strategy pattern lets you select an algorithm at runtime and decouple it from the code that uses it, which is exactly how `sort.Sort` / `sort.Interface`, `http.Handler`, and pluggable comparators work in real Go codebases.\n\n## Idea\n- Express the varying behavior (sorting, filtering) as a small interface rather than a hardcoded function.\n- Concrete types (`AlphaSort`, `LengthSort`, `ReversSort`) each satisfy the interface; the `Sorter` context depends only on the interface, not the concrete type.\n- Swapping the algorithm is just assigning a different value to the `strategy` field, with no change to `Sorter` itself.\n- This works because Go interfaces are satisfied implicitly, so any type with the right methods is a drop-in strategy.\n\n## Complexity\nSorting strategies are O(n log n) time, O(1)/O(log n) auxiliary; filters are O(n┬Ęm) time (m = match cost) and O(n) space for the result slice.\n\n## Pitfalls\n- `sort.Slice` is not stable; equal-key elements (same length) may keep arbitrary relative order, so do not assert exact ordering of ties.\n- `Sort` mutates the underlying slice in place; the caller shares that backing array.\n- Comparing reverse order with `>` gives descending lexicographic order, which is not the same as reversing an ascending sort when ties exist.\n- Filters should allocate a new slice rather than modifying the input to avoid surprising aliasing."},{"t":"ą¤ą░čéčéąĄčĆąĮ ąöąĄą║ąŠčĆą░čéąŠčĆ čćąĄčĆąĄąĘ ą▓čüčéčĆą░ąĖą▓ą░ąĮąĖąĄ ąĖąĮčéąĄčĆčäąĄą╣čüą░","d":"medium","desc":"ąöąĄą║ąŠčĆą░čéąŠčĆ ąŠą▒ąŠčĆą░čćąĖą▓ą░ąĄčé ąŠą▒čŖąĄą║čé, ą┤ąŠą▒ą░ą▓ą╗čÅčÅ ą┐ąŠą▓ąĄą┤ąĄąĮąĖąĄ ą▒ąĄąĘ ąĖąĘą╝ąĄąĮąĄąĮąĖčÅ ąĖčüčģąŠą┤ąĮąŠą│ąŠ ą║ąŠą┤ą░. ąÆ Go ŌĆö čćąĄčĆąĄąĘ ą▓čüčéčĆą░ąĖą▓ą░ąĮąĖąĄ ąĖąĮčéąĄčĆčäąĄą╣čüą░ ą▓ čüčéčĆčāą║čéčāčĆčā.","go":"package main\n\nimport (\n\t\"fmt\"\n\t\"strings\"\n\t\"time\"\n)\n\n// ąŚą░ą┤ą░ąĮąĖąĄ 30: ą¤ą░čéčéąĄčĆąĮ ąöąĄą║ąŠčĆą░čéąŠčĆ čćąĄčĆąĄąĘ ą▓čüčéčĆą░ąĖą▓ą░ąĮąĖąĄ ąĖąĮčéąĄčĆčäąĄą╣čüą░\n//\n// ąöąĄą║ąŠčĆą░čéąŠčĆ ąŠą▒ąŠčĆą░čćąĖą▓ą░ąĄčé ąŠą▒čŖąĄą║čé, ą┤ąŠą▒ą░ą▓ą╗čÅčÅ ą┐ąŠą▓ąĄą┤ąĄąĮąĖąĄ ą▒ąĄąĘ ąĖąĘą╝ąĄąĮąĄąĮąĖčÅ ąĖčüčģąŠą┤ąĮąŠą│ąŠ ą║ąŠą┤ą░.\n// ąÆ Go ŌĆö čćąĄčĆąĄąĘ ą▓čüčéčĆą░ąĖą▓ą░ąĮąĖąĄ ąĖąĮčéąĄčĆčäąĄą╣čüą░ ą▓ čüčéčĆčāą║čéčāčĆčā.\n\n// ąæą░ąĘąŠą▓čŗą╣ ąĖąĮčéąĄčĆčäąĄą╣čü\ntype Logger interface {\n\tLog(msg string)\n}\n\n// ą¤čĆąŠčüčéąŠą╣ ą╗ąŠą│ą│ąĄčĆ\ntype SimpleLogger struct{}\n\nfunc (l SimpleLogger) Log(msg string) {\n\tfmt.Println(msg)\n}\n\n// ąöąĄą║ąŠčĆą░čéąŠčĆ 1: ą┤ąŠą▒ą░ą▓ą╗čÅąĄčé ą▓čĆąĄą╝ąĄąĮąĮčāčÄ ą╝ąĄčéą║čā\ntype TimestampLogger struct {\n\tLogger // ą▓čüčéčĆą░ąĖą▓ą░ąĄą╝ ąĖąĮčéąĄčĆčäąĄą╣čü Logger ŌĆö čŹčéąŠ ą║ą╗čÄčć ą║ ą┐ą░čéčéąĄčĆąĮčā\n}\n\nfunc (t TimestampLogger) Log(msg string) {\n\tstamped := fmt.Sprintf(\"[%s] %s\", time.Now().Format(\"15:04:05\"), msg)\n\tt.Logger.Log(stamped) // ą▓čŗąĘčŗą▓ą░ąĄą╝ Log ą▓čüčéčĆąŠąĄąĮąĮąŠą│ąŠ ą╗ąŠą│ą│ąĄčĆą░\n}\n\n// ąöąĄą║ąŠčĆą░čéąŠčĆ 2: ą┤ąŠą▒ą░ą▓ą╗čÅąĄčé čāčĆąŠą▓ąĄąĮčī (INFO, ERROR...)\ntype LevelLogger struct {\n\tLogger // ą▓čüčéčĆą░ąĖą▓ą░ąĄą╝ Logger\n\tLevel  string\n}\n\nfunc (l LevelLogger) Log(msg string) {\n\tleveled := fmt.Sprintf(\"%s: %s\", l.Level, msg)\n\tl.Logger.Log(leveled) // ą┐ąĄčĆąĄą┤ą░čæą╝ ą┤ą░ą╗čīčłąĄ ą┐ąŠ čåąĄą┐ąŠčćą║ąĄ\n}\n\n// ąöąĄą║ąŠčĆą░čéąŠčĆ 3: ą┐čĆąĄąŠą▒čĆą░ąĘčāąĄčé ą▓ uppercase\ntype UpperLogger struct {\n\tLogger\n}\n\nfunc (u UpperLogger) Log(msg string) {\n\tu.Logger.Log(strings.ToUpper(msg))\n}\n\n// ąöąĄą║ąŠčĆą░čéąŠčĆ 4: čäąĖą╗čīčéčĆčāąĄčé čüąŠąŠą▒čēąĄąĮąĖčÅ ą┐ąŠ ą┐ąŠą┤čüčéčĆąŠą║ąĄ\ntype FilterLogger struct {\n\tLogger\n\tMustContain string\n}\n\nfunc (f FilterLogger) Log(msg string) {\n\tif strings.Contains(msg, f.MustContain) {\n\t\tf.Logger.Log(msg)\n\t}\n\t// ąĖąĮą░čćąĄ ŌĆö čüąŠąŠą▒čēąĄąĮąĖąĄ ą┐čĆąŠą│ą╗ą░čéčŗą▓ą░ąĄčéčüčÅ\n}\n\nfunc main() {\n\t// ą¤čĆąŠčüčéąŠą╣ ą╗ąŠą│ą│ąĄčĆ\n\tvar logger Logger = SimpleLogger{}\n\tlogger.Log(\"hello\")\n\t// hello\n\n\t// ą×ą▒ąŠčĆą░čćąĖą▓ą░ąĄą╝ ą▓ timestamp\n\tlogger = TimestampLogger{Logger: logger}\n\tlogger.Log(\"with time\")\n\t// [15:04:05] with time\n\n\t// ą×ą▒ąŠčĆą░čćąĖą▓ą░ąĄą╝ ąĄčēčæ ą▓ level\n\tlogger = LevelLogger{Logger: logger, Level: \"INFO\"}\n\tlogger.Log(\"server started\")\n\t// INFO: [15:04:05] server started\n\n\t// ą”ąĄą┐ąŠčćą║ą░: Simple ŌåÆ Timestamp ŌåÆ Upper ŌåÆ Level\n\tchain := LevelLogger{\n\t\tLogger: UpperLogger{\n\t\t\tLogger: TimestampLogger{\n\t\t\t\tLogger: SimpleLogger{},\n\t\t\t},\n\t\t},\n\t\tLevel: \"ERROR\",\n\t}\n\tchain.Log(\"something broke\")\n\t// ERROR: [15:04:05] SOMETHING BROKE\n\n\t// ąĪ čäąĖą╗čīčéčĆąŠą╝: čéąŠą╗čīą║ąŠ čüąŠąŠą▒čēąĄąĮąĖčÅ čüąŠą┤ąĄčĆąČą░čēąĖąĄ \"FAIL\"\n\tfiltered := FilterLogger{\n\t\tLogger:      SimpleLogger{},\n\t\tMustContain: \"FAIL\",\n\t}\n\tfiltered.Log(\"all good\")        // ŌåÉ ąĮąĄ ąĮą░ą┐ąĄčćą░čéą░ąĄčéčüčÅ\n\tfiltered.Log(\"FAIL: disk full\") // FAIL: disk full\n}","info":"## Summary\nImplement the Decorator pattern in Go using interface embedding: a `Logger` interface with `Log(msg)`, a base `SimpleLogger`, and decorators (`TimestampLogger`, `LevelLogger`, `UpperLogger`, `FilterLogger`) that each embed a `Logger`, transform the message, and delegate to the wrapped logger. The input is a log message; the output is that message after passing through the chain of decorators (timestamp prefix, level prefix, uppercasing, or substring filtering).\n\n## Why it matters\nDecorators add behavior to an object without modifying it or subclassing, which is how middleware chains (`http.Handler` wrappers), `io.Reader`/`io.Writer` wrappers, and logging pipelines are built in production Go.\n\n## Idea\n- Each decorator struct embeds the `Logger` interface, so it automatically satisfies `Logger` and holds a reference to the next logger in the chain.\n- The decorator overrides `Log`, does its transformation, then calls the embedded `Logger.Log`, forwarding down the chain.\n- Wrapping is composable: you nest constructors to build an arbitrary pipeline, and order matters because each layer sees the output of the layer it wraps.\n- The base `SimpleLogger` terminates the chain by actually printing.\n\n## Complexity\nO(k) time per log call where k is the number of decorators in the chain (each does O(len(msg)) work); O(k) space for the nested wrapper objects.\n\n## Pitfalls\n- Order of nesting changes the result: uppercasing before vs. after adding a level/timestamp prefix produces different strings.\n- If a decorator forgets to call the embedded `Logger.Log`, the message is silently dropped (intentional for `FilterLogger`, a bug elsewhere).\n- Embedding the interface (not a concrete type) is what keeps decorators interchangeable; embedding a concrete logger would break the chain.\n- A nil embedded `Logger` panics on delegation, so always set the wrapped logger."},{"t":"ą¤ą░čéčéąĄčĆąĮ ąØą░ą▒ą╗čÄą┤ą░čéąĄą╗čī (Observer)","d":"medium","desc":"ąØą░ą▒ą╗čÄą┤ą░čéąĄą╗čī ŌĆö ą┐ąŠą┤ą┐ąĖčüčćąĖą║ąĖ ą┐ąŠą╗čāčćą░čÄčé čāą▓ąĄą┤ąŠą╝ą╗ąĄąĮąĖčÅ ą┐čĆąĖ ąĖąĘą╝ąĄąĮąĄąĮąĖąĖ čüąŠčüčéąŠčÅąĮąĖčÅ.","go":"package main\n\nimport \"fmt\"\n\n// ąŚą░ą┤ą░ąĮąĖąĄ 31: ą¤ą░čéčéąĄčĆąĮ ąØą░ą▒ą╗čÄą┤ą░čéąĄą╗čī (Observer)\n//\n// ąØą░ą▒ą╗čÄą┤ą░čéąĄą╗čī ŌĆö ą┐ąŠą┤ą┐ąĖčüčćąĖą║ąĖ ą┐ąŠą╗čāčćą░čÄčé čāą▓ąĄą┤ąŠą╝ą╗ąĄąĮąĖčÅ ą┐čĆąĖ ąĖąĘą╝ąĄąĮąĄąĮąĖąĖ čüąŠčüčéąŠčÅąĮąĖčÅ.\n\n// ąśąĮčéąĄčĆčäąĄą╣čü ąĮą░ą▒ą╗čÄą┤ą░čéąĄą╗čÅ\ntype Observer interface {\n\tOnEvent(event string, data any) // any = interface{}\n}\n\n// ąśąĮčéąĄčĆčäąĄą╣čü ąĖąĘą┤ą░čéąĄą╗čÅ\ntype Publisher interface {\n\tSubscribe(observer Observer)\n\tUnsubscribe(observer Observer)\n\tNotify(event string, data any)\n}\n\n// --- ąÜąŠąĮą║čĆąĄčéąĮčŗą╣ ąĖąĘą┤ą░čéąĄą╗čī: ą£ą░ą│ą░ąĘąĖąĮ ---\n\ntype Store struct {\n\tname      string\n\tobservers []Observer\n\tproducts  map[string]float64\n}\n\nfunc NewStore(name string) *Store {\n\treturn &Store{\n\t\tname:      name,\n\t\tobservers: make([]Observer, 0),\n\t\tproducts:  make(map[string]float64),\n\t}\n}\n\nfunc (s *Store) Subscribe(obs Observer) {\n\ts.observers = append(s.observers, obs)\n}\n\nfunc (s *Store) Unsubscribe(obs Observer) {\n\t// ąĮą░ą╣čéąĖ obs ą▓ s.observers ąĖ čāą┤ą░ą╗ąĖčéčī.\n\t// ąĪčĆą░ą▓ąĮąĖą▓ą░čéčī čćąĄčĆąĄąĘ == (ąĖąĮčéąĄčĆčäąĄą╣čüčŗ čüčĆą░ą▓ąĮąĖą╝čŗ ąĄčüą╗ąĖ underlying type čüčĆą░ą▓ąĮąĖą╝)\n\tfor i, o := range s.observers {\n\t\tif o == obs {\n\t\t\ts.observers = append(s.observers[:i], s.observers[i+1:]...)\n\t\t\treturn\n\t\t}\n\t}\n}\n\nfunc (s *Store) Notify(event string, data any) {\n\tfor _, obs := range s.observers {\n\t\tobs.OnEvent(event, data)\n\t}\n}\n\nfunc (s *Store) AddProduct(name string, price float64) {\n\ts.products[name] = price\n\ts.Notify(\"product_added\", map[string]any{\n\t\t\"product\": name,\n\t\t\"price\":   price,\n\t})\n}\n\nfunc (s *Store) UpdatePrice(name string, newPrice float64) {\n\toldPrice := s.products[name]\n\ts.products[name] = newPrice\n\ts.Notify(\"price_changed\", map[string]any{\n\t\t\"product\":   name,\n\t\t\"old_price\": oldPrice,\n\t\t\"new_price\": newPrice,\n\t})\n}\n\n// --- ąÜąŠąĮą║čĆąĄčéąĮčŗąĄ ąĮą░ą▒ą╗čÄą┤ą░čéąĄą╗ąĖ ---\n\ntype EmailNotifier struct {\n\tAddress string\n}\n\nfunc (e EmailNotifier) OnEvent(event string, data any) {\n\tfmt.Printf(\"[EMAIL ŌåÆ %s] event=%s data=%v\\n\", e.Address, event, data)\n}\n\ntype DashboardWidget struct {\n\tName string\n}\n\nfunc (d DashboardWidget) OnEvent(event string, data any) {\n\tfmt.Printf(\"[DASHBOARD:%s] %s: %v\\n\", d.Name, event, data)\n}\n\ntype PriceWatcher struct {\n\tProductName string\n\tMaxPrice    float64\n}\n\nfunc (p PriceWatcher) OnEvent(event string, data any) {\n\tif event != \"price_changed\" {\n\t\treturn\n\t}\n\t// ąĄčüą╗ąĖ data ŌĆö čŹčéąŠ map[string]any ąĖ product čüąŠą▓ą┐ą░ą┤ą░ąĄčé čü p.ProductName\n\t// ąĖ new_price (float64) > p.MaxPrice ŌĆö ąĮą░ą┐ąĄčćą░čéą░čéčī ą┐čĆąĄą┤čāą┐čĆąĄąČą┤ąĄąĮąĖąĄ\n\tm, ok := data.(map[string]any)\n\tif !ok {\n\t\treturn\n\t}\n\tproduct, _ := m[\"product\"].(string)\n\tnewPrice, _ := m[\"new_price\"].(float64)\n\tif product == p.ProductName && newPrice > p.MaxPrice {\n\t\tfmt.Printf(\"ŌÜĀ PRICE ALERT: %s is now %v (max: %v)\\n\", product, newPrice, p.MaxPrice)\n\t}\n}\n\nfunc main() {\n\tstore := NewStore(\"TechShop\")\n\n\temail := EmailNotifier{Address: \"user@mail.com\"}\n\tdash := DashboardWidget{Name: \"main\"}\n\twatcher := PriceWatcher{ProductName: \"laptop\", MaxPrice: 1000}\n\n\tstore.Subscribe(email)\n\tstore.Subscribe(dash)\n\tstore.Subscribe(watcher)\n\n\tstore.AddProduct(\"laptop\", 900)\n\tfmt.Println(\"---\")\n\tstore.UpdatePrice(\"laptop\", 1200) // watcher ą┤ąŠą╗ąČąĄąĮ čüčĆąĄą░ą│ąĖčĆąŠą▓ą░čéčī\n\tfmt.Println(\"---\")\n\n\t// ą×čéą┐ąĖčüčŗą▓ą░ąĄą╝ email\n\tstore.Unsubscribe(email)\n\tstore.AddProduct(\"mouse\", 25) // email ąĮąĄ ą┐ąŠą╗čāčćąĖčé\n}","info":"## Summary\nImplement the Observer pattern in Go: a `Publisher` (`Store`) maintains a list of `Observer`s and notifies them on state changes (`AddProduct`, `UpdatePrice`) by calling `OnEvent(event, data)`. Concrete observers (`EmailNotifier`, `DashboardWidget`, `PriceWatcher`) react differently, e.g. `PriceWatcher` raises an alert only when a watched product's new price exceeds its threshold. Input is a series of store mutations; output is the side-effects each subscribed observer emits.\n\n## Why it matters\nObserver decouples event producers from consumers and underlies pub/sub systems, UI event handlers, and reactive state propagation; in Go it is the conceptual basis for channel fan-out and event buses.\n\n## Idea\n- The subject stores observers as a slice of the `Observer` interface and iterates it on every change, calling `OnEvent`.\n- Events carry a name plus a `data any` payload (here a `map[string]any`); observers type-assert and inspect the fields they care about.\n- `Subscribe`/`Unsubscribe` add/remove from the slice; removal compares interface values with `==`, which is valid because the concrete observer types are comparable structs.\n- Decoupling works because the store depends only on the interface, so new observer types need no change to the publisher.\n\n## Complexity\nNotify is O(n) per event over n observers; Unsubscribe is O(n) for the linear search and slice splice; space is O(n) for the observer list.\n\n## Pitfalls\n- Comparing observers with `==` panics if any concrete observer type is not comparable (e.g. contains a slice/map field); use an explicit ID or pointer identity instead.\n- Mutating the observers slice while iterating in `Notify` (an observer that unsubscribes during notification) can skip or double-process entries.\n- Type assertions on the `any` payload must use the comma-ok form; a wrong key or type otherwise yields a zero value silently.\n- Reading a missing key in the products map returns the zero `float64`, so `old_price` may be 0 for a never-seen product."},{"t":"Functional Options + Factory","d":"medium","desc":"Functional Options ŌĆö ąĖą┤ąĖąŠą╝ą░čéąĖčćąĮčŗą╣ Go-ą┐ą░čéčéąĄčĆąĮ ą┤ą╗čÅ ą║ąŠąĮčäąĖą│čāčĆą░čåąĖąĖ. ąÆą╝ąĄčüčéąŠ ą┤ą╗ąĖąĮąĮąŠą│ąŠ ą║ąŠąĮčüčéčĆčāą║čéąŠčĆą░ ąĖą╗ąĖ builder ŌĆö ą┐ąĄčĆąĄą┤ą░čæą╝ čäčāąĮą║čåąĖąĖ-ąŠą┐čåąĖąĖ.","go":"package main\n\nimport (\n\t\"fmt\"\n\t\"time\"\n)\n\n// ąŚą░ą┤ą░ąĮąĖąĄ 32: Functional Options + Factory\n//\n// Functional Options ŌĆö ąĖą┤ąĖąŠą╝ą░čéąĖčćąĮčŗą╣ Go-ą┐ą░čéčéąĄčĆąĮ ą┤ą╗čÅ ą║ąŠąĮčäąĖą│čāčĆą░čåąĖąĖ.\n// ąÆą╝ąĄčüčéąŠ ą┤ą╗ąĖąĮąĮąŠą│ąŠ ą║ąŠąĮčüčéčĆčāą║čéąŠčĆą░ ąĖą╗ąĖ builder ŌĆö ą┐ąĄčĆąĄą┤ą░čæą╝ čäčāąĮą║čåąĖąĖ-ąŠą┐čåąĖąĖ.\n\ntype Server struct {\n\thost         string\n\tport         int\n\treadTimeout  time.Duration\n\twriteTimeout time.Duration\n\tmaxConns     int\n\ttls          bool\n}\n\n// Option ŌĆö čéąĖą┐ čäčāąĮą║čåąĖąĖ, ą║ąŠčéąŠčĆą░čÅ ą╝ąŠą┤ąĖčäąĖčåąĖčĆčāąĄčé Server\ntype Option func(s *Server)\n\nfunc WithPort(port int) Option {\n\treturn func(s *Server) {\n\t\ts.port = port\n\t}\n}\n\nfunc WithTimeouts(read, write time.Duration) Option {\n\treturn func(s *Server) {\n\t\ts.readTimeout = read\n\t\ts.writeTimeout = write\n\t}\n}\n\nfunc WithMaxConns(n int) Option {\n\treturn func(s *Server) {\n\t\ts.maxConns = n\n\t}\n}\n\nfunc WithTLS(enabled bool) Option {\n\treturn func(s *Server) {\n\t\ts.tls = enabled\n\t}\n}\n\n// ąÜąŠąĮčüčéčĆčāą║čéąŠčĆ čü ąŠą┐čåąĖčÅą╝ąĖ\nfunc NewServer(host string, opts ...Option) *Server {\n\t// ąöąĄčäąŠą╗čéąĮčŗąĄ ąĘąĮą░čćąĄąĮąĖčÅ\n\ts := &Server{\n\t\thost:         host,\n\t\tport:         8080,\n\t\treadTimeout:  5 * time.Second,\n\t\twriteTimeout: 10 * time.Second,\n\t\tmaxConns:     100,\n\t\ttls:          false,\n\t}\n\n\t// ą¤čĆąĖą╝ąĄąĮčÅąĄą╝ ąŠą┐čåąĖąĖ\n\tfor _, opt := range opts {\n\t\topt(s)\n\t}\n\n\treturn s\n}\n\nfunc (s *Server) String() string {\n\tproto := \"http\"\n\tif s.tls {\n\t\tproto = \"https\"\n\t}\n\treturn fmt.Sprintf(\"%s://%s:%d (read=%v write=%v maxConns=%d)\",\n\t\tproto, s.host, s.port, s.readTimeout, s.writeTimeout, s.maxConns)\n}\n\n// --- ąĢčēčæ ą┐čĆąĖą╝ąĄčĆ: ąĖąĮčéąĄčĆčäąĄą╣čü + čäą░ą▒čĆąĖą║ą░ ---\n\ntype Storage interface {\n\tSave(key string, value []byte) error\n\tLoad(key string) ([]byte, error)\n\tName() string // ą╝ąĄčéąŠą┤ Name\n}\n\ntype MemoryStorage struct {\n\tdata map[string][]byte\n}\n\nfunc (m *MemoryStorage) Save(key string, value []byte) error {\n\tm.data[key] = value\n\treturn nil\n}\n\nfunc (m *MemoryStorage) Load(key string) ([]byte, error) {\n\tv, ok := m.data[key]\n\tif !ok {\n\t\treturn nil, fmt.Errorf(\"key %s not found\", key)\n\t}\n\treturn v, nil\n}\n\nfunc (m *MemoryStorage) Name() string {\n\treturn \"memory\"\n}\n\ntype DiskStorage struct {\n\tBasePath string\n}\n\nfunc (d *DiskStorage) Save(key string, value []byte) error {\n\tfmt.Printf(\"[disk] saving %s to %s/%s\\n\", key, d.BasePath, key)\n\treturn nil // čāą┐čĆąŠčēčæąĮąĮąŠ\n}\n\nfunc (d *DiskStorage) Load(key string) ([]byte, error) {\n\tfmt.Printf(\"[disk] loading %s from %s/%s\\n\", key, d.BasePath, key)\n\treturn []byte(\"fake data\"), nil\n}\n\nfunc (d *DiskStorage) Name() string {\n\treturn \"disk\"\n}\n\n// ążą░ą▒čĆąĖą║ą░ ŌĆö čüąŠąĘą┤ą░čæčé Storage ą┐ąŠ ąĖą╝ąĄąĮąĖ\nfunc NewStorage(kind string) (Storage, error) {\n\tswitch kind {\n\tcase \"memory\":\n\t\treturn &MemoryStorage{data: make(map[string][]byte)}, nil\n\tcase \"disk\":\n\t\treturn &DiskStorage{BasePath: \"/tmp/data\"}, nil\n\tdefault:\n\t\treturn nil, fmt.Errorf(\"unknown storage: %s\", kind)\n\t}\n}\n\nfunc main() {\n\t// Functional Options\n\ts1 := NewServer(\"localhost\")\n\tfmt.Println(s1)\n\n\ts2 := NewServer(\"api.example.com\",\n\t\tWithPort(443),\n\t\tWithTLS(true),\n\t\tWithMaxConns(1000),\n\t\tWithTimeouts(30*time.Second, 60*time.Second),\n\t)\n\tfmt.Println(s2)\n\n\t// Factory\n\tfor _, kind := range []string{\"memory\", \"disk\", \"redis\"} {\n\t\tstorage, err := NewStorage(kind)\n\t\tif err != nil {\n\t\t\tfmt.Printf(\"error: %v\\n\", err)\n\t\t\tcontinue\n\t\t}\n\t\tfmt.Printf(\"created %s storage\\n\", storage.Name())\n\t}\n}","info":"## Summary\nImplement two idiomatic Go construction patterns. Functional Options: `NewServer(host, opts...)` starts from sensible defaults and applies a variadic list of `Option` functions (`WithPort`, `WithTLS`, `WithTimeouts`, `WithMaxConns`) that each mutate the `Server`. Factory: `NewStorage(kind)` returns a `Storage` interface implementation (`MemoryStorage` or `DiskStorage`) selected by string, or an error for unknown kinds. Input is a host plus option functions / a storage kind; output is a configured `*Server` or a `Storage` value.\n\n## Why it matters\nFunctional options give clean, backward-compatible, optional configuration without telescoping constructors or builders, and the factory hides concrete types behind an interface; both are pervasive in real Go libraries (gRPC, zap, database clients).\n\n## Idea\n- An `Option` is a `func(*Server)`; each `WithX` returns a closure capturing its argument and setting one field.\n- The constructor seeds defaults first, then loops over the options applying them in order, so later options override earlier ones.\n- The factory switches on the kind string and returns the matching concrete type as the `Storage` interface, returning an error in the default case instead of panicking.\n- Returning the interface lets callers stay decoupled from whether storage is in-memory or on disk.\n\n## Complexity\n`NewServer` is O(k) over k options; `NewStorage` is O(1). Space is O(1) beyond the constructed object (the memory storage's map grows with stored entries).\n\n## Pitfalls\n- Apply defaults before applying options, otherwise zero values clobber user choices.\n- `MemoryStorage` must initialize its map (done in the factory); writing to a nil map panics.\n- Option order matters when two options touch the same field; document precedence.\n- The factory must handle the unknown-kind case explicitly and return a non-nil error, and callers must check it before using the returned interface (which is nil on error)."}]},{"name":"Resilience","icon":"­¤øĪ","problems":[{"t":"Rate Limiter čćąĄčĆąĄąĘ ticker","d":"hard","desc":"========== ą¤ą×ą»ąĪąØąĢąØąśąĢ ========== Rate Limiter ŌĆö ąŠą│čĆą░ąĮąĖčćąĖčéąĄą╗čī čćą░čüčéąŠčéčŗ ąĘą░ą┐čĆąŠčüąŠą▓ (token bucket algorithm). ąŚąÉą¦ąĢą£: ąŚą░čēąĖčēą░ąĄčé čüąĄčĆą▓ąĖčü ąŠčé ą┐ąĄčĆąĄą│čĆčāąĘą║ąĖ. ąØą░ą┐čĆąĖą╝ąĄčĆ: API ą┐ąŠąĘą▓ąŠą╗čÅąĄčé 5 ąĘą░ą┐čĆąŠčüąŠą▓/čüąĄą║ ŌĆö Rate Limiter ą│ą░čĆą░ąĮčéąĖčĆčāąĄčé, čćčéąŠ ą║ą╗ąĖąĄąĮčé ąĮąĄ ą┐čĆąĄą▓čŗčüąĖčé ą╗ąĖą╝ąĖčé. ąÜąÉąÜ ąĀąÉąæą×ąóąÉąĢąó (Token Bucket): 1. ąĢčüčéčī ┬½ą▓ąĄą┤čĆąŠ┬╗ (ą▒čāčäąĄčĆąĖąĘąĖčĆąŠą▓ą░ąĮąĮčŗą╣ ą║ą░ąĮą░ą╗) čü čéąŠą║ąĄąĮą░ą╝ŌĆ”","go":"package main\n\nimport (\n\t\"fmt\"\n\t\"sync\"\n\t\"time\"\n)\n\n// ąŚą░ą┤ą░ąĮąĖąĄ 14: Rate Limiter čćąĄčĆąĄąĘ ticker\n//\n// ========== ą¤ą×ą»ąĪąØąĢąØąśąĢ ==========\n//\n// Rate Limiter ŌĆö ąŠą│čĆą░ąĮąĖčćąĖčéąĄą╗čī čćą░čüčéąŠčéčŗ ąĘą░ą┐čĆąŠčüąŠą▓ (token bucket algorithm).\n//\n// ąŚąÉą¦ąĢą£:\n//   ąŚą░čēąĖčēą░ąĄčé čüąĄčĆą▓ąĖčü ąŠčé ą┐ąĄčĆąĄą│čĆčāąĘą║ąĖ. ąØą░ą┐čĆąĖą╝ąĄčĆ: API ą┐ąŠąĘą▓ąŠą╗čÅąĄčé 5 ąĘą░ą┐čĆąŠčüąŠą▓/čüąĄą║ ŌĆö\n//   Rate Limiter ą│ą░čĆą░ąĮčéąĖčĆčāąĄčé, čćčéąŠ ą║ą╗ąĖąĄąĮčé ąĮąĄ ą┐čĆąĄą▓čŗčüąĖčé ą╗ąĖą╝ąĖčé.\n//\n// ąÜąÉąÜ ąĀąÉąæą×ąóąÉąĢąó (Token Bucket):\n//   1. ąĢčüčéčī ┬½ą▓ąĄą┤čĆąŠ┬╗ (ą▒čāčäąĄčĆąĖąĘąĖčĆąŠą▓ą░ąĮąĮčŗą╣ ą║ą░ąĮą░ą╗) čü čéąŠą║ąĄąĮą░ą╝ąĖ\n//   2. ąÜą░ąČą┤čŗą╣ ąĘą░ą┐čĆąŠčü ąĘą░ą▒ąĖčĆą░ąĄčé 1 čéąŠą║ąĄąĮ ąĖąĘ ą▓ąĄą┤čĆą░ (ą▒ą╗ąŠą║ąĖčĆčāąĄčéčüčÅ ąĄčüą╗ąĖ ą┐čāčüčéąŠ)\n//   3. Ticker ą┐ąĄčĆąĖąŠą┤ąĖčćąĄčüą║ąĖ ą┤ąŠą▒ą░ą▓ą╗čÅąĄčé ąĮąŠą▓čŗąĄ čéąŠą║ąĄąĮčŗ čü ąĘą░ą┤ą░ąĮąĮąŠą╣ čćą░čüčéąŠčéąŠą╣\n//   4. burst ŌĆö ą╝ą░ą║čüąĖą╝ą░ą╗čīąĮčŗą╣ čĆą░ąĘą╝ąĄčĆ ą▓ąĄą┤čĆą░ (čüą║ąŠą╗čīą║ąŠ ąĘą░ą┐čĆąŠčüąŠą▓ ą╝ąŠąČąĮąŠ čüą┤ąĄą╗ą░čéčī čĆą░ąĘąŠą╝)\n//\n// ąÜąøą«ą¦ąĢąÆą½ąĢ ąÜą×ąØą”ąĢą¤ą”ąśąś:\n//   - time.Ticker ŌĆö ą│ąĄąĮąĄčĆąĖčĆčāąĄčé čüąŠą▒čŗčéąĖčÅ čćąĄčĆąĄąĘ čĆą░ą▓ąĮčŗąĄ ąĖąĮčéąĄčĆą▓ą░ą╗čŗ (rate)\n//   - chan struct{} ŌĆö ą║ą░ąĮą░ą╗-čüąĄą╝ą░čäąŠčĆ, struct{} ąĘą░ąĮąĖą╝ą░ąĄčé 0 ą▒ą░ą╣čé (ąĖą┤ąĖąŠą╝ą░čéąĖčćąĮąŠ ą┤ą╗čÅ čüąĖą│ąĮą░ą╗ąŠą▓)\n//   - ąæčāčäąĄčĆąĖąĘąĖčĆąŠą▓ą░ąĮąĮčŗą╣ ą║ą░ąĮą░ą╗ ą║ą░ą║ ą▓ąĄą┤čĆąŠ: čæą╝ą║ąŠčüčéčī = burst\n//   - select čü default ŌĆö ąĮąĄą▒ą╗ąŠą║ąĖčĆčāčÄčēą░čÅ ąĘą░ą┐ąĖčüčī (ąĄčüą╗ąĖ ą▓ąĄą┤čĆąŠ ą┐ąŠą╗ąĮąŠ ŌĆö čéąŠą║ąĄąĮ čéąĄčĆčÅąĄčéčüčÅ)\n//   - close(chan) ŌĆö čüąĖą│ąĮą░ą╗ ąŠčüčéą░ąĮąŠą▓ą║ąĖ ą│ąŠčĆčāčéąĖąĮčŗ ą┐ąŠą┐ąŠą╗ąĮąĄąĮąĖčÅ\n//\n// ą¤ąÉąóąóąĢąĀąØ:\n//   NewRateLimiter(rate=5, burst=2):\n//     - Ticker čéąĖą║ą░ąĄčé ą║ą░ąČą┤čŗąĄ 200ms (1s / 5)\n//     - ąÆąĄą┤čĆąŠ ą▓ą╝ąĄčēą░ąĄčé 2 čéąŠą║ąĄąĮą░ (burst)\n//     - ąĪąĮą░čćą░ą╗ą░ ą▓ąĄą┤čĆąŠ ąĘą░ą┐ąŠą╗ąĮčÅąĄčéčüčÅ burst čéąŠą║ąĄąĮą░ą╝ąĖ ŌåÆ ą┐ąĄčĆą▓čŗąĄ 2 ąĘą░ą┐čĆąŠčüą░ ą┐čĆąŠčģąŠą┤čÅčé čüčĆą░ąĘčā\n//     - ąöą░ą╗ąĄąĄ ą║ą░ąČą┤čŗąĄ 200ms ą┤ąŠą▒ą░ą▓ą╗čÅąĄčéčüčÅ 1 čéąŠą║ąĄąĮ ŌåÆ ąĘą░ą┐čĆąŠčüčŗ ąĖą┤čāčé čü čćą░čüčéąŠčéąŠą╣ 5/čüąĄą║\n//\n// ================================\n\ntype RateLimiter struct {\n\tticker *time.Ticker\n\ttokens chan struct{}\n\tstop   chan int\n}\n\nfunc NewRateLimiter(rate int, burst int) *RateLimiter {\n\trl := &RateLimiter{\n\t\tticker: time.NewTicker(time.Second / time.Duration(rate)), // ąĖąĮčéąĄčĆą▓ą░ą╗ = 1s/rate\n\t\ttokens: make(chan struct{}, burst),                        // čæą╝ą║ąŠčüčéčī ą▓ąĄą┤čĆą░ = burst\n\t\tstop:   make(chan int),                                    // čüąĖą│ąĮą░ą╗ ąŠčüčéą░ąĮąŠą▓ą║ąĖ\n\t}\n\n\t// ąŚą░ą┐ąŠą╗ąĮčÅąĄą╝ ąĮą░čćą░ą╗čīąĮčŗąĄ čéąŠą║ąĄąĮčŗ (burst čłčéčāą║ ŌĆö ą┤ą╗čÅ ą╝ą│ąĮąŠą▓ąĄąĮąĮąŠą│ąŠ čüčéą░čĆčéą░)\n\tfor i := 0; i < burst; i++ {\n\t\trl.tokens <- struct{}{}\n\t}\n\n\t// ąōąŠčĆčāčéąĖąĮą░ ą┐ąŠą┐ąŠą╗ąĮąĄąĮąĖčÅ ŌĆö ą┤ąŠą▒ą░ą▓ą╗čÅąĄčé čéąŠą║ąĄąĮ ą║ą░ąČą┤čŗą╣ čéąĖą║\n\tgo func() {\n\t\tfor {\n\t\t\tselect {\n\t\t\tcase <-rl.stop: // ą┐ąŠą╗čāčćąĖą╗ąĖ čüąĖą│ąĮą░ą╗ ąŠčüčéą░ąĮąŠą▓ą║ąĖ\n\t\t\t\trl.ticker.Stop() // ąŠčüčéą░ąĮą░ą▓ą╗ąĖą▓ą░ąĄą╝ ticker, ąŠčüą▓ąŠą▒ąŠąČą┤ą░ąĄą╝ čĆąĄčüčāčĆčüčŗ\n\t\t\t\treturn\n\t\t\tcase <-rl.ticker.C: // ąŠčćąĄčĆąĄą┤ąĮąŠą╣ čéąĖą║ ŌĆö ą┐ąŠčĆą░ ą┤ąŠą▒ą░ą▓ąĖčéčī čéąŠą║ąĄąĮ\n\t\t\t\tselect {\n\t\t\t\tcase rl.tokens <- struct{}{}: // ą║ą╗ą░ą┤čæą╝ čéąŠą║ąĄąĮ ą▓ ą▓ąĄą┤čĆąŠ\n\t\t\t\tdefault:\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\t}()\n\n\treturn rl\n}\n\nfunc (rl *RateLimiter) Wait() {\n\t<-rl.tokens // ą▒ą╗ąŠą║ąĖčĆčāąĄą╝čüčÅ ą┐ąŠą║ą░ ąĮąĄ ą┐ąŠą╗čāčćąĖą╝ čéąŠą║ąĄąĮ ąĖąĘ ą▓ąĄą┤čĆą░\n}\n\nfunc (rl *RateLimiter) Close() {\n\tclose(rl.stop) // close ąŠčéą┐čĆą░ą▓ą╗čÅąĄčé čüąĖą│ąĮą░ą╗ ą▓čüąĄą╝ čćąĖčéą░čéąĄą╗čÅą╝ ą║ą░ąĮą░ą╗ą░\n}\n\nfunc main() {\n\tlimiter := NewRateLimiter(5, 2) // 5 req/sec, burst 2\n\tdefer limiter.Close()\n\n\tvar wg sync.WaitGroup\n\tstart := time.Now()\n\n\tfor i := 0; i < 10; i++ {\n\t\twg.Add(1)\n\t\tgo func(id int) {\n\t\t\tdefer wg.Done()\n\t\t\tlimiter.Wait() // ąČą┤čæą╝ čĆą░ąĘčĆąĄčłąĄąĮąĖčÅ ąŠčé rate limiter\n\t\t\tfmt.Printf(\"request %d at %v\\n\", id, time.Since(start))\n\t\t}(i)\n\t}\n\n\twg.Wait()\n\tfmt.Println(\"All requests done\")\n}","info":"## Summary\nImplement a rate limiter using the token-bucket algorithm backed by a `time.Ticker`. `NewRateLimiter(rate, burst)` creates a limiter that allows `burst` immediate requests and then refills one token every `1s/rate`. Callers invoke `Wait()` which blocks until a token is available; `Close()` stops the background refill goroutine.\n\n## Why it matters\nRate limiting protects services from overload and enforces API quotas. The token-bucket pattern (a buffered channel as the bucket plus a ticker as the refiller) is a canonical Go concurrency idiom that appears in clients, gateways, and any throttled I/O path.\n\n## Idea\n- A buffered channel `tokens` of capacity `burst` is the bucket; each `struct{}` is a token costing zero bytes.\n- The bucket is pre-filled with `burst` tokens so the first `burst` calls pass instantly.\n- A background goroutine listens on `ticker.C`; on each tick it tries a non-blocking send (`select` with `default`) so a full bucket simply drops the surplus token.\n- `Wait()` receives from `tokens`, blocking when empty ŌĆö this is the throttle.\n- `Close()` closes the `stop` channel; the goroutine sees it, stops the ticker to free resources, and returns.\n\n## Complexity\n`Wait()` is O(1) channel receive; refill goroutine does O(1) work per tick. Space is O(burst) for the channel buffer plus one goroutine and one ticker.\n\n## Pitfalls\n- Forgetting the non-blocking send (`default`) makes the refill goroutine block on a full bucket, freezing the ticker drain.\n- Not calling `ticker.Stop()` on shutdown leaks the ticker's resources.\n- `rate = 0` causes a division-by-zero panic in `time.Second / time.Duration(rate)`.\n- Closing `stop` more than once panics; `Close()` must be called at most once."}]},{"name":"ąōąĄąĮąĄčĆą░čéąŠčĆčŗ / ąśčéąĄčĆą░čéąŠčĆčŗ","icon":"­¤öä","problems":[{"t":"ąōąĄąĮąĄčĆą░čéąŠčĆčŗ ąĖ ąĖčéąĄčĆą░čéąŠčĆčŗ","d":"medium","desc":"ąōąĄąĮąĄčĆą░čéąŠčĆčŗ ąĖ ąĖčéąĄčĆą░čéąŠčĆčŗ","python":"# ąŚą░ą┤ą░ąĮąĖąĄ 2: ąōąĄąĮąĄčĆą░čéąŠčĆčŗ ąĖ ąĖčéąĄčĆą░čéąŠčĆčŗ\n\nfrom typing import Generator, Iterator\n\n# --- ąōąĄąĮąĄčĆą░čéąŠčĆ 1: ą▒ąĄčüą║ąŠąĮąĄčćąĮą░čÅ ą┐ąŠčüą╗ąĄą┤ąŠą▓ą░čéąĄą╗čīąĮąŠčüčéčī ążąĖą▒ąŠąĮą░čćčćąĖ ---\n\ndef fibonacci() -> Generator[int, None, None]:\n    a, b = 0, 1\n    while True:\n        yield a\n        a, b = b, a + b\n\n# --- ąōąĄąĮąĄčĆą░čéąŠčĆ 2: čćčéąĄąĮąĖąĄ čäą░ą╣ą╗ą░ čćą░ąĮą║ą░ą╝ąĖ ---\n\ndef read_chunks(data: str, chunk_size: int) -> Generator[str, None, None]:\n    for i in range(0, len(data), chunk_size):\n        yield data[i:i + chunk_size]\n\n# --- ąōąĄąĮąĄčĆą░čéąŠčĆ 3: pipeline ŌĆö čåąĄą┐ąŠčćą║ą░ ą│ąĄąĮąĄčĆą░čéąŠčĆąŠą▓ ---\n\ndef numbers(n: int) -> Generator[int, None, None]:\n    for i in range(n):\n        yield i\n\ndef even_only(gen: Generator) -> Generator[int, None, None]:\n    for val in gen:\n        if val % 2 == 0:\n            yield val\n\ndef squared(gen: Generator) -> Generator[int, None, None]:\n    for val in gen:\n        yield val * val\n\n# --- ąĪą▓ąŠą╣ ąĖčéąĄčĆą░čéąŠčĆ čćąĄčĆąĄąĘ ą║ą╗ą░čüčü ---\n\nclass Countdown:\n    \"\"\"ąśčéąĄčĆą░čéąŠčĆ ąŠą▒čĆą░čéąĮąŠą│ąŠ ąŠčéčüčćčæčéą░: 5, 4, 3, 2, 1\"\"\"\n\n    def __init__(self, start: int):\n        self.current = start\n\n    def __iter__(self) -> \"Countdown\":\n        return self\n\n    def __next__(self) -> int:\n        if self.current <= 0:\n            raise StopIteration\n        val = self.current\n        self.current -= 1\n        return val\n\n# --- ąōąĄąĮąĄčĆą░čéąŠčĆ 4: flatten ą▓ą╗ąŠąČąĄąĮąĮčŗčģ čüą┐ąĖčüą║ąŠą▓ (čĆąĄą║čāčĆčüąĖą▓ąĮčŗą╣) ---\n\ndef flatten(lst: list) -> Generator:\n    for item in lst:\n        if isinstance(item, list):\n            yield from flatten(item)\n        else:\n            yield item\n\n# --- send() ą▓ ą│ąĄąĮąĄčĆą░čéąŠčĆ ---\n\ndef accumulator() -> Generator[float, float, None]:\n    total = 0.0\n    while True:\n        value = yield total\n        if value is None:\n            break\n        total += value\n\nif __name__ == \"__main__\":\n    # ążąĖą▒ąŠąĮą░čćčćąĖ ŌĆö ą┐ąĄčĆą▓čŗąĄ 10\n    fib = fibonacci()\n    for _ in range(10):\n        print(next(fib), end=\" \")\n    print()\n\n    # ą¦ą░ąĮą║ąĖ\n    for chunk in read_chunks(\"HelloWorld!!!\", 4):\n        print(chunk)\n    print()\n\n    # Pipeline: čćąĖčüą╗ą░ 0..9 ŌåÆ čéąŠą╗čīą║ąŠ čćčæčéąĮčŗąĄ ŌåÆ ą▓ ą║ą▓ą░ą┤čĆą░čé\n    pipe = squared(even_only(numbers(10)))\n    print(list(pipe))\n\n    # Countdown\n    for val in Countdown(5):\n        print(val, end=\" \")\n    print()\n\n    # Flatten\n    nested = [1, [2, [3, 4], 5], [6, 7]]\n    print(list(flatten(nested)))\n\n    # Accumulator čü send\n    acc = accumulator()\n    next(acc)          # ąĖąĮąĖčåąĖą░ą╗ąĖąĘą░čåąĖčÅ ą│ąĄąĮąĄčĆą░čéąŠčĆą░\n    print(acc.send(10))  # 10.0\n    print(acc.send(20))  # 30.0\n    print(acc.send(5))   # 35.0","info":"## Summary\nDemonstrate Python generators and iterators: an infinite Fibonacci generator, a chunked reader, a generator pipeline (numbers ŌåÆ even-only ŌåÆ squared), a class-based `Countdown` iterator, a recursive `flatten`, and an `accumulator` coroutine driven by `send()`. The output is the values each producer yields when consumed.\n\n## Why it matters\nGenerators give lazy, memory-efficient streaming and compose into pipelines, which is central to data processing, file streaming, and ETL code. `send()`-based coroutines are the foundation of cooperative concurrency patterns in Python.\n\n## Idea\n- A generator function pauses at each `yield` and resumes on the next `next()`, so `fibonacci()` can be infinite yet consumed finitely via `take`-style loops.\n- Pipelines chain generators: each stage consumes its upstream lazily, so `squared(even_only(numbers(10)))` processes one element end-to-end at a time.\n- A class implements the iterator protocol with `__iter__` returning self and `__next__` raising `StopIteration` when done (`Countdown`).\n- `flatten` uses `yield from` to recurse into nested lists, delegating to sub-generators.\n- The `accumulator` coroutine must be primed with one `next()` (or `send(None)`) before `send(value)` can inject data; `value = yield total` receives the sent value and returns the running total.\n\n## Complexity\nEach generator yields in O(1) amortized per element; `flatten` is O(n) over total elements with recursion depth equal to nesting depth. Space is O(1) per generator (no materialized lists) aside from recursion/result collection.\n\n## Pitfalls\n- Calling `send(value)` before priming the coroutine raises `TypeError: can't send non-None value to a just-started generator`.\n- Iterating an infinite generator (`fibonacci`, real `Naturals`) without a bound (`take`, `islice`) hangs.\n- A class iterator that returns a fresh state from `__iter__` vs `self` changes whether it is single- or multi-pass; here `Countdown` is single-pass.\n- `isinstance(item, list)` only flattens `list`; strings or tuples are treated as scalars, which may or may not be intended."},{"t":"Fibonacci čćąĄčĆąĄąĘ Iterator trait (ą░ąĮą░ą╗ąŠą│ Go generator čü ą║ą░ąĮą░ą╗ąŠą╝)","d":"medium","desc":"Fibonacci čćąĄčĆąĄąĘ Iterator trait (ą░ąĮą░ą╗ąŠą│ Go generator čü ą║ą░ąĮą░ą╗ąŠą╝)","rust":"// ąŚą░ą┤ą░ąĮąĖąĄ 8: Fibonacci čćąĄčĆąĄąĘ Iterator trait (ą░ąĮą░ą╗ąŠą│ Go generator čü ą║ą░ąĮą░ą╗ąŠą╝)\n\nstruct Fibonacci {\n    a: u64,\n    b: u64,\n}\n\nimpl Fibonacci {\n    fn new() -> Self {\n        Fibonacci { a: 0, b: 1 }\n    }\n}\n\nimpl Iterator for Fibonacci {\n    type Item = u64;\n\n    fn next(&mut self) -> Option<Self::Item> {\n        let current = self.a;\n        let new_b = self.a + self.b;\n        self.a = self.b;\n        self.b = new_b;\n        Some(current)\n    }\n}\n\n// ą×ą▒ąŠą▒čēčæąĮąĮčŗą╣ Range-ąĖčéąĄčĆą░čéąŠčĆ\nstruct RangeIter {\n    current: i32,\n    end: i32,\n    step: i32,\n}\n\nimpl RangeIter {\n    fn new(start: i32, end: i32, step: i32) -> Self {\n        RangeIter {\n            current: start,\n            end,\n            step,\n        }\n    }\n}\n\nimpl Iterator for RangeIter {\n    type Item = i32;\n\n    fn next(&mut self) -> Option<i32> {\n        if self.current >= self.end {\n            return None;\n        }\n        let val = self.current;\n        self.current += self.step;\n        Some(val)\n    }\n}\n\n// ąæąĄčüą║ąŠąĮąĄčćąĮčŗą╣ ąĖčéąĄčĆą░čéąŠčĆ ąĮą░čéčāčĆą░ą╗čīąĮčŗčģ čćąĖčüąĄą╗\nstruct Naturals {\n    current: u64,\n}\n\nimpl Naturals {\n    fn new() -> Self {\n        Naturals { current: 1 }\n    }\n}\n\nimpl Iterator for Naturals {\n    type Item = u64;\n\n    fn next(&mut self) -> Option<u64> {\n        let val = self.current;\n        self.current += 1;\n        Some(val)\n    }\n}\n\nfn main() {\n    // Fibonacci ŌĆö ą┐ąĄčĆą▓čŗąĄ 10\n    let fibs: Vec<u64> = Fibonacci::new().take(10).collect();\n    println!(\"first 10 fib: {:?}\", fibs);\n\n    // Fibonacci ŌĆö čüčāą╝ą╝ą░ ą┐ąĄčĆą▓čŗčģ 20\n    let sum: u64 = Fibonacci::new().take(20).sum();\n    println!(\"sum of first 20: {}\", sum);\n\n    // Fibonacci ŌĆö ą┐ąĄčĆą▓čŗą╣ > 1000\n    let big = Fibonacci::new().find(|&x| x > 1000).unwrap();\n    println!(\"first fib > 1000: {}\", big);\n\n    // RangeIter\n    println!(\"\\nrange 0..20 step 3:\");\n
