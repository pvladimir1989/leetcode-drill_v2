ibrary vs binary compilation needs `--crate-type=lib` and `--extern name=lib.rlib`; the single-file `mod` here only imitates that linkage.\n- Re-exporting with `pub use` changes the public path but not the item's own privacy ŌĆö re-exporting a private item still won't compile.\n- Aliasing a struct to a lower-case name (`Config as config`) compiles but fires a non-camel-case-types lint; it is a warning, not an error.\n- Edition matters: Rust 2015 needs `extern crate`, 2018+ does not ŌĆö mixing assumptions breaks the build."},{"t":"typing ŌĆö Generic, TypeVar, overload, TypeGuard","d":"medium","desc":"typing ŌĆö Generic, TypeVar, overload, TypeGuard","python":"# ąŚą░ą┤ą░ąĮąĖąĄ 13: typing ŌĆö Generic, TypeVar, overload, TypeGuard\n\nfrom __future__ import annotations\nfrom typing import (\n    Generic,\n    TypeVar,\n    overload,\n    TypeGuard,\n    Callable,\n    Any,\n    Iterator,\n)\n\n# --- TypeVar ąĖ Generic: čéąĖą┐ąŠą▒ąĄąĘąŠą┐ą░čüąĮčŗą╣ čüčéąĄą║ ---\n\nT = TypeVar(\"T\")\n\nclass Stack(Generic[T]):\n    def __init__(self):\n        self._items: list[T] = []\n\n    def push(self, item: T) -> None:\n        self._items.append(item)\n\n    def pop(self) -> T:\n        if self.is_empty():\n            raise IndexError(\"pop from empty stack\")\n        return self._items.pop()\n\n    def peek(self) -> T:\n        if self.is_empty():\n            raise IndexError(\"peek at empty stack\")\n        return self._items[-1]\n\n    def is_empty(self) -> bool:\n        return len(self._items) == 0\n\n    def __len__(self) -> int:\n        return len(self._items)\n\n    def __iter__(self) -> Iterator[T]:\n        return iter(reversed(self._items))\n\n# --- Generic čü ą┤ą▓čāą╝čÅ ą┐ą░čĆą░ą╝ąĄčéčĆą░ą╝ąĖ: Result ---\n\nE = TypeVar(\"E\", bound=Exception)\n\nclass Result(Generic[T, E]):\n    def __init__(self, value: T | None = None, error: E | None = None):\n        self._value = value\n        self._error = error\n\n    @property\n    def is_ok(self) -> bool:\n        return self._error is None\n\n    def unwrap(self) -> T:\n        if not self.is_ok:\n            raise RuntimeError(f\"unwrap on error: {self._error}\")\n        return self._value  # type: ignore\n\n    def unwrap_err(self) -> E:\n        if self.is_ok:\n            raise RuntimeError(\"unwrap_err on ok\")\n        return self._error  # type: ignore\n\n    def map(self, func: Callable[[T], Any]) -> Result:\n        if not self.is_ok:\n            return self\n        try:\n            return Result(value=func(self._value))\n        except Exception as e:\n            return Result(error=e)\n\n    @classmethod\n    def ok(cls, value: T) -> Result[T, Any]:\n        return cls(value=value)\n\n    @classmethod\n    def err(cls, error: E) -> Result[Any, E]:\n        return cls(error=error)\n\n# --- overload: čĆą░ąĘąĮčŗąĄ čüąĖą│ąĮą░čéčāčĆčŗ ---\n\n@overload\ndef parse(data: str) -> dict: ...\n\n@overload\ndef parse(data: bytes) -> str: ...\n\n@overload\ndef parse(data: list) -> list[dict]: ...\n\ndef parse(data: str | bytes | list) -> dict | str | list[dict]:\n    if isinstance(data, str):\n        return {\"parsed\": data}\n    elif isinstance(data, bytes):\n        return data.decode(\"utf-8\")\n    elif isinstance(data, list):\n        return [{\"item\": x} for x in data]\n    raise TypeError(f\"unsupported type: {type(data)}\")\n\n# --- TypeGuard: čüčāąČąĄąĮąĖąĄ čéąĖą┐ąŠą▓ ---\n\ndef is_string_list(val: list[Any]) -> TypeGuard[list[str]]:\n    return all(isinstance(item, str) for item in val)\n\ndef process_items(items: list[Any]) -> str:\n    if is_string_list(items):\n        # ąŚą┤ąĄčüčī mypy ąĘąĮą░ąĄčé čćčéąŠ items: list[str]\n        return \", \".join(items)\n    return str(items)\n\n# --- Generic čäčāąĮą║čåąĖčÅ: pipe ---\n\nA = TypeVar(\"A\")\nB = TypeVar(\"B\")\n\ndef pipe(value: A, *funcs: Callable) -> Any:\n    result = value\n    for func in funcs:\n        result = func(result)\n    return result\n\nif __name__ == \"__main__\":\n    # Stack\n    print(\"=== Generic Stack ===\")\n    int_stack: Stack[int] = Stack()\n    int_stack.push(1)\n    int_stack.push(2)\n    int_stack.push(3)\n    print(f\"peek: {int_stack.peek()}\")\n    print(f\"pop: {int_stack.pop()}\")\n    print(f\"len: {len(int_stack)}\")\n    print(f\"items: {list(int_stack)}\")\n    print()\n\n    str_stack: Stack[str] = Stack()\n    str_stack.push(\"hello\")\n    str_stack.push(\"world\")\n    print(f\"str peek: {str_stack.peek()}\")\n    print()\n\n    # Result\n    print(\"=== Result[T, E] ===\")\n    ok = Result.ok(42)\n    err = Result.err(ValueError(\"oops\"))\n\n    print(f\"ok: is_ok={ok.is_ok}, value={ok.unwrap()}\")\n    print(f\"err: is_ok={err.is_ok}, error={err.unwrap_err()}\")\n\n    chained = ok.map(lambda x: x * 2).map(str)\n    print(f\"chained: {chained.unwrap()}\")\n    print()\n\n    # overload\n    print(\"=== Overload ===\")\n    print(parse(\"hello\"))\n    print(parse(b\"world\"))\n    print(parse([1, 2, 3]))\n    print()\n\n    # TypeGuard\n    print(\"=== TypeGuard ===\")\n    print(process_items([\"a\", \"b\", \"c\"]))\n    print(process_items([1, \"mixed\", 3]))\n    print()\n\n    # pipe\n    print(\"=== Pipe ===\")\n    result = pipe(\n        \"  Hello World  \",\n        str.strip,\n        str.lower,\n        lambda s: s.replace(\" \", \"_\"),\n    )\n    print(f\"pipe result: {result}\")","info":"## Summary\nA demonstration of Python's static-typing toolkit: a generic `Stack[T]` and a two-parameter `Result[T, E]` built on `TypeVar`/`Generic`, a `parse` function with three `@overload` signatures over one implementation, a `TypeGuard` that narrows `list[Any]` to `list[str]`, and a variadic `pipe` helper. Inputs are ordinary values; the payoff is precise static types that a checker like mypy can verify.\n\n## Why it matters\nThese features let you write reusable containers and functions that stay type-safe without runtime cost, so editors and CI catch misuse before it ships. `Result[T, E]`, overloads, and type guards are the everyday vocabulary of well-typed Python libraries and APIs.\n\n## Idea\n- `TypeVar(\"T\")` plus `Generic[T]` parameterize a class so `Stack[int]` and `Stack[str]` are distinct to the checker while sharing one implementation; bounds like `TypeVar(\"E\", bound=Exception)` constrain what a parameter may be.\n- `Result[T, E]` models success/error in the value layer (├Ā la Rust's `Result`), with `is_ok`, `unwrap`, `unwrap_err`, and a `map` that short-circuits on error.\n- `@overload` declares multiple precise inputŌåÆoutput signatures; the checker picks the matching one, while a single untyped-ish implementation (the last `def`) does the real work at runtime.\n- A `TypeGuard[list[str]]` return type tells the checker that inside the `if`, the argument is narrowed to `list[str]`, enabling safe string-only operations.\n\n## Complexity\nAll runtime operations are O(1) (stack push/pop/peek, Result accessors) except `is_string_list` and `pipe`, which are O(n) in the list length / number of functions. Typing constructs themselves add zero runtime overhead beyond ordinary calls.\n\n## Pitfalls\n- `@overload` stubs have empty bodies and must be followed by exactly one real implementation; calling an overload stub directly does nothing useful.\n- A `TypeGuard` only narrows when it returns `True`; the `else` branch keeps the original (wider) type, and a wrong predicate silently lies to the checker.\n- Generics are erased at runtime ŌĆö `Stack[int]()` does not actually reject a pushed string at runtime; only the static checker enforces it.\n- `Result.map` returning `self` on the error path relies on the error type flowing through; forgetting the short-circuit would re-run the function on an invalid value."},{"t":"functools ąĖ itertools ŌĆö ą┐čĆąŠą┤ą▓ąĖąĮčāčéąŠąĄ čäčāąĮą║čåąĖąŠąĮą░ą╗čīąĮąŠąĄ ą┐čĆąŠą│čĆą░ą╝ą╝ąĖčĆąŠą▓ą░ąĮąĖąĄ","d":"medium","desc":"functools ąĖ itertools ŌĆö ą┐čĆąŠą┤ą▓ąĖąĮčāčéąŠąĄ čäčāąĮą║čåąĖąŠąĮą░ą╗čīąĮąŠąĄ ą┐čĆąŠą│čĆą░ą╝ą╝ąĖčĆąŠą▓ą░ąĮąĖąĄ","python":"# ąŚą░ą┤ą░ąĮąĖąĄ 14: functools ąĖ itertools ŌĆö ą┐čĆąŠą┤ą▓ąĖąĮčāčéąŠąĄ čäčāąĮą║čåąĖąŠąĮą░ą╗čīąĮąŠąĄ ą┐čĆąŠą│čĆą░ą╝ą╝ąĖčĆąŠą▓ą░ąĮąĖąĄ\n\nimport functools\nimport itertools\nimport operator\nfrom typing import Any, Callable, Iterator\n\n# --- functools.reduce ---\n\ndef my_sum(numbers: list[int]) -> int:\n    return functools.reduce(operator.add, numbers, 0)\n\ndef flatten(nested: list[list]) -> list:\n    return functools.reduce(operator.add, nested, [])\n\ndef compose(*funcs: Callable) -> Callable:\n    \"\"\"ąÜąŠą╝ą┐ąŠąĘąĖčåąĖčÅ čäčāąĮą║čåąĖą╣: compose(f, g, h)(x) = f(g(h(x)))\"\"\"\n    def composed(x):\n        return functools.reduce(\n            lambda acc, f: f(acc),\n            reversed(funcs),\n            x,\n        )\n    return composed\n\n# --- functools.partial ---\n\ndef power(base: int, exp: int) -> int:\n    return base ** exp\n\nsquare = functools.partial(power, exp=2)\ncube = functools.partial(power, exp=3)\n\n# --- functools.lru_cache ---\n\n@functools.lru_cache(maxsize=128)\ndef fibonacci(n: int) -> int:\n    if n < 2:\n        return n\n    return fibonacci(n - 1) + fibonacci(n - 2)\n\n# --- functools.total_ordering ---\n\n@functools.total_ordering\nclass Money:\n    def __init__(self, amount: float, currency: str = \"USD\"):\n        self.amount = amount\n        self.currency = currency\n\n    def __eq__(self, other: object) -> bool:\n        if not isinstance(other, Money):\n            return NotImplemented\n        return self.amount == other.amount and self.currency == other.currency\n\n    def __lt__(self, other: \"Money\") -> bool:\n        if self.currency != other.currency:\n            raise ValueError(\"cannot compare different currencies\")\n        return self.amount < other.amount\n\n    def __repr__(self) -> str:\n        return f\"Money({self.amount}, '{self.currency}')\"\n\n# --- itertools: ą▒ąĄčüą║ąŠąĮąĄčćąĮčŗąĄ ąĖčéąĄčĆą░čéąŠčĆčŗ ---\n\ndef take(n: int, iterable: Iterator) -> list:\n    \"\"\"ąæąĄčĆčæčé ą┐ąĄčĆą▓čŗąĄ n čŹą╗ąĄą╝ąĄąĮčéąŠą▓\"\"\"\n    return list(itertools.islice(iterable, n))\n\ndef fibonacci_gen() -> Iterator[int]:\n    \"\"\"ąæąĄčüą║ąŠąĮąĄčćąĮčŗą╣ ą│ąĄąĮąĄčĆą░čéąŠčĆ ążąĖą▒ąŠąĮą░čćčćąĖ\"\"\"\n    a, b = 0, 1\n    while True:\n        yield a\n        a, b = b, a + b\n\n# --- itertools: ą║ąŠą╝ą▒ąĖąĮą░čéąŠčĆąĖą║ą░ ---\n\ndef all_pairs(items: list) -> list[tuple]:\n    \"\"\"ąÆčüąĄ čāąĮąĖą║ą░ą╗čīąĮčŗąĄ ą┐ą░čĆčŗ\"\"\"\n    return list(itertools.combinations(items, 2))\n\ndef all_triples(items: list) -> list[tuple]:\n    \"\"\"ąÆčüąĄ ą║ąŠą╝ą▒ąĖąĮą░čåąĖąĖ ą┐ąŠ 3 čü ą┐ąŠą▓čéąŠčĆąĄąĮąĖčÅą╝ąĖ\"\"\"\n    return list(itertools.combinations_with_replacement(items, 3))\n\ndef cartesian(list1: list, list2: list) -> list[tuple]:\n    \"\"\"ąöąĄą║ą░čĆčéąŠą▓ąŠ ą┐čĆąŠąĖąĘą▓ąĄą┤ąĄąĮąĖąĄ\"\"\"\n    return list(itertools.product(list1, list2))\n\n# --- itertools: ą│čĆčāą┐ą┐ąĖčĆąŠą▓ą║ą░ ąĖ čåąĄą┐ąŠčćą║ąĖ ---\n\ndef group_consecutive(data: list[int]) -> list[list[int]]:\n    \"\"\"ąōčĆčāą┐ą┐ąĖčĆčāąĄčé ą┐ąŠčüą╗ąĄą┤ąŠą▓ą░čéąĄą╗čīąĮčŗąĄ ąŠą┤ąĖąĮą░ą║ąŠą▓čŗąĄ čŹą╗ąĄą╝ąĄąĮčéčŗ\"\"\"\n    result = []\n    for key, group in itertools.groupby(data):\n        result.append(list(group))\n    return result\n\ndef chunked(iterable, size: int) -> Iterator[list]:\n    \"\"\"ąĀą░ąĘą▒ąĖą▓ą░ąĄčé ąĖčéąĄčĆąĖčĆčāąĄą╝ąŠąĄ ąĮą░ čćą░ąĮą║ąĖ\"\"\"\n    it = iter(iterable)\n    while True:\n        chunk = list(itertools.islice(it, size))\n        if not chunk:\n            break\n        yield chunk\n\ndef chain_iterables(*iterables) -> list:\n    \"\"\"ąĪą║ą╗ąĄąĖą▓ą░ąĄčé ąĮąĄčüą║ąŠą╗čīą║ąŠ ąĖčéąĄčĆąĖčĆčāąĄą╝čŗčģ ą▓ ąŠą┤ąĖąĮ čüą┐ąĖčüąŠą║\"\"\"\n    return list(itertools.chain.from_iterable(iterables))\n\n# --- itertools: accumulate ---\n\ndef running_max(numbers: list[int]) -> list[int]:\n    return list(itertools.accumulate(numbers, max))\n\ndef running_product(numbers: list[int]) -> list[int]:\n    return list(itertools.accumulate(numbers, operator.mul))\n\nif __name__ == \"__main__\":\n    # reduce\n    print(\"=== reduce ===\")\n    print(f\"sum: {my_sum([1, 2, 3, 4, 5])}\")\n    print(f\"flatten: {flatten([[1, 2], [3, 4], [5]])}\")\n\n    transform = compose(str.upper, str.strip, lambda s: s + \"!\")\n    print(f\"compose: {transform('  hello  ')}\")\n    print()\n\n    # partial\n    print(\"=== partial ===\")\n    print(f\"square(5): {square(5)}\")\n    print(f\"cube(3): {cube(3)}\")\n    print()\n\n    # lru_cache\n    print(\"=== lru_cache ===\")\n    print(f\"fib(30): {fibonacci(30)}\")\n    print(f\"cache info: {fibonacci.cache_info()}\")\n    fibonacci.cache_clear()  # ąŠčćąĖčüčéąĖčéčī ą║čŹčł\n    print()\n\n    # total_ordering\n    print(\"=== total_ordering ===\")\n    m1 = Money(10)\n    m2 = Money(20)\n    m3 = Money(10)\n    print(f\"{m1} < {m2}: {m1 < m2}\")\n    print(f\"{m1} >= {m3}: {m1 >= m3}\")\n    print(f\"{m1} == {m3}: {m1 == m3}\")\n    print(f\"sorted: {sorted([m2, m1, Money(15)])}\")\n    print()\n\n    # itertools\n    print(\"=== itertools ===\")\n    print(f\"first 8 fib: {take(8, fibonacci_gen())}\")\n    print(f\"pairs of [1,2,3]: {all_pairs([1, 2, 3])}\")\n    print(f\"cartesian: {cartesian(['a','b'], [1, 2])}\")\n    print()\n\n    print(f\"group: {group_consecutive([1,1,2,2,2,3,1,1])}\")\n    print(f\"chunks: {list(chunked(range(10), 3))}\")\n    print(f\"chain: {chain_iterables([1,2], [3,4], [5])}\")\n    print()\n\n    print(f\"running max: {running_max([3,1,4,1,5,9,2,6])}\")\n    print(f\"running product: {running_product([1,2,3,4])}\")","info":"## Summary\nA tour of Python's `functools` and `itertools` modules for functional-style programming. It implements helpers such as `reduce`-based sum/flatten/compose, `partial` for fixing arguments (square, cube), an `lru_cache`-memoized Fibonacci, a `total_ordering` `Money` class, infinite generators with `islice`, combinatorics (`combinations`, `product`), `groupby`, chunking, and `accumulate`-based running aggregates. The output is the demonstrated results of each helper.\n\n## Why it matters\n`functools` and `itertools` are the standard-library backbone of clean, allocation-aware Python: memoization, lazy iteration over huge or infinite sequences, and composable transformations all show up in data pipelines and interview problems.\n\n## Idea\n- `functools.reduce(op, seq, init)` folds a sequence left-to-right; `compose` folds over `reversed(funcs)` so the rightmost function runs first.\n- `functools.partial` binds arguments (here keyword `exp`) to make specialized callables.\n- `lru_cache` turns naive recursive Fibonacci into linear time by caching subproblem results.\n- `total_ordering` synthesizes the missing comparison operators from `__eq__` plus `__lt__`.\n- `itertools` provides lazy iterators: `islice` for taking prefixes of infinite generators, `combinations`/`combinations_with_replacement`/`product` for combinatorics, `groupby` for runs of equal consecutive items, `chain.from_iterable` for flattening, and `accumulate` for prefix folds.\n\n## Complexity\nVaries per helper: `reduce`/`accumulate`/`chain` are O(n); memoized Fibonacci is O(n) time/space; `combinations(items, k)` produces C(n, k) tuples; `product` is O(|a|┬Ę|b|). Lazy iterators use O(1) extra space until materialized.\n\n## Pitfalls\n- `compose` must fold over `reversed(funcs)` so `compose(f, g, h)(x) == f(g(h(x)))`; getting the order wrong silently produces wrong results.\n- `groupby` only groups *consecutive* equal elements, not all equal elements globally ŌĆö sort first if you need global grouping.\n- Iterating an infinite generator (`fibonacci_gen`) without `islice`/`take` hangs forever.\n- `lru_cache` on functions with unhashable arguments raises `TypeError`; remember `cache_clear()`/`cache_info()` for state and diagnostics."},{"t":"Dunder-ą╝ąĄčéąŠą┤čŗ ŌĆö ą┐ąŠą╗ąĮą░čÅ ą║ą░čüčéąŠą╝ąĖąĘą░čåąĖčÅ ą┐ąŠą▓ąĄą┤ąĄąĮąĖčÅ ąŠą▒čŖąĄą║čéąŠą▓","d":"medium","desc":"Dunder-ą╝ąĄčéąŠą┤čŗ ŌĆö ą┐ąŠą╗ąĮą░čÅ ą║ą░čüčéąŠą╝ąĖąĘą░čåąĖčÅ ą┐ąŠą▓ąĄą┤ąĄąĮąĖčÅ ąŠą▒čŖąĄą║čéąŠą▓","python":"# ąŚą░ą┤ą░ąĮąĖąĄ 15: Dunder-ą╝ąĄčéąŠą┤čŗ ŌĆö ą┐ąŠą╗ąĮą░čÅ ą║ą░čüčéąŠą╝ąĖąĘą░čåąĖčÅ ą┐ąŠą▓ąĄą┤ąĄąĮąĖčÅ ąŠą▒čŖąĄą║čéąŠą▓\n\n# === Vector: ą░čĆąĖčäą╝ąĄčéąĖą║ą░ ąĖ čüčĆą░ą▓ąĮąĄąĮąĖčÅ ===\n\nclass Vector:\n    def __init__(self, *components: float):\n        self._data = list(components)\n\n    # --- ąĪčéčĆąŠą║ąŠą▓ąŠąĄ ą┐čĆąĄą┤čüčéą░ą▓ą╗ąĄąĮąĖąĄ ---\n\n    def __repr__(self) -> str:\n        coords = \", \".join(f\"{x:.1f}\" for x in self._data)\n        return f\"Vector({coords})\"\n\n    def __str__(self) -> str:\n        return f\"({', '.join(str(x) for x in self._data)})\"\n\n    # --- ąÉčĆąĖčäą╝ąĄčéąĖą║ą░ ---\n\n    def __add__(self, other: \"Vector\") -> \"Vector\":\n        if len(self) != len(other):\n            raise ValueError(\"dimension mismatch\")\n        return Vector(*(a + b for a, b in zip(self._data, other._data)))\n\n    def __sub__(self, other: \"Vector\") -> \"Vector\":\n        return Vector(*(a - b for a, b in zip(self._data, other._data)))\n\n    def __mul__(self, scalar: float) -> \"Vector\":\n        \"\"\"ąŻą╝ąĮąŠąČąĄąĮąĖąĄ ąĮą░ čüą║ą░ą╗čÅčĆ: v * 3\"\"\"\n        return Vector(*(x * scalar for x in self._data))\n\n    def __rmul__(self, scalar: float) -> \"Vector\":\n        \"\"\"ą×ą▒čĆą░čéąĮąŠąĄ čāą╝ąĮąŠąČąĄąĮąĖąĄ: 3 * v\"\"\"\n        return self.__mul__(scalar)\n\n    def __neg__(self) -> \"Vector\":\n        \"\"\"ąŻąĮą░čĆąĮčŗą╣ ą╝ąĖąĮčāčü: -v\"\"\"\n        return Vector(*(-x for x in self._data))\n\n    # --- Dot product čćąĄčĆąĄąĘ @ ---\n\n    def __matmul__(self, other: \"Vector\") -> float:\n        \"\"\"ąĪą║ą░ą╗čÅčĆąĮąŠąĄ ą┐čĆąŠąĖąĘą▓ąĄą┤ąĄąĮąĖąĄ: v1 @ v2\"\"\"\n        return sum(a * b for a, b in zip(self._data, other._data))\n\n    # --- ąĪčĆą░ą▓ąĮąĄąĮąĖčÅ (ą┐ąŠ ą┤ą╗ąĖąĮąĄ) ---\n\n    def __abs__(self) -> float:\n        \"\"\"ąöą╗ąĖąĮą░ ą▓ąĄą║čéąŠčĆą░: abs(v)\"\"\"\n        return sum(x ** 2 for x in self._data) ** 0.5\n\n    def __eq__(self, other: object) -> bool:\n        if not isinstance(other, Vector):\n            return NotImplemented\n        return self._data == other._data\n\n    def __lt__(self, other: \"Vector\") -> bool:\n        return abs(self) < abs(other)\n\n    # --- ąśąĮą┤ąĄą║čüą░čåąĖčÅ ---\n\n    def __len__(self) -> int:\n        return len(self._data)\n\n    def __getitem__(self, index: int) -> float:\n        return self._data[index]\n\n    def __setitem__(self, index: int, value: float):\n        self._data[index] = value\n\n    def __iter__(self):\n        return iter(self._data)\n\n    # --- bool ąĖ contains ---\n\n    def __bool__(self) -> bool:\n        \"\"\"ąØčāą╗ąĄą▓ąŠą╣ ą▓ąĄą║čéąŠčĆ = False\"\"\"\n        return any(x != 0 for x in self._data)\n\n    def __contains__(self, value: float) -> bool:\n        return value in self._data\n\n# === Matrix: ą║ąŠąĮčéąĄą╣ąĮąĄčĆ ąĖ callable ===\n\nclass Matrix:\n    def __init__(self, rows: list[list[float]]):\n        self._rows = [list(row) for row in rows]\n\n    def __repr__(self) -> str:\n        rows_str = \", \".join(str(row) for row in self._rows)\n        return f\"Matrix([{rows_str}])\"\n\n    # ąĀą░ąĘą╝ąĄčĆčŗ\n    @property\n    def shape(self) -> tuple[int, int]:\n        return len(self._rows), len(self._rows[0]) if self._rows else 0\n\n    # ąöąŠčüčéčāą┐ ą┐ąŠ [row][col]\n    def __getitem__(self, row: int) -> list[float]:\n        return self._rows[row]\n\n    # ąśčéąĄčĆą░čåąĖčÅ ą┐ąŠ čüčéčĆąŠą║ą░ą╝\n    def __iter__(self):\n        return iter(self._rows)\n\n    # len = ą║ąŠą╗ąĖčćąĄčüčéą▓ąŠ čüčéčĆąŠą║\n    def __len__(self) -> int:\n        return len(self._rows)\n\n    # ąŻą╝ąĮąŠąČąĄąĮąĖąĄ ą╝ą░čéčĆąĖčåčŗ ąĮą░ ą▓ąĄą║čéąŠčĆ\n    def __call__(self, vec: Vector) -> Vector:\n        \"\"\"ą¤čĆąĖą╝ąĄąĮčÅąĄą╝ ą╝ą░čéčĆąĖčåčā ą║ ą▓ąĄą║čéąŠčĆčā: m(v)\"\"\"\n        if self.shape[1] != len(vec):\n            raise ValueError(\"dimension mismatch\")\n        result = []\n        for row in self._rows:\n            val = sum(a * b for a, b in zip(row, vec))\n            result.append(val)\n        return Vector(*result)\n\n    # ąĪčĆą░ą▓ąĮąĄąĮąĖąĄ\n    def __eq__(self, other: object) -> bool:\n        if not isinstance(other, Matrix):\n            return NotImplemented\n        return self._rows == other._rows\n\nif __name__ == \"__main__\":\n    # Vector\n    print(\"=== Vector ===\")\n    v1 = Vector(1, 2, 3)\n    v2 = Vector(4, 5, 6)\n\n    print(f\"repr: {repr(v1)}\")\n    print(f\"str: {v1}\")\n    print(f\"v1 + v2 = {v1 + v2}\")\n    print(f\"v1 - v2 = {v1 - v2}\")\n    print(f\"v1 * 3 = {v1 * 3}\")\n    print(f\"3 * v1 = {3 * v1}\")\n    print(f\"-v1 = {-v1}\")\n    print(f\"v1 @ v2 = {v1 @ v2}\")  # dot product\n    print(f\"|v1| = {abs(v1):.2f}\")\n    print(f\"v1 < v2: {v1 < v2}\")\n    print(f\"v1 == v1: {v1 == v1}\")\n    print(f\"len: {len(v1)}\")\n    print(f\"v1[0]: {v1[0]}\")\n    print(f\"2 in v1: {2 in v1}\")\n    print(f\"bool(Vector(0,0)): {bool(Vector(0, 0))}\")\n    print()\n\n    # ąśčéąĄčĆą░čåąĖčÅ\n    for component in v1:\n        print(f\"  component: {component}\")\n    print()\n\n    # Matrix\n    print(\"=== Matrix ===\")\n    m = Matrix([\n        [1, 0, 0],\n        [0, 2, 0],\n        [0, 0, 3],\n    ])\n    print(f\"shape: {m.shape}\")\n    print(f\"m[1][1]: {m[1][1]}\")\n    print(f\"len: {len(m)}\")\n\n    # ąÆčŗąĘąŠą▓ ą╝ą░čéčĆąĖčåčŗ ą║ą░ą║ čäčāąĮą║čåąĖąĖ\n    result = m(v1)\n    print(f\"m(v1) = {result}\")  # Vector(1.0, 4.0, 9.0)\n    print()\n\n    for row in m:\n        print(f\"  row: {row}\")","info":"## Summary\nImplement two classes that fully customize object behavior through dunder (double-underscore) methods. `Vector` supports arithmetic (`+`, `-`, scalar `*`, unary `-`), the matrix-multiply operator `@` for dot product, magnitude via `abs`, comparisons by length, indexing, iteration, truthiness, and membership. `Matrix` is an iterable, indexable container that is also callable, applying the matrix to a `Vector`. Output is the demonstrated result of each operation.\n\n## Why it matters\nOperator overloading via dunders is how Python lets user types behave like built-ins ŌĆö numeric types, containers, and callables (think NumPy arrays, Decimal, ORM query objects). Knowing which dunder backs which syntax is core to writing ergonomic, Pythonic APIs.\n\n## Idea\n- Arithmetic operators map to `__add__`, `__sub__`, `__mul__`, `__neg__`; `__rmul__` handles `3 * v` when the left operand doesn't know how to multiply.\n- `@` (matrix multiply) maps to `__matmul__`, used here for the dot product.\n- Container protocol: `__len__`, `__getitem__`, `__setitem__`, `__iter__`, `__contains__` make `Vector` and `Matrix` behave like sequences.\n- `__bool__` defines truthiness (zero vector is falsy); `__abs__` gives Euclidean length; comparisons (`__eq__`, `__lt__`) define ordering by magnitude.\n- `Matrix.__call__` makes an instance callable so `m(v)` computes the matrix-vector product row by row.\n\n## Complexity\nVector ops are O(d) in the dimension d; dot product and magnitude are O(d). Matrix-vector application is O(rows┬Ęcols). Space is O(d) or O(rows┬Ęcols) for the stored data.\n\n## Pitfalls\n- Return `NotImplemented` (not raise) from `__eq__` when the other operand is the wrong type so Python can try the reflected operation.\n- Without `__rmul__`, `3 * v` fails because `int.__mul__` doesn't know about `Vector`.\n- Validate dimensions before `__add__`/`__matmul__`/matrix application; `zip` silently truncates to the shorter operand and hides mismatches.\n- In the `shape` property, the conditional expression binds only to the column count; an empty matrix must still yield a sensible `(0, 0)`."}]},{"name":"ą¤čĆąŠčäąĖą╗ąĖčĆąŠą▓ą░ąĮąĖąĄ","icon":"­¤ōŖ","problems":[{"t":"Http pprof","d":"hard","desc":"HTTP-čüąĄčĆą▓ąĄčĆ čü ą┐ąŠą┤ą║ą╗čÄčćčæąĮąĮčŗą╝ net/http/pprof. ąŚą░ą┐čāčüą║: go run main.go            # ą┐ąŠčĆčé 8001 go run main.go 8080       # čüą▓ąŠą╣ ą┐ąŠčĆčé ąŁąĮą┤ą┐ąŠąĖąĮčéčŗ ą┐čĆąĖą╗ąŠąČąĄąĮąĖčÅ: GET /                     ŌĆö ąĘą░ą│ą╗čāčłą║ą░-ąŠą▒čĆą░ą▒ąŠčéčćąĖą║ GET /time                 ŌĆö čéąĄą║čāčēąĄąĄ ą▓čĆąĄą╝čÅ GET /hot                  ŌĆö ąĮą░ą│čĆčāąĘąŠčćąĮčŗą╣ ąŠą▒čĆą░ą▒ąŠčéčćąĖą║ (ąČčĆčæčé CPU ąĖ ą┐ą░ą╝čÅčéčī) ąŁąĮą┤ą┐ąŠąĖąĮŌĆ”","go":"// HTTP-čüąĄčĆą▓ąĄčĆ čü ą┐ąŠą┤ą║ą╗čÄčćčæąĮąĮčŗą╝ net/http/pprof.\n//\n// ąŚą░ą┐čāčüą║:\n//\n//\tgo run main.go            # ą┐ąŠčĆčé 8001\n//\tgo run main.go 8080       # čüą▓ąŠą╣ ą┐ąŠčĆčé\n//\n// ąŁąĮą┤ą┐ąŠąĖąĮčéčŗ ą┐čĆąĖą╗ąŠąČąĄąĮąĖčÅ:\n//\n//\tGET /                     ŌĆö ąĘą░ą│ą╗čāčłą║ą░-ąŠą▒čĆą░ą▒ąŠčéčćąĖą║\n//\tGET /time                 ŌĆö čéąĄą║čāčēąĄąĄ ą▓čĆąĄą╝čÅ\n//\tGET /hot                  ŌĆö ąĮą░ą│čĆčāąĘąŠčćąĮčŗą╣ ąŠą▒čĆą░ą▒ąŠčéčćąĖą║ (ąČčĆčæčé CPU ąĖ ą┐ą░ą╝čÅčéčī)\n//\n// ąŁąĮą┤ą┐ąŠąĖąĮčéčŗ ą┐čĆąŠčäąĖą╗ąĖčĆąŠą▓čēąĖą║ą░:\n//\n//\tGET /debug/pprof/         ŌĆö ąĖąĮą┤ąĄą║čü\n//\tGET /debug/pprof/profile  ŌĆö CPU-ą┐čĆąŠčäąĖą╗čī (30 čüąĄą║ ą┐ąŠ čāą╝ąŠą╗čćą░ąĮąĖčÄ)\n//\tGET /debug/pprof/heap     ŌĆö čüąĮąĖą╝ąŠą║ ą║čāčćąĖ\n//\tGET /debug/pprof/goroutine ŌĆö ą▓čüąĄ ą│ąŠčĆčāčéąĖąĮčŗ\n//\tGET /debug/pprof/trace?seconds=5 ŌĆö čéčĆą░čüčüąĖčĆąŠą▓ą║ą░ ą▓čŗą┐ąŠą╗ąĮąĄąĮąĖčÅ\n//\n// ąĪą▒ąŠčĆ ą┐čĆąŠčäąĖą╗ąĄą╣:\n//\n//\tgo tool pprof http://localhost:8001/debug/pprof/profile\n//\tgo tool pprof http://localhost:8001/debug/pprof/heap\n//\tgo tool pprof -http=:9090 http://localhost:8001/debug/pprof/profile\n//\tcurl -o trace.out 'http://localhost:8001/debug/pprof/trace?seconds=5'\n//\tgo tool trace trace.out\npackage main\n\nimport (\n\t\"crypto/sha256\"\n\t\"fmt\"\n\t\"math/rand\"\n\t\"net/http\"\n\t\"net/http/pprof\"\n\t\"os\"\n\t\"time\"\n)\n\nfunc myHandler(w http.ResponseWriter, r *http.Request) {\n\tfmt.Fprintf(w, \"Serving: %s\\n\", r.URL.Path)\n\tfmt.Printf(\"Served: %s\\n\", r.Host)\n}\n\nfunc timeHandler(w http.ResponseWriter, r *http.Request) {\n\tt := time.Now().Format(time.RFC1123)\n\tfmt.Fprintf(w, \"The current time is: %s\\n\", t)\n\tfmt.Fprintf(w, \"Serving: %s\\n\", r.URL.Path)\n\tfmt.Printf(\"Served time for: %s\\n\", r.Host)\n}\n\n// hotHandler čüą┐ąĄčåąĖą░ą╗čīąĮąŠ ąĮą░ą│čĆčāąČą░ąĄčé CPU ąĖ ą░ą╗ą╗ąŠčåąĖčĆčāąĄčé ą┐ą░ą╝čÅčéčī,\n// čćčéąŠą▒čŗ ą▓ pprof ą▒čŗą╗ąŠ čćčéąŠ ą┐ąŠčüą╝ąŠčéčĆąĄčéčī.\nfunc hotHandler(w http.ResponseWriter, r *http.Request) {\n\tbuf := make([]byte, 1<<20) // 1 MiB\n\trand.Read(buf)\n\n\tsum := sha256.Sum256(buf)\n\tfor i := 0; i < 50_000; i++ {\n\t\tsum = sha256.Sum256(sum[:])\n\t}\n\n\tfmt.Fprintf(w, \"hot work done, hash prefix: %x\\n\", sum[:4])\n}\n\nfunc main() {\n\tport := \":8001\"\n\tif len(os.Args) > 1 {\n\t\tport = \":\" + os.Args[1]\n\t\tfmt.Println(\"Using port number:\", port)\n\t} else {\n\t\tfmt.Println(\"Using default port number:\", port)\n\t}\n\n\tr := http.NewServeMux()\n\tr.HandleFunc(\"/time\", timeHandler)\n\tr.HandleFunc(\"/hot\", hotHandler)\n\tr.HandleFunc(\"/\", myHandler)\n\n\t// ąĀąĄą│ąĖčüčéčĆąĖčĆčāąĄą╝ pprof-ąŠą▒čĆą░ą▒ąŠčéčćąĖą║ąĖ ą▓čĆčāčćąĮčāčÄ, ą┐ąŠčéąŠą╝čā čćčéąŠ ąĖčüą┐ąŠą╗čīąĘčāąĄą╝ čüą▓ąŠą╣ mux.\n\t// ąĢčüą╗ąĖ ą▒čŗ ąĖčüą┐ąŠą╗čīąĘąŠą▓ą░ą╗ąĖ http.DefaultServeMux, ąĖą╝ą┐ąŠčĆčéą░ _ \"net/http/pprof\"\n\t// ą▒čŗą╗ąŠ ą▒čŗ ą┤ąŠčüčéą░čéąŠčćąĮąŠ.\n\tr.HandleFunc(\"/debug/pprof/\", pprof.Index)\n\tr.HandleFunc(\"/debug/pprof/cmdline\", pprof.Cmdline)\n\tr.HandleFunc(\"/debug/pprof/profile\", pprof.Profile)\n\tr.HandleFunc(\"/debug/pprof/symbol\", pprof.Symbol)\n\tr.HandleFunc(\"/debug/pprof/trace\", pprof.Trace)\n\n\tfmt.Println(\"pprof index: http://localhost\" + port + \"/debug/pprof/\")\n\tif err := http.ListenAndServe(port, r); err != nil {\n\t\tfmt.Println(err)\n\t\treturn\n\t}\n}","info":"## Summary\nBuild an HTTP server that exposes Go's `net/http/pprof` profiling endpoints alongside application routes. Routes: `/` (echo handler), `/time` (current time), `/hot` (CPU- and memory-intensive handler), and the `/debug/pprof/*` family. The server reads an optional port from `os.Args` (default 8001) and serves until an error occurs.\n\n## Why it matters\n`net/http/pprof` is the standard way to profile live Go services in production ŌĆö CPU profiles, heap snapshots, goroutine dumps, and execution traces are all reachable over HTTP and consumable by `go tool pprof`/`go tool trace`.\n\n## Idea\n- Create a custom `http.ServeMux` instead of the default mux to keep routing explicit.\n- Register application handlers (`/`, `/time`, `/hot`) with `HandleFunc`.\n- Because a custom mux is used, the pprof handlers must be wired manually: `pprof.Index`, `pprof.Cmdline`, `pprof.Profile`, `pprof.Symbol`, `pprof.Trace`. (A blank import `_ \"net/http/pprof\"` only auto-registers them on `http.DefaultServeMux`.)\n- `hotHandler` allocates a 1 MiB buffer and hashes it 50k times so CPU and allocation profiles have something to show.\n- `http.ListenAndServe(port, mux)` runs the server.\n\n## Complexity\nServer lifetime is O(1) setup; per-request cost dominated by `/hot` at roughly O(k) SHA-256 rounds (k = 50,000). Memory is the 1 MiB scratch buffer per `/hot` request plus pprof's profiling overhead.\n\n## Pitfalls\n- With a custom mux, forgetting to register the `/debug/pprof/` handlers means the blank-import trick does nothing and profiling 404s.\n- The index handler must be registered at the trailing-slash path `/debug/pprof/`; sub-pages like `/debug/pprof/heap` are dispatched by `pprof.Index`.\n- Exposing pprof on a public interface is a security/DoS risk ŌĆö gate it behind auth or a private port in production.\n- `pprof.Profile` blocks for the full sample window (default 30s), which can look like a hang if you don't pass `?seconds=`."},{"t":"Trace cla","d":"hard","desc":"CLI-ą┐čĆąŠą│čĆą░ą╝ą╝ą░ čüąŠ ą▓čüčéčĆąŠąĄąĮąĮąŠą╣ čéčĆą░čüčüąĖčĆąŠą▓ą║ąŠą╣ čćąĄčĆąĄąĘ runtime/trace. ą¦čéąŠ ą┤ąĄą╗ą░ąĄčé: ą░ą╗ą╗ąŠčåąĖčĆčāąĄčé ą▒ąŠą╗čīčłąĖąĄ čüčĆąĄąĘčŗ, čćčéąŠą▒čŗ ąĘą░ą┐čāčüčéąĖčéčī GC ąĖ ąĮą░ą│ąĄąĮąĄčĆąĖčĆąŠą▓ą░čéčī čüąŠą▒čŗčéąĖą╣ ą┐ą╗ą░ąĮąĖčĆąŠą▓čēąĖą║ą░, ąĘą░čéąĄą╝ ąŠčüčéą░ąĮą░ą▓ą╗ąĖą▓ą░ąĄčé čéčĆą░čüčüąĖčĆąŠą▓ą║čā ąĖ ą┐ąĖčłąĄčé čäą░ą╣ą╗. ąŚą░ą┐čāčüą║: go run main.go ą¤čĆąŠčüą╝ąŠčéčĆ čĆąĄąĘčāą╗čīčéą░čéą░: go tool trace /tmp/traceCLA.out (ąŠčéą║čĆąŠąĄčéčüčÅ ą▒čĆą░čāąĘąĄčĆ čü čĆą░ąĘą┤ąĄą╗ą░ą╝ąĖ View tŌĆ”","go":"// CLI-ą┐čĆąŠą│čĆą░ą╝ą╝ą░ čüąŠ ą▓čüčéčĆąŠąĄąĮąĮąŠą╣ čéčĆą░čüčüąĖčĆąŠą▓ą║ąŠą╣ čćąĄčĆąĄąĘ runtime/trace.\n//\n// ą¦čéąŠ ą┤ąĄą╗ą░ąĄčé: ą░ą╗ą╗ąŠčåąĖčĆčāąĄčé ą▒ąŠą╗čīčłąĖąĄ čüčĆąĄąĘčŗ, čćčéąŠą▒čŗ ąĘą░ą┐čāčüčéąĖčéčī GC ąĖ ąĮą░ą│ąĄąĮąĄčĆąĖčĆąŠą▓ą░čéčī\n// čüąŠą▒čŗčéąĖą╣ ą┐ą╗ą░ąĮąĖčĆąŠą▓čēąĖą║ą░, ąĘą░čéąĄą╝ ąŠčüčéą░ąĮą░ą▓ą╗ąĖą▓ą░ąĄčé čéčĆą░čüčüąĖčĆąŠą▓ą║čā ąĖ ą┐ąĖčłąĄčé čäą░ą╣ą╗.\n//\n// ąŚą░ą┐čāčüą║:\n//\n//\tgo run main.go\n//\n// ą¤čĆąŠčüą╝ąŠčéčĆ čĆąĄąĘčāą╗čīčéą░čéą░:\n//\n//\tgo tool trace /tmp/traceCLA.out\n//\t(ąŠčéą║čĆąŠąĄčéčüčÅ ą▒čĆą░čāąĘąĄčĆ čü čĆą░ąĘą┤ąĄą╗ą░ą╝ąĖ View trace, Goroutine analysis,\n//\t Network blocking profile, Syscall blocking profile, Scheduler latency)\n//\n// ąÉąĮą░ą╗ąŠą│ čćąĄčĆąĄąĘ `go test -trace`:\n//\n//\tgo test -trace=trace.out ./...\n//\tgo tool trace trace.out\npackage main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\t\"os\"\n\t\"path\"\n\t\"runtime/trace\"\n\t\"sync\"\n\t\"time\"\n)\n\nfunc main() {\n\tfilename := path.Join(os.TempDir(), \"traceCLA.out\")\n\tf, err := os.Create(filename)\n\tif err != nil {\n\t\tpanic(err)\n\t}\n\tdefer f.Close()\n\n\tif err := trace.Start(f); err != nil {\n\t\tfmt.Println(err)\n\t\treturn\n\t}\n\tdefer trace.Stop()\n\n\tfmt.Println(\"Tracing to:\", filename)\n\n\t// ążą░ąĘą░ 1: ą║ąŠčĆąŠčéą║ąĖąĄ ą░ą╗ą╗ąŠą║ą░čåąĖąĖ ŌĆö ą┐čĆąŠą▓ąŠčåąĖčĆčāąĄą╝ GC.\n\tfor i := 0; i < 3; i++ {\n\t\ts := make([]byte, 50_000_000)\n\t\t_ = s\n\t}\n\n\t// ążą░ąĘą░ 2: ą░ą╗ą╗ąŠą║ą░čåąĖąĖ + sleep, čćčéąŠą▒čŗ ą┐ą╗ą░ąĮąĖčĆąŠą▓čēąĖą║čā ą▒čŗą╗ąŠ čćčéąŠ ą┐ąŠą║ą░ąĘą░čéčī.\n\tfor i := 0; i < 5; i++ {\n\t\ts := make([]byte, 100_000_000)\n\t\t_ = s\n\t\ttime.Sleep(time.Millisecond)\n\t}\n\n\t// ążą░ąĘą░ 3: ą│ąŠčĆčāčéąĖąĮčŗ ŌĆö čćčéąŠą▒čŗ ą▓ąŠ View trace ą┐ąŠčÅą▓ąĖą╗ąĖčüčī ą┐ą░čĆą░ą╗ą╗ąĄą╗čīąĮčŗąĄ ą┤ąŠčĆąŠąČą║ąĖ.\n\tvar wg sync.WaitGroup\n\tfor i := 0; i < 8; i++ {\n\t\twg.Add(1)\n\t\tgo func(id int) {\n\t\t\tdefer wg.Done()\n\t\t\tregion := trace.StartRegion(context.Background(), fmt.Sprintf(\"worker-%d\", id))\n\t\t\tdefer region.End()\n\n\t\t\tsum := 0\n\t\t\tfor j := 0; j < 5_000_000; j++ {\n\t\t\t\tsum += j\n\t\t\t}\n\t\t\t_ = sum\n\t\t}(i)\n\t}\n\twg.Wait()\n\n\tfmt.Println(\"Done. Run: go tool trace\", filename)\n}","info":"## Summary\nA CLI program that captures a runtime execution trace with `runtime/trace`. It opens a trace file in the temp directory, starts tracing, then allocates large slices (to provoke GC and scheduler events), sleeps, and spawns labeled worker goroutines, before stopping the trace. The output is a trace file viewable with `go tool trace`.\n\n## Why it matters\n`runtime/trace` gives a timeline-level view the CPU profiler cannot: goroutine scheduling, GC pauses, syscall and network blocking, and user-defined regions. It's the go-to tool for diagnosing latency, contention, and concurrency behavior.\n\n## Idea\n- `os.Create` the output file and `defer f.Close()`.\n- `trace.Start(f)` begins writing trace events; `defer trace.Stop()` flushes and ends tracing on exit.\n- Phase 1/2 allocate large byte slices to trigger garbage collection so GC events appear in the timeline.\n- `time.Sleep` yields the goroutine, generating scheduler-latency events.\n- Phase 3 launches 8 goroutines coordinated by a `sync.WaitGroup`; each wraps its work in a `trace.StartRegion`/`region.End()` so named regions show up in the trace UI.\n- `wg.Wait()` blocks until all workers finish, after which the deferred `trace.Stop()` runs.\n\n## Complexity\nWork is dominated by the allocations (hundreds of MB total) and the per-goroutine summation loops at O(8 ┬Ę 5,000,000). Tracing adds bounded per-event overhead and writes a trace file proportional to the number of runtime events.\n\n## Pitfalls\n- `trace.Stop()` must run before the file is read; ordering the defers correctly (Close after Stop, i.e. declared before) matters so the buffer is flushed.\n- `WaitGroup` misuse ŌĆö calling `Add` inside the goroutine or forgetting `Done` ŌĆö causes a race or a permanent block on `Wait`.\n- Capturing the loop variable: pass `i` as the goroutine argument (`func(id int)`) to avoid all workers sharing the same value (pre-Go 1.22 footgun).\n- `StartRegion` requires a `context.Context`; the returned region must be ended (here via `defer`) or the trace region stays open."},{"t":"Runtime pprof","d":"hard","desc":"ą¤čĆąŠčäąĖą╗ąĖčĆąŠą▓ą░ąĮąĖąĄ ąŠą▒čŗčćąĮąŠą╣ (ąĮąĄ-HTTP) ą┐čĆąŠą│čĆą░ą╝ą╝čŗ čćąĄčĆąĄąĘ runtime/pprof. ąĪčĆą░ą▓ąĮąĖčéčī čü ą┐ą░ą║ąĄčéąŠą╝ net/http/pprof ŌĆö ąĘą┤ąĄčüčī ą┐čĆąŠčäąĖą╗ąĖ ą┐ąĖčłąĄą╝ čüą░ą╝ąĖ ą▓ čäą░ą╣ą╗čŗ. ąŚą░ą┐čāčüą║: go run main.go -cpuprofile=cpu.out -memprofile=mem.out ąÉąĮą░ą╗ąĖąĘ: go tool pprof cpu.out go tool pprof -http=:9090 cpu.out go tool pprof -alloc_space mem.out go tool pprof -inuse_ŌĆ”","go":"// ą¤čĆąŠčäąĖą╗ąĖčĆąŠą▓ą░ąĮąĖąĄ ąŠą▒čŗčćąĮąŠą╣ (ąĮąĄ-HTTP) ą┐čĆąŠą│čĆą░ą╝ą╝čŗ čćąĄčĆąĄąĘ runtime/pprof.\n// ąĪčĆą░ą▓ąĮąĖčéčī čü ą┐ą░ą║ąĄčéąŠą╝ net/http/pprof ŌĆö ąĘą┤ąĄčüčī ą┐čĆąŠčäąĖą╗ąĖ ą┐ąĖčłąĄą╝ čüą░ą╝ąĖ ą▓ čäą░ą╣ą╗čŗ.\n//\n// ąŚą░ą┐čāčüą║:\n//\n//\tgo run main.go -cpuprofile=cpu.out -memprofile=mem.out\n//\n// ąÉąĮą░ą╗ąĖąĘ:\n//\n//\tgo tool pprof cpu.out\n//\tgo tool pprof -http=:9090 cpu.out\n//\tgo tool pprof -alloc_space mem.out\n//\tgo tool pprof -inuse_space mem.out\n//\n// ą¤ąŠą╗ąĄąĘąĮčŗąĄ ą║ąŠą╝ą░ąĮą┤čŗ ą▓ąĮčāčéčĆąĖ pprof:\n//\n//\ttop              ŌĆö čéąŠą┐ čäčāąĮą║čåąĖą╣ ą┐ąŠ CPU/ą┐ą░ą╝čÅčéąĖ\n//\ttop -cum         ŌĆö čü čāčćčæčéąŠą╝ ą▓čŗąĘčŗą▓ą░ąĄą╝čŗčģ čäčāąĮą║čåąĖą╣\n//\tlist funcName    ŌĆö ą┐ąŠčüčéčĆąŠčćąĮąŠ ą┐ąŠčüą╝ąŠčéčĆąĄčéčī čäčāąĮą║čåąĖčÄ\n//\tweb              ŌĆö ąŠčéą║čĆčŗčéčī SVG-ą│čĆą░čä ą▓čŗąĘąŠą▓ąŠą▓ (ąĮčāąČąĄąĮ graphviz)\n//\tpeek funcName    ŌĆö ą║čéąŠ ą▓čŗąĘčŗą▓ą░ąĄčé / ą║ąŠą│ąŠ ą▓čŗąĘčŗą▓ą░ąĄčé čäčāąĮą║čåąĖčÅ\npackage main\n\nimport (\n\t\"flag\"\n\t\"fmt\"\n\t\"log\"\n\t\"os\"\n\t\"runtime\"\n\t\"runtime/pprof\"\n)\n\nvar (\n\tcpuprofile = flag.String(\"cpuprofile\", \"\", \"write cpu profile to file\")\n\tmemprofile = flag.String(\"memprofile\", \"\", \"write memory profile to file\")\n)\n\nfunc fibonacci(n int) int {\n\tif n < 2 {\n\t\treturn n\n\t}\n\treturn fibonacci(n-1) + fibonacci(n-2)\n}\n\nfunc allocateGarbage() [][]byte {\n\tout := make([][]byte, 0, 100)\n\tfor i := 0; i < 100; i++ {\n\t\tout = append(out, make([]byte, 1<<20)) // 1 MiB\n\t}\n\treturn out\n}\n\nfunc main() {\n\tflag.Parse()\n\n\tif *cpuprofile != \"\" {\n\t\tf, err := os.Create(*cpuprofile)\n\t\tif err != nil {\n\t\t\tlog.Fatal(\"could not create CPU profile:\", err)\n\t\t}\n\t\tdefer f.Close()\n\t\tif err := pprof.StartCPUProfile(f); err != nil {\n\t\t\tlog.Fatal(\"could not start CPU profile:\", err)\n\t\t}\n\t\tdefer pprof.StopCPUProfile()\n\t}\n\n\t// CPU-ąĮą░ą│čĆčāąĘą║ą░.\n\tfor i := 0; i < 5; i++ {\n\t\tfmt.Println(\"fib(35) =\", fibonacci(35))\n\t}\n\n\t// ą¤ą░ą╝čÅčéčī.\n\tkeep := allocateGarbage()\n\tfmt.Println(\"allocated:\", len(keep), \"MiB-blocks\")\n\n\tif *memprofile != \"\" {\n\t\tf, err := os.Create(*memprofile)\n\t\tif err != nil {\n\t\t\tlog.Fatal(\"could not create memory profile:\", err)\n\t\t}\n\t\tdefer f.Close()\n\t\truntime.GC() // ąŠčüą▓ąĄąČąĖčéčī čüčéą░čéąĖčüčéąĖą║čā ąČąĖą▓ąŠą╣ ą┐ą░ą╝čÅčéąĖ\n\t\tif err := pprof.WriteHeapProfile(f); err != nil {\n\t\t\tlog.Fatal(\"could not write memory profile:\", err)\n\t\t}\n\t}\n\n\tfmt.Println(\"done\")\n}","info":"## Summary\nProfile a plain (non-HTTP) Go program using the `runtime/pprof` package, writing CPU and heap profiles directly to files chosen by `-cpuprofile` and `-memprofile` flags. The program does CPU-heavy work (recursive Fibonacci) and allocates many 1 MiB byte slices, then emits the profiles for offline analysis with `go tool pprof`.\n\n## Why it matters\nNot every program is an HTTP server, so you cannot always rely on `net/http/pprof`; `runtime/pprof` lets any binary (CLI tools, batch jobs, tests) capture CPU and memory profiles. This is the standard way to find hot functions and allocation sources in production Go code.\n\n## Idea\n- Parse flags; if `-cpuprofile` is set, create the file, call `pprof.StartCPUProfile(f)`, and `defer pprof.StopCPUProfile()` so sampling spans the workload.\n- Run the workload (the recursive `fibonacci(35)` loop generates CPU samples; `allocateGarbage` produces heap allocations).\n- For memory, call `runtime.GC()` first to settle live-heap statistics, then `pprof.WriteHeapProfile(f)` so the inuse_space numbers are accurate.\n- Analyze offline: `go tool pprof cpu.out`, `top`, `list`, `web`, or the interactive `-http=:9090` UI.\n\n## Complexity\nProfiling overhead is roughly O(1) per sample (CPU sampling at ~100 Hz); the demo workload is exponential O(2^n) for `fibonacci(35)` and O(blocks) memory. Profile files are small relative to program runtime.\n\n## Pitfalls\n- Forgetting `defer pprof.StopCPUProfile()` (or returning early) yields a truncated or empty CPU profile.\n- Writing the heap profile without a preceding `runtime.GC()` can report stale or misleading live-memory numbers.\n- Not closing the profile file (or closing before pprof finishes writing) corrupts the output.\n- Confusing `-alloc_space` (total allocated) with `-inuse_space` (currently live) when reading the heap profile."},{"t":"Load generator","d":"hard","desc":"ą¤čĆąŠčüčéąŠą╣ ąĮą░ą│čĆčāąĘąŠčćąĮčŗą╣ ą│ąĄąĮąĄčĆą░čéąŠčĆ ą┤ą╗čÅ ą┐čĆąĖą╝ąĄčĆą░ 01-http-pprof. ąöąŠą╗ą▒ąĖčé /hot ą┐ą░čĆą░ą╗ą╗ąĄą╗čīąĮčŗą╝ąĖ ąĘą░ą┐čĆąŠčüą░ą╝ąĖ, čćčéąŠą▒čŗ CPU-ą┐čĆąŠčäąĖą╗čī ą▒čŗą╗ ąĮą░ą┐ąŠą╗ąĮąĄąĮąĮčŗą╝. ąŚą░ą┐čāčüą║: 1. čéąĄčĆą╝ąĖąĮą░ą╗ 1:  cd 01-http-pprof && go run main.go 2. čéąĄčĆą╝ąĖąĮą░ą╗ 2:  cd 04-load-generator && go run main.go 3. čéąĄčĆą╝ąĖąĮą░ą╗ 3:  go tool pprof -http=:9090 http://localhost:8001/debug/pproŌĆ”","go":"// ą¤čĆąŠčüčéąŠą╣ ąĮą░ą│čĆčāąĘąŠčćąĮčŗą╣ ą│ąĄąĮąĄčĆą░čéąŠčĆ ą┤ą╗čÅ ą┐čĆąĖą╝ąĄčĆą░ 01-http-pprof.\n// ąöąŠą╗ą▒ąĖčé /hot ą┐ą░čĆą░ą╗ą╗ąĄą╗čīąĮčŗą╝ąĖ ąĘą░ą┐čĆąŠčüą░ą╝ąĖ, čćčéąŠą▒čŗ CPU-ą┐čĆąŠčäąĖą╗čī ą▒čŗą╗ ąĮą░ą┐ąŠą╗ąĮąĄąĮąĮčŗą╝.\n//\n// ąŚą░ą┐čāčüą║:\n//  1. čéąĄčĆą╝ąĖąĮą░ą╗ 1:  cd 01-http-pprof && go run main.go\n//  2. čéąĄčĆą╝ąĖąĮą░ą╗ 2:  cd 04-load-generator && go run main.go\n//  3. čéąĄčĆą╝ąĖąĮą░ą╗ 3:  go tool pprof -http=:9090 http://localhost:8001/debug/pprof/profile?seconds=15\npackage main\n\nimport (\n\t\"flag\"\n\t\"fmt\"\n\t\"io\"\n\t\"net/http\"\n\t\"sync\"\n\t\"sync/atomic\"\n\t\"time\"\n)\n\nfunc main() {\n\turl := flag.String(\"url\", \"http://localhost:8001/hot\", \"target URL\")\n\tworkers := flag.Int(\"workers\", 16, \"concurrent workers\")\n\tduration := flag.Duration(\"duration\", 30*time.Second, \"test duration\")\n\tflag.Parse()\n\n\tfmt.Printf(\"Hitting %s with %d workers for %s\\n\", *url, *workers, *duration)\n\n\tvar (\n\t\twg       sync.WaitGroup\n\t\tok       atomic.Int64\n\t\tfail     atomic.Int64\n\t\tdeadline = time.Now().Add(*duration)\n\t\tclient   = &http.Client{Timeout: 30 * time.Second}\n\t)\n\n\tfor i := 0; i < *workers; i++ {\n\t\twg.Add(1)\n\t\tgo func() {\n\t\t\tdefer wg.Done()\n\t\t\tfor time.Now().Before(deadline) {\n\t\t\t\tresp, err := client.Get(*url)\n\t\t\t\tif err != nil {\n\t\t\t\t\tfail.Add(1)\n\t\t\t\t\tcontinue\n\t\t\t\t}\n\t\t\t\tio.Copy(io.Discard, resp.Body)\n\t\t\t\tresp.Body.Close()\n\t\t\t\tok.Add(1)\n\t\t\t}\n\t\t}()\n\t}\n\n\twg.Wait()\n\tfmt.Printf(\"ok=%d fail=%d\\n\", ok.Load(), fail.Load())\n}","info":"## Summary\nA small HTTP load generator that hammers a target URL (default `/hot`) with a fixed number of concurrent workers for a given duration, so a CPU profile collected on the server side is well populated. It prints the count of successful and failed requests at the end. Input: `-url`, `-workers`, `-duration` flags; output: `ok=N fail=M`.\n\n## Why it matters\nProfiling is only meaningful under load, so you frequently need a quick way to drive traffic at a service before grabbing a pprof sample. The pattern (a pool of goroutines looping until a deadline, with atomic counters) is the foundation of any benchmarking or stress-test harness.\n\n## Idea\n- Launch `workers` goroutines, tracked by a `sync.WaitGroup`.\n- Each goroutine loops while `time.Now().Before(deadline)`, issuing `client.Get(url)`, draining and closing the body, and incrementing an atomic success/failure counter.\n- A shared `http.Client` with a timeout is reused so connections are pooled and a hung server cannot stall a worker forever.\n- After `wg.Wait()`, print the aggregated `atomic.Int64` totals; atomics avoid a mutex on the hot path.\n\n## Complexity\nTime is O(duration) wall-clock, bounded by throughput; total requests scale with `workers` and server latency. Space is O(workers) goroutines plus pooled connections, independent of request count.\n\n## Pitfalls\n- Not draining and closing `resp.Body` leaks connections and prevents keep-alive reuse, throttling the generator.\n- Reading the deadline correctly: each worker re-evaluates `time.Now()`, so requests in flight at the deadline still complete.\n- Using a plain `int` counter instead of `atomic.Int64` causes a data race across workers.\n- Omitting `http.Client.Timeout` lets a slow server block a worker indefinitely, skewing results."},{"t":"Mux walk routes","d":"hard","desc":"ą×ą▒čģąŠą┤ ą▓čüąĄčģ ąĘą░čĆąĄą│ąĖčüčéčĆąĖčĆąŠą▓ą░ąĮąĮčŗčģ ą╝ą░čĆčłčĆčāčéąŠą▓ čćąĄčĆąĄąĘ gorilla/mux Walk(). ąśą┤ąĄčÅ: ą▓ąĄčłą░ąĄą╝ ą┐čāčüčéąŠą╣ ąŠą▒čĆą░ą▒ąŠčéčćąĖą║ ąĮą░ ą║ą░ąČą┤čŗą╣ ą╝ą░čĆčłčĆčāčé, ą┐ąŠčéąŠą╝ ą┐čĆąŠčģąŠą┤ąĖą╝ ą┐ąŠ ą┤ąĄčĆąĄą▓čā čĆąŠčāčéąĄčĆą░ ąĖ ą┐ąĄčćą░čéą░ąĄą╝ čłą░ą▒ą╗ąŠąĮčŗ ą┐čāčéąĖ, čĆąĄą│čāą╗čÅčĆą║ąĖ, HTTP-ą╝ąĄčéąŠą┤čŗ. ąŁčéąŠ ┬½ąĮąĄąŠčäąĖčåąĖą░ą╗čīąĮčŗą╣┬╗ čüą┐ąŠčüąŠą▒ ą┐čĆąŠą▓ąĄčĆąĖčéčī, čćčéąŠ čĆąŠčāčéąĖąĮą│ ąĮą░čüčéčĆąŠąĄąĮ čéą░ą║, ą║ą░ą║ ąĘą░ą┤čāą╝ą░ąĮąŠ ŌĆö ąĮąĄ čāą┐čāčüčéąĖą╗ąĖ ą╗ąĖ čŹąĮą┤ą┐ąŠąĖąĮčé, ąĮąĄ ą┐ąŠą▓ąĄčüąĖą╗ąĖ ą╗ąĖŌĆ”","go":"// ą×ą▒čģąŠą┤ ą▓čüąĄčģ ąĘą░čĆąĄą│ąĖčüčéčĆąĖčĆąŠą▓ą░ąĮąĮčŗčģ ą╝ą░čĆčłčĆčāčéąŠą▓ čćąĄčĆąĄąĘ gorilla/mux Walk().\n//\n// ąśą┤ąĄčÅ: ą▓ąĄčłą░ąĄą╝ ą┐čāčüčéąŠą╣ ąŠą▒čĆą░ą▒ąŠčéčćąĖą║ ąĮą░ ą║ą░ąČą┤čŗą╣ ą╝ą░čĆčłčĆčāčé, ą┐ąŠčéąŠą╝ ą┐čĆąŠčģąŠą┤ąĖą╝ ą┐ąŠ\n// ą┤ąĄčĆąĄą▓čā čĆąŠčāčéąĄčĆą░ ąĖ ą┐ąĄčćą░čéą░ąĄą╝ čłą░ą▒ą╗ąŠąĮčŗ ą┐čāčéąĖ, čĆąĄą│čāą╗čÅčĆą║ąĖ, HTTP-ą╝ąĄčéąŠą┤čŗ.\n// ąŁčéąŠ ┬½ąĮąĄąŠčäąĖčåąĖą░ą╗čīąĮčŗą╣┬╗ čüą┐ąŠčüąŠą▒ ą┐čĆąŠą▓ąĄčĆąĖčéčī, čćčéąŠ čĆąŠčāčéąĖąĮą│ ąĮą░čüčéčĆąŠąĄąĮ čéą░ą║, ą║ą░ą║\n// ąĘą░ą┤čāą╝ą░ąĮąŠ ŌĆö ąĮąĄ čāą┐čāčüčéąĖą╗ąĖ ą╗ąĖ čŹąĮą┤ą┐ąŠąĖąĮčé, ąĮąĄ ą┐ąŠą▓ąĄčüąĖą╗ąĖ ą╗ąĖ GET ą▓ą╝ąĄčüčéąŠ POST.\n//\n// ąŚą░ą┐čāčüą║:\n//\n//\tgo mod tidy\n//\tgo run main.go\npackage main\n\nimport (\n\t\"fmt\"\n\t\"net/http\"\n\t\"strings\"\n\n\t\"github.com/gorilla/mux\"\n)\n\nfunc handler(w http.ResponseWriter, r *http.Request) {\n\t// ą¤čāčüčéąŠą╣ ąŠą▒čĆą░ą▒ąŠčéčćąĖą║ ŌĆö ąĮą░ą╝ ą▓ą░ąČąĮą░ čéąŠą╗čīą║ąŠ čĆąĄą│ąĖčüčéčĆą░čåąĖčÅ ą╝ą░čĆčłčĆčāčéą░.\n}\n\ntype notAllowedHandler struct{}\n\nfunc (h notAllowedHandler) ServeHTTP(rw http.ResponseWriter, r *http.Request) {\n\thandler(rw, r)\n}\n\nfunc main() {\n\tr := mux.NewRouter()\n\tr.NotFoundHandler = http.HandlerFunc(handler)\n\tr.MethodNotAllowedHandler = notAllowedHandler{}\n\n\t// GET ŌĆö čćčéąĄąĮąĖąĄ\n\tgetMux := r.Methods(http.MethodGet).Subrouter()\n\tgetMux.HandleFunc(\"/time\", handler)\n\tgetMux.HandleFunc(\"/getall\", handler)\n\tgetMux.HandleFunc(\"/getid\", handler)\n\tgetMux.HandleFunc(\"/logged\", handler)\n\tgetMux.HandleFunc(\"/username/{id:[0-9]+}\", handler)\n\n\t// PUT ŌĆö ąŠą▒ąĮąŠą▓ą╗ąĄąĮąĖąĄ ą┐ąŠą╗čīąĘąŠą▓ą░čéąĄą╗čÅ\n\tputMux := r.Methods(http.MethodPut).Subrouter()\n\tputMux.HandleFunc(\"/update\", handler)\n\n\t// POST ŌĆö ą┤ąŠą▒ą░ą▓ąĖčéčī ą┐ąŠą╗čīąĘąŠą▓ą░čéąĄą╗čÅ, ą▓čģąŠą┤ ąĖ ą▓čŗčģąŠą┤\n\tpostMux := r.Methods(http.MethodPost).Subrouter()\n\tpostMux.HandleFunc(\"/add\", handler)\n\tpostMux.HandleFunc(\"/login\", handler)\n\tpostMux.HandleFunc(\"/logout\", handler)\n\n\t// DELETE ŌĆö čāą┤ą░ą╗ąĖčéčī ą┐ąŠą╗čīąĘąŠą▓ą░čéąĄą╗čÅ\n\tdeleteMux := r.Methods(http.MethodDelete).Subrouter()\n\tdeleteMux.HandleFunc(\"/username/{id:[0-9]+}\", handler)\n\n\terr := r.Walk(func(route *mux.Route, router *mux.Router, ancestors []*mux.Route) error {\n\t\tif pathTemplate, err := route.GetPathTemplate(); err == nil {\n\t\t\tfmt.Println(\"ROUTE:\", pathTemplate)\n\t\t}\n\t\tif pathRegexp, err := route.GetPathRegexp(); err == nil {\n\t\t\tfmt.Println(\"Path regexp:\", pathRegexp)\n\t\t}\n\t\tif qT, err := route.GetQueriesTemplates(); err == nil {\n\t\t\tfmt.Println(\"Queries templates:\", strings.Join(qT, \",\"))\n\t\t}\n\t\tif qRegexps, err := route.GetQueriesRegexp(); err == nil {\n\t\t\tfmt.Println(\"Queries regexps:\", strings.Join(qRegexps, \",\"))\n\t\t}\n\t\tif methods, err := route.GetMethods(); err == nil {\n\t\t\tfmt.Println(\"Methods:\", strings.Join(methods, \",\"))\n\t\t}\n\t\tfmt.Println()\n\t\treturn nil\n\t})\n\tif err != nil {\n\t\tfmt.Println(err)\n\t}\n\n\thttp.Handle(\"/\", r)\n}","info":"## Summary\nRegister a set of HTTP routes on a `gorilla/mux` router (grouped by method via subrouters) and then enumerate every route using `router.Walk`, printing each path template, path regexp, query templates/regexps, and HTTP methods. The goal is to verify the routing table matches intent ŌĆö no endpoint missing, no method mismatch (e.g. GET where POST was meant).\n\n## Why it matters\nOn large services it is easy to mis-register a route or attach the wrong verb; walking the router gives a self-documenting, auditable dump of the actual routing tree. The same `Walk` technique powers route listers, OpenAPI generators, and startup sanity checks.\n\n## Idea\n- Build a `mux.NewRouter()` and create method-scoped subrouters with `r.Methods(http.MethodGet).Subrouter()`, attaching handlers per path.\n- Call `r.Walk(fn)` where `fn` receives each `*mux.Route`; query the route with `GetPathTemplate`, `GetPathRegexp`, `GetQueriesTemplates`, `GetQueriesRegexp`, and `GetMethods`.\n- Each getter returns an error when that facet is not set (e.g. a method-only matcher has no path template), so guard each with `if ..., err := ...; err == nil`.\n- Printing the compiled regexps and method lists reveals exactly how mux will match incoming requests.\n\n## Complexity\nTime is O(R) where R is the number of registered routes (Walk visits each once); space is O(1) extra beyond the printed output and the router's own tree.\n\n## Pitfalls\n- Ignoring the error returned by each `Get*` getter: routes without a path template will otherwise produce confusing empty output.\n- Returning a non-nil error from the walk callback aborts the traversal early.\n- Method matchers create subrouters whose own node may have no path ŌĆö expect \"missing\" templates on those internal nodes.\n- The trailing `http.Handle(\"/\", r)` does nothing without a subsequent `http.ListenAndServe`; the example only needs the walk, not a running server."}]},{"name":"Go Training (čüą▒ąŠčĆąĮąĖą║ąĖ)","icon":"­¤ōÜ","problems":[{"t":"Concurrency patterns reference","d":"hard","desc":"Snippet 1: Fan-in/Fan-out (merge)","go":"package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\t\"math/rand\"\n\t\"sync\"\n\t\"time\"\n)\n\n// Snippet 1: Fan-in/Fan-out (merge)\nfunc gen(data []int) <-chan int {\n\tch := make(chan int)\n\tgo func() {\n\t\tdefer close(ch)\n\t\tfor _, val := range data {\n\t\t\tch <- val\n\t\t}\n\t}()\n\treturn ch\n}\n\nfunc merge(chans ...<-chan int) <-chan int {\n\tout := make(chan int)\n\tvar wg sync.WaitGroup // Use WaitGroup to wait for all goroutines\n\twg.Add(len(chans))\n\n\tfor _, ch := range chans {\n\t\tgo func(c <-chan int) {\n\t\t\tdefer wg.Done()\n\t\t\tfor val := range c {\n\t\t\t\tout <- val\n\t\t\t}\n\t\t}(ch)\n\t}\n\n\tgo func() {\n\t\twg.Wait()\n\t\tclose(out) // Close the 'out' channel, not a loop variable\n\t}()\n\treturn out\n}\n\nfunc mergeExample() {\n\tch1 := gen([]int{1, 2, 3})\n\tch2 := gen([]int{4, 5, 6})\n\tch3 := gen([]int{7, 8, 9})\n\n\tmerged := merge(ch1, ch2, ch3)\n\n\tfor val := range merged { // Correct loop syntax\n\t\tfmt.Println(val)\n\t}\n}\n\n// Snippet 2: Parallel Processing with Context\nfunc processData(v int) int {\n\t// Simulate work\n\ttime.Sleep(time.Duration(rand.Intn(100)) * time.Millisecond)\n\treturn v * 5\n}\n\nfunc processDataWithContext(ctx context.Context, v int) (int, bool) {\n\tch := make(chan int)\n\tgo func() {\n\t\tdefer close(ch)\n\t\tch <- processData(v)\n\t}()\n\n\tselect {\n\tcase <-ctx.Done():\n\t\treturn 0, false // Return a value and indicate timeout\n\tcase res := <-ch:\n\t\treturn res, true\n\t}\n}\n\nfunc processParallel(ctx context.Context, in <-chan int, out chan<- int, numWorkers int) {\n\tvar wg sync.WaitGroup\n\twg.Add(numWorkers)\n\tfor i := 0; i < numWorkers; i++ {\n\t\tgo func() {\n\t\t\tdefer wg.Done()\n\t\t\tfor {\n\t\t\t\tselect {\n\t\t\t\tcase <-ctx.Done():\n\t\t\t\t\treturn\n\t\t\t\tcase v, ok := <-in:\n\t\t\t\t\tif !ok {\n\t\t\t\t\t\treturn\n\t\t\t\t\t}\n\t\t\t\t\tif res, ok := processDataWithContext(ctx, v); ok {\n\t\t\t\t\t\tselect {\n\t\t\t\t\t\tcase <-ctx.Done():\n\t\t\t\t\t\t\treturn\n\t\t\t\t\t\tcase out <- res:\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t}\n\t\t}()\n\t}\n\twg.Wait()\n}\n\nfunc processExample() {\n\tin := make(chan int)\n\tout := make(chan int)\n\n\tctx, cancel := context.WithTimeout(context.Background(), 5*time.Second)\n\tdefer cancel()\n\n\t// Producer\n\tgo func() {\n\t\tdefer close(in)\n\t\tfor i := 0; i < 10; i++ {\n\t\t\tselect {\n\t\t\tcase <-ctx.Done():\n\t\t\t\treturn\n\t\t\tcase in <- i + 1:\n\t\t\t}\n\t\t}\n\t}()\n\n\t// Parallel processor\n\tgo func() {\n\t\tprocessParallel(ctx, in, out, 5)\n\t\tclose(out)\n\t}()\n\n\t// Consumer\n\tfor v := range out {\n\t\tfmt.Println(v)\n\t}\n}\n\n// Snippet 3: Stack\ntype Stack struct {\n\titems []string\n}\n\nfunc (s *Stack) Push(data string) {\n\ts.items = append(s.items, data)\n}\n\nfunc (s *Stack) Pop() {\n\tif s.IsEmpty() { // Correct method call\n\t\treturn\n\t}\n\ts.items = s.items[:len(s.items)-1]\n}\n\nfunc (s *Stack) IsEmpty() bool {\n\treturn len(s.items) == 0\n}\n\nfunc (s *Stack) Top() (string, error) {\n\tif s.IsEmpty() {\n\t\treturn \"\", fmt.Errorf(\"stack is empty\")\n\t}\n\treturn s.items[len(s.items)-1], nil\n}\n\nfunc stackExample() {\n\ts := Stack{}\n\ts.Push(\"A\")\n\ts.Push(\"B\")\n\ttop, _ := s.Top()\n\tfmt.Println(\"Top:\", top)\n\ts.Pop()\n\ttop, _ = s.Top()\n\tfmt.Println(\"Top after pop:\", top)\n}\n\n// Snippet 4: Concurrent Map\nfunc concurrentMapExample() {\n\twrites := 1000\n\tstorage := make(map[int]int, writes)\n\tvar mu sync.RWMutex\n\tvar wg sync.WaitGroup\n\n\twg.Add(writes)\n\tfor i := 0; i < writes; i++ {\n\t\ti := i\n\t\tgo func() {\n\t\t\tdefer wg.Done()\n\t\t\tmu.Lock()\n\t\t\tstorage[i] = i\n\t\t\tmu.Unlock()\n\t\t}()\n\t}\n\twg.Wait()\n\n\twg.Add(writes)\n\tfor i := 0; i < writes; i++ {\n\t\ti := i\n\t\tgo func() {\n\t\t\tdefer wg.Done()\n\t\t\tmu.RLock()\n\t\t\t_, _ = storage[i]\n\t\t\tmu.RUnlock()\n\t\t}()\n\t}\n\twg.Wait()\n\tfmt.Println(\"map size: \", len(storage))\n}\n\n// Snippet 5: Context Timeout\nfunc longFunc() int {\n\ttime.Sleep(time.Duration(rand.Intn(3)) * time.Second)\n\treturn 42\n}\n\nfunc callingLongFunc(ctx context.Context) (int, error) { // Correct signature\n\tch := make(chan int, 1)\n\tgo func() {\n\t\tch <- longFunc()\n\t}()\n\n\tselect {\n\tcase <-ctx.Done():\n\t\treturn 0, ctx.Err() // Return error on timeout\n\tcase v := <-ch:\n\t\treturn v, nil\n\t}\n}\n\nfunc contextTimeoutExample() {\n\tctx, cancel := context.WithTimeout(context.Background(), 2*time.Second)\n\tdefer cancel()\n\tres, err := callingLongFunc(ctx)\n\tif err != nil {\n\t\tfmt.Println(\"err:\", err)\n\t\treturn\n\t}\n\tfmt.Println(\"res: \", res) // Correct variable name\n}\n\n// Snippet 6: Swap\nfunc swap(x, y *int) {\n\t*x, *y = *y, *x\n}\n\nfunc swapExample() {\n\tx := 1\n\ty := 2\n\tswap(&x, &y)\n\tfmt.Println(x, y)\n}\n\n// Snippet 7: Square\nfunc square(x *float64) {\n\t*x = *x * *x\n}\n\nfunc squareExample() {\n\tx := 1.5\n\tsquare(&x)\n\tfmt.Println(x)\n}\n\n// Snippet 8: Number Pipeline\nfunc pipelineExample() {\n\tnumbers1 := make(chan int)\n\tnumbers2 := make(chan int)\n\n\tgo func() {\n\t\tdefer close(numbers1)\n\t\tfor i := 1; i <= 10; i++ { // Correct loop initialization\n\t\t\tnumbers1 <- i\n\t\t}\n\t}()\n\n\tgo func() {\n\t\tdefer close(numbers2)\n\t\tfor x := range numbers1 {\n\t\t\tnumbers2 <- x * x\n\t\t}\n\t}()\n\n\tfor x := range numbers2 { // Correct channel name\n\t\tfmt.Println(x)\n\t}\n}\n\n// Snippet 9: Worker Pool\nfunc worker(id int, f func(int) int, jobs <-chan int, results chan<- int) {\n\tfor j := range jobs {\n\t\t// fmt.Printf(\"worker %d started job %d\\n\", id, j)\n\t\tresults <- f(j)\n\t\t// fmt.Printf(\"worker %d finished job %d\\n\", id, j)\n\t}\n}\n\nfunc workerPoolExample() {\n\tconst numJobs = 5\n\tjobs := make(chan int, numJobs)\n\tresults := make(chan int, numJobs)\n\n\tmult := func(x int) int {\n\t\ttime.Sleep(50 * time.Millisecond)\n\t\treturn x * 10\n\t}\n\n\tfor w := 1; w <= 3; w++ { // Correct loop condition\n\t\tgo worker(w, mult, jobs, results)\n\t}\n\n\tfor j := 1; j <= numJobs; j++ {\n\t\tjobs <- j\n\t}\n\tclose(jobs)\n\n\tfor a := 1; a <= numJobs; a++ {\n\t\tfmt.Println(<-results)\n\t}\n}\n\n// Snippet 10: Custom WaitGroup (Semaphore)\ntype sema chan struct{}\n\nfunc NewSema(n int) sema {\n\treturn make(sema, n)\n}\n\nfunc (s sema) Inc(k int) {\n\tfor i := 0; i < k; i++ {\n\t\ts <- struct{}{}\n\t}\n}\n\nfunc (s sema) Dec(k int) {\n\tfor i := 0; i < k; i++ {\n\t\t<-s\n\t}\n}\n\nfunc customWaitGroupExample() {\n\tnumbers := []int{1, 3, 5, 6}\n\tn := len(numbers)\n\n\tsem := NewSema(n)\n\tfor _, num := range numbers {\n\t\tgo func(n int) {\n\t\t\ttime.Sleep(10 * time.Millisecond)\n\t\t\tfmt.Println(n)\n\t\t\tsem.Inc(1) // Signal that one goroutine is done\n\t\t}(num)\n\t}\n\tsem.Dec(n) // Wait for n signals\n\tfmt.Println(\"All goroutines finished.\")\n}\n\n// Snippet 11: Infinite Generator (Fibonacci)\nfunc fibo() <-chan int {\n\tch := make(chan int)\n\tgo func() {\n\t\ta, b := 0, 1\n\t\tfor {\n\t\t\tch <- a\n\t\t\ta, b = b, a+b\n\t\t}\n\t}()\n\treturn ch\n}\n\nfunc fiboExample() {\n\tf := fibo()\n\tfor i := 0; i < 10; i++ { // Correct loop initialization\n\t\tfmt.Println(<-f) // Correct channel variable\n\t}\n}\n\n// Snippet 12: Fan-In\nfunc boring(msg string) <-chan string {\n\tc := make(chan string)\n\tgo func() {\n\t\tfor i := 0; ; i++ {\n\t\t\tc <- fmt.Sprintf(\"%s %d\", msg, i)\n\t\t\ttime.Sleep(time.Duration(rand.Intn(1e3)) * time.Millisecond)\n\t\t}\n\t}()\n\treturn c\n}\n\nfunc fanIn(input1, input2 <-chan string) <-chan string {\n\tc := make(chan string)\n\tgo func() {\n\t\tfor {\n\t\t\tselect {\n\t\t\tcase s := <-input1:\n\t\t\t\tc <- s\n\t\t\tcase s := <-input2:\n\t\t\t\tc <- s\n\t\t\t}\n\t\t}\n\t}()\n\treturn c // Added missing return\n}\n\nfunc fanInExample() {\n\tc := fanIn(boring(\"Joe\"), boring(\"Ann\"))\n\tfor i := 0; i < 10; i++ {\n\t\tfmt.Println(<-c)\n\t}\n\tfmt.Println(\"finish\")\n}\n\n// Snippet 13: Variadic Fan-In\nfunc fanInVariadic(chans ...<-chan int) <-chan int {\n\tvar wg sync.WaitGroup\n\tout := make(chan int)\n\n\toutput := func(c <-chan int) {\n\t\tfor n := range c {\n\t\t\tout <- n\n\t\t}\n\t\twg.Done()\n\t}\n\n\twg.Add(len(chans))\n\tfor _, c := range chans {\n\t\tgo output(c)\n\t}\n\n\tgo func() {\n\t\twg.Wait()\n\t\tclose(out)\n\t}()\n\treturn out\n}\n\nfunc fanInVariadicExample() {\n\tch1 := gen([]int{11, 12, 13})\n\tch2 := gen([]int{14, 15, 16})\n\tmerged := fanInVariadic(ch1, ch2)\n\tfor v := range merged {\n\t\tfmt.Println(v)\n\t}\n}\n\n// Snippet 14: Pointer Basics\nfunc increment(x *int) {\n\t*x += 1\n}\n\nfunc incrementExample() {\n\tx := 10\n\tincrement(&x)\n\tfmt.Println(x)\n}\n\nfunc swapStrings(str1, str2 *string) { // Correct signature\n\t*str1, *str2 = *str2, *str1\n}\n\nfunc swapStringsExample() {\n\ts1, s2 := \"hello\", \"world\"\n\tswapStrings(&s1, &s2)\n\tfmt.Println(s1, s2)\n}\n\nfunc minMax(a, b int, min, max *int) { // Simpler without pointers for a,b\n\tif a >= b {\n\t\t*max, *min = a, b\n\t} else {\n\t\t*max, *min = b, a\n\t}\n}\n\nfunc minMaxExample() {\n\ta, b := 5, 10\n\tvar mn, mx int\n\tminMax(a, b, &mn, &mx)\n\tfmt.Println(mn, mx)\n}\n\nfunc zeroArray(arr *[5]int) {\n\tfor i := range arr {\n\t\tarr[i] = 0\n\t}\n}\n\nfunc zeroArrayExample() {\n\tarr := [5]int{1, 2, 4, 5, 9} // Use an array of size 5\n\tzeroArray(&arr)\n\tfmt.Println(arr)\n}\n\nfunc changeFirstLetter(letters *[]byte) {\n\ts := *letters\n\tif len(s) > 0 { // Check length > 0\n\t\ts[0] = 'x'\n\t}\n}\n\nfunc changeFirstLetterExample() {\n\tb := []byte(\"hello\")\n\tchangeFirstLetter(&b)\n\tfmt.Println(string(b))\n}\n\n// Main function to run all examples\nfunc main() {\n\trand.Seed(time.Now().UnixNano())\n\n\tfmt.Println(\"--- mergeExample ---\")\n\tmergeExample()\n\n\tfmt.Println(\"\\n--- processExample ---\")\n\tprocessExample()\n\n\tfmt.Println(\"\\n--- stackExample ---\")\n\tstackExample()\n\n\tfmt.Println(\"\\n--- concurrentMapExample ---\")\n\tconcurrentMapExample()\n\n\tfmt.Println(\"\\n--- contextTimeoutExample ---\")\n\tcontextTimeoutExample()\n\n\tfmt.Println(\"\\n--- swapExample ---\")\n\tswapExample()\n\n\tfmt.Println(\"\\n--- squareExample ---\")\n\tsquareExample()\n\n\tfmt.Println(\"\\n--- pipelineExample ---\")\n\tpipelineExample()\n\n\tfmt.Println(\"\\n--- workerPoolExample ---\")\n\tworkerPoolExample()\n\n\tfmt.Println(\"\\n--- customWaitGroupExample ---\")\n\tcustomWaitGroupExample()\n\n\tfmt.Println(\"\\n--- fiboExample ---\")\n\tfiboExample()\n\n\tfmt.Println(\"\\n--- fanInExample ---\")\n\tfanInExample()\n\n\tfmt.Println(\"\\n--- fanInVariadicExample ---\")\n\tfanInVariadicExample()\n\n\tfmt.Println(\"\\n--- incrementExample ---\")\n\tincrementExample()\n\n\tfmt.Println(\"\\n--- swapStringsExample ---\")\n\tswapStringsExample()\n\n\tfmt.Println(\"\\n--- minMaxExample ---\")\n\tminMaxExample()\n\n\tfmt.Println(\"\\n--- zeroArrayExample ---\")\n\tzeroArrayExample()\n\n\tfmt.Println(\"\\n--- changeFirstLetterExample ---\")\n\tchangeFirstLetterExample()\n}","info":"## Summary\nA reference collection of canonical Go concurrency and pointer snippets, each with a small runnable example: channel fan-in/fan-out merge, context-bounded parallel processing, a stack, a mutex-guarded concurrent map, context timeout, swap/square/min-max via pointers, number pipelines, a worker pool, a channel-based semaphore, infinite generators, and variadic fan-in. The program runs every example from `main` and prints their output.\n\n## Why it matters\nThese are the building blocks asked about in nearly every Go interview and used daily in real services: bounding work with `context`, merging multiple producers safely, worker pools, and avoiding map data races. Getting the channel-close and WaitGroup ownership rules right is the difference between correct code and a deadlock or panic.\n\n## Idea\n- Fan-in/merge: one goroutine per input channel forwards into a shared `out`; a `sync.WaitGroup` plus a closer goroutine closes `out` exactly once after all forwarders finish ŌĆö the closer, not the loop, owns the close.\n- Parallel processing: a fixed pool of workers reads from `in`, and every blocking send/receive is wrapped in a `select` on `ctx.Done()` so cancellation/timeout unwinds cleanly without leaking goroutines.\n- Concurrent map: guard reads with `RLock` and writes with `Lock` on a `sync.RWMutex`; a bare Go map is not safe for concurrent writes.\n- Semaphore: a buffered channel of `struct{}` of capacity n; sending counts a finished goroutine and the main goroutine drains n receives to wait ŌĆö a hand-rolled WaitGroup.\n- Pipelines/generators: each stage owns and `defer close`es its output channel; downstream `range` terminates when the channel closes.\n\n## Complexity\nEach snippet is linear in its data: O(n) work across the fan-in/pipeline/worker-pool examples, with O(workers) or O(channels) goroutines live at once. The fibonacci/boring generators are unbounded by design and rely on the consumer reading a fixed count.\n\n## Pitfalls\n- Closing a channel from multiple sender goroutines panics; only the dedicated WaitGroup-closer goroutine may close `out`.\n- A literal newline inside a `//` comment or a `\"...\"` string is a compile error ŌĆö the printf debug comments and the `\"\\n--- ...\"` separators must use the `\\n` escape, not a real line break (the original source had this bug).\n- The infinite `fibo` and `boring` generators leak their goroutines once `main` stops reading; acceptable in a demo but a leak in production ŌĆö bound them with context or a done channel.\n- Forgetting the `RLock`/`Lock` distinction, or sending on an unbuffered channel inside a worker without selecting on `ctx.Done()`, leads to races or deadlocks."},{"t":"Load balancing strategies","d":"hard","desc":"Task ą┐čĆąĄą┤čüčéą░ą▓ą╗čÅąĄčé ąĘą░ą┤ą░čćčā ą┤ą╗čÅ ąŠą▒čĆą░ą▒ąŠčéą║ąĖ","go":"package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\t\"math/rand\"\n\t\"sort\"\n\t\"sync\"\n\t\"sync/atomic\"\n\t\"time\"\n)\n\n// Task ą┐čĆąĄą┤čüčéą░ą▓ą╗čÅąĄčé ąĘą░ą┤ą░čćčā ą┤ą╗čÅ ąŠą▒čĆą░ą▒ąŠčéą║ąĖ\ntype Task struct {\n\tID   int\n\tData interface{}\n}\n\n// Result čüąŠą┤ąĄčĆąČąĖčé čĆąĄąĘčāą╗čīčéą░čé ą▓čŗą┐ąŠą╗ąĮąĄąĮąĖčÅ ąĘą░ą┤ą░čćąĖ\ntype Result struct {\n\tTaskID   int\n\tWorkerID int\n\tData     interface{}\n\tDuration time.Duration\n\tError    error\n}\n\n// Worker ą┐čĆąĄą┤čüčéą░ą▓ą╗čÅąĄčé ą▓ąŠčĆą║ąĄčĆą░ čü ą╝ąĄčéčĆąĖą║ą░ą╝ąĖ\ntype Worker struct {\n\tID            int\n\tTasksHandled  int64\n\tTotalDuration time.Duration\n\tCurrentLoad   int32 // čéąĄą║čāčēąĄąĄ ą║ąŠą╗ąĖčćąĄčüčéą▓ąŠ ąĘą░ą┤ą░čć ą▓ ąŠą▒čĆą░ą▒ąŠčéą║ąĄ\n\tLastUsed      time.Time\n\tqueue         chan Task\n\tmu            sync.RWMutex\n}\n\nfunc (w *Worker) IncrementLoad() {\n\tatomic.AddInt32(&w.CurrentLoad, 1)\n}\n\nfunc (w *Worker) DecrementLoad() {\n\tatomic.AddInt32(&w.CurrentLoad, -1)\n}\n\nfunc (w *Worker) GetCurrentLoad() int32 {\n\treturn atomic.LoadInt32(&w.CurrentLoad)\n}\n\nfunc (w *Worker) UpdateStats(duration time.Duration) {\n\tw.mu.Lock()\n\tdefer w.mu.Unlock()\n\tw.TasksHandled++\n\tw.TotalDuration += duration\n\tw.LastUsed = time.Now()\n}\n\nfunc (w *Worker) GetStats() (int64, time.Duration, time.Time) {\n\tw.mu.RLock()\n\tdefer w.mu.RUnlock()\n\treturn w.TasksHandled, w.TotalDuration, w.LastUsed\n}\n\n// LoadBalancingStrategy ąŠą┐čĆąĄą┤ąĄą╗čÅąĄčé ąĖąĮčéąĄčĆčäąĄą╣čü ą┤ą╗čÅ čüčéčĆą░čéąĄą│ąĖą╣ ą▒ą░ą╗ą░ąĮčüąĖčĆąŠą▓ą║ąĖ\ntype LoadBalancingStrategy interface {\n\tSelectWorker(workers []*Worker) *Worker\n\tName() string\n}\n\n// 1. Round Robin Strategy\ntype RoundRobinStrategy struct {\n\tcounter uint64\n}\n\nfunc (rr *RoundRobinStrategy) SelectWorker(workers []*Worker) *Worker {\n\tif len(workers) == 0 {\n\t\treturn nil\n\t}\n\tidx := atomic.AddUint64(&rr.counter, 1) % uint64(len(workers))\n\treturn workers[idx]\n}\n\nfunc (rr *RoundRobinStrategy) Name() string {\n\treturn \"Round Robin\"\n}\n\n// 2. Least Connections Strategy\ntype LeastConnectionsStrategy struct{}\n\nfunc (lc *LeastConnectionsStrategy) SelectWorker(workers []*Worker) *Worker {\n\tif len(workers) == 0 {\n\t\treturn nil\n\t}\n\n\tvar bestWorker *Worker\n\tminConnections := int32(^uint32(0) >> 1) // ą╝ą░ą║čüąĖą╝ą░ą╗čīąĮąŠąĄ ąĘąĮą░čćąĄąĮąĖąĄ int32\n\n\tfor _, worker := range workers {\n\t\tcurrentLoad := worker.GetCurrentLoad()\n\t\tif currentLoad < minConnections {\n\t\t\tminConnections = currentLoad\n\t\t\tbestWorker = worker\n\t\t}\n\t}\n\n\treturn bestWorker\n}\n\nfunc (lc *LeastConnectionsStrategy) Name() string {\n\treturn \"Least Connections\"\n}\n\n// 3. Weighted Round Robin Strategy\ntype WeightedRoundRobinStrategy struct {\n\tweights []int\n\tcurrent []int\n\tmu      sync.Mutex\n}\n\nfunc NewWeightedRoundRobinStrategy(weights []int) *WeightedRoundRobinStrategy {\n\treturn &WeightedRoundRobinStrategy{\n\t\tweights: weights,\n\t\tcurrent: make([]int, len(weights)),\n\t}\n}\n\nfunc (wrr *WeightedRoundRobinStrategy) SelectWorker(workers []*Worker) *Worker {\n\tif len(workers) == 0 {\n\t\treturn nil\n\t}\n\n\twrr.mu.Lock()\n\tdefer wrr.mu.Unlock()\n\n\t// ąŻą▒ąĄąČą┤ą░ąĄą╝čüčÅ, čćčéąŠ čĆą░ąĘą╝ąĄčĆčŗ ą╝ą░čüčüąĖą▓ąŠą▓ čüąŠą▓ą┐ą░ą┤ą░čÄčé\n\tif len(wrr.weights) != len(workers) {\n\t\treturn workers[0] // fallback ą║ ą┐ąĄčĆą▓ąŠą╝čā ą▓ąŠčĆą║ąĄčĆčā\n\t}\n\n\tbestIdx := -1\n\tmaxWeight := -1\n\n\tfor i := 0; i < len(workers); i++ {\n\t\twrr.current[i] += wrr.weights[i]\n\t\tif wrr.current[i] > maxWeight {\n\t\t\tmaxWeight = wrr.current[i]\n\t\t\tbestIdx = i\n\t\t}\n\t}\n\n\tif bestIdx != -1 {\n\t\twrr.current[bestIdx] -= wrr.getTotalWeight()\n\t\treturn workers[bestIdx]\n\t}\n\n\treturn workers[0]\n}\n\nfunc (wrr *WeightedRoundRobinStrategy) getTotalWeight() int {\n\ttotal := 0\n\tfor _, weight := range wrr.weights {\n\t\ttotal += weight\n\t}\n\treturn total\n}\n\nfunc (wrr *WeightedRoundRobinStrategy) Name() string {\n\treturn \"Weighted Round Robin\"\n}\n\n// 4. Least Response Time Strategy\ntype LeastResponseTimeStrategy struct{}\n\nfunc (lrt *LeastResponseTimeStrategy) SelectWorker(workers []*Worker) *Worker {\n\tif len(workers) == 0 {\n\t\treturn nil\n\t}\n\n\tvar bestWorker *Worker\n\tminAvgResponseTime := time.Duration(^uint64(0) >> 1) // ą╝ą░ą║čüąĖą╝ą░ą╗čīąĮąŠąĄ ąĘąĮą░čćąĄąĮąĖąĄ\n\n\tfor _, worker := range workers {\n\t\thandled, totalDuration, _ := worker.GetStats()\n\t\tif handled == 0 {\n\t\t\t// ąØąŠą▓čŗą╣ ą▓ąŠčĆą║ąĄčĆ - ą▓čŗą▒ąĖčĆą░ąĄą╝ ąĄą│ąŠ\n\t\t\treturn worker\n\t\t}\n\n\t\tavgResponseTime := totalDuration / time.Duration(handled)\n\t\tcurrentLoad := worker.GetCurrentLoad()\n\n\t\t// ąŻčćąĖčéčŗą▓ą░ąĄą╝ čéąĄą║čāčēčāčÄ ąĮą░ą│čĆčāąĘą║čā\n\t\tadjustedTime := avgResponseTime * time.Duration(currentLoad+1)\n\n\t\tif adjustedTime < minAvgResponseTime {\n\t\t\tminAvgResponseTime = adjustedTime\n\t\t\tbestWorker = worker\n\t\t}\n\t}\n\n\treturn bestWorker\n}\n\nfunc (lrt *LeastResponseTimeStrategy) Name() string {\n\treturn \"Least Response Time\"\n}\n\n// 5. Random Strategy\ntype RandomStrategy struct{}\n\nfunc (rs *RandomStrategy) SelectWorker(workers []*Worker) *Worker {\n\tif len(workers) == 0 {\n\t\treturn nil\n\t}\n\n\tidx := rand.Intn(len(workers))\n\treturn workers[idx]\n}\n\nfunc (rs *RandomStrategy) Name() string {\n\treturn \"Random\"\n}\n\n// 6. Power of Two Choices Strategy (ą┤ą╗čÅ ą▓čŗčüąŠą║ąŠąĮą░ą│čĆčāąČąĄąĮąĮčŗčģ čüąĖčüčéąĄą╝)\ntype PowerOfTwoStrategy struct{}\n\nfunc (pt *PowerOfTwoStrategy) SelectWorker(workers []*Worker) *Worker {\n\tif len(workers) == 0 {\n\t\treturn nil\n\t}\n\n\tif len(workers) == 1 {\n\t\treturn workers[0]\n\t}\n\n\t// ąÆčŗą▒ąĖčĆą░ąĄą╝ ą┤ą▓ą░ čüą╗čāčćą░ą╣ąĮčŗčģ ą▓ąŠčĆą║ąĄčĆą░\n\tidx1 := rand.Intn(len(workers))\n\tidx2 := rand.Intn(len(workers))\n\tfor idx2 == idx1 {\n\t\tidx2 = rand.Intn(len(workers))\n\t}\n\n\tworker1, worker2 := workers[idx1], workers[idx2]\n\n\t// ąÆąŠąĘą▓čĆą░čēą░ąĄą╝ ą▓ąŠčĆą║ąĄčĆą░ čü ą╝ąĄąĮčīčłąĄą╣ ąĮą░ą│čĆčāąĘą║ąŠą╣\n\tif worker1.GetCurrentLoad() <= worker2.GetCurrentLoad() {\n\t\treturn worker1\n\t}\n\treturn worker2\n}\n\nfunc (pt *PowerOfTwoStrategy) Name() string {\n\treturn \"Power of Two\"\n}\n\n// WorkerPool ąŠčüąĮąŠą▓ąĮą░čÅ čüčéčĆčāą║čéčāčĆą░ ą┐čāą╗ą░ ą▓ąŠčĆą║ąĄčĆąŠą▓\ntype WorkerPool struct {\n\tworkers  []*Worker\n\ttasks    chan Task\n\tresults  chan Result\n\tstrategy LoadBalancingStrategy\n\tctx      context.Context\n\tcancel   context.CancelFunc\n\twg       sync.WaitGroup\n}\n\n// NewWorkerPool čüąŠąĘą┤ą░ąĄčé ąĮąŠą▓čŗą╣ ą┐čāą╗ ą▓ąŠčĆą║ąĄčĆąŠą▓\nfunc NewWorkerPool(numWorkers int, taskBufferSize int, strategy LoadBalancingStrategy) *WorkerPool {\n\tctx, cancel := context.WithCancel(context.Background())\n\n\tworkers := make([]*Worker, numWorkers)\n\tfor i := 0; i < numWorkers; i++ {\n\t\tworkers[i] = &Worker{\n\t\t\tID:       i + 1,\n\t\t\tLastUsed: time.Now(),\n\t\t\tqueue:    make(chan Task, taskBufferSize),\n\t\t}\n\t}\n\n\treturn &WorkerPool{\n\t\tworkers:  workers,\n\t\ttasks:    make(chan Task, taskBufferSize),\n\t\tresults:  make(chan Result, taskBufferSize),\n\t\tstrategy: strategy,\n\t\tctx:      ctx,\n\t\tcancel:   cancel,\n\t}\n}\n\n// Start ąĘą░ą┐čāčüą║ą░ąĄčé ą┐čāą╗ ą▓ąŠčĆą║ąĄčĆąŠą▓\nfunc (wp *WorkerPool) Start() {\n\tfor _, worker := range wp.workers {\n\t\twp.wg.Add(1)\n\t\tgo wp.workerRoutine(worker)\n\t}\n\n\t// ąŚą░ą┐čāčüą║ą░ąĄą╝ dispatcher\n\tgo wp.dispatcherRoutine()\n}\n\n// workerRoutine ąŠčüąĮąŠą▓ąĮąŠą╣ čåąĖą║ą╗ ą▓ąŠčĆą║ąĄčĆą░: čćąĖčéą░ąĄčé ąĖąĘ čüą▓ąŠąĄą╣ ą┐ąĄčĆčüąŠąĮą░ą╗čīąĮąŠą╣ ąŠčćąĄčĆąĄą┤ąĖ\nfunc (wp *WorkerPool) workerRoutine(worker *Worker) {\n\tdefer wp.wg.Done()\n\n\tfor {\n\t\tselect {\n\t\tcase <-wp.ctx.Done():\n\t\t\treturn\n\t\tcase task, ok := <-worker.queue:\n\t\t\tif !ok {\n\t\t\t\treturn\n\t\t\t}\n\t\t\twp.processTask(worker, task)\n\t\t}\n\t}\n}\n\n// dispatcherRoutine čĆą░čüą┐čĆąĄą┤ąĄą╗čÅąĄčé ąĘą░ą┤ą░čćąĖ čüąŠą│ą╗ą░čüąĮąŠ ą▓čŗą▒čĆą░ąĮąĮąŠą╣ čüčéčĆą░čéąĄą│ąĖąĖ\nfunc (wp *WorkerPool) dispatcherRoutine() {\n\tfor {\n\t\tselect {\n\t\tcase <-wp.ctx.Done():\n\t\t\treturn\n\t\tcase task, ok := <-wp.tasks:\n\t\t\tif !ok {\n\t\t\t\t// ąŚą░ą║čĆčŗą▓ą░ąĄą╝ ąŠčćąĄčĆąĄą┤ąĖ ą▓ąŠčĆą║ąĄčĆąŠą▓, čćčéąŠą▒čŗ ąŠąĮąĖ ąĘą░ą▓ąĄčĆčłąĖą╗ąĖčüčī\n\t\t\t\tfor _, w := range wp.workers {\n\t\t\t\t\tclose(w.queue)\n\t\t\t\t}\n\t\t\t\treturn\n\t\t\t}\n\t\t\t// ąÆčŗą▒ąĖčĆą░ąĄą╝ ą▓ąŠčĆą║ąĄčĆą░ čüąŠą│ą╗ą░čüąĮąŠ čüčéčĆą░čéąĄą│ąĖąĖ ąĖ ą║ą╗ą░ą┤čæą╝ ąĘą░ą┤ą░čćčā ą▓ ąĄą│ąŠ ąŠčćąĄčĆąĄą┤čī\n\t\t\tselectedWorker := wp.strategy.SelectWorker(wp.workers)\n\t\t\tif selectedWorker != nil {\n\t\t\t\tselectedWorker.IncrementLoad()\n\t\t\t\tselect {\n\t\t\t\tcase selectedWorker.queue <- task:\n\t\t\t\tcase <-wp.ctx.Done():\n\t\t\t\t\tselectedWorker.DecrementLoad()\n\t\t\t\t\treturn\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\t}\n}\n\n// processTask ąŠą▒čĆą░ą▒ą░čéčŗą▓ą░ąĄčé ąĘą░ą┤ą░čćčā\nfunc (wp *WorkerPool) processTask(worker *Worker, task Task) {\n\tstart := time.Now()\n\tdefer worker.DecrementLoad()\n\n\t// ąĪąĖą╝čāą╗ąĖčĆčāąĄą╝ ąŠą▒čĆą░ą▒ąŠčéą║čā ąĘą░ą┤ą░čćąĖ\n\tprocessingTime := time.Duration(rand.Intn(1000)+100) * time.Millisecond\n\ttime.Sleep(processingTime)\n\n\tduration := time.Since(start)\n\tworker.UpdateStats(duration)\n\n\tresult := Result{\n\t\tTaskID:   task.ID,\n\t\tWorkerID: worker.ID,\n\t\tData:     fmt.Sprintf(\"Processed task %d by worker %d\", task.ID, worker.ID),\n\t\tDuration: duration,\n\t}\n\n\tselect {\n\tcase wp.results <- result:\n\tcase <-wp.ctx.Done():\n\t\treturn\n\t}\n}\n\n// SubmitTask ąŠčéą┐čĆą░ą▓ą╗čÅąĄčé ąĘą░ą┤ą░čćčā ą▓ ą┐čāą╗\nfunc (wp *WorkerPool) SubmitTask(task Task) {\n\tselect {\n\tcase wp.tasks <- task:\n\tcase <-wp.ctx.Done():\n\t\treturn\n\t}\n}\n\n// GetResults ą▓ąŠąĘą▓čĆą░čēą░ąĄčé ą║ą░ąĮą░ą╗ čĆąĄąĘčāą╗čīčéą░čéąŠą▓\nfunc (wp *WorkerPool) GetResults() <-chan Result {\n\treturn wp.results\n}\n\ntype WorkerStats struct {\n\tWorkerID      int\n\tTasksHandled  int64\n\tTotalDuration time.Duration\n\tAvgDuration   time.Duration\n}\n\n// GetStats ą▓ąŠąĘą▓čĆą░čēą░ąĄčé čüčéą░čéąĖčüčéąĖą║čā ą▓ąŠčĆą║ąĄčĆąŠą▓\nfunc (wp *WorkerPool) GetStats() []WorkerStats {\n\tstats := make([]WorkerStats, 0, len(wp.workers))\n\tfor _, worker := range wp.workers {\n\t\thandled, totalDuration, _ := worker.GetStats()\n\t\tavgDuration := time.Duration(0)\n\t\tif handled > 0 {\n\t\t\tavgDuration = totalDuration / time.Duration(handled)\n\t\t}\n\n\t\tstats = append(stats, WorkerStats{\n\t\t\tWorkerID:      worker.ID,\n\t\t\tTasksHandled:  handled,\n\t\t\tTotalDuration: totalDuration,\n\t\t\tAvgDuration:   avgDuration,\n\t\t})\n\t}\n\n\t// ąĪąŠčĆčéąĖčĆčāąĄą╝ ą┐ąŠ ID ą▓ąŠčĆą║ąĄčĆą░\n\tsort.Slice(stats, func(i, j int) bool {\n\t\treturn stats[i].WorkerID < stats[j].WorkerID\n\t})\n\n\treturn stats\n}\n\n// Stop ąŠčüčéą░ąĮą░ą▓ą╗ąĖą▓ą░ąĄčé ą┐čāą╗ ą▓ąŠčĆą║ąĄčĆąŠą▓\nfunc (wp *WorkerPool) Stop() {\n\tclose(wp.tasks) // dispatcher ąĘą░ą║čĆąŠąĄčé ąŠčćąĄčĆąĄą┤ąĖ ą▓ąŠčĆą║ąĄčĆąŠą▓\n\twp.wg.Wait()\n\twp.cancel()\n\tclose(wp.results)\n}\n\n// ąöąĄą╝ąŠąĮčüčéčĆą░čåąĖčÅ čĆą░ąĘą╗ąĖčćąĮčŗčģ čüčéčĆą░čéąĄą│ąĖą╣\nfunc demonstrateStrategy(strategyName string, strategy LoadBalancingStrategy) {\n\tfmt.Printf(\"\\n=== ąöąĄą╝ąŠąĮčüčéčĆą░čåąĖčÅ čüčéčĆą░čéąĄą│ąĖąĖ: %s ===\\n\", strategyName)\n\n\t// ąĪąŠąĘą┤ą░ąĄą╝ ą┐čāą╗ čü 4 ą▓ąŠčĆą║ąĄčĆą░ą╝ąĖ\n\tpool := NewWorkerPool(4, 20, strategy)\n\tpool.Start()\n\n\t// ą×čéą┐čĆą░ą▓ą╗čÅąĄą╝ ąĘą░ą┤ą░čćąĖ\n\tnumTasks := 20\n\tgo func() {\n\t\tfor i := 1; i <= numTasks; i++ {\n\t\t\ttask := Task{\n\t\t\t\tID:   i,\n\t\t\t\tData: fmt.Sprintf(\"Task data %d\", i),\n\t\t\t}\n\t\t\tpool.SubmitTask(task)\n\t\t}\n\t}()\n\n\t// ąĪąŠą▒ąĖčĆą░ąĄą╝ čĆąĄąĘčāą╗čīčéą░čéčŗ\n\tresults := make([]Result, 0, numTasks)\n\tfor i := 0; i < numTasks; i++ {\n\t\tresult := <-pool.GetResults()\n\t\tresults = append(results, result)\n\t\tfmt.Printf(\"Task %d processed by Worker %d in %v\\n\",\n\t\t\tresult.TaskID, result.WorkerID, result.Duration)\n\t}\n\n\t// ą¤ąŠą║ą░ąĘčŗą▓ą░ąĄą╝ čüčéą░čéąĖčüčéąĖą║čā\n\tstats := pool.GetStats()\n\tfmt.Printf(\"\\nąĪčéą░čéąĖčüčéąĖą║ą░ ą▓ąŠčĆą║ąĄčĆąŠą▓ (%s):\\n\", strategyName)\n\tfmt.Printf(\"%-10s %-15s %-15s %-15s\\n\", \"Worker\", \"Tasks\", \"Total Time\", \"Avg Time\")\n\tfmt.Printf(\"%-10s %-15s %-15s %-15s\\n\", \"------\", \"-----\", \"----------\", \"--------\")\n\n\tfor _, stat := range stats {\n\t\tfmt.Printf(\"%-10d %-15d %-15v %-15v\\n\",\n\t\t\tstat.WorkerID, stat.TasksHandled,\n\t\t\tstat.TotalDuration.Round(time.Millisecond),\n\t\t\tstat.AvgDuration.Round(time.Millisecond))\n\t}\n\n\tpool.Stop()\n}\n\nfunc main() {\n\trand.Seed(time.Now().UnixNano())\n\n\t// ąöąĄą╝ąŠąĮčüčéčĆąĖčĆčāąĄą╝ čĆą░ąĘą╗ąĖčćąĮčŗąĄ čüčéčĆą░čéąĄą│ąĖąĖ\n\tstrategies := []struct {\n\t\tname     string\n\t\tstrategy LoadBalancingStrategy\n\t}{\n\t\t{\"Round Robin\", &RoundRobinStrategy{}},\n\t\t{\"Least Connections\", &LeastConnectionsStrategy{}},\n\t\t{\"Weighted Round Robin\", NewWeightedRoundRobinStrategy([]int{1, 2, 3, 4})},\n\t\t{\"Least Response Time\", &LeastResponseTimeStrategy{}},\n\t\t{\"Random\", &RandomStrategy{}},\n\t\t{\"Power of Two\", &PowerOfTwoStrategy{}},\n\t}\n\n\tfor _, s := range strategies {\n\t\tdemonstrateStrategy(s.name, s.strategy)\n\t\ttime.Sleep(500 * time.Millisecond)\n\t}\n}","info":"## Summary\nBuild a worker pool that distributes incoming `Task`s across a fixed set of `Worker`s using pluggable load-balancing strategies (Round Robin, Least Connections, Weighted Round Robin, Least Response Time, Random, Power of Two Choices). Each strategy implements `SelectWorker([]*Worker) *Worker`; the pool dispatches each task to the chosen worker, tracks per-worker metrics (tasks handled, total/avg duration, current load), and exposes results plus a stats snapshot.\n\n## Why it matters\nLoad balancing is fundamental to any system that fans work across replicas: HTTP proxies, RPC clients, job queues, and connection pools. Knowing several strategies and their trade-offs (fairness vs. responsiveness vs. simplicity) is a common backend/distributed-systems interview topic.\n\n## Idea\n- Model the strategy as an interface so the pool is decoupled from the selection algorithm (Strategy pattern).\n- Each worker owns a private buffered `queue` channel. A single dispatcher goroutine reads from the shared `tasks` channel, calls `strategy.SelectWorker`, increments that worker's load, and forwards the task into the worker's queue. This is the key fix: load balancing only has meaning if the selected worker actually receives the task instead of every worker reading from one shared channel.\n- `CurrentLoad` is tracked with atomics so the load-aware strategies (Least Connections, Power of Two, Least Response Time) see live in-flight counts; cumulative stats are guarded by an `RWMutex`.\n- Weighted Round Robin uses the smooth WRR algorithm: add each weight to a running `current[]`, pick the max, then subtract the total weight from the winner.\n\n## Complexity\nSelection is O(W) for load-aware strategies and O(1) for Round Robin/Random, where W = number of workers; dispatch runs in one goroutine plus W worker goroutines, with per-worker buffered channels for back-pressure.\n\n## Pitfalls\n- The original dispatcher read from an unused local `taskQueue` and pushed to a shared `tasks` channel, so the strategy's choice was discarded ŌĆö workers must consume from per-worker queues for balancing to take effect.\n- `Stop()` ordering matters: close `tasks` so the dispatcher closes each worker queue, `wg.Wait()` for workers to drain, then close `results`; closing in the wrong order can panic on send-on-closed-channel.\n- Reading stats while workers mutate them needs the mutex/atomics; a plain field read is a data race.\n- Power of Two must pick two distinct indices, otherwise it degenerates to a single random choice."},{"t":"Mixed training 200526","d":"hard","desc":"stack","go":"package main\n\nimport (\n\t\"context\"\n\t\"errors\"\n\t\"fmt\"\n\t\"math/rand\"\n\t\"sync\"\n\t\"time\"\n)\n\n// ---------------- Stack ----------------\n\ntype Stack struct {\n\titems []string\n}\n\nfunc (s *Stack) Push(data string) {\n\ts.items = append(s.items, data)\n}\n\nfunc (s *Stack) Pop() (string, error) {\n\tif s.IsEmpty() {\n\t\treturn \"\", errors.New(\"stack is empty\")\n\t}\n\ttop := s.items[len(s.items)-1]\n\ts.items = s.items[:len(s.items)-1]\n\treturn top, nil\n}\n\nfunc (s *Stack) IsEmpty() bool {\n\treturn len(s.items) == 0\n}\n\nfunc (s *Stack) Top() (string, error) {\n\tif s.IsEmpty() {\n\t\treturn \"\", errors.New(\"stack is empty\")\n\t}\n\treturn s.items[len(s.items)-1], nil\n}\n\n// ---------------- Shared storage: collect unique ids concurrently ----------------\n\nfunc uniqueIdsEx() {\n\tvar wg sync.WaitGroup\n\tvar mu sync.Mutex\n\tstorage := make(map[int]struct{})\n\tconst capacity = 1000\n\tarr := make([]int, 0, capacity)\n\n\tfor i := 0; i < capacity; i++ {\n\t\tarr = append(arr, rand.Intn(5))\n\t}\n\tuniqueIds := make(chan int, capacity)\n\n\tfor i := 0; i < capacity; i++ {\n\t\twg.Add(1)\n\t\tgo func(idx int) {\n\t\t\tdefer wg.Done()\n\t\t\tmu.Lock()\n\t\t\tdefer mu.Unlock()\n\t\t\tif _, ok := storage[arr[idx]]; !ok {\n\t\t\t\tstorage[arr[idx]] = struct{}{}\n\t\t\t\tuniqueIds <- arr[idx]\n\t\t\t}\n\t\t}(i)\n\t}\n\n\tgo func() {\n\t\twg.Wait()\n\t\tclose(uniqueIds)\n\t}()\n\n\tfor v := range uniqueIds {\n\t\tfmt.Println(\"unique:\", v)\n\t}\n}\n\n// ---------------- Context timeout around a long call ----------------\n\nfunc longFunc() int {\n\ttime.Sleep(time.Duration(rand.Intn(5)) * time.Second)\n\treturn 200\n}\n\nfunc callingLongFunc(ctx context.Context) (int, error) {\n\tch := make(chan int, 1)\n\tgo func() {\n\t\tch <- longFunc()\n\t}()\n\n\tselect {\n\tcase <-ctx.Done():\n\t\treturn 0, errors.New(\"timeout\")\n\tcase v := <-ch:\n\t\treturn v, nil\
