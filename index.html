    # --- Строковое представление ---

    def __repr__(self) -> str:
        coords = ", ".join(f"{x:.1f}" for x in self._data)
        return f"Vector({coords})"

    def __str__(self) -> str:
        return f"({', '.join(str(x) for x in self._data)})"

    # --- Арифметика ---

    def __add__(self, other: "Vector") -> "Vector":
        if len(self) != len(other):
            raise ValueError("dimension mismatch")
        return Vector(*(a + b for a, b in zip(self._data, other._data)))

    def __sub__(self, other: "Vector") -> "Vector":
        return Vector(*(a - b for a, b in zip(self._data, other._data)))

    def __mul__(self, scalar: float) -> "Vector":
        """Умножение на скаляр: v * 3"""
        return Vector(*(x * scalar for x in self._data))

    def __rmul__(self, scalar: float) -> "Vector":
        """Обратное умножение: 3 * v"""
        return self.__mul__(scalar)

    def __neg__(self) -> "Vector":
        """Унарный минус: -v"""
        return Vector(*(-x for x in self._data))

    # --- Dot product через @ ---

    def __matmul__(self, other: "Vector") -> float:
        """Скалярное произведение: v1 @ v2"""
        return sum(a * b for a, b in zip(self._data, other._data))

    # --- Сравнения (по длине) ---

    def __abs__(self) -> float:
        """Длина вектора: abs(v)"""
        return sum(x ** 2 for x in self._data) ** 0.5

    def __eq__(self, other: object) -> bool:
        if not isinstance(other, Vector):
            return NotImplemented
        return self._data == other._data

    def __lt__(self, other: "Vector") -> bool:
        return abs(self) < abs(other)

    # --- Индексация ---

    def __len__(self) -> int:
        return len(self._data)

    def __getitem__(self, index: int) -> float:
        return self._data[index]

    def __setitem__(self, index: int, value: float):
        self._data[index] = value

    def __iter__(self):
        return iter(self._data)

    # --- bool и contains ---

    def __bool__(self) -> bool:
        """Нулевой вектор = False"""
        return any(x != 0 for x in self._data)

    def __contains__(self, value: float) -> bool:
        return value in self._data

# === Matrix: контейнер и callable ===

class Matrix:
    def __init__(self, rows: list[list[float]]):
        self._rows = [list(row) for row in rows]

    def __repr__(self) -> str:
        rows_str = ", ".join(str(row) for row in self._rows)
        return f"Matrix([{rows_str}])"

    # Размеры
    @property
    def shape(self) -> tuple[int, int]:
        return len(self._rows), len(self._rows[0]) if self._rows else 0

    # Доступ по [row][col]
    def __getitem__(self, row: int) -> list[float]:
        return self._rows[row]

    # Итерация по строкам
    def __iter__(self):
        return iter(self._rows)

    # len = количество строк
    def __len__(self) -> int:
        return len(self._rows)

    # Умножение матрицы на вектор
    def __call__(self, vec: Vector) -> Vector:
        """Применяем матрицу к вектору: m(v)"""
        if self.shape[1] != len(vec):
            raise ValueError("dimension mismatch")
        result = []
        for row in self._rows:
            val = sum(a * b for a, b in zip(row, vec))
            result.append(val)
        return Vector(*result)

    def __eq__(self, other: object) -> bool:
        if not isinstance(other, Matrix):

		ok       atomic.Int64
		fail     atomic.Int64

import (
	"context"
	"fmt"
	"math/rand"
	"sync"
	"time"
)

// Snippet 1: Fan-in/Fan-out (merge)
func gen(data []int) <-chan int {
	ch := make(chan int)
	go func() {
		defer close(ch)
		for _, val := range data {
			ch <- val
		}
	}()
	return ch
}

func merge(chans ...<-chan int) <-chan int {
	out := make(chan int)
	var wg sync.WaitGroup // Use WaitGroup to wait for all goroutines
	wg.Add(len(chans))

	for _, ch := range chans {
		go func(c <-chan int) {
			defer wg.Done()
			for val := range c {
				out <- val
			}
		}(ch)
	}

	go func() {
		wg.Wait()
		close(out) // Close the 'out' channel, not a loop variable
	}()
	return out
}

func mergeExample() {
	ch1 := gen([]int{1, 2, 3})
	ch2 := gen([]int{4, 5, 6})
	ch3 := gen([]int{7, 8, 9})

	merged := merge(ch1, ch2, ch3)

	for val := range merged { // Correct loop syntax
		fmt.Println(val)
	}
}

// Snippet 2: Parallel Processing with Context
func processData(v int) int {
	// Simulate work
	time.Sleep(time.Duration(rand.Intn(100)) * time.Millisecond)
	return v * 5
}

func processDataWithContext(ctx context.Context, v int) (int, bool) {
	ch := make(chan int)
	go func() {
		defer close(ch)
		ch <- processData(v)
	}()

	select {
	case <-ctx.Done():
		return 0, false // Return a value and indicate timeout
	case res := <-ch:
		return res, true
	}
}

func processParallel(ctx context.Context, in <-chan int, out chan<- int, numWorkers int) {
	var wg sync.WaitGroup
	wg.Add(numWorkers)
	for i := 0; i < numWorkers; i++ {
		go func() {
			defer wg.Done()
			for {
				select {
				case <-ctx.Done():
					return
				case v, ok := <-in:
					if !ok {
						return
					}
					if res, ok := processDataWithContext(ctx, v); ok {
						select {
						case <-ctx.Done():
							return

import (
	"context"
	"fmt"
	"math/rand"
	"sort"
	"sync"
	"sync/atomic"
	"time"
)

// Task представляет задачу для обработки
type Task struct {
	ID   int
	Data interface{}
}

// Result содержит результат выполнения задачи
type Result struct {
	TaskID   int
	WorkerID int
	Data     interface{}
	Duration time.Duration
	Error    error
}

// Worker представляет воркера с метриками
type Worker struct {
	ID            int
	TasksHandled  int64
	TotalDuration time.Duration
	CurrentLoad   int32 // текущее количество задач в обработке
	LastUsed      time.Time
	mu            sync.RWMutex
}

func (w *Worker) IncrementLoad() {
	atomic.AddInt32(&w.CurrentLoad, 1)
}

func (w *Worker) DecrementLoad() {
	atomic.AddInt32(&w.CurrentLoad, -1)
}

func (w *Worker) GetCurrentLoad() int32 {
	return atomic.LoadInt32(&w.CurrentLoad)
}

func (w *Worker) UpdateStats(duration time.Duration) {
	w.mu.Lock()
	defer w.mu.Unlock()
	w.TasksHandled++
	w.TotalDuration += duration
	w.LastUsed = time.Now()
}

func (w *Worker) GetStats() (int64, time.Duration, time.Time) {
	w.mu.RLock()
	defer w.mu.RUnlock()
	return w.TasksHandled, w.TotalDuration, w.LastUsed
}

// LoadBalancingStrategy определяет интерфейс для стратегий балансировки
type LoadBalancingStrategy interface {
	SelectWorker(workers []*Worker) *Worker
	Name() string
}

// 1. Round Robin Strategy
type RoundRobinStrategy struct {
	counter uint64
}

func (rr *RoundRobinStrategy) SelectWorker(workers []*Worker) *Worker {
	if len(workers) == 0 {
		return nil
	}
	idx := atomic.AddUint64(&rr.counter, 1) % uint64(len(workers))
	return workers[idx]
}

func (rr *RoundRobinStrategy) Name() string {
	return "Round Robin"
}

// 2. Least Connections Strategy
type LeastConnectionsStrategy struct{}

func (lc *LeastConnectionsStrategy) SelectWorker(workers []*Worker) *Worker {
	if len(workers) == 0 {
		return nil
	}

	var bestWorker *Worker
	minConnections := int32(^uint32(0) >> 1) // максимальное значение int32

	for _, worker := range workers {
		currentLoad := worker.GetCurrentLoad()
		if currentLoad < minConnections {
			minConnections = currentLoad
			bestWorker = worker
		}
	}

	return bestWorker
}

func (lc *LeastConnectionsStrategy) Name() string {
	return "Least Connections"
}

// 3. Weighted Round Robin Strategy
type WeightedRoundRobinStrategy struct {
	weights []int
	current []int
	mu      sync.Mutex
}

func NewWeightedRoundRobinStrategy(weights []int) *WeightedRoundRobinStrategy {
	return &WeightedRoundRobinStrategy{
		weights: weights,
		current: make([]int, len(weights)),
	}
}

func (wrr *WeightedRoundRobinStrategy) SelectWorker(workers []*Worker) *Worker {
	if len(workers) == 0 {
		return nil
	}

	wrr.mu.Lock()
	defer wrr.mu.Unlock()

	// Убеждаемся, что размеры массивов совпадают
	if len(wrr.weights) != len(workers) {
		return workers[0] // fallback к первому воркеру
	}

	var bestIdx = -1
	var maxWeight = -1

	for i := 0; i < len(workers); i++ {
		wrr.current[i] += wrr.weights[i]
		if wrr.current[i] > maxWeight {
			maxWeight = wrr.current[i]
			bestIdx = i
		}
	}

	if bestIdx != -1 {
		wrr.current[bestIdx] -= wrr.getTotalWeight()
		return workers[bestIdx]
	}

	return workers[0]
}

func (wrr *WeightedRoundRobinStrategy) getTotalWeight() int {
	total := 0
	for _, weight := range wrr.weights {
		total += weight
	}
	return total
}

func (wrr *WeightedRoundRobinStrategy) Name() string {
	return "Weighted Round Robin"
}

// 4. Least Response Time Strategy
type LeastResponseTimeStrategy struct{}

func (lrt *LeastResponseTimeStrategy) SelectWorker(workers []*Worker) *Worker {
	if len(workers) == 0 {
		return nil
	}

	var bestWorker *Worker
	var minAvgResponseTime time.Duration = time.Duration(^uint64(0) >> 1) // максимальное значение

	for _, worker := range workers {
		handled, totalDuration, _ := worker.GetStats()
		if handled == 0 {
			// Новый воркер - выбираем его
			return worker
		}

		avgResponseTime := totalDuration / time.Duration(handled)
		currentLoad := worker.GetCurrentLoad()

		// Учитываем текущую нагрузку
		adjustedTime := avgResponseTime * time.Duration(currentLoad+1)

		if adjustedTime < minAvgResponseTime {
			minAvgResponseTime = adjustedTime
			bestWorker = worker
		}
	}

	return bestWorker
}

func (lrt *LeastResponseTimeStrategy) Name() string {
	return "Least Response Time"
}

// 5. Random Strategy
type RandomStrategy struct{}

func (rs *RandomStrategy) SelectWorker(workers []*Worker) *Worker {
	if len(workers) == 0 {
		return nil
	}

	idx := rand.Intn(len(workers))
	return workers[idx]
}

func (rs *RandomStrategy) Name() string {
	return "Random"
}

// 6. Power of Two Choices Strategy (для высоконагруженных систем)
type PowerOfTwoStrategy struct{}

func (pt *PowerOfTwoStrategy) SelectWorker(workers []*Worker) *Worker {
	if len(workers) == 0 {
		return nil
	}

	if len(workers) == 1 {
		return workers[0]
	}

	// Выбираем два случайных воркера
	idx1 := rand.Intn(len(workers))
	idx2 := rand.Intn(len(workers))
	for idx2 == idx1 {
		idx2 = rand.Intn(len(workers))
	}

	worker1, worker2 := workers[idx1], workers[idx2]

	// Возвращаем воркера с меньшей нагрузкой
	if worker1.GetCurrentLoad() <= worker2.GetCurrentLoad() {
		return worker1
	}
	return worker2
}

func (pt *PowerOfTwoStrategy) Name() string {
	return "Power of Two"
}

// WorkerPool основная структура пула воркеров
type WorkerPool struct {
	workers   []*Worker
	tasks     chan Task
	results   chan Result
	strategy  LoadBalancingStrategy
	ctx       context.Context
	cancel    context.CancelFunc
	wg        sync.WaitGroup
	stats     map[int]*WorkerStats
	statsMu   sync.RWMutex
}

type WorkerStats struct {
	WorkerID      int
	TasksHandled  int64
	TotalDuration time.Duration
	AvgDuration   time.Duration
}

// NewWorkerPool создает новый пул воркеров
func NewWorkerPool(numWorkers int, taskBufferSize int, strategy LoadBalancingStrategy) *WorkerPool {
	ctx, cancel := context.WithCancel(context.Background())

	workers := make([]*Worker, numWorkers)
	for i := 0; i < numWorkers; i++ {
		workers[i] = &Worker{
			ID:       i + 1,
			LastUsed: time.Now(),
		}
	}

	return &WorkerPool{
		workers:  workers,
		tasks:    make(chan Task, taskBufferSize),
		results:  make(chan Result, taskBufferSize),
		strategy: strategy,
		ctx:      ctx,
		cancel:   cancel,
		stats:    make(map[int]*WorkerStats),
	}
}

// Start запускает пул воркеров
func (wp *WorkerPool) Start() {
	for _, worker := range wp.workers {
		wp.wg.Add(1)
		go wp.workerRoutine(worker)
	}

	// Запускаем dispatcher
	go wp.dispatcherRoutine()
}

// workerRoutine основной цикл воркера
func (wp *WorkerPool) workerRoutine(worker *Worker) {
	defer wp.wg.Done()

	for {
		select {
		case <-wp.ctx.Done():
			return
		case task := <-wp.tasks:
			wp.processTask(worker, task)
		}
	}
}

// dispatcherRoutine распределяет задачи согласно выбранной стратегии
func (wp *WorkerPool) dispatcherRoutine() {
	taskQueue := make(chan Task, cap(wp.tasks))

	for {
		select {
		case <-wp.ctx.Done():
			return
		case task := <-taskQueue:
			// Выбираем воркера согласно стратегии
			selectedWorker := wp.strategy.SelectWorker(wp.workers)
			if selectedWorker != nil {
				wp.tasks <- task
			}
		}
	}
}

// processTask обрабатывает задачу
func (wp *WorkerPool) processTask(worker *Worker, task Task) {
	start := time.Now()
	worker.IncrementLoad()
	defer worker.DecrementLoad()

	// Симулируем обработку задачи
	processingTime := time.Duration(rand.Intn(1000)+100) * time.Millisecond
	time.Sleep(processingTime)

	duration := time.Since(start)
	worker.UpdateStats(duration)

	result := Result{
		TaskID:   task.ID,
		WorkerID: worker.ID,
		Data:     fmt.Sprintf("Processed task %d by worker %d", task.ID, worker.ID),
		Duration: duration,
	}

	select {
	case wp.results <- result:
	case <-wp.ctx.Done():
		return
	}
}

// SubmitTask отправляет задачу в пул
func (wp *WorkerPool) SubmitTask(task Task) {
	select {
	case wp.tasks <- task:
	case <-wp.ctx.Done():
		return
	}
}

// GetResults возвращает канал результатов
func (wp *WorkerPool) GetResults() <-chan Result {
	return wp.results
}

// GetStats возвращает статистику воркеров
func (wp *WorkerPool) GetStats() []WorkerStats {
	wp.statsMu.Lock()
	defer wp.statsMu.Unlock()

	stats := make([]WorkerStats, 0, len(wp.workers))
	for _, worker := range wp.workers {
		handled, totalDuration, _ := worker.GetStats()
		avgDuration := time.Duration(0)
		if handled > 0 {
			avgDuration = totalDuration / time.Duration(handled)
		}

		stats = append(stats, WorkerStats{
			WorkerID:      worker.ID,
			TasksHandled:  handled,
			TotalDuration: totalDuration,
			AvgDuration:   avgDuration,
		})
	}

	// Сортируем по ID воркера
	sort.Slice(stats, func(i, j int) bool {
		return stats[i].WorkerID < stats[j].WorkerID
	})

	return stats
}

// Stop останавливает пул воркеров
func (wp *WorkerPool) Stop() {
	wp.cancel()
	close(wp.tasks)
	wp.wg.Wait()
	close(wp.results)
}

// Start processes input data concurrently with multiple workers
// YouTube: https://www.youtube.com/watch?v=pgR9z5mWZmM
func Start[T, R any](ctx context.Context, input <-chan T, workerNum int, transform func(T) R) chan R {
	res := make(chan R)
	wg := new(sync.WaitGroup)

	for i := 0; i < workerNum; i++ {
		wg.Add(1)
		go func() {
			defer wg.Done()
			for {
				select {
				case <-ctx.Done():
					return
				case v, ok := <-input:
					if !ok {
						return
					}
					select {
					case <-ctx.Done():
						return
					case res <- transform(v):
					}
				}
			}
		}()
	}

	go func() {
		wg.Wait()
		close(res)
	}()

	return res
}

	out := make(chan int)

	go func() {
		defer close(out)
		wg := &sync.WaitGroup{}
		for _, ch := range chans {
			wg.Add(1)
			go func(ch <-chan int) {
				defer wg.Done()
				for {
					select {
					case v, ok := <-ch:
						if !ok {

						}
						select {
						case out <- v:
						case <-ctx.Done():
							return
						}
					case <-ctx.Done():
						return
					}
				}
			}(ch)
		}

		wg.Wait()
	}()

	return out
}

// YouTube: https://www.youtube.com/watch?v=pgR9z5mWZmM
func protect(g func()) {
	defer func() {
		fmt.Println("done")
		if x := recover(); x != nil {
			fmt.Printf("run time panic: %v\\n", x)
		}
	}()

	fmt.Println("start")
	g()
}

// Context with timeout example
// YouTube: https://www.youtube.com/watch?v=Hy3KXGFyhwQ
func longFunc() int {
	time.Sleep(time.Duration(rand.Intn(5)) * time.Second)
	return 42
}

func callingLongFunc(ctx context.Context) (int, error) {
	ch := make(chan int, 1)

	go func() {
		defer close(ch)
		ch <- longFunc()
	}()

	select {
	case <-ctx.Done():
		return 0, errors.New("timeout")
	case v := <-ch:
		return v, nil
	}
}

func contextTimeoutExample() {
	ctx, cancel := context.WithTimeout(context.Background(), time.Second)
	defer cancel()

	result, err := callingLongFunc(ctx)
	if err != nil {
		fmt.Println("Error:", err)
		return
	}
	fmt.Println("Result:", result)
}

// Unique numbers example
// YouTube: https://www.youtube.com/watch?v=wzluC-Suwk4
func uniqNum(n int) []int {
	m := make(map[int]bool)
	arr := make([]int, 0, n)

	for len(arr) < n {
		num := rand.Intn(1000)
		if !m[num] {
			m[num] = true
			arr = append(arr, num)
		}
	}
	return arr
}

// Concurrent map access with RWMutex
// YouTube: https://www.youtube.com/watch?v=aJ74a1gydbQ
func concurrentMapExample() {
	writes := 1000
	storage := make(map[int]int, writes)
	mu := sync.RWMutex{} // Fixed: RWLock -> RWMutex
	wg := sync.WaitGroup{}

	wg.Add(writes)
	for i := 0; i < writes; i++ {
		i := i
		go func() {
			defer wg.Done()
			mu.Lock()
			storage[i] = i
			mu.Unlock()
		}()
	}
	wg.Wait()

	wg.Add(writes)
	for i := 0; i < writes; i++ {
		i := i
		go func() {
			defer wg.Done()
			mu.RLock()
			_, _ = storage[i]
			mu.RUnlock()
		}()
	}

	wg.Wait()
	fmt.Println("Map size:", len(storage))
}

// Unique IDs with concurrency
// YouTube: https://www.youtube.com/watch?v=U3fEaBDZvyE
func uniqueIDsExample() {
	rand.Seed(time.Now().UnixNano())

	alreadyStored := make(map[int]struct{})
	var mu sync.Mutex
	wg := sync.WaitGroup{}
	const capacity = 1000
	doubles := make([]int, 0, capacity)
	for i := 0; i < capacity; i++ {
		doubles = append(doubles, rand.Intn(10))
	}
	uniqueIds := make(chan int, capacity)

	for i := 0; i < capacity; i++ {
		i := i
		wg.Add(1)
		go func() {
			defer wg.Done()
			mu.Lock()
			defer mu.Unlock()
			if _, ok := alreadyStored[doubles[i]]; !ok {
				alreadyStored[doubles[i]] = struct{}{}
				uniqueIds <- doubles[i]
			}
		}()
	}
	go func() {
		wg.Wait()
		close(uniqueIds)
	}()
	for v := range uniqueIds {
		fmt.Println("u: ", v)
	}
}

// stack

type Stack struct{
	items[] string
}

func (s *Stack) Push(data string) {
	s.items = append(s.items, data)
}

func (s *Stack) Pop() {
	if s.isEmpty{
		return
	}
	s.items = s.items[:len(s.items)-1]
}

func (s *Stack) isEmpty() bool{
	return len(s.items) == 0
}

func (s *Stack) Top() (string, error){
	if s.isEmpty{
		return "", fmt.Errorf("error")
	}
	return s.items[len(s.items)-1], nil
}

const SY = { keyword:'#c678dd',ident:'#e8e6e3',number:'#d19a66',string:'#98c379',op:'#888',comment:'#555' };

function tokenize(code, lang) {
  const tokens = []; let i = 0;
  const kws = {python:['def','class','return','if','elif','else','for','while','in','not','and','or','True','False','None','import','from','break','continue','pass','lambda'],go:['func','return','if','else','for','range','var','type','struct','switch','case','default','break','continue','go','defer','select','chan','map','make','append','len','nil','true','false','const'],rust:['fn','let','mut','return','if','else','for','while','loop','in','match','struct','enum','impl','pub','use','self','Self','Some','None','Ok','Err','vec','true','false','const','unsafe','move','ref','as','where'],ts:['function','return','if','else','for','while','const','let','var','new','class','interface','type','import','export','true','false','null','undefined','void','number','string','boolean','of','in','break','continue','switch','case']};
  const kw = kws[lang]||kws.ts;
  while (i < code.length) {
    if (code[i]==='\n') { tokens.push({type:'newline',value:'\n'}); i++; continue; }
    if (code[i]===' '||code[i]==='\t') { let w=''; while(i<code.length&&(code[i]===' '||code[i]==='\t')){w+=code[i];i++;} tokens.push({type:'ws',value:w}); continue; }
    if ((lang==='python'&&code[i]==='#')||(lang!=='python'&&code[i]==='/'&&i+1<code.length&&code[i+1]==='/')) { let c=''; while(i<code.length&&code[i]!=='\n'){c+=code[i];i++;} tokens.push({type:'comment',value:c}); continue; }
    if (code[i]==='"'||code[i]==="'"||code[i]==='`') { const q=code[i]; let s=q; i++; while(i<code.length&&code[i]!==q){if(code[i]==='\\'){s+=code[i];i++;}s+=code[i];i++;} if(i<code.length){s+=code[i];i++;} tokens.push({type:'string',value:s}); continue; }
    if (/[0-9]/.test(code[i])) { let n=''; while(i<code.length&&/[0-9.x]/.test(code[i])){n+=code[i];i++;} tokens.push({type:'number',value:n}); continue; }
    if (/[a-zA-Z_]/.test(code[i])) { let w=''; while(i<code.length&&/[a-zA-Z0-9_]/.test(code[i])){w+=code[i];i++;} tokens.push({type:kw.includes(w)?'keyword':'ident',value:w}); continue; }
    const ops=[':=','==','!=','<=','>=','+=','-=','*=','&&','||','<<','>>','<-','++','--','//','**','->','..=','..','::','=>'];
    let found=false; for(const op of ops){if(code.substring(i,i+op.length)===op){tokens.push({type:'op',value:op});i+=op.length;found=true;break;}} if(found) continue;
    tokens.push({type:'op',value:code[i]}); i++;
  }
  return tokens;
}

function createBlanks(tokens, ratio) {
  const bl = []; tokens.forEach((t,i)=>{if(['keyword','ident','number','op','string'].includes(t.type)&&t.value.length>=1&&!['(',')','{','}','[',']',':',',','.',';','&'].includes(t.value))bl.push(i);});
  const cnt = Math.max(1, Math.round(bl.length*ratio));
  return new Set([...bl].sort(()=>Math.random()-0.5).slice(0,cnt));
}

      <pre style={{background:'#111116',border:'1px solid #1a1a1f',borderRadius:mob?8:10,padding:mob?'14px 12px':'20px 24px',margin:0,overflowX:'auto',fontSize:mob?12:13.5,lineHeight:1.7,WebkitOverflowScrolling:'touch'}}>
        {tokens.map((t,idx)=>{
          if(mode==='practice'&&blanks.has(idx)){const cor=tokens[idx].value,ua=ans[idx]||'';const ok=showR&&ua.trim()===cor,bad=showR&&ua.trim()!==cor;
            return <span key={idx} style={{display:'inline-block',verticalAlign:'baseline'}}>
              <input ref={el=>{refs.current[idx]=el;}} type="text" value={ua} onChange={e=>setAns(p=>({...p,[idx]:e.target.value}))} onKeyDown={e=>onKey(e,idx)} disabled={showR} autoCapitalize="none" autoCorrect="off" autoComplete="off" spellCheck="false" style={{width:`${Math.max(cor.length+1,ua.length+1,2)}ch`,boxSizing:'content-box',padding:'0 2px 1px',margin:'0 2px',background:'transparent',border:'none',borderBottom:`2px solid ${ok?'#4ade80':bad?'#ef4444':'#f59e0b'}`,borderRadius:0,color:ok?'#4ade80':bad?'#ef4444':'#f59e0b',fontFamily:'inherit',fontSize:mob?14:13.5,outline:'none',textAlign:'center',verticalAlign:'baseline'}} placeholder="___"/>
              {bad&&<span style={{fontSize:10.5,color:'#4ade80',marginLeft:2,opacity:0.8}}>{cor}</span>}
            </span>;
          }
          if(t.type==='newline') return <br key={idx}/>;
          if(t.type==='ws') return <span key={idx}>{t.value}</span>;
          return <span key={idx} style={{color:SY[t.type]||'#888'}}>{t.value}</span>;
        })}
      </pre>
    </div>
  </div>;
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
