n\t}\n}\n\nfunc contextTimeoutEx() {\n\tctx, cancel := context.WithTimeout(context.Background(), time.Second)\n\tdefer cancel()\n\tres, err := callingLongFunc(ctx)\n\tif err != nil {\n\t\tfmt.Println(\"error:\", err)\n\t\treturn\n\t}\n\tfmt.Println(\"result:\", res)\n}\n\n// ---------------- Concurrent map with RWMutex ----------------\n\nfunc concurrentMapEx() {\n\tconst writes = 1000\n\tstorage := make(map[int]int, writes)\n\tvar wg sync.WaitGroup\n\tvar mu sync.RWMutex\n\n\twg.Add(writes)\n\tfor i := 0; i < writes; i++ {\n\t\ti := i\n\t\tgo func() {\n\t\t\tdefer wg.Done()\n\t\t\tmu.Lock()\n\t\t\tstorage[i] = i\n\t\t\tmu.Unlock()\n\t\t}()\n\t}\n\twg.Wait()\n\n\twg.Add(writes)\n\tfor i := 0; i < writes; i++ {\n\t\ti := i\n\t\tgo func() {\n\t\t\tdefer wg.Done()\n\t\t\tmu.RLock()\n\t\t\t_ = storage[i]\n\t\t\tmu.RUnlock()\n\t\t}()\n\t}\n\twg.Wait()\n\tfmt.Println(\"map size:\", len(storage))\n}\n\n// ---------------- Fan-in ----------------\n\nfunc fanIn(ctx context.Context, chans []<-chan int) <-chan int {\n\tres := make(chan int)\n\tvar wg sync.WaitGroup\n\n\tfor _, ch := range chans {\n\t\twg.Add(1)\n\t\tgo func(c <-chan int) {\n\t\t\tdefer wg.Done()\n\t\t\tfor {\n\t\t\t\tselect {\n\t\t\t\tcase <-ctx.Done():\n\t\t\t\t\treturn\n\t\t\t\tcase v, ok := <-c:\n\t\t\t\t\tif !ok {\n\t\t\t\t\t\treturn\n\t\t\t\t\t}\n\t\t\t\t\tselect {\n\t\t\t\t\tcase <-ctx.Done():\n\t\t\t\t\t\treturn\n\t\t\t\t\tcase res <- v:\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t}\n\t\t}(ch)\n\t}\n\n\tgo func() {\n\t\twg.Wait()\n\t\tclose(res)\n\t}()\n\n\treturn res\n}\n\n// ---------------- Generic generator ----------------\n\nfunc Generator[T any](ctx context.Context, data []T) <-chan T {\n\tres := make(chan T)\n\tgo func() {\n\t\tdefer close(res)\n\t\tfor i := 0; i < len(data); i++ {\n\t\t\tselect {\n\t\t\tcase res <- data[i]:\n\t\t\tcase <-ctx.Done():\n\t\t\t\treturn\n\t\t\t}\n\t\t}\n\t}()\n\treturn res\n}\n\n// ---------------- processData with context ----------------\n\nfunc processData(v int) int {\n\ttime.Sleep(time.Duration(rand.Intn(10)) * time.Second)\n\treturn v * 5\n}\n\nfunc processDataWithContext(ctx context.Context, v int) int {\n\tch := make(chan int, 1)\n\tgo func() {\n\t\tch <- processData(v)\n\t}()\n\tselect {\n\tcase <-ctx.Done():\n\t\treturn 0\n\tcase res := <-ch:\n\t\treturn res\n\t}\n}\n\n// ---------------- Product of array except self ----------------\n// [1, 2, 3] => [2*3, 1*3, 1*2] => [6, 3, 2]\n\nfunc MultOther(in []int) []int {\n\tn := len(in)\n\tres := make([]int, n)\n\tif n == 0 {\n\t\treturn res\n\t}\n\n\t// prefix products\n\tres[0] = 1\n\tfor i := 1; i < n; i++ {\n\t\tres[i] = res[i-1] * in[i-1]\n\t}\n\n\t// suffix products folded in\n\tsuffix := 1\n\tfor i := n - 1; i >= 0; i-- {\n\t\tres[i] *= suffix\n\t\tsuffix *= in[i]\n\t}\n\n\treturn res\n}\n\n// ---------------- Bounded concurrent crawler (at most k in flight) ----------------\n\nfunc get(url string) int {\n\treturn 200\n}\n\nfunc crawl(urls []string, k int) []int {\n\tres := make([]int, len(urls))\n\tch := make(chan int, k)\n\tvar wg sync.WaitGroup\n\n\tgo func() {\n\t\tdefer close(ch)\n\t\tfor i := range urls {\n\t\t\tch <- i\n\t\t}\n\t}()\n\n\tfor w := 0; w < k; w++ {\n\t\twg.Add(1)\n\t\tgo func() {\n\t\t\tdefer wg.Done()\n\t\t\tfor i := range ch {\n\t\t\t\tres[i] = get(urls[i])\n\t\t\t}\n\t\t}()\n\t}\n\n\twg.Wait()\n\treturn res\n}\n\nfunc main() {\n\ts := &Stack{}\n\ts.Push(\"a\")\n\ts.Push(\"b\")\n\ttop, _ := s.Top()\n\tfmt.Println(\"stack top:\", top)\n\n\tuniqueIdsEx()\n\tcontextTimeoutEx()\n\tconcurrentMapEx()\n\n\tfmt.Println(\"MultOther:\", MultOther([]int{1, 2, 3}))\n\n\turls := []string{\"u1\", \"u2\", \"u3\", \"u4\", \"u5\", \"u6\"}\n\tfmt.Println(\"crawl:\", crawl(urls, 3))\n\n\t_ = fanIn\n\t_ = Generator[int]\n\t_ = processDataWithContext\n}","info":"## Summary\nA mixed Go training set bundling several independent exercises: a string `Stack`, concurrent collection of unique ids into a channel, wrapping a slow call with a `context` timeout, a concurrent map guarded by `RWMutex`, a generic fan-in, a generic generator, processing with cancellation, product-of-array-except-self (`MultOther`), and a bounded concurrent crawler (at most `k` requests in flight). The goal is to make every fragment compile and behave correctly.\n\n## Why it matters\nThese are canonical Go concurrency and data-structure interview drills. They exercise channels, `sync.WaitGroup`/`Mutex`, `context` cancellation, generics, and array math ŌĆö the everyday toolkit for writing correct concurrent Go.\n\n## Idea\n- Stack: back the stack with a `[]string`; `Push` appends, `Pop`/`Top` check `len==0` and return an error instead of panicking.\n- uniqueIds: each goroutine takes a captured loop index, locks the mutex, inserts into the dedup map and sends to a buffered channel; a closer goroutine does `wg.Wait()` then `close`, so the `range` over the channel terminates.\n- context timeout: run the slow function in a goroutine that sends to a buffered channel; `select` on `ctx.Done()` vs. the result so a timeout returns early without leaking (buffer size 1 lets the goroutine finish).\n- MultOther: two passes ŌĆö prefix products into `res`, then a running suffix product multiplied in ŌĆö giving each position the product of all other elements without division.\n- crawl: a feeder goroutine pushes indices into a buffered channel and closes it; exactly `k` worker goroutines `range` over it and write into a pre-sized result slice by index, preserving order while capping concurrency.\n\n## Complexity\nStack ops O(1); MultOther O(n) time, O(1) extra (output aside); crawl O(n) requests with at most k concurrent goroutines; uniqueIds/concurrentMap O(n) with mutex-serialized map access.\n\n## Pitfalls\n- Loop-variable capture: goroutines must receive `i` as an argument (or shadow it) or they all read the final value.\n- The closer goroutine (`go func(){ wg.Wait(); close(ch) }()`) must actually be invoked with `()`; forgetting it leaves the channel open and `range` blocks forever.\n- Native Go maps are not safe for concurrent writes ŌĆö guard with a mutex or use `sync.Map`; the original `storage[i]=i` on a channel/map mix would not compile or would race.\n- Writing crawl results into a shared slice is race-free only because each index is written by exactly one worker; appending from many goroutines would race."},{"t":"Oop shapes factory","d":"hard","desc":"Oop shapes factory","go":"package main\n\nimport (\n\t\"fmt\"\n\t\"math\"\n)\n\ntype Shape interface {\n\tArea() float64\n\tName() string\n}\n\ntype Rectangle struct {\n\tWidth  float64\n\tHeight float64\n}\n\nfunc (r Rectangle) Area() float64 {\n\treturn r.Width * r.Height\n}\n\nfunc (r Rectangle) Name() string {\n\treturn \"Rectangle\"\n}\n\ntype Circle struct {\n\tRadius float64\n}\n\nfunc (c Circle) Area() float64 {\n\treturn math.Pi * c.Radius * c.Radius\n}\n\nfunc (c Circle) Name() string {\n\treturn \"Circle\"\n}\n\nfunc NewShape(shapeType string, params ...float64) (Shape, error) {\n\tswitch shapeType {\n\tcase \"rectangle\":\n\t\tif len(params) != 2 {\n\t\t\treturn nil, fmt.Errorf(\"rectangle requires 2 parameters: width and height\")\n\t\t}\n\t\treturn Rectangle{Width: params[0], Height: params[1]}, nil\n\tcase \"circle\":\n\t\tif len(params) != 1 {\n\t\t\treturn nil, fmt.Errorf(\"circle requires 1 parameter: radius\")\n\t\t}\n\t\treturn Circle{Radius: params[0]}, nil\n\tdefault:\n\t\treturn nil, fmt.Errorf(\"unknown shape type: %s\", shapeType)\n\t}\n}\n\nfunc PrintShapeInfo(s Shape) {\n\tfmt.Printf(\"Shape: %s, Area: %.2f\\n\", s.Name(), s.Area())\n}\n\nfunc main() {\n\tfmt.Println(\"--- Factory Pattern ---\")\n\n\trect, err := NewShape(\"rectangle\", 10, 5)\n\tif err != nil {\n\t\tfmt.Println(\"Error:\", err)\n\t} else {\n\t\tPrintShapeInfo(rect)\n\t}\n\n\tcirc, err := NewShape(\"circle\", 7)\n\tif err != nil {\n\t\tfmt.Println(\"Error:\", err)\n\t} else {\n\t\tPrintShapeInfo(circ)\n\t}\n\n\t_, err = NewShape(\"triangle\", 10)\n\tif err != nil {\n\t\tfmt.Println(\"Error creating shape:\", err)\n\t}\n}","info":"## Summary\nImplement the Factory pattern for geometric shapes: a `Shape` interface with `Area() float64` and `Name() string`, concrete `Rectangle` and `Circle` types, and a `NewShape(shapeType string, params ...float64)` factory that returns the right `Shape` or an error for bad input (wrong parameter count or unknown type). A helper prints each shape's name and area.\n\n## Why it matters\nThe factory function centralizes construction logic and validation behind one entry point, decoupling callers from concrete types ŌĆö a staple of object-oriented design and a frequent \"show me interfaces in Go\" interview question.\n\n## Idea\n- Define behavior in the `Shape` interface so callers depend on the abstraction, not concrete structs.\n- `Rectangle` and `Circle` implement `Area`/`Name` with value receivers, so the structs themselves satisfy `Shape`.\n- `NewShape` switches on the type string, validates the variadic `params` length per shape, constructs the struct, and returns `(Shape, error)` so invalid requests fail explicitly rather than panicking.\n- `PrintShapeInfo` works on any `Shape`, demonstrating polymorphism.\n\n## Complexity\nAll operations are O(1) time and O(1) space ŌĆö fixed-cost construction and arithmetic per shape.\n\n## Pitfalls\n- The original `fmt.Printf` had a literal newline inside the format string instead of the escape `\\n`, which is a compile error in Go (newlines are not allowed in interpreted string literals); use `\"...\\n\"`.\n- Validate `len(params)` before indexing, or constructing a circle/rectangle with too few args panics with an index-out-of-range.\n- Returning `nil` shape on error means callers must check `err` before using the value; printing a nil interface would otherwise misbehave.\n- Use value vs. pointer receivers consistently so both the value and pointer satisfy the interface as intended."},{"t":"Safe thread cache","d":"hard","desc":"1. ąśąĮčéąĄčĆčäąĄą╣čü ą║ąĄčłą░","go":"package main\n\nimport (\n\t\"fmt\"\n\t\"hash/fnv\"\n\t\"sync\"\n)\n\n// 1. ąśąĮčéąĄčĆčäąĄą╣čü ą║ąĄčłą░\ntype Cache interface {\n\tSet(key, value string)\n\tGet(key string) (string, bool)\n}\n\n// 2. ąĪčéčĆčāą║čéčāčĆą░ ąŠą┤ąĮąŠą│ąŠ čłą░čĆą┤ą░ (map + RWMutex)\ntype shard struct {\n\tmu   sync.RWMutex\n\tdata map[string]string\n}\n\nfunc newShard() *shard {\n\treturn &shard{data: make(map[string]string)}\n}\n\nfunc (s *shard) Set(key, value string) {\n\ts.mu.Lock()\n\tdefer s.mu.Unlock()\n\ts.data[key] = value\n}\n\nfunc (s *shard) Get(key string) (string, bool) {\n\ts.mu.RLock()\n\tdefer s.mu.RUnlock()\n\tv, ok := s.data[key]\n\treturn v, ok\n}\n\n// 3. ą×čüąĮąŠą▓ąĮą░čÅ čüčéčĆčāą║čéčāčĆą░ ą║ąĄčłą░ čü čłą░čĆą┤ąĖčĆąŠą▓ą░ąĮąĖąĄą╝\ntype ShardedCache struct {\n\tshards []*shard\n\tn      int // ą║ąŠą╗ąĖčćąĄčüčéą▓ąŠ čłą░čĆą┤ąŠą▓\n}\n\nfunc NewShardedCache(numShards int) *ShardedCache {\n\tshards := make([]*shard, numShards)\n\tfor i := range shards {\n\t\tshards[i] = newShard()\n\t}\n\treturn &ShardedCache{shards: shards, n: numShards}\n}\n\n// ą▓čüą┐ąŠą╝ąŠą│ą░čéąĄą╗čīąĮą░čÅ čäčāąĮą║čåąĖčÅ: ą▓čŗčćąĖčüą╗ąĄąĮąĖąĄ ąĮąŠą╝ąĄčĆą░ čłą░čĆą┤ą░ ą┐ąŠ ą║ą╗čÄčćčā čćąĄčĆąĄąĘ FNV-čģčŹčł\nfunc (c *ShardedCache) getShardIndex(key string) int {\n\thash := fnv.New32a()\n\thash.Write([]byte(key))\n\treturn int(hash.Sum32()) % c.n\n}\n\n// čĆąĄą░ą╗ąĖąĘčāąĄą╝ ą╝ąĄčéąŠą┤čŗ ąĖąĮčéąĄčĆčäąĄą╣čüą░\nfunc (c *ShardedCache) Set(key, value string) {\n\tidx := c.getShardIndex(key)\n\tc.shards[idx].Set(key, value)\n}\n\nfunc (c *ShardedCache) Get(key string) (string, bool) {\n\tidx := c.getShardIndex(key)\n\treturn c.shards[idx].Get(key)\n}\n\n// 4. ą¤čĆąĖą╝ąĄčĆ čéąĄčüčéą░ čü ą║ąŠąĮą║čāčĆąĄąĮčåąĖąĄą╣\nfunc main() {\n\tcache := NewShardedCache(5)\n\n\t// ą¤čĆąŠčüčéąĄą╣čłą░čÅ ą┐čĆąŠą▓ąĄčĆą║ą░\n\tcache.Set(\"foo\", \"bar\")\n\tif v, ok := cache.Get(\"foo\"); ok {\n\t\tfmt.Println(\"found:\", v)\n\t} else {\n\t\tfmt.Println(\"not found\")\n\t}\n\n\t// ą¤čĆąŠą▓ąĄčĆą║ą░ ą║ąŠąĮą║čāčĆąĄąĮčéąĮąŠčüčéąĖ - ą┐ą░čĆą░ą╗ą╗ąĄą╗čīąĮąŠ čüąĄčéąĖą╝ ąĖ ą│ąĄčéąĖą╝\n\tvar wg sync.WaitGroup\n\tkeys := []string{\"foo\", \"bar\", \"baz\", \"qux\", \"quux\"}\n\tvalues := []string{\"one\", \"two\", \"three\", \"four\", \"five\"}\n\n\t// Set ą┐ą░čĆą░ą╗ą╗ąĄą╗čīąĮąŠ\n\tfor i := 0; i < len(keys); i++ {\n\t\twg.Add(1)\n\t\tgo func(k, v string) {\n\t\t\tdefer wg.Done()\n\t\t\tcache.Set(k, v)\n\t\t}(keys[i], values[i])\n\t}\n\n\t// Get ą┐ą░čĆą░ą╗ą╗ąĄą╗čīąĮąŠ\n\tfor i := 0; i < len(keys); i++ {\n\t\twg.Add(1)\n\t\tgo func(k string) {\n\t\t\tdefer wg.Done()\n\t\t\tv, ok := cache.Get(k)\n\t\t\tif ok {\n\t\t\t\tfmt.Printf(\"key:%s, value:%s\\n\", k, v)\n\t\t\t} else {\n\t\t\t\tfmt.Printf(\"key:%s, NOT found\\n\", k)\n\t\t\t}\n\t\t}(keys[i])\n\t}\n\n\twg.Wait()\n}","info":"## Summary\nBuild a thread-safe string cache implementing `Set(key, value)` and `Get(key) (string, bool)`. To reduce lock contention it is sharded: keys are distributed across N independent `shard`s, each holding its own `map[string]string` protected by its own `sync.RWMutex`. `ShardedCache` routes every operation to the shard chosen by an FNV hash of the key.\n\n## Why it matters\nA single global mutex around a map serializes all access and becomes a bottleneck under concurrency. Sharded/striped locking is the standard way to scale concurrent caches and maps (the same idea underlies Java's `ConcurrentHashMap` and many in-memory caches).\n\n## Idea\n- Wrap each map in a `shard` with an `RWMutex`: `Set` takes the write lock, `Get` takes the read lock, so many readers proceed in parallel while writers are exclusive ŌĆö only within one shard.\n- `ShardedCache` holds a `[]*shard`; `getShardIndex` hashes the key with FNV-1a and takes it modulo the shard count to pick a shard deterministically.\n- Because different keys usually land in different shards, concurrent operations on distinct keys contend on different mutexes, multiplying throughput roughly by the shard count.\n- The same key always hashes to the same shard, so reads and writes stay consistent.\n\n## Complexity\n`Set`/`Get` are O(1) average (one hash + one map op); space is O(total keys) across shards. Concurrency scales with the number of shards.\n\n## Pitfalls\n- The hash-to-index step must yield a non-negative index; `uint32` from FNV converted to `int` is always non-negative, but a naive `int(int32hash) % n` can go negative and panic on indexing.\n- Locking the whole cache instead of per-shard defeats the purpose; the lock must live inside each shard.\n- `RWMutex` only helps if reads dominate and you actually use `RLock` for `Get`; using `Lock` everywhere serializes readers needlessly.\n- Choosing too few shards relative to goroutine count reinstates contention; too many wastes memory ŌĆö pick proportional to expected parallelism."},{"t":"Youtube patterns","d":"hard","desc":"Basic channel and select example YouTube: https://www.youtube.com/watch?v=Qf24zMzMmgI&list=PLdVg9TvRuiR3LF8ljvaFWl_HewyL2jDm","go":"package main\n\nimport (\n\t\"context\"\n\t\"errors\"\n\t\"fmt\"\n\t\"log\"\n\t\"math/rand\"\n\t\"runtime\"\n\t\"sync\"\n\t\"time\"\n)\n\nfunc main() {\n\texample()\n}\n\n// Basic channel and select example\n// YouTube: https://www.youtube.com/watch?v=Qf24zMzMmgI&list=PLdVg9TvRuiR3LF8ljvaFWl_HewyL2jDm\nfunc example() {\n\tfirstDone := make(chan struct{})\n\tsecondDone := make(chan struct{})\n\n\tcallBackFunc(\n\t\tfunc() {\n\t\t\tfmt.Println(\"a\")\n\t\t\tclose(firstDone)\n\t\t},\n\t\tfunc() {\n\t\t\tfmt.Println(\"b\")\n\t\t\tclose(secondDone)\n\t\t},\n\t)\n\tcount := 0\n\tfor count < 2 {\n\t\tselect {\n\t\tcase <-firstDone:\n\t\t\tcount++\n\t\tcase <-secondDone:\n\t\t\tcount++\n\t\t}\n\t}\n\n\tfmt.Printf(\"%d\\n\", count)\n}\n\n// callBackFunc executes the provided functions\nfunc callBackFunc(f1, f2 func()) {\n\tgo f1()\n\tgo f2()\n}\n\n// --------------------------------\n// Fan-out, fan-in pattern example\n// YouTube: https://www.youtube.com/watch?v=dnGnKIB0_04\n\nfunc gen(data []int, delay time.Duration) <-chan int {\n\tout := make(chan int)\n\tgo func() {\n\t\tdefer close(out)\n\t\tfor _, v := range data {\n\t\t\ttime.Sleep(delay)\n\t\t\tout <- v\n\t\t}\n\t}()\n\treturn out\n}\n\nfunc merge(cs ...<-chan int) <-chan int {\n\tres := make(chan int)\n\tvar wg sync.WaitGroup\n\tfor _, ch := range cs {\n\t\twg.Add(1)\n\t\tgo func(ch <-chan int) {\n\t\t\tdefer wg.Done()\n\t\t\tfor v := range ch {\n\t\t\t\tres <- v\n\t\t\t}\n\t\t}(ch)\n\t}\n\tgo func() {\n\t\twg.Wait()\n\t\tclose(res)\n\t}()\n\treturn res\n}\n\nfunc mergeExample() {\n\tc1 := gen([]int{1, 2, 3}, 100*time.Millisecond)\n\tc2 := gen([]int{4, 5, 6}, 100*time.Millisecond)\n\tc3 := gen([]int{7, 8, 9}, 100*time.Millisecond)\n\n\tmerged := merge(c1, c2, c3)\n\n\tfor v := range merged {\n\t\tfmt.Println(v)\n\t}\n}\n\n// -----------------------------\n// Context timeout pattern example\n// YouTube: https://www.youtube.com/watch?v=Hy3KXGFyhwQ\n\nfunc getDiscount() float64 {\n\ttime.Sleep(2 * time.Second)\n\treturn 12.0\n}\n\nfunc discountExample() {\n\tctx, cancel := context.WithTimeout(context.Background(), 5*time.Second)\n\tdefer cancel()\n\tv, err := wrapper(ctx)\n\tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n\n\tfmt.Printf(\"Discount %v\", v)\n}\n\nfunc wrapper(ctx context.Context) (float64, error) {\n\tch := make(chan float64, 1)\n\tgo func() {\n\t\tv := getDiscount()\n\t\tch <- v\n\t}()\n\tselect {\n\tcase <-ctx.Done():\n\t\treturn 0.0, errors.New(\"bad\")\n\tcase v := <-ch:\n\t\treturn v, nil\n\t}\n}\n\n// ---------------------------------------------\n// Goroutine loop variable capture example\n// YouTube: https://www.youtube.com/watch?v=Qf24zMzMmgI&list=PLdVg9TvRuiR3LF8ljvaFWl_HewyL2jDm\n\nfunc goroutineExample() {\n\twg := sync.WaitGroup{}\n\n\truntime.GOMAXPROCS(1)\n\n\twg.Add(5)\n\tfor i := range []int{1, 2, 3, 4, 5} {\n\t\ti := i // capture loop variable\n\t\tgo func() {\n\t\t\tdefer wg.Done()\n\t\t\tfmt.Println(i)\n\t\t}()\n\t}\n\twg.Wait()\n}\n\n// ---------------------------------------------------\n// Context with worker pool pattern\n// YouTube: https://www.youtube.com/watch?v=wZCLVt_5-4c\n\n// processData simulates processing with random delay\nfunc processData(v int) int {\n\ttime.Sleep(time.Duration(rand.Intn(10)) * time.Second)\n\treturn v * 2\n}\n\nfunc processDataWithContext(ctx context.Context, v int) int {\n\tch := make(chan int, 1)\n\tgo func() {\n\t\tch <- processData(v)\n\t}()\n\n\tselect {\n\tcase <-ctx.Done():\n\t\treturn 0\n\tcase result := <-ch:\n\t\treturn result\n\t}\n}\n\nfunc processParallel(ctx context.Context, in <-chan int, out chan<- int, numWorkers int) {\n\twg := &sync.WaitGroup{}\n\twg.Add(numWorkers)\n\n\tfor i := 0; i < numWorkers; i++ {\n\t\tgo func() {\n\t\t\tdefer wg.Done()\n\t\t\tfor {\n\t\t\t\tselect {\n\t\t\t\tcase <-ctx.Done():\n\t\t\t\t\treturn\n\t\t\t\tcase v, ok := <-in:\n\t\t\t\t\tif !ok {\n\t\t\t\t\t\treturn\n\t\t\t\t\t}\n\t\t\t\t\tresult := processDataWithContext(ctx, v)\n\t\t\t\t\tselect {\n\t\t\t\t\tcase out <- result:\n\t\t\t\t\tcase <-ctx.Done():\n\t\t\t\t\t\treturn\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t}\n\t\t}()\n\t}\n\n\tgo func() {\n\t\twg.Wait()\n\t\tclose(out)\n\t}()\n}\n\nfunc processExample() {\n\tin := make(chan int)\n\tout := make(chan int)\n\n\tctx, cancel := context.WithTimeout(context.Background(), 5*time.Second)\n\tdefer cancel()\n\n\tgo func() {\n\t\tdefer close(in)\n\t\tfor i := 0; i < 10; i++ {\n\t\t\tselect {\n\t\t\tcase in <- i + 1:\n\t\t\tcase <-ctx.Done():\n\t\t\t\treturn\n\t\t\t}\n\t\t}\n\t}()\n\n\tstart := time.Now()\n\tprocessParallel(ctx, in, out, 5)\n\n\tfor v := range out {\n\t\tfmt.Println(\"res=\", v)\n\t}\n\tfmt.Println(\"time since start\", time.Since(start))\n}\n\n// -------------------------\n// Generic concurrency patterns\n// YouTube: https://www.youtube.com/watch?v=pgR9z5mWZmM\n\n// Generator creates a channel that produces values from data\nfunc Generator[T any](ctx context.Context, data []T) <-chan T {\n\tres := make(chan T)\n\n\tgo func() {\n\t\tdefer close(res)\n\t\tfor i := 0; i < len(data); i++ {\n\t\t\tselect {\n\t\t\tcase <-ctx.Done():\n\t\t\t\treturn\n\t\t\tcase res <- data[i]:\n\t\t\t}\n\t\t}\n\t}()\n\n\treturn res\n}\n\n// Start processes input data concurrently with multiple workers\n// YouTube: https://www.youtube.com/watch?v=pgR9z5mWZmM\nfunc Start[T, R any](ctx context.Context, input <-chan T, workerNum int, transform func(T) R) chan R {\n\tres := make(chan R)\n\twg := new(sync.WaitGroup)\n\n\tfor i := 0; i < workerNum; i++ {\n\t\twg.Add(1)\n\t\tgo func() {\n\t\t\tdefer wg.Done()\n\t\t\tfor {\n\t\t\t\tselect {\n\t\t\t\tcase <-ctx.Done():\n\t\t\t\t\treturn\n\t\t\t\tcase v, ok := <-input:\n\t\t\t\t\tif !ok {\n\t\t\t\t\t\treturn\n\t\t\t\t\t}\n\t\t\t\t\tselect {\n\t\t\t\t\tcase <-ctx.Done():\n\t\t\t\t\t\treturn\n\t\t\t\t\tcase res <- transform(v):\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t}\n\t\t}()\n\t}\n\n\tgo func() {\n\t\twg.Wait()\n\t\tclose(res)\n\t}()\n\n\treturn res\n}\n\n// -------------------------\n// Fan-in pattern\n// YouTube: https://www.youtube.com/watch?v=vMGCm0HvBgI\n\n// fanIn combines multiple channels into one\nfunc fanIn(ctx context.Context, chans []<-chan int) <-chan int {\n\tout := make(chan int)\n\n\tgo func() {\n\t\tdefer close(out)\n\t\twg := &sync.WaitGroup{}\n\t\tfor _, ch := range chans {\n\t\t\twg.Add(1)\n\t\t\tgo func(ch <-chan int) {\n\t\t\t\tdefer wg.Done()\n\t\t\t\tfor {\n\t\t\t\t\tselect {\n\t\t\t\t\tcase v, ok := <-ch:\n\t\t\t\t\t\tif !ok {\n\t\t\t\t\t\t\treturn\n\t\t\t\t\t\t}\n\t\t\t\t\t\tselect {\n\t\t\t\t\t\tcase out <- v:\n\t\t\t\t\t\tcase <-ctx.Done():\n\t\t\t\t\t\t\treturn\n\t\t\t\t\t\t}\n\t\t\t\t\tcase <-ctx.Done():\n\t\t\t\t\t\treturn\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t}(ch)\n\t\t}\n\n\t\twg.Wait()\n\t}()\n\n\treturn out\n}\n\n// ----------------------------\n// Concurrency patterns for HTTP requests\n// YouTube: https://www.youtube.com/watch?v=v4EsDebU_es\n\nfunc sendReq(s string) int {\n\t// Simulate HTTP request\n\treturn 200\n}\n\n// Junior level implementation\nfunc urlMain() {\n\turls := make([]string, 1000)\n\tcodes := make(map[int]int)\n\tmu := sync.Mutex{}\n\twg := sync.WaitGroup{}\n\n\twg.Add(len(urls))\n\tfor _, url := range urls {\n\t\turl := url // capture loop variable\n\t\tgo func() {\n\t\t\tdefer wg.Done()\n\t\t\tcode := sendReq(url)\n\t\t\tmu.Lock()\n\t\t\tcodes[code]++\n\t\t\tmu.Unlock()\n\t\t}()\n\t}\n\twg.Wait()\n}\n\n// Worker pool pattern implementation\n// YouTube: https://www.youtube.com/watch?v=qGca_8VldmE\nfunc urlsMainWorkerPool() {\n\turls := make([]string, 1000)\n\tcodes := make(map[int]int)\n\tmu := sync.Mutex{}\n\twg := sync.WaitGroup{}\n\n\tch := make(chan string)\n\n\tgo func() {\n\t\tdefer close(ch)\n\t\tfor _, url := range urls {\n\t\t\tch <- url\n\t\t}\n\t}()\n\n\twg.Add(5)\n\tfor i := 0; i < 5; i++ {\n\t\tgo func() {\n\t\t\tdefer wg.Done()\n\t\t\tfor url := range ch {\n\t\t\t\tcode := sendReq(url)\n\t\t\t\tmu.Lock()\n\t\t\t\tcodes[code]++\n\t\t\t\tmu.Unlock()\n\t\t\t}\n\t\t}()\n\t}\n\twg.Wait()\n}\n\n// Semaphore pattern implementation\n// YouTube: https://www.youtube.com/watch?v=v4EsDebU_es\nfunc urlsMainSemaphore() {\n\turls := make([]string, 1000)\n\tcodes := make(map[int]int)\n\tmu := sync.Mutex{}\n\twg := sync.WaitGroup{}\n\tsema := make(chan struct{}, 5)\n\n\twg.Add(len(urls))\n\tfor _, url := range urls {\n\t\turl := url // capture loop variable\n\t\tsema <- struct{}{}\n\t\tgo func() {\n\t\t\tdefer func() {\n\t\t\t\t<-sema\n\t\t\t\twg.Done()\n\t\t\t}()\n\t\t\tcode := sendReq(url)\n\t\t\tmu.Lock()\n\t\t\tcodes[code]++\n\t\t\tmu.Unlock()\n\t\t}()\n\t}\n\twg.Wait()\n}\n\n// Defer examples\n// YouTube: https://www.youtube.com/watch?v=pgR9z5mWZmM\nfunc deferExample() {\n\tdefer fmt.Println(1)\n\tdefer fmt.Println(2)\n\tdefer fmt.Println(3)\n}\n\ntype data struct {\n\tvalue int\n}\n\nfunc deferEvaluateAsUsual() {\n\td := data{}\n\tdefer fmt.Println(d.value) // Will print 0\n\td.value++\n}\n\nfunc deferEvaluateOnDemand() {\n\td := data{}\n\tdefer func() {\n\t\tfmt.Println(d.value) // Will print 1\n\t}()\n\td.value++\n}\n\ntype returnData struct {\n\tvalue int\n}\n\nfunc deferChangeReturnValue() (d returnData) {\n\tdefer func() {\n\t\td.value = 43\n\t}()\n\td.value = 42\n\treturn\n}\n\n// Panic recovery example\n// YouTube: https://www.youtube.com/watch?v=pgR9z5mWZmM\nfunc protect(g func()) {\n\tdefer func() {\n\t\tfmt.Println(\"done\")\n\t\tif x := recover(); x != nil {\n\t\t\tfmt.Printf(\"run time panic: %v\\n\", x)\n\t\t}\n\t}()\n\n\tfmt.Println(\"start\")\n\tg()\n}\n\nfunc panicExample() {\n\tprotect(func() {\n\t\tpanic(\"test\")\n\t})\n\tfmt.Println(\"all done\")\n}\n\n// Context with timeout example\n// YouTube: https://www.youtube.com/watch?v=Hy3KXGFyhwQ\nfunc longFunc() int {\n\ttime.Sleep(time.Duration(rand.Intn(5)) * time.Second)\n\treturn 42\n}\n\nfunc callingLongFunc(ctx context.Context) (int, error) {\n\tch := make(chan int, 1)\n\n\tgo func() {\n\t\tdefer close(ch)\n\t\tch <- longFunc()\n\t}()\n\n\tselect {\n\tcase <-ctx.Done():\n\t\treturn 0, errors.New(\"timeout\")\n\tcase v := <-ch:\n\t\treturn v, nil\n\t}\n}\n\nfunc contextTimeoutExample() {\n\tctx, cancel := context.WithTimeout(context.Background(), time.Second)\n\tdefer cancel()\n\n\tresult, err := callingLongFunc(ctx)\n\tif err != nil {\n\t\tfmt.Println(\"Error:\", err)\n\t\treturn\n\t}\n\tfmt.Println(\"Result:\", result)\n}\n\n// Unique numbers example\n// YouTube: https://www.youtube.com/watch?v=wzluC-Suwk4\nfunc uniqNum(n int) []int {\n\tm := make(map[int]bool)\n\tarr := make([]int, 0, n)\n\n\tfor len(arr) < n {\n\t\tnum := rand.Intn(1000)\n\t\tif !m[num] {\n\t\t\tm[num] = true\n\t\t\tarr = append(arr, num)\n\t\t}\n\t}\n\treturn arr\n}\n\n// Concurrent map access with RWMutex\n// YouTube: https://www.youtube.com/watch?v=aJ74a1gydbQ\nfunc concurrentMapExample() {\n\twrites := 1000\n\tstorage := make(map[int]int, writes)\n\tmu := sync.RWMutex{}\n\twg := sync.WaitGroup{}\n\n\twg.Add(writes)\n\tfor i := 0; i < writes; i++ {\n\t\ti := i\n\t\tgo func() {\n\t\t\tdefer wg.Done()\n\t\t\tmu.Lock()\n\t\t\tstorage[i] = i\n\t\t\tmu.Unlock()\n\t\t}()\n\t}\n\twg.Wait()\n\n\twg.Add(writes)\n\tfor i := 0; i < writes; i++ {\n\t\ti := i\n\t\tgo func() {\n\t\t\tdefer wg.Done()\n\t\t\tmu.RLock()\n\t\t\t_, _ = storage[i]\n\t\t\tmu.RUnlock()\n\t\t}()\n\t}\n\n\twg.Wait()\n\tfmt.Println(\"Map size:\", len(storage))\n}\n\n// Unique IDs with concurrency\n// YouTube: https://www.youtube.com/watch?v=U3fEaBDZvyE\nfunc uniqueIDsExample() {\n\trand.Seed(time.Now().UnixNano())\n\n\talreadyStored := make(map[int]struct{})\n\tvar mu sync.Mutex\n\twg := sync.WaitGroup{}\n\tconst capacity = 1000\n\tdoubles := make([]int, 0, capacity)\n\tfor i := 0; i < capacity; i++ {\n\t\tdoubles = append(doubles, rand.Intn(10))\n\t}\n\tuniqueIds := make(chan int, capacity)\n\n\tfor i := 0; i < capacity; i++ {\n\t\ti := i\n\t\twg.Add(1)\n\t\tgo func() {\n\t\t\tdefer wg.Done()\n\t\t\tmu.Lock()\n\t\t\tdefer mu.Unlock()\n\t\t\tif _, ok := alreadyStored[doubles[i]]; !ok {\n\t\t\t\talreadyStored[doubles[i]] = struct{}{}\n\t\t\t\tuniqueIds <- doubles[i]\n\t\t\t}\n\t\t}()\n\t}\n\tgo func() {\n\t\twg.Wait()\n\t\tclose(uniqueIds)\n\t}()\n\tfor v := range uniqueIds {\n\t\tfmt.Println(\"u: \", v)\n\t}\n}\n\n// -------------\n// Stack\n// YouTube: https://www.youtube.com/watch?v=o5IB0E3z-wo\n\ntype Stack struct {\n\titems []string\n}\n\nfunc (s *Stack) Push(data string) {\n\ts.items = append(s.items, data)\n}\n\nfunc (s *Stack) Pop() {\n\tif s.isEmpty() {\n\t\treturn\n\t}\n\ts.items = s.items[:len(s.items)-1]\n}\n\nfunc (s *Stack) isEmpty() bool {\n\treturn len(s.items) == 0\n}\n\nfunc (s *Stack) Top() (string, error) {\n\tif s.isEmpty() {\n\t\treturn \"\", fmt.Errorf(\"error\")\n\t}\n\treturn s.items[len(s.items)-1], nil\n}\n\n// -------------\n// Pipeline: generator -> square\n// https://www.youtube.com/watch?v=...\n\nfunc genPipe(ctx context.Context, nums ...int) <-chan int {\n\tout := make(chan int)\n\tgo func() {\n\t\tdefer close(out)\n\t\tfor _, v := range nums {\n\t\t\tselect {\n\t\t\tcase <-ctx.Done():\n\t\t\t\treturn\n\t\t\tcase out <- v:\n\t\t\t}\n\t\t}\n\t}()\n\treturn out\n}\n\nfunc sq(ctx context.Context, in <-chan int) <-chan int {\n\tout := make(chan int)\n\tgo func() {\n\t\tdefer close(out)\n\t\tfor i := range in {\n\t\t\ti := i\n\t\t\tresult := func() int {\n\t\t\t\ttime.Sleep(100 * time.Millisecond)\n\t\t\t\treturn i * i\n\t\t\t}()\n\t\t\tselect {\n\t\t\tcase <-ctx.Done():\n\t\t\t\treturn\n\t\t\tcase out <- result:\n\t\t\t}\n\t\t}\n\t}()\n\treturn out\n}\n\nfunc pipelineExample() {\n\tctx, cancel := context.WithTimeout(context.Background(), 400*time.Millisecond)\n\tdefer cancel()\n\tfor val := range sq(ctx, genPipe(ctx, 1, 2, 3, 4, 5)) {\n\t\tfmt.Println(val)\n\t}\n}","info":"## Summary\nThis is a Go concurrency pattern catalog covering the building blocks asked in interviews: channel + select coordination, fan-out/fan-in, pipelines, context-based timeouts, worker pools, semaphores, generics over channels, defer/recover semantics, and concurrent map access. There is no single input/output; each function is a self-contained example that produces values on a channel or prints results, and the goal is to make every pattern compile and run race-free.\n\n## Why it matters\nThese are the exact primitives a Go service uses to bound parallelism, propagate cancellation, and aggregate results from many goroutines without leaking them. The same patterns reappear in HTTP request fan-out, job processing, and any pipeline where one stage feeds the next over channels.\n\n## Idea\n- Coordination: `select` over multiple done-channels waits for whichever fires first; a buffered result channel lets a worker goroutine send and exit even if the consumer already returned (timeout case), avoiding a goroutine leak.\n- Fan-in/merge: spawn one goroutine per input channel, all sending into a shared `res` channel; a separate goroutine does `wg.Wait()` then `close(res)` so the consumer's `range` terminates exactly once all sources drain.\n- Pipeline (genPipe -> sq): each stage owns its output channel, `defer close(out)` on completion, and every send is guarded by `select { case <-ctx.Done(): return; case out <- v: }` so cancellation unwinds the whole chain.\n- Worker pool / semaphore: bound concurrency either by N goroutines reading a shared input channel, or by a buffered `chan struct{}` acting as a counting semaphore.\n- Defer/recover: deferred plain args are evaluated at the defer statement, deferred closures see the latest value, and a named return value can be mutated by a deferred func.\n\n## Complexity\nO(n) total work across the data with at most W goroutines live at once and O(W) channel/WaitGroup overhead; cancellation is O(1) propagated via the shared context.\n\n## Pitfalls\n- A `select` with a timeout that returns must not leave the worker goroutine blocked forever on an unbuffered send ŌĆö give the result channel buffer 1 (goroutine leak otherwise).\n- In the merge/fan-in, register all `wg.Add(1)` calls before the goroutine that does `wg.Wait()` + `close`, and never `close` from multiple senders.\n- Capture loop variables (`i := i`, `url := url`) before launching goroutines in pre-1.22 Go, or every goroutine reads the final value.\n- Guard every channel send inside worker/pipeline stages with `<-ctx.Done()` so a cancelled context does not deadlock on a send to a no-longer-read channel."}]}];

function tokenize(code, lang) {
  const tokens = []; let i = 0;
  const kws = {python:['def','class','return','if','elif','else','for','while','in','not','and','or','True','False','None','import','from','break','continue','pass','lambda'],go:['func','return','if','else','for','range','var','type','struct','switch','case','default','break','continue','go','defer','select','chan','map','make','append','len','nil','true','false','const'],rust:['fn','let','mut','return','if','else','for','while','loop','in','match','struct','enum','impl','pub','use','self','Self','Some','None','Ok','Err','vec','true','false','const','unsafe','move','ref','as','where'],ts:['function','return','if','else','for','while','const','let','var','new','class','interface','type','import','export','true','false','null','undefined','void','number','string','boolean','of','in','break','continue','switch','case']};
  const kw = kws[lang]||kws.ts;
  while (i < code.length) {
    if (code[i]==='\n') { tokens.push({type:'newline',value:'\n'}); i++; continue; }
    if (code[i]===' '||code[i]==='\t') { let w=''; while(i<code.length&&(code[i]===' '||code[i]==='\t')){w+=code[i];i++;} tokens.push({type:'ws',value:w}); continue; }
    if ((lang==='python'&&code[i]==='#')||(lang!=='python'&&code[i]==='/'&&i+1<code.length&&code[i+1]==='/')) { let c=''; while(i<code.length&&code[i]!=='\n'){c+=code[i];i++;} tokens.push({type:'comment',value:c}); continue; }
    if (code[i]==='"'||code[i]==="'"||code[i]==='`') { const q=code[i]; let s=q; i++; while(i<code.length&&code[i]!==q){if(code[i]==='\\'){s+=code[i];i++;}s+=code[i];i++;} if(i<code.length){s+=code[i];i++;} tokens.push({type:'string',value:s}); continue; }
    if (/[0-9]/.test(code[i])) { let n=''; while(i<code.length&&/[0-9.x]/.test(code[i])){n+=code[i];i++;} tokens.push({type:'number',value:n}); continue; }
    if (/[a-zA-Z_]/.test(code[i])) { let w=''; while(i<code.length&&/[a-zA-Z0-9_]/.test(code[i])){w+=code[i];i++;} tokens.push({type:kw.includes(w)?'keyword':'ident',value:w}); continue; }
    const ops=[':=','==','!=','<=','>=','+=','-=','*=','&&','||','<<','>>','<-','++','--','//','**','->','..=','..','::','=>'];
    let found=false; for(const op of ops){if(code.substring(i,i+op.length)===op){tokens.push({type:'op',value:op});i+=op.length;found=true;break;}} if(found) continue;
    tokens.push({type:'op',value:code[i]}); i++;
  }
  return tokens;
}

function createBlanks(tokens, ratio) {
  const bl = []; tokens.forEach((t,i)=>{if(['keyword','ident','number','op','string'].includes(t.type)&&t.value.length>=1&&!['(',')','{','}','[',']',':',',','.',';','&'].includes(t.value))bl.push(i);});
  const cnt = Math.max(1, Math.round(bl.length*ratio));
  return new Set([...bl].sort(()=>Math.random()-0.5).slice(0,cnt));
}

function MdInline({txt}){
  const parts=[];let rest=String(txt);let k=0;const re=/(\*\*([^*]+)\*\*|`([^`]+)`)/;let m;
  while((m=re.exec(rest))){
    if(m.index>0) parts.push(rest.slice(0,m.index));
    if(m[2]!==undefined) parts.push(<strong key={k++} style={{color:'#e8e8e8',fontWeight:600}}>{m[2]}</strong>);
    else parts.push(<code key={k++} style={{background:'#1a1a22',padding:'1px 5px',borderRadius:4,fontFamily:"'JetBrains Mono',ui-monospace,monospace",fontSize:'0.88em',color:'#f59e0b'}}>{m[3]}</code>);
    rest=rest.slice(m.index+m[0].length);
  }
  if(rest) parts.push(rest);
  return <>{parts}</>;
}
function Md({src}){
  if(!src) return null;
  const lines=String(src).replace(/\r/g,'').split('\n');
  const out=[];let i=0,k=0;
  while(i<lines.length){
    const ln=lines[i];
    if(/^#{1,6}\s+/.test(ln)){out.push(<div key={k++} style={{fontWeight:600,fontSize:13,color:'#f59e0b',margin:k===1?'0 0 6px':'18px 0 6px',fontFamily:"'Space Grotesk',sans-serif"}}><MdInline txt={ln.replace(/^#{1,6}\s+/,'')}/></div>);i++;continue;}
    if(/^[-*]\s+/.test(ln)){const items=[];while(i<lines.length&&/^[-*]\s+/.test(lines[i])){items.push(lines[i].replace(/^[-*]\s+/,''));i++;}out.push(<ul key={k++} style={{margin:'4px 0 8px',paddingLeft:18}}>{items.map((it,j)=><li key={j} style={{marginBottom:4,lineHeight:1.6}}><MdInline txt={it}/></li>)}</ul>);continue;}
    if(ln.trim()===''){i++;continue;}
    out.push(<p key={k++} style={{margin:'0 0 8px',lineHeight:1.65}}><MdInline txt={ln}/></p>);i++;
  }
  return <>{out}</>;
}

      </div>
      <div style={{maxWidth:960,margin:'0 auto',padding:`20px ${px}px`}}>
        {filtered && filtered.length > 0 && filtered.map((p,i)=>{const d=done.has(`${p.category}-${p.t}-${lang}`);return <div key={i} onClick={()=>openP(p)} style={{padding:'10px 14px',marginBottom:4,borderRadius:6,cursor:'pointer',display:'flex',alignItems:'center',gap:10,background:'#111116',border:'1px solid #1a1a1f'}}><span style={{fontSize:14,width:20,textAlign:'center'}}>{p.icon}</span><span style={{flex:1,fontSize:13}}>{p.t}</span><span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:DC[p.d].bg,color:DC[p.d].t,border:`1px solid ${DC[p.d].b}`}}>{p.d}</span>{d&&<span style={{color:'#4ade80'}}>Ō£ō</span>}</div>})}
        {filtered && filtered.length === 0 && <div style={{color:'#555',fontSize:13}}>ąØąĖčćąĄą│ąŠ ąĮąĄ ąĮą░ą╣ą┤ąĄąĮąŠ</div>}
        {!filtered && DS.map((cat,ci)=><div key={ci} style={{marginBottom:20}}>
          <div onClick={()=>setSelCat(selCat===ci?null:ci)} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 0',cursor:'pointer',userSelect:'none',borderBottom:'1px solid #1a1a1f'}}>
            <span style={{fontSize:18,width:28,textAlign:'center'}}>{cat.icon}</span>
            <span style={{flex:1,fontSize:15,fontFamily:"'Space Grotesk',sans-serif",fontWeight:600}}>{cat.name}</span>
            <span style={{fontSize:12,color:'#555'}}>{cat.problems.length}</span>
            <span style={{fontSize:12,color:'#555',transform:selCat===ci?'rotate(90deg)':'none',transition:'transform 0.2s'}}>Ō¢Ė</span>
          </div>
          {selCat===ci&&<div style={{paddingLeft:mob?20:38,paddingTop:4}}>
            {cat.problems.map((p,pi)=>{const d=done.has(`${cat.name}-${p.t}-${lang}`);return <div key={pi} onClick={()=>openP({...p,category:cat.name,icon:cat.icon})} style={{padding:'8px 12px',marginBottom:2,borderRadius:6,cursor:'pointer',display:'flex',alignItems:'center',gap:10}} onMouseEnter={e=>e.currentTarget.style.background='#111116'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <span style={{width:6,height:6,borderRadius:'50%',background:d?'#4ade80':DC[p.d].t,opacity:d?1:0.5,flexShrink:0}}/>
              <span style={{flex:1,fontSize:13,color:d?'#888':'#ccc'}}>{p.t}</span>
              <span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:DC[p.d].bg,color:DC[p.d].t,border:`1px solid ${DC[p.d].b}`}}>{p.d}</span>
              {d&&<span style={{fontSize:11,color:'#4ade80'}}>Ō£ō</span>}
            </div>})}
          </div>}
        </div>)}
      </div>
    </div>;
  }

  const cc=showR?[...blanks].filter(i=>(ans[i]||'').trim()===tokens[i].value).length:0;
  return <div style={BS}>{FL}
    <Modal open={modal} onClose={()=>setModal(false)} title={selP.t} desc={selP.desc}/>
    <div style={{padding:`${mob?10:12}px ${px}px`,borderBottom:'1px solid #1a1a1f',display:'flex',alignItems:'center',gap:mob?8:12,background:'#0f0f14',position:'sticky',top:0,zIndex:10,flexWrap:'wrap'}}>
      <button onClick={()=>{setSelP(null);setMode('view');setBlanks(new Set());setAns({});setShowR(false);}} style={{background:'none',border:'1px solid #222',borderRadius:6,color:'#888',cursor:'pointer',padding:mob?'6px 10px':'4px 10px',fontSize:12,fontFamily:'inherit'}}>ŌåÉ</button>
      <span style={{fontSize:mob?12:14,flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
        {!mob&&<span style={{color:'#555'}}>{selP.icon} {selP.category} / </span>}{selP.t}
      </span>
      <button onClick={()=>setPanel(p=>!p)} title={panel?'ąĪą║čĆčŗčéčī ąŠą┐ąĖčüą░ąĮąĖąĄ':'ą¤ąŠą║ą░ąĘą░čéčī ąŠą┐ąĖčüą░ąĮąĖąĄ'} style={{background:panel?'#f59e0b':'#1a1a22',border:`1px solid ${panel?'#f59e0b':'#2a2a35'}`,borderRadius:6,color:panel?'#000':'#f59e0b',cursor:'pointer',padding:mob?'6px 10px':'4px 10px',fontSize:13,fontFamily:'inherit',flexShrink:0}}>­¤ÆĪ</button>
      <span style={{fontSize:10,padding:'2px 8px',borderRadius:4,background:DC[selP.d].bg,color:DC[selP.d].t,border:`1px solid ${DC[selP.d].b}`}}>{selP.d}</span>
    </div>
    <div style={{padding:`${mob?10:12}px ${px}px`,borderBottom:'1px solid #1a1a1f',display:'flex',alignItems:'center',gap:mob?5:8,flexWrap:'wrap'}}>
      {LANGS.filter(l=>selP[l]).map(l=><button key={l} onClick={()=>swLang(l)} style={{padding:mob?'6px 8px':'4px 10px',borderRadius:5,fontSize:11,fontFamily:'inherit',cursor:'pointer',background:lang===l?LM[l].c:'#111116',color:lang===l?'#fff':'#666',border:`1px solid ${lang===l?'transparent':'#222'}`,fontWeight:lang===l?600:400}}>{LM[l].l}</button>)}
      <div style={{width:1,height:20,background:'#222',margin:'0 2px'}}/>
      {mode==='view'?<>
        {[{l:'20%',v:0.2},{l:'35%',v:0.35},{l:'55%',v:0.55}].map(o=><button key={o.v} onClick={()=>setRatio(o.v)} style={{padding:mob?'6px 8px':'4px 8px',borderRadius:5,fontSize:11,fontFamily:'inherit',cursor:'pointer',background:ratio===o.v?'#f59e0b':'#111116',color:ratio===o.v?'#000':'#888',border:`1px solid ${ratio===o.v?'#f59e0b':'#222'}`,fontWeight:ratio===o.v?600:400}}>{o.l}</button>)}
        <button onClick={startP} style={{marginLeft:'auto',padding:mob?'8px 14px':'6px 16px',borderRadius:6,fontSize:12,fontFamily:'inherit',cursor:'pointer',background:'#f59e0b',color:'#000',border:'none',fontWeight:600}}>­¤Ä▓</button>
      </>:<>
        <span style={{fontSize:12,color:'#888'}}>{blanks.size}</span>
        {showR&&<span style={{fontSize:12,color:cc===blanks.size?'#4ade80':'#ef4444',fontWeight:600}}>{cc}/{blanks.size}</span>}
        <div style={{marginLeft:'auto',display:'flex',gap:6,flexWrap:'wrap'}}>
          {!showR&&<button onClick={check} style={{padding:mob?'7px 12px':'5px 12px',borderRadius:6,fontSize:11,fontFamily:'inherit',cursor:'pointer',background:'#4ade80',color:'#000',border:'none',fontWeight:600}}>Ō£ō</button>}
          <button onClick={reveal} style={{padding:mob?'7px 12px':'5px 12px',borderRadius:6,fontSize:11,fontFamily:'inherit',cursor:'pointer',background:'#333',color:'#ccc',border:'none'}}>­¤æü</button>
          <button onClick={startP} style={{padding:mob?'7px 12px':'5px 12px',borderRadius:6,fontSize:11,fontFamily:'inherit',cursor:'pointer',background:'#f59e0b',color:'#000',border:'none',fontWeight:600}}>­¤öä</button>
          <button onClick={()=>{setMode('view');setBlanks(new Set());setAns({});setShowR(false);}} style={{padding:mob?'7px 12px':'5px 12px',borderRadius:6,fontSize:11,fontFamily:'inherit',cursor:'pointer',background:'#111116',color:'#888',border:'1px solid #222'}}>ąÜąŠą┤</button>
        </div>
      </>}
    </div>
    <div style={{display:'flex',flexDirection:mob?'column':'row',alignItems:'flex-start',gap:mob?12:20,padding:`${mob?12:20}px ${px}px`}}>
      <div style={{flex:1,minWidth:0,width:'100%',maxWidth:(panel&&selP.info&&!mob)?'none':960}}>
      <pre style={{background:'#111116',border:'1px solid #1a1a1f',borderRadius:mob?8:10,padding:mob?'14px 12px':'20px 24px',margin:0,overflowX:'auto',fontSize:mob?12:13.5,lineHeight:1.7,WebkitOverflowScrolling:'touch'}}>
        {tokens.map((t,idx)=>{
          if(mode==='practice'&&blanks.has(idx)){const cor=tokens[idx].value,ua=ans[idx]||'';const ok=showR&&ua.trim()===cor,bad=showR&&ua.trim()!==cor;
            return <span key={idx} style={{display:'inline-block',verticalAlign:'baseline'}}>
              <input ref={el=>{refs.current[idx]=el;}} type="text" value={ua} onChange={e=>setAns(p=>({...p,[idx]:e.target.value}))} onKeyDown={e=>onKey(e,idx)} disabled={showR} autoCapitalize="none" autoCorrect="off" autoComplete="off" spellCheck="false" style={{width:`${Math.max(cor.length+1,ua.length+1,2)}ch`,boxSizing:'content-box',padding:'0 2px 1px',margin:'0 2px',background:'transparent',border:'none',borderBottom:`2px solid ${ok?'#4ade80':bad?'#ef4444':'#f59e0b'}`,borderRadius:0,color:ok?'#4ade80':bad?'#ef4444':'#f59e0b',fontFamily:'inherit',fontSize:mob?14:13.5,outline:'none',textAlign:'center',verticalAlign:'baseline'}} placeholder="___"/>
              {bad&&<span style={{fontSize:10.5,color:'#4ade80',marginLeft:2,opacity:0.8}}>{cor}</span>}
            </span>;
          }
          if(t.type==='newline') return <br key={idx}/>;
          if(t.type==='ws') return <span key={idx}>{t.value}</span>;
          return <span key={idx} style={{color:SY[t.type]||'#888'}}>{t.value}</span>;
        })}
      </pre>
      </div>
      {panel&&selP.info&&<aside style={{width:mob?'100%':380,flexShrink:0,background:'#0d0d12',border:'1px solid #1a1a1f',borderRadius:mob?8:10,padding:mob?'16px 18px':'18px 22px',fontSize:13,color:'#b8b8b8',position:mob?'static':'sticky',top:mob?0:70,maxHeight:mob?'none':'calc(100vh - 96px)',overflowY:'auto'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <span style={{fontSize:10.5,textTransform:'uppercase',letterSpacing:1.2,color:'#666',fontWeight:600}}>ą× ąĘą░ą┤ą░čćąĄ</span>
          <button onClick={()=>setPanel(false)} title="ąĪą║čĆčŗčéčī" style={{background:'none',border:'none',color:'#555',cursor:'pointer',fontSize:14,lineHeight:1,padding:0}}>Ō£Ģ</button>
        </div>
        <Md src={selP.info}/>
      </aside>}
    </div>
  </div>;
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
