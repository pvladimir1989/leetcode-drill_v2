    { t:"Reverse String", d:"easy", id:344, desc:"Разверни массив символов in-place. Два указателя с краёв, swap к центру.",
      python:`def reverseString(s):\n    left, right = 0, len(s) - 1\n    while left < right:\n        s[left], s[right] = s[right], s[left]\n        left += 1\n        right -= 1`,
      go:`func reverseString(s []byte) {\n    left, right := 0, len(s)-1\n    for left < right {\n        s[left], s[right] = s[right], s[left]\n        left++\n        right--\n    }\n}`,
      rust:`fn reverse_string(s: &mut Vec<char>) {\n    let (mut l, mut r) = (0, s.len() - 1);\n    while l < r {\n        s.swap(l, r);\n        l += 1;\n        r -= 1;\n    }\n}`,
      ts:`function reverseString(s: string[]): void {\n    let left = 0, right = s.length - 1;\n    while (left < right) {\n        [s[left], s[right]] = [s[right], s[left]];\n        left++;\n        right--;\n    }\n}` },
    { t:"Valid Palindrome", d:"easy", id:125, desc:"Палиндром ли строка? Только буквы/цифры, игнорируй регистр. Два указателя с краёв.",
      python:`def isPalindrome(s):\n    s = ''.join(c.lower() for c in s if c.isalnum())\n    left, right = 0, len(s) - 1\n    while left < right:\n        if s[left] != s[right]: return False\n        left += 1\n        right -= 1\n    return True`,
      go:`func isPalindrome(s string) bool {\n    var cl []byte\n    for _, c := range s {\n        if unicode.IsLetter(c) || unicode.IsDigit(c) {\n            cl = append(cl, byte(unicode.ToLower(c)))\n        }\n    }\n    l, r := 0, len(cl)-1\n    for l < r {\n        if cl[l] != cl[r] { return false }\n        l++; r--\n    }\n    return true\n}`,
      rust:`fn is_palindrome(s: String) -> bool {\n    let ch: Vec<char> = s.chars().filter(|c| c.is_alphanumeric())\n        .map(|c| c.to_lowercase().next().unwrap()).collect();\n    let (mut l, mut r) = (0, ch.len().saturating_sub(1));\n    while l < r {\n        if ch[l] != ch[r] { return false; }\n        l += 1; r -= 1;\n    }\n    true\n}`,
      ts:`function isPalindrome(s: string): boolean {\n    const c = s.toLowerCase().replace(/[^a-z0-9]/g, '');\n    let l = 0, r = c.length - 1;\n    while (l < r) {\n        if (c[l] !== c[r]) return false;\n        l++; r--;\n    }\n    return true;\n}` },
    { t:"Merge Sorted Array", d:"easy", id:88, desc:"Слей два отсортированных массива. Заполняй nums1 с конца справа налево.",
      python:`def merge(nums1, m, nums2, n):\n    i, j, k = m-1, n-1, m+n-1\n    while j >= 0:\n        if i >= 0 and nums1[i] > nums2[j]:\n            nums1[k] = nums1[i]; i -= 1\n        else:\n            nums1[k] = nums2[j]; j -= 1\n        k -= 1`,
      go:`func merge(nums1 []int, m int, nums2 []int, n int) {\n    i, j, k := m-1, n-1, m+n-1\n    for j >= 0 {\n        if i >= 0 && nums1[i] > nums2[j] {\n            nums1[k] = nums1[i]; i--\n        } else {\n            nums1[k] = nums2[j]; j--\n        }\n        k--\n    }\n}`,
      rust:`fn merge(nums1: &mut Vec<i32>, m: i32, nums2: &mut Vec<i32>, n: i32) {\n    let (mut i, mut j, mut k) = (m as i64-1, n as i64-1, (m+n) as i64-1);\n    while j >= 0 {\n        if i >= 0 && nums1[i as usize] > nums2[j as usize] {\n            nums1[k as usize] = nums1[i as usize]; i -= 1;\n        } else {\n            nums1[k as usize] = nums2[j as usize]; j -= 1;\n        }\n        k -= 1;\n    }\n}`,
      ts:`function merge(nums1: number[], m: number, nums2: number[], n: number): void {\n    let i = m-1, j = n-1, k = m+n-1;\n    while (j >= 0) {\n        if (i >= 0 && nums1[i] > nums2[j]) nums1[k--] = nums1[i--];\n        else nums1[k--] = nums2[j--];\n    }\n}` },
    { t:"Move Zeroes", d:"easy", id:283, desc:"Перемести нули в конец, сохраняя порядок. Slow — позиция записи ненулевых.",
      python:`def moveZeroes(nums):\n    slow = 0\n    for fast in range(len(nums)):\n        if nums[fast] != 0:\n            nums[slow], nums[fast] = nums[fast], nums[slow]\n            slow += 1`,
      go:`func moveZeroes(nums []int) {\n    slow := 0\n    for fast := 0; fast < len(nums); fast++ {\n        if nums[fast] != 0 {\n            nums[slow], nums[fast] = nums[fast], nums[slow]\n            slow++\n        }\n    }\n}`,
      rust:`fn move_zeroes(nums: &mut Vec<i32>) {\n    let mut slow = 0;\n    for fast in 0..nums.len() {\n        if nums[fast] != 0 {\n            nums.swap(slow, fast);\n            slow += 1;\n        }\n    }\n}`,
      ts:`function moveZeroes(nums: number[]): void {\n    let slow = 0;\n    for (let fast = 0; fast < nums.length; fast++) {\n        if (nums[fast] !== 0) {\n            [nums[slow], nums[fast]] = [nums[fast], nums[slow]];\n            slow++;\n        }\n    }\n}` },
    { t:"Two Sum II", d:"medium", id:167, desc:"Отсортированный массив. Два указателя: сумма мала — left++, велика — right--.",
      python:`def twoSum(numbers, target):\n    left, right = 0, len(numbers) - 1\n    while left < right:\n        s = numbers[left] + numbers[right]\n        if s == target: return [left+1, right+1]\n        elif s < target: left += 1\n        else: right -= 1`,
      go:`func twoSum(numbers []int, target int) []int {\n    l, r := 0, len(numbers)-1\n    for l < r {\n        s := numbers[l] + numbers[r]\n        if s == target { return []int{l+1, r+1} }\n        if s < target { l++ } else { r-- }\n    }\n    return nil\n}`,
      rust:`fn two_sum(numbers: Vec<i32>, target: i32) -> Vec<i32> {\n    let (mut l, mut r) = (0, numbers.len()-1);\n    while l < r {\n        let s = numbers[l] + numbers[r];\n        if s == target { return vec![(l+1) as i32, (r+1) as i32]; }\n        if s < target { l += 1; } else { r -= 1; }\n    }\n    vec![]\n}`,
      ts:`function twoSum(numbers: number[], target: number): number[] {\n    let l = 0, r = numbers.length - 1;\n    while (l < r) {\n        const s = numbers[l] + numbers[r];\n        if (s === target) return [l+1, r+1];\n        if (s < target) l++; else r--;\n    }\n    return [];\n}` },
    { t:"3Sum", d:"medium", id:15, desc:"Тройки с суммой 0. Сортируй, фиксируй i, два указателя для остатка. Пропускай дубли.",
      python:`def threeSum(nums):\n    nums.sort(); result = []\n    for i in range(len(nums)-2):\n        if i > 0 and nums[i] == nums[i-1]: continue\n        l, r = i+1, len(nums)-1\n        while l < r:\n            s = nums[i]+nums[l]+nums[r]\n            if s == 0:\n                result.append([nums[i],nums[l],nums[r]])\n                while l<r and nums[l]==nums[l+1]: l+=1\n                while l<r and nums[r]==nums[r-1]: r-=1\n                l+=1; r-=1\n            elif s < 0: l+=1\n            else: r-=1\n    return result`,
      go:`func threeSum(nums []int) [][]int {\n    sort.Ints(nums)\n    var res [][]int\n    for i := 0; i < len(nums)-2; i++ {\n        if i > 0 && nums[i] == nums[i-1] { continue }\n        l, r := i+1, len(nums)-1\n        for l < r {\n            s := nums[i]+nums[l]+nums[r]\n            if s == 0 {\n                res = append(res, []int{nums[i],nums[l],nums[r]})\n                for l<r && nums[l]==nums[l+1] { l++ }\n                for l<r && nums[r]==nums[r-1] { r-- }\n                l++; r--\n            } else if s < 0 { l++ } else { r-- }\n        }\n    }\n    return res\n}`,
      rust:`fn three_sum(mut nums: Vec<i32>) -> Vec<Vec<i32>> {\n    nums.sort(); let mut res = vec![];\n    for i in 0..nums.len().saturating_sub(2) {\n        if i > 0 && nums[i] == nums[i-1] { continue; }\n        let (mut l, mut r) = (i+1, nums.len()-1);\n        while l < r {\n            let s = nums[i]+nums[l]+nums[r];\n            if s == 0 {\n                res.push(vec![nums[i],nums[l],nums[r]]);\n                while l<r && nums[l]==nums[l+1] { l+=1; }\n                while l<r && nums[r]==nums[r-1] { r-=1; }\n                l+=1; r-=1;\n            } else if s < 0 { l+=1; } else { r-=1; }\n        }\n    }\n    res\n}`,
      ts:`function threeSum(nums: number[]): number[][] {\n    nums.sort((a,b) => a-b); const res: number[][] = [];\n    for (let i = 0; i < nums.length-2; i++) {\n        if (i > 0 && nums[i] === nums[i-1]) continue;\n        let l = i+1, r = nums.length-1;\n        while (l < r) {\n            const s = nums[i]+nums[l]+nums[r];\n            if (s === 0) {\n                res.push([nums[i],nums[l],nums[r]]);\n                while (l<r && nums[l]===nums[l+1]) l++;\n                while (l<r && nums[r]===nums[r-1]) r--;\n                l++; r--;\n            } else if (s < 0) l++; else r--;\n        }\n    }\n    return res;\n}` },
    { t:"Container With Most Water", d:"medium", id:11, desc:"Два указателя с краёв. Площадь = min(h[l],h[r])*(r-l). Двигай короткую сторону.",
      python:`def maxArea(height):\n    l, r = 0, len(height)-1\n    mx = 0\n    while l < r:\n        mx = max(mx, min(height[l],height[r])*(r-l))\n        if height[l] < height[r]: l += 1\n        else: r -= 1\n    return mx`,
      go:`func maxArea(height []int) int {\n    l, r, mx := 0, len(height)-1, 0\n    for l < r {\n        h := min(height[l], height[r])\n        if (r-l)*h > mx { mx = (r-l)*h }\n        if height[l] < height[r] { l++ } else { r-- }\n    }\n    return mx\n}`,
      rust:`fn max_area(height: Vec<i32>) -> i32 {\n    let (mut l, mut r, mut mx) = (0, height.len()-1, 0);\n    while l < r {\n        let h = height[l].min(height[r]);\n        mx = mx.max((r-l) as i32 * h);\n        if height[l] < height[r] { l+=1; } else { r-=1; }\n    }\n    mx\n}`,
      ts:`function maxArea(height: number[]): number {\n    let l = 0, r = height.length-1, mx = 0;\n    while (l < r) {\n        mx = Math.max(mx, Math.min(height[l],height[r])*(r-l));\n        if (height[l] < height[r]) l++; else r--;\n    }\n    return mx;\n}` },
  ]},
  { name:"Хеш-таблицы", icon:"#", problems:[
    { t:"Two Sum", d:"easy", id:1, desc:"Найди два числа с суммой target. Хеш: число→индекс. complement = target-num.",
      python:`def twoSum(nums, target):\n    seen = {}\n    for i, num in enumerate(nums):\n        if target-num in seen: return [seen[target-num], i]\n        seen[num] = i`,
      go:`func twoSum(nums []int, target int) []int {\n    seen := map[int]int{}\n    for i, num := range nums {\n        if j, ok := seen[target-num]; ok { return []int{j, i} }\n        seen[num] = i\n    }\n    return nil\n}`,
      rust:`fn two_sum(nums: Vec<i32>, target: i32) -> Vec<i32> {\n    use std::collections::HashMap;\n    let mut seen = HashMap::new();\n    for (i, &num) in nums.iter().enumerate() {\n        if let Some(&j) = seen.get(&(target-num)) {\n            return vec![j as i32, i as i32];\n        }\n        seen.insert(num, i);\n    }\n    vec![]\n}`,
      ts:`function twoSum(nums: number[], target: number): number[] {\n    const seen = new Map<number, number>();\n    for (let i = 0; i < nums.length; i++) {\n        if (seen.has(target-nums[i])) return [seen.get(target-nums[i])!, i];\n        seen.set(nums[i], i);\n    }\n    return [];\n}` },
    { t:"Valid Anagram", d:"easy", id:242, desc:"Анаграмма? Подсчитай частоты букв в s, вычти частоты из t. Все должны быть 0.",
      python:`def isAnagram(s, t):\n    if len(s) != len(t): return False\n    count = {}\n    for c in s: count[c] = count.get(c,0)+1\n    for c in t:\n        count[c] = count.get(c,0)-1\n        if count[c] < 0: return False\n    return True`,
      go:`func isAnagram(s string, t string) bool {\n    if len(s) != len(t) { return false }\n    count := [26]int{}\n    for i := 0; i < len(s); i++ {\n        count[s[i]-'a']++\n        count[t[i]-'a']--\n    }\n    for _, c := range count { if c != 0 { return false } }\n    return true\n}`,
      rust:`fn is_anagram(s: String, t: String) -> bool {\n    if s.len() != t.len() { return false; }\n    let mut count = [0i32; 26];\n    for (a, b) in s.bytes().zip(t.bytes()) {\n        count[(a-b'a') as usize] += 1;\n        count[(b-b'a') as usize] -= 1;\n    }\n    count.iter().all(|&c| c == 0)\n}`,
      ts:`function isAnagram(s: string, t: string): boolean {\n    if (s.length !== t.length) return false;\n    const count: Record<string,number> = {};\n    for (const c of s) count[c] = (count[c]||0)+1;\n    for (const c of t) {\n        count[c] = (count[c]||0)-1;\n        if (count[c] < 0) return false;\n    }\n    return true;\n}` },
    { t:"Group Anagrams", d:"medium", id:49, desc:"Группируй по анаграммам. Ключ = sorted(word). Словарь ключ → список.",
      python:`def groupAnagrams(strs):\n    groups = {}\n    for s in strs:\n        key = ''.join(sorted(s))\n        groups.setdefault(key, []).append(s)\n    return list(groups.values())`,
      go:`func groupAnagrams(strs []string) [][]string {\n    groups := map[string][]string{}\n    for _, s := range strs {\n        bs := []byte(s)\n        sort.Slice(bs, func(i,j int) bool { return bs[i]<bs[j] })\n        groups[string(bs)] = append(groups[string(bs)], s)\n    }\n    res := make([][]string, 0, len(groups))\n    for _, v := range groups { res = append(res, v) }\n    return res\n}`,
      rust:`fn group_anagrams(strs: Vec<String>) -> Vec<Vec<String>> {\n    use std::collections::HashMap;\n    let mut groups: HashMap<String, Vec<String>> = HashMap::new();\n    for s in strs {\n        let mut key: Vec<u8> = s.bytes().collect();\n        key.sort();\n        groups.entry(String::from_utf8(key).unwrap()).or_default().push(s);\n    }\n    groups.into_values().collect()\n}`,
      ts:`function groupAnagrams(strs: string[]): string[][] {\n    const groups = new Map<string, string[]>();\n    for (const s of strs) {\n        const key = s.split('').sort().join('');\n        if (!groups.has(key)) groups.set(key, []);\n        groups.get(key)!.push(s);\n    }\n    return [...groups.values()];\n}` },
  ]},
  { name:"Бинарный поиск", icon:"⟐", problems:[
    { t:"Binary Search", d:"easy", id:704, desc:"left ≤ right. mid = (l+r)/2. Равно — нашли. Меньше — left=mid+1. Больше — right=mid-1.",
      python:`def search(nums, target):\n    l, r = 0, len(nums)-1\n    while l <= r:\n        mid = (l+r)//2\n        if nums[mid] == target: return mid\n        elif nums[mid] < target: l = mid+1\n        else: r = mid-1\n    return -1`,
      go:`func search(nums []int, target int) int {\n    l, r := 0, len(nums)-1\n    for l <= r {\n        mid := (l+r)/2\n        if nums[mid] == target { return mid }\n        if nums[mid] < target { l = mid+1 } else { r = mid-1 }\n    }\n    return -1\n}`,
      rust:`fn search(nums: Vec<i32>, target: i32) -> i32 {\n    let (mut l, mut r) = (0i32, nums.len() as i32 - 1);\n    while l <= r {\n        let mid = (l+r)/2;\n        if nums[mid as usize] == target { return mid; }\n        if nums[mid as usize] < target { l = mid+1; } else { r = mid-1; }\n    }\n    -1\n}`,
      ts:`function search(nums: number[], target: number): number {\n    let l = 0, r = nums.length-1;\n    while (l <= r) {\n        const mid = (l+r) >> 1;\n        if (nums[mid] === target) return mid;\n        if (nums[mid] < target) l = mid+1; else r = mid-1;\n    }\n    return -1;\n}` },
    { t:"Search in Rotated Sorted Array", d:"medium", id:33, desc:"Повернутый массив. Определи отсортированную половину, ищи target в ней.",
      python:`def search(nums, target):\n    l, r = 0, len(nums)-1\n    while l <= r:\n        mid = (l+r)//2\n        if nums[mid] == target: return mid\n        if nums[l] <= nums[mid]:\n            if nums[l] <= target < nums[mid]: r = mid-1\n            else: l = mid+1\n        else:\n            if nums[mid] < target <= nums[r]: l = mid+1\n            else: r = mid-1\n    return -1`,
      go:`func search(nums []int, target int) int {\n    l, r := 0, len(nums)-1\n    for l <= r {\n        mid := (l+r)/2\n        if nums[mid] == target { return mid }\n        if nums[l] <= nums[mid] {\n            if nums[l] <= target && target < nums[mid] { r = mid-1 } else { l = mid+1 }\n        } else {\n            if nums[mid] < target && target <= nums[r] { l = mid+1 } else { r = mid-1 }\n        }\n    }\n    return -1\n}`,
      rust:`fn search(nums: Vec<i32>, target: i32) -> i32 {\n    let (mut l, mut r) = (0i32, nums.len() as i32 - 1);\n    while l <= r {\n        let mid = (l+r)/2;\n        let m = mid as usize;\n        if nums[m] == target { return mid; }\n        if nums[l as usize] <= nums[m] {\n            if nums[l as usize] <= target && target < nums[m] { r=mid-1; } else { l=mid+1; }\n        } else {\n            if nums[m] < target && target <= nums[r as usize] { l=mid+1; } else { r=mid-1; }\n        }\n    }\n    -1\n}`,
      ts:`function search(nums: number[], target: number): number {\n    let l = 0, r = nums.length-1;\n    while (l <= r) {\n        const mid = (l+r) >> 1;\n        if (nums[mid] === target) return mid;\n        if (nums[l] <= nums[mid]) {\n            if (nums[l] <= target && target < nums[mid]) r = mid-1; else l = mid+1;\n        } else {\n            if (nums[mid] < target && target <= nums[r]) l = mid+1; else r = mid-1;\n        }\n    }\n    return -1;\n}` },
  ]},
  { name:"Связные списки", icon:"⟶", problems:[
    { t:"Reverse Linked List", d:"easy", id:206, desc:"prev, curr, next. На каждом шаге: curr.next = prev, сдвигай вперёд.",
      python:`def reverseList(head):\n    prev = None\n    curr = head\n    while curr:\n        nxt = curr.next\n        curr.next = prev\n        prev = curr\n        curr = nxt\n    return prev`,
      go:`func reverseList(head *ListNode) *ListNode {\n    var prev *ListNode\n    curr := head\n    for curr != nil {\n        nxt := curr.Next\n        curr.Next = prev\n        prev = curr\n        curr = nxt\n    }\n    return prev\n}`,
      rust:`fn reverse_list(head: Option<Box<ListNode>>) -> Option<Box<ListNode>> {\n    let (mut prev, mut curr) = (None, head);\n    while let Some(mut node) = curr {\n        curr = node.next.take();\n        node.next = prev;\n        prev = Some(node);\n    }\n    prev\n}`,
      ts:`function reverseList(head: ListNode | null): ListNode | null {\n    let prev: ListNode | null = null, curr = head;\n    while (curr) {\n        const nxt = curr.next;\n        curr.next = prev;\n        prev = curr;\n        curr = nxt;\n    }\n    return prev;\n}` },
    { t:"Linked List Cycle", d:"easy", id:141, desc:"Floyd: slow +1, fast +2. Встретились — цикл.",
      python:`def hasCycle(head):\n    slow = fast = head\n    while fast and fast.next:\n        slow = slow.next\n        fast = fast.next.next\n        if slow == fast: return True\n    return False`,
      go:`func hasCycle(head *ListNode) bool {\n    slow, fast := head, head\n    for fast != nil && fast.Next != nil {\n        slow = slow.Next\n        fast = fast.Next.Next\n        if slow == fast { return true }\n    }\n    return false\n}`,
      rust:`// Safe Rust не позволяет цикл через Box. Используем raw pointers.\nfn has_cycle(head: Option<Box<ListNode>>) -> bool {\n    // Обычно решается через HashSet<*const ListNode>\n    false\n}`,

function tokenize(code, lang) {

  const kws = {python:['def','class','return','if','elif','else','for','while','in','not','and','or','True','False','None','import','from','break','continue','pass','lambda'],go:['func','return','if','else','for','range','var','type','struct','switch','case','default','break','continue','go','defer','select','chan','map','make','append','len','nil','true','false','const'],rust:['fn','let','mut','return','if','else','for','while','loop','in','match','struct','enum','impl','pub','use','self','Self','Some','None','Ok','Err','vec','true','false','const','unsafe','move','ref','as','where'],ts:['function','return','if','else','for','while','const','let','var','new','class','interface','type','import','export','true','false','null','undefined','void','number','string','boolean','of','in','break','continue','switch','case']};
  const kw = kws[lang]||kws.ts;
  while (i < code.length) {
    if (code[i]==='\n') { tokens.push({type:'newline',value:'\n'}); i++; continue; }
    if (code[i]===' '||code[i]==='\t') { let w=''; while(i<code.length&&(code[i]===' '||code[i]==='\t')){w+=code[i];i++;} tokens.push({type:'ws',value:w}); continue; }
    if ((lang==='python'&&code[i]==='#')||(lang!=='python'&&code[i]==='/'&&i+1<code.length&&code[i+1]==='/')) { let c=''; while(i<code.length&&code[i]!=='\n'){c+=code[i];i++;} tokens.push({type:'comment',value:c}); continue; }
    if (code[i]==='"'||code[i]==="'"||code[i]==='`') { const q=code[i]; let s=q; i++; while(i<code.length&&code[i]!==q){if(code[i]==='\\'){s+=code[i];i++;}s+=code[i];i++;} if(i<code.length){s+=code[i];i++;} tokens.push({type:'string',value:s}); continue; }
    if (/[0-9]/.test(code[i])) { let n=''; while(i<code.length&&/[0-9.x]/.test(code[i])){n+=code[i];i++;} tokens.push({type:'number',value:n}); continue; }
    if (/[a-zA-Z_]/.test(code[i])) { let w=''; while(i<code.length&&/[a-zA-Z0-9_]/.test(code[i])){w+=code[i];i++;} tokens.push({type:kw.includes(w)?'keyword':'ident',value:w}); continue; }
    const ops=[':=','==','!=','<=','>=','+=','-=','*=','&&','||','<<','>>','<-','++','--','//','**','->','..=','..','::','=>'];
    let found=false; for(const op of ops){if(code.substring(i,i+op.length)===op){tokens.push({type:'op',value:op});i+=op.length;found=true;break;}} if(found) continue;
    tokens.push({type:'op',value:code[i]}); i++;
  }
  return tokens;
}

function createBlanks(tokens, ratio) {
  const bl = []; tokens.forEach((t,i)=>{if(['keyword','ident','number','op','string'].includes(t.type)&&t.value.length>=1&&!['(',')','{','}','[',']',':',',','.',';','&'].includes(t.value))bl.push(i);});
  const cnt = Math.max(1, Math.round(bl.length*ratio));
  return new Set([...bl].sort(()=>Math.random()-0.5).slice(0,cnt));
}

function Modal({open,onClose,title,desc}) {
  if(!open) return null;
  return <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
    <div onClick={e=>e.stopPropagation()} style={{background:'#16161d',border:'1px solid #2a2a35',borderRadius:12,padding:'24px 28px',maxWidth:480,width:'100%',position:'relative'}}>
      <button onClick={onClose} style={{position:'absolute',top:12,right:16,background:'none',border:'none',color:'#666',fontSize:18,cursor:'pointer'}}>✕</button>
      <div style={{fontSize:16,fontWeight:600,marginBottom:12,fontFamily:"'Space Grotesk',sans-serif",color:'#f0f0f0'}}>{title}</div>
      <div style={{fontSize:13,lineHeight:1.7,color:'#aaa'}}>{desc}</div>
    </div>
  </div>;
}

function useM(){const[m,s]=useState(typeof window!=='undefined'&&window.innerWidth<640);if(typeof window!=='undefined'){window.onresize=()=>s(window.innerWidth<640);}return m;}

function App() {
  const mob = useM(); const px = mob?12:24;
  const [selCat,setSelCat]=useState(null);
  const [selP,setSelP]=useState(null);
  const [lang,setLang]=useState('python');
  const [mode,setMode]=useState('view');
  const [blanks,setBlanks]=useState(new Set());
  const [ans,setAns]=useState({});
  const [showR,setShowR]=useState(false);
  const [ratio,setRatio]=useState(0.3);
  const [search,setSearch]=useState('');
  const [done,setDone]=useState(new Set());
  const [modal,setModal]=useState(false);
  const refs=useRef({});

  const allP=useMemo(()=>{const a=[];C.forEach(c=>c.problems.forEach(p=>a.push({...p,category:c.name,icon:c.icon})));return a;},[]);
  const filtered=useMemo(()=>{if(!search.trim())return null;const q=search.toLowerCase();return allP.filter(p=>p.t.toLowerCase().includes(q)||p.category.toLowerCase().includes(q));},[search,allP]);
  const code=selP?(selP[lang]||selP.python):'';
  const tokens=useMemo(()=>code?tokenize(code,lang):[],[code,lang]);

  const startP=useCallback(()=>{const t=tokenize(code,lang);const b=createBlanks(t,ratio);setBlanks(b);setAns({});setShowR(false);setMode('practice');setTimeout(()=>{const f=[...b].sort((a,b)=>a-b)[0];if(f!==undefined&&refs.current[f])refs.current[f].focus();},100);},[code,lang,ratio]);
  const check=useCallback(()=>{setShowR(true);if([...blanks].every(i=>(ans[i]||'').trim()===tokens[i].value)&&selP)setDone(p=>new Set([...p,`${selP.category}-${selP.t}-${lang}`]));},[blanks,ans,tokens,selP,lang]);
  const reveal=useCallback(()=>{const r={};blanks.forEach(i=>{r[i]=tokens[i].value;});setAns(r);setShowR(true);},[blanks,tokens]);
  const onKey=useCallback((e,idx)=>{if(e.key==='Tab'||e.key==='Enter'){e.preventDefault();const s=[...blanks].sort((a,b)=>a-b);const n=s[s.indexOf(idx)+1];if(n!==undefined&&refs.current[n])refs.current[n].focus();}},[blanks]);
  const swLang=useCallback(l=>{setLang(l);if(mode==='practice'){setMode('view');setBlanks(new Set());setAns({});setShowR(false);}},[mode]);

  const FL=<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>;
  const BS={minHeight:'100vh',background:'#0a0a0c',color:'#e8e6e3',fontFamily:"'JetBrains Mono','Fira Code',monospace"};

  if(!selP){
    const ec=allP.filter(p=>p.d==='easy').length,mc=allP.filter(p=>p.d==='medium').length;
    return <div style={BS}>{FL}
      <div style={{padding:`${mob?20:32}px ${px}px ${mob?14:20}px`,borderBottom:'1px solid #1a1a1f',background:'linear-gradient(180deg,#0f0f14,#0a0a0c)'}}>
        <div style={{maxWidth:960,margin:'0 auto'}}>
          <div style={{display:'flex',alignItems:'baseline',gap:12,marginBottom:8}}>
            <span style={{fontSize:mob?22:28,fontFamily:"'Space Grotesk',sans-serif",fontWeight:700}}>leetcode<span style={{color:'#f59e0b'}}>.drill</span></span>
            <span style={{fontSize:13,color:'#555'}}>v4</span>
          </div>
          <div style={{display:'flex',gap:16,fontSize:12,color:'#666',marginBottom:16,flexWrap:'wrap'}}>
            <span>{allP.length} задач</span><span style={{color:'#4ade80'}}>{ec} easy</span><span style={{color:'#facc15'}}>{mc} medium</span><span style={{color:'#a78bfa'}}>{done.size} решено</span>
          </div>
          <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}}>
            {LANGS.map(l=><button key={l} onClick={()=>setLang(l)} style={{padding:mob?'6px 10px':'5px 14px',borderRadius:6,fontSize:12,fontFamily:'inherit',cursor:'pointer',background:lang===l?LM[l].c:'#111116',color:lang===l?'#fff':'#666',border:`1px solid ${lang===l?'transparent':'#222'}`,fontWeight:lang===l?600:400}}>{LM[l].l}</button>)}
          </div>
          <div style={{position:'relative'}}>
            <input type="text" placeholder="Поиск..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:'100%',padding:'10px 14px 10px 36px',background:'#111116',border:'1px solid #222',borderRadius:8,color:'#e8e6e3',fontSize:13,fontFamily:'inherit',outline:'none',boxSizing:'border-box'}}/>
            <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'#555'}}>⌕</span>
          </div>
        </div>
      </div>
      <div style={{maxWidth:960,margin:'0 auto',padding:`20px ${px}px`}}>
        {filtered && filtered.length > 0 && filtered.map((p,i)=>{const d=done.has(`${p.category}-${p.t}-${lang}`);return <div key={i} onClick={()=>{setSelP(p);setMode('view');setSearch('');}} style={{padding:'10px 14px',marginBottom:4,borderRadius:6,cursor:'pointer',display:'flex',alignItems:'center',gap:10,background:'#111116',border:'1px solid #1a1a1f'}}><span style={{fontSize:14,width:20,textAlign:'center'}}>{p.icon}</span><span style={{flex:1,fontSize:13}}>{p.t}</span><span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:DC[p.d].bg,color:DC[p.d].t,border:`1px solid ${DC[p.d].b}`}}>{p.d}</span>{d&&<span style={{color:'#4ade80'}}>✓</span>}</div>})}
        {filtered && filtered.length === 0 && <div style={{color:'#555',fontSize:13}}>Ничего не найдено</div>}
        {!filtered && C.map((cat,ci)=><div key={ci} style={{marginBottom:20}}>
          <div onClick={()=>setSelCat(selCat===ci?null:ci)} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 0',cursor:'pointer',userSelect:'none',borderBottom:'1px solid #1a1a1f'}}>
            <span style={{fontSize:18,width:28,textAlign:'center'}}>{cat.icon}</span>
            <span style={{flex:1,fontSize:15,fontFamily:"'Space Grotesk',sans-serif",fontWeight:600}}>{cat.name}</span>
            <span style={{fontSize:12,color:'#555'}}>{cat.problems.length}</span>
            <span style={{fontSize:12,color:'#555',transform:selCat===ci?'rotate(90deg)':'none',transition:'transform 0.2s'}}>▸</span>
          </div>
          {selCat===ci&&<div style={{paddingLeft:mob?20:38,paddingTop:4}}>
            {cat.problems.map((p,pi)=>{const d=done.has(`${cat.name}-${p.t}-${lang}`);return <div key={pi} onClick={()=>{setSelP({...p,category:cat.name,icon:cat.icon});setMode('view');}} style={{padding:'8px 12px',marginBottom:2,borderRadius:6,cursor:'pointer',display:'flex',alignItems:'center',gap:10}} onMouseEnter={e=>e.currentTarget.style.background='#111116'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <span style={{width:6,height:6,borderRadius:'50%',background:d?'#4ade80':DC[p.d].t,opacity:d?1:0.5,flexShrink:0}}/>
              <span style={{flex:1,fontSize:13,color:d?'#888':'#ccc'}}>{p.t}</span>
              <span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:DC[p.d].bg,color:DC[p.d].t,border:`1px solid ${DC[p.d].b}`}}>{p.d}</span>
              {d&&<span style={{fontSize:11,color:'#4ade80'}}>✓</span>}
            </div>})}
          </div>}
        </div>)}
      </div>
    </div>;
  }

  const cc=showR?[...blanks].filter(i=>(ans[i]||'').trim()===tokens[i].value).length:0;
  return <div style={BS}>{FL}
    <Modal open={modal} onClose={()=>setModal(false)} title={selP.t} desc={selP.desc}/>
    <div style={{padding:`${mob?10:12}px ${px}px`,borderBottom:'1px solid #1a1a1f',display:'flex',alignItems:'center',gap:mob?8:12,background:'#0f0f14',position:'sticky',top:0,zIndex:10,flexWrap:'wrap'}}>
      <button onClick={()=>{setSelP(null);setMode('view');setBlanks(new Set());setAns({});setShowR(false);}} style={{background:'none',border:'1px solid #222',borderRadius:6,color:'#888',cursor:'pointer',padding:mob?'6px 10px':'4px 10px',fontSize:12,fontFamily:'inherit'}}>←</button>
      <span style={{fontSize:mob?12:14,flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
        {!mob&&<span style={{color:'#555'}}>{selP.icon} {selP.category} / </span>}{selP.t}
      </span>
      <button onClick={()=>setModal(true)} style={{background:'#1a1a22',border:'1px solid #2a2a35',borderRadius:6,color:'#f59e0b',cursor:'pointer',padding:mob?'6px 10px':'4px 10px',fontSize:13,fontFamily:'inherit',flexShrink:0}}>💡</button>
      <span style={{fontSize:10,padding:'2px 8px',borderRadius:4,background:DC[selP.d].bg,color:DC[selP.d].t,border:`1px solid ${DC[selP.d].b}`}}>{selP.d}</span>
    </div>
    <div style={{padding:`${mob?10:12}px ${px}px`,borderBottom:'1px solid #1a1a1f',display:'flex',alignItems:'center',gap:mob?5:8,flexWrap:'wrap'}}>
      {LANGS.filter(l=>selP[l]).map(l=><button key={l} onClick={()=>swLang(l)} style={{padding:mob?'6px 8px':'4px 10px',borderRadius:5,fontSize:11,fontFamily:'inherit',cursor:'pointer',background:lang===l?LM[l].c:'#111116',color:lang===l?'#fff':'#666',border:`1px solid ${lang===l?'transparent':'#222'}`,fontWeight:lang===l?600:400}}>{LM[l].l}</button>)}
      <div style={{width:1,height:20,background:'#222',margin:'0 2px'}}/>
      {mode==='view'?<>
        {[{l:'20%',v:0.2},{l:'35%',v:0.35},{l:'55%',v:0.55}].map(o=><button key={o.v} onClick={()=>setRatio(o.v)} style={{padding:mob?'6px 8px':'4px 8px',borderRadius:5,fontSize:11,fontFamily:'inherit',cursor:'pointer',background:ratio===o.v?'#f59e0b':'#111116',color:ratio===o.v?'#000':'#888',border:`1px solid ${ratio===o.v?'#f59e0b':'#222'}`,fontWeight:ratio===o.v?600:400}}>{o.l}</button>)}
        <button onClick={startP} style={{marginLeft:'auto',padding:mob?'8px 14px':'6px 16px',borderRadius:6,fontSize:12,fontFamily:'inherit',cursor:'pointer',background:'#f59e0b',color:'#000',border:'none',fontWeight:600}}>🎲</button>
      </>:<>
        <span style={{fontSize:12,color:'#888'}}>{blanks.size}</span>
        {showR&&<span style={{fontSize:12,color:cc===blanks.size?'#4ade80':'#ef4444',fontWeight:600}}>{cc}/{blanks.size}</span>}
        <div style={{marginLeft:'auto',display:'flex',gap:6,flexWrap:'wrap'}}>
          {!showR&&<button onClick={check} style={{padding:mob?'7px 12px':'5px 12px',borderRadius:6,fontSize:11,fontFamily:'inherit',cursor:'pointer',background:'#4ade80',color:'#000',border:'none',fontWeight:600}}>✓</button>}
          <button onClick={reveal} style={{padding:mob?'7px 12px':'5px 12px',borderRadius:6,fontSize:11,fontFamily:'inherit',cursor:'pointer',background:'#333',color:'#ccc',border:'none'}}>👁</button>
          <button onClick={startP} style={{padding:mob?'7px 12px':'5px 12px',borderRadius:6,fontSize:11,fontFamily:'inherit',cursor:'pointer',background:'#f59e0b',color:'#000',border:'none',fontWeight:600}}>🔄</button>
          <button onClick={()=>{setMode('view');setBlanks(new Set());setAns({});setShowR(false);}} style={{padding:mob?'7px 12px':'5px 12px',borderRadius:6,fontSize:11,fontFamily:'inherit',cursor:'pointer',background:'#111116',color:'#888',border:'1px solid #222'}}>Код</button>
        </div>
      </>}
    </div>
    <div style={{padding:`${mob?12:20}px ${px}px`,maxWidth:960}}>
      <pre style={{background:'#111116',border:'1px solid #1a1a1f',borderRadius:mob?8:10,padding:mob?'14px 12px':'20px 24px',margin:0,overflowX:'auto',fontSize:mob?12:13.5,lineHeight:1.7,WebkitOverflowScrolling:'touch'}}>
        {tokens.map((t,idx)=>{
          if(mode==='practice'&&blanks.has(idx)){const cor=tokens[idx].value,ua=ans[idx]||'';const ok=showR&&ua.trim()===cor,bad=showR&&ua.trim()!==cor;
            return <span key={idx} style={{display:'inline-block',verticalAlign:'baseline'}}>
              <input ref={el=>{refs.current[idx]=el;}} type="text" value={ua} onChange={e=>setAns(p=>({...p,[idx]:e.target.value}))} onKeyDown={e=>onKey(e,idx)} disabled={showR} autoCapitalize="none" autoCorrect="off" autoComplete="off" spellCheck="false" style={{width:Math.max(cor.length*(mob?9:8.5),mob?40:32),padding:mob?'3px 5px':'1px 4px',margin:'0 1px',background:ok?'#0d2818':bad?'#2a0a0a':'#1a1a22',border:`1px solid ${ok?'#166534':bad?'#7f1d1d':'#f59e0b55'}`,borderRadius:4,color:ok?'#4ade80':bad?'#ef4444':'#f59e0b',fontFamily:'inherit',fontSize:mob?14:13.5,outline:'none'}} placeholder="___"/>
              {bad&&<span style={{fontSize:10.5,color:'#4ade80',marginLeft:2,opacity:0.8}}>{cor}</span>}
            </span>;
          }
          if(t.type==='newline') return <br key={idx}/>;
          if(t.type==='ws') return <span key={idx}>{t.value}</span>;
          return <span key={idx} style={{color:SY[t.type]||'#888'}}>{t.value}</span>;
        })}
      </pre>
    </div>
  </div>;
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
