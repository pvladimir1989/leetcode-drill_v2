const C = [{"name":"ąöą▓ą░ čāą║ą░ąĘą░čéąĄą╗čÅ","icon":"Ōćä","problems":[{"t":"Reverse String","d":"easy","id":344,"desc":"ąĀą░ąĘą▓ąĄčĆąĮąĖ ą╝ą░čüčüąĖą▓ čüąĖą╝ą▓ąŠą╗ąŠą▓ in-place. ąöą▓ą░ čāą║ą░ąĘą░čéąĄą╗čÅ čü ą║čĆą░čæą▓, swap ą║ čåąĄąĮčéčĆčā.","python":"def reverseString(s):\n    left, right = 0, len(s) - 1\n    while left < right:\n        s[left], s[right] = s[right], s[left]\n        left += 1\n        right -= 1","go":"func reverseString(s []byte) {\n    left, right := 0, len(s)-1\n    for left < right {\n        s[left], s[right] = s[right], s[left]\n        left++\n        right--\n    }\n}","rust":"fn reverse_string(s: &mut Vec<char>) {\n    if s.is_empty() {\n        return;\n    }\n    let (mut l, mut r) = (0, s.len() - 1);\n    while l < r {\n        s.swap(l, r);\n        l += 1;\n        r -= 1;\n    }\n}","ts":"function reverseString(s: string[]): void {\n    let left = 0, right = s.length - 1;\n    while (left < right) {\n        [s[left], s[right]] = [s[right], s[left]];\n        left++;\n        right--;\n    }\n}","info":"## Summary\nReverse an array of characters in place. The input is a mutable sequence of characters; the function returns nothing and must mutate the buffer so its elements end up in reverse order.\n\n## Why it matters\nIn-place reversal is the canonical two-pointer warm-up and appears as a building block in rotate-array, palindrome checks, and string manipulation where extra O(n) memory is disallowed.\n\n## Idea\n- Place one pointer `left` at index 0 and another `right` at the last index.\n- Swap the two characters, then move `left` forward and `right` backward.\n- Stop when `left >= right`, since the middle element (if length is odd) stays put.\n- This touches each element exactly once and needs no auxiliary array.\n\n## Complexity\nTime O(n) for one pass swapping halves; space O(1) since work is done in place.\n\n## Pitfalls\n- Empty input: computing `len - 1` on an unsigned index type (e.g. Rust `usize`) underflows and panics, so guard the empty case.\n- The loop condition must be strict (`left < right`), otherwise an odd-length middle element gets swapped with itself or pointers cross.\n- Forgetting to advance both pointers each iteration causes an infinite loop."},{"t":"Valid Palindrome","d":"easy","id":125,"desc":"ą¤ą░ą╗ąĖąĮą┤čĆąŠą╝ ą╗ąĖ čüčéčĆąŠą║ą░? ąóąŠą╗čīą║ąŠ ą▒čāą║ą▓čŗ/čåąĖčäčĆčŗ, ąĖą│ąĮąŠčĆąĖčĆčāą╣ čĆąĄą│ąĖčüčéčĆ. ąöą▓ą░ čāą║ą░ąĘą░čéąĄą╗čÅ čü ą║čĆą░čæą▓.","python":"def isPalindrome(s):\n    s = ''.join(c.lower() for c in s if c.isalnum())\n    left, right = 0, len(s) - 1\n    while left < right:\n        if s[left] != s[right]: return False\n        left += 1\n        right -= 1\n    return True","go":"func isPalindrome(s string) bool {\n    var cl []byte\n    for _, c := range s {\n        if unicode.IsLetter(c) || unicode.IsDigit(c) {\n            cl = append(cl, byte(unicode.ToLower(c)))\n        }\n    }\n    l, r := 0, len(cl)-1\n    for l < r {\n        if cl[l] != cl[r] { return false }\n        l++; r--\n    }\n    return true\n}","rust":"fn is_palindrome(s: String) -> bool {\n    let ch: Vec<char> = s.chars().filter(|c| c.is_alphanumeric())\n        .map(|c| c.to_lowercase().next().unwrap()).collect();\n    let (mut l, mut r) = (0, ch.len().saturating_sub(1));\n    while l < r {\n        if ch[l] != ch[r] { return false; }\n        l += 1; r -= 1;\n    }\n    true\n}","ts":"function isPalindrome(s: string): boolean {\n    const c = s.toLowerCase().replace(/[^a-z0-9]/g, '');\n    let l = 0, r = c.length - 1;\n    while (l < r) {\n        if (c[l] !== c[r]) return false;\n        l++; r--;\n    }\n    return true;\n}","info":"## Summary\nDecide whether a string is a palindrome, considering only alphanumeric characters and ignoring case. Input is a string; output is a boolean.\n\n## Why it matters\nFiltering plus symmetric comparison is a common interview pattern and mirrors real input-sanitization tasks where you normalize text before comparing.\n\n## Idea\n- First normalize: keep only letters and digits and lowercase them.\n- Then run two pointers from both ends inward, comparing the characters at `left` and `right`.\n- If any pair differs, it is not a palindrome; if pointers meet without a mismatch, it is.\n- Normalizing up front keeps the comparison loop simple; an alternative is to skip non-alphanumeric characters on the fly to avoid building a second buffer.\n\n## Complexity\nTime O(n) to scan and compare; space O(n) for the filtered buffer (O(1) if you skip in place).\n\n## Pitfalls\n- Unicode case folding: `toLowercase` can yield multiple characters for some code points; the simple `.next().unwrap()` shortcut is fine for ASCII but lossy for full Unicode.\n- Empty or all-punctuation strings reduce to an empty sequence, which is a valid palindrome.\n- Off-by-one on the right pointer when the filtered length is zero (use a saturating subtraction or guard).\n- Comparing raw bytes vs runes matters for non-ASCII letters."},{"t":"Merge Sorted Array","d":"easy","id":88,"desc":"ąĪą╗ąĄą╣ ą┤ą▓ą░ ąŠčéčüąŠčĆčéąĖčĆąŠą▓ą░ąĮąĮčŗčģ ą╝ą░čüčüąĖą▓ą░. ąŚą░ą┐ąŠą╗ąĮčÅą╣ nums1 čü ą║ąŠąĮčåą░ čüą┐čĆą░ą▓ą░ ąĮą░ą╗ąĄą▓ąŠ.","python":"def merge(nums1, m, nums2, n):\n    i, j, k = m-1, n-1, m+n-1\n    while j >= 0:\n        if i >= 0 and nums1[i] > nums2[j]:\n            nums1[k] = nums1[i]; i -= 1\n        else:\n            nums1[k] = nums2[j]; j -= 1\n        k -= 1","go":"func merge(nums1 []int, m int, nums2 []int, n int) {\n    i, j, k := m-1, n-1, m+n-1\n    for j >= 0 {\n        if i >= 0 && nums1[i] > nums2[j] {\n            nums1[k] = nums1[i]; i--\n        } else {\n            nums1[k] = nums2[j]; j--\n        }\n        k--\n    }\n}","rust":"fn merge(nums1: &mut Vec<i32>, m: i32, nums2: &mut Vec<i32>, n: i32) {\n    let (mut i, mut j, mut k) = (m as i64-1, n as i64-1, (m+n) as i64-1);\n    while j >= 0 {\n        if i >= 0 && nums1[i as usize] > nums2[j as usize] {\n            nums1[k as usize] = nums1[i as usize]; i -= 1;\n        } else {\n            nums1[k as usize] = nums2[j as usize]; j -= 1;\n        }\n        k -= 1;\n    }\n}","ts":"function merge(nums1: number[], m: number, nums2: number[], n: number): void {\n    let i = m-1, j = n-1, k = m+n-1;\n    while (j >= 0) {\n        if (i >= 0 && nums1[i] > nums2[j]) nums1[k--] = nums1[i--];\n        else nums1[k--] = nums2[j--];\n    }\n}","info":"## Summary\nMerge two sorted integer arrays into the first one in place. `nums1` has length `m + n` with the first `m` slots valid and `n` trailing zero slots; `nums2` holds `n` sorted values. Output: `nums1` becomes the fully sorted merge.\n\n## Why it matters\nMerging from the back is the in-place trick behind merge sort's combine step and any \"fill a buffer that has spare capacity\" problem, avoiding the cost of shifting elements.\n\n## Idea\n- Use three indices: `i` at the last valid element of `nums1` (`m-1`), `j` at the last of `nums2` (`n-1`), and `k` at the very end of `nums1` (`m+n-1`).\n- Compare the two tail elements and write the larger into position `k`, then decrement the source index and `k`.\n- Writing from the back means you never overwrite an unread `nums1` element, since `k` is always at or ahead of `i`.\n- Loop until `nums2` is exhausted; any remaining `nums1` prefix is already in place.\n\n## Complexity\nTime O(m + n) single backward pass; space O(1) in place.\n\n## Pitfalls\n- Loop on `j >= 0` only: once `nums2` is drained the rest of `nums1` is already sorted, so no extra copy is needed.\n- Guard `i >= 0` before reading `nums1[i]`, or you index out of bounds when `nums1`'s valid part is consumed first.\n- Filling from the front would clobber unprocessed `nums1` values.\n- Watch index types: mixing signed loop counters with unsigned array indices (Rust) requires casts and care so `-1` does not underflow."},{"t":"Move Zeroes","d":"easy","id":283,"desc":"ą¤ąĄčĆąĄą╝ąĄčüčéąĖ ąĮčāą╗ąĖ ą▓ ą║ąŠąĮąĄčå, čüąŠčģčĆą░ąĮčÅčÅ ą┐ąŠčĆčÅą┤ąŠą║. Slow ŌĆö ą┐ąŠąĘąĖčåąĖčÅ ąĘą░ą┐ąĖčüąĖ ąĮąĄąĮčāą╗ąĄą▓čŗčģ.","python":"def moveZeroes(nums):\n    slow = 0\n    for fast in range(len(nums)):\n        if nums[fast] != 0:\n            nums[slow], nums[fast] = nums[fast], nums[slow]\n            slow += 1","go":"func moveZeroes(nums []int) {\n    slow := 0\n    for fast := 0; fast < len(nums); fast++ {\n        if nums[fast] != 0 {\n            nums[slow], nums[fast] = nums[fast], nums[slow]\n            slow++\n        }\n    }\n}","rust":"fn move_zeroes(nums: &mut Vec<i32>) {\n    let mut slow = 0;\n    for fast in 0..nums.len() {\n        if nums[fast] != 0 {\n            nums.swap(slow, fast);\n            slow += 1;\n        }\n    }\n}","ts":"function moveZeroes(nums: number[]): void {\n    let slow = 0;\n    for (let fast = 0; fast < nums.length; fast++) {\n        if (nums[fast] !== 0) {\n            [nums[slow], nums[fast]] = [nums[fast], nums[slow]];\n            slow++;\n        }\n    }\n}","info":"## Summary\nMove all zeroes in an integer array to the end while keeping the relative order of the non-zero elements. The array is modified in place; nothing is returned.\n\n## Why it matters\nThis fast/slow two-pointer partitioning is the basis for stable in-place compaction (remove-element, dedup sorted array) used whenever you cannot allocate a second buffer.\n\n## Idea\n- Keep a `slow` pointer marking the next write position for non-zero values, starting at 0.\n- Scan with a `fast` pointer; whenever `nums[fast]` is non-zero, swap it into `nums[slow]` and advance `slow`.\n- Because non-zeros are placed left-to-right in encounter order, their relative order is preserved and zeroes naturally bubble to the tail.\n- When `fast == slow` the swap is a no-op, so order among non-zeros is never disturbed.\n\n## Complexity\nTime O(n) single pass; space O(1) in place.\n\n## Pitfalls\n- Swapping instead of overwrite-then-fill is what keeps zeroes correctly placed without a second loop; overwriting forward would lose values.\n- Only advance `slow` on a non-zero element, not on every iteration.\n- Order must stay stable, so do not sort or move zeroes via two-end swaps.\n- Already-zero arrays and all-non-zero arrays are valid no-op edge cases."},{"t":"Two Sum II","d":"medium","id":167,"desc":"ą×čéčüąŠčĆčéąĖčĆąŠą▓ą░ąĮąĮčŗą╣ ą╝ą░čüčüąĖą▓. ąöą▓ą░ čāą║ą░ąĘą░čéąĄą╗čÅ: čüčāą╝ą╝ą░ ą╝ą░ą╗ą░ ŌĆö left++, ą▓ąĄą╗ąĖą║ą░ ŌĆö right--.","python":"def twoSum(numbers, target):\n    left, right = 0, len(numbers) - 1\n    while left < right:\n        s = numbers[left] + numbers[right]\n        if s == target: return [left+1, right+1]\n        elif s < target: left += 1\n        else: right -= 1","go":"func twoSum(numbers []int, target int) []int {\n    l, r := 0, len(numbers)-1\n    for l < r {\n        s := numbers[l] + numbers[r]\n        if s == target { return []int{l+1, r+1} }\n        if s < target { l++ } else { r-- }\n    }\n    return nil\n}","rust":"fn two_sum(numbers: Vec<i32>, target: i32) -> Vec<i32> {\n    let (mut l, mut r) = (0, numbers.len()-1);\n    while l < r {\n        let s = numbers[l] + numbers[r];\n        if s == target { return vec![(l+1) as i32, (r+1) as i32]; }\n        if s < target { l += 1; } else { r -= 1; }\n    }\n    vec![]\n}","ts":"function twoSum(numbers: number[], target: number): number[] {\n    let l = 0, r = numbers.length - 1;\n    while (l < r) {\n        const s = numbers[l] + numbers[r];\n        if (s === target) return [l+1, r+1];\n        if (s < target) l++; else r--;\n    }\n    return [];\n}","info":"## Summary\nGiven a 1-indexed array of integers sorted in non-decreasing order and a target value, find the two distinct positions whose values add up to the target. Return those two positions as a 1-based pair. Exactly one solution is assumed to exist.\n\n## Why it matters\nThe two-pointer technique on a sorted array turns an O(n^2) brute-force pair search into O(n), and the same converging-pointers idea underlies problems like 3Sum, Container With Most Water, and merge steps.\n\n## Idea\n- Place one pointer `left` at the start and one pointer `right` at the end.\n- Compute the sum of the two pointed values.\n- If the sum equals the target, return the 1-based indices.\n- If the sum is too small, the only way to grow it is to move `left` rightward (toward larger values); if too large, move `right` leftward.\n- Because the array is sorted, each move provably discards only pairs that cannot be the answer, so the pointers never need to backtrack.\n\n## Complexity\nTime O(n), space O(1): each element is visited at most once and only two index variables are kept.\n\n## Pitfalls\n- Returning 0-based indices instead of the required 1-based positions.\n- Moving the wrong pointer, or moving both pointers when the sum matches.\n- Using a hash map (valid but O(n) extra space) when the sorted-array two-pointer gives O(1) space.\n- Integer overflow when summing in fixed-width languages for very large values."},{"t":"3Sum","d":"medium","id":15,"desc":"ąóčĆąŠą╣ą║ąĖ čü čüčāą╝ą╝ąŠą╣ 0. ąĪąŠčĆčéąĖčĆčāą╣, čäąĖą║čüąĖčĆčāą╣ i, ą┤ą▓ą░ čāą║ą░ąĘą░čéąĄą╗čÅ ą┤ą╗čÅ ąŠčüčéą░čéą║ą░. ą¤čĆąŠą┐čāčüą║ą░ą╣ ą┤čāą▒ą╗ąĖ.","python":"def threeSum(nums):\n    nums.sort(); result = []\n    for i in range(len(nums)-2):\n        if i > 0 and nums[i] == nums[i-1]: continue\n        l, r = i+1, len(nums)-1\n        while l < r:\n            s = nums[i]+nums[l]+nums[r]\n            if s == 0:\n                result.append([nums[i],nums[l],nums[r]])\n                while l<r and nums[l]==nums[l+1]: l+=1\n                while l<r and nums[r]==nums[r-1]: r-=1\n                l+=1; r-=1\n            elif s < 0: l+=1\n            else: r-=1\n    return result","go":"func threeSum(nums []int) [][]int {\n    sort.Ints(nums)\n    var res [][]int\n    for i := 0; i < len(nums)-2; i++ {\n        if i > 0 && nums[i] == nums[i-1] { continue }\n        l, r := i+1, len(nums)-1\n        for l < r {\n            s := nums[i]+nums[l]+nums[r]\n            if s == 0 {\n                res = append(res, []int{nums[i],nums[l],nums[r]})\n                for l<r && nums[l]==nums[l+1] { l++ }\n                for l<r && nums[r]==nums[r-1] { r-- }\n                l++; r--\n            } else if s < 0 { l++ } else { r-- }\n        }\n    }\n    return res\n}","rust":"fn three_sum(mut nums: Vec<i32>) -> Vec<Vec<i32>> {\n    nums.sort(); let mut res = vec![];\n    for i in 0..nums.len().saturating_sub(2) {\n        if i > 0 && nums[i] == nums[i-1] { continue; }\n        let (mut l, mut r) = (i+1, nums.len()-1);\n        while l < r {\n            let s = nums[i]+nums[l]+nums[r];\n            if s == 0 {\n                res.push(vec![nums[i],nums[l],nums[r]]);\n                while l<r && nums[l]==nums[l+1] { l+=1; }\n                while l<r && nums[r]==nums[r-1] { r-=1; }\n                l+=1; r-=1;\n            } else if s < 0 { l+=1; } else { r-=1; }\n        }\n    }\n    res\n}","ts":"function threeSum(nums: number[]): number[][] {\n    nums.sort((a,b) => a-b); const res: number[][] = [];\n    for (let i = 0; i < nums.length-2; i++) {\n        if (i > 0 && nums[i] === nums[i-1]) continue;\n        let l = i+1, r = nums.length-1;\n        while (l < r) {\n            const s = nums[i]+nums[l]+nums[r];\n            if (s === 0) {\n                res.push([nums[i],nums[l],nums[r]]);\n                while (l<r && nums[l]===nums[l+1]) l++;\n                while (l<r && nums[r]===nums[r-1]) r--;\n                l++; r--;\n            } else if (s < 0) l++; else r--;\n        }\n    }\n    return res;\n}","info":"## Summary\nGiven an integer array, find all unique triplets whose elements sum to zero. Return the list of triplets, each as a sorted group of three values, with no duplicate triplets. The input may contain duplicates and negative numbers.\n\n## Why it matters\n3Sum is the canonical reduction of a k-sum problem to a sorted two-pointer sweep, and the duplicate-skipping logic is a reusable pattern for any \"all unique combinations\" problem.\n\n## Idea\n- Sort the array first so duplicates are adjacent and two pointers can converge meaningfully.\n- Fix each index `i` as the first element of the triplet, then run a two-pointer search (`l = i+1`, `r = end`) for two values summing to `-nums[i]`.\n- If the triple sums to zero, record it, then advance both pointers past any equal neighbors to avoid duplicate triplets.\n- If the sum is negative, move `l` right; if positive, move `r` left.\n- Skip a fixed `i` when it equals the previous one so the same leading value is not reused.\n\n## Complexity\nTime O(n^2): an O(n log n) sort plus an O(n) two-pointer scan for each of n fixed elements. Space O(1) auxiliary beyond the output (or O(n) depending on the sort).\n\n## Pitfalls\n- Forgetting to skip duplicates for `i`, `l`, and `r`, which produces repeated triplets.\n- Advancing only one pointer after a match, causing missed or duplicated results.\n- An unsigned-index loop bound that underflows when the array has fewer than three elements (handled with a saturating subtraction in Rust).\n- Mutating the caller's array via in-place sort when that is undesirable."},{"t":"Container With Most Water","d":"medium","id":11,"desc":"ąöą▓ą░ čāą║ą░ąĘą░čéąĄą╗čÅ čü ą║čĆą░čæą▓. ą¤ą╗ąŠčēą░ą┤čī = min(h[l],h[r])*(r-l). ąöą▓ąĖą│ą░ą╣ ą║ąŠčĆąŠčéą║čāčÄ čüčéąŠčĆąŠąĮčā.","python":"def maxArea(height):\n    l, r = 0, len(height)-1\n    mx = 0\n    while l < r:\n        mx = max(mx, min(height[l],height[r])*(r-l))\n        if height[l] < height[r]: l += 1\n        else: r -= 1\n    return mx","go":"func maxArea(height []int) int {\n    l, r, mx := 0, len(height)-1, 0\n    for l < r {\n        h := min(height[l], height[r])\n        if (r-l)*h > mx { mx = (r-l)*h }\n        if height[l] < height[r] { l++ } else { r-- }\n    }\n    return mx\n}","rust":"fn max_area(height: Vec<i32>) -> i32 {\n    let (mut l, mut r, mut mx) = (0, height.len()-1, 0);\n    while l < r {\n        let h = height[l].min(height[r]);\n        mx = mx.max((r-l) as i32 * h);\n        if height[l] < height[r] { l+=1; } else { r-=1; }\n    }\n    mx\n}","ts":"function maxArea(height: number[]): number {\n    let l = 0, r = height.length-1, mx = 0;\n    while (l < r) {\n        mx = Math.max(mx, Math.min(height[l],height[r])*(r-l));\n        if (height[l] < height[r]) l++; else r--;\n    }\n    return mx;\n}","info":"## Summary\nGiven an array where each element is the height of a vertical line on the x-axis, find two lines that together with the x-axis form a container holding the most water. Return the maximum area. Area between lines `l` and `r` is `min(height[l], height[r]) * (r - l)`.\n\n## Why it matters\nThis is a classic greedy two-pointer optimization: it shows how moving the limiting side is always the correct local choice, a pattern that recurs in interval and capacity problems.\n\n## Idea\n- Start with the widest container: `l` at the left end, `r` at the right end.\n- The area is bounded by the shorter of the two lines times the width.\n- Record the area, then move the pointer at the shorter line inward.\n- Moving the taller line could only keep or shrink the bounding height while reducing width, so it can never improve the result; moving the shorter line is the only move that might help.\n- Continue until the pointers meet, tracking the running maximum.\n\n## Complexity\nTime O(n), space O(1): a single inward sweep with two pointers and one max accumulator.\n\n## Pitfalls\n- Moving the taller line instead of the shorter one, which misses the optimum.\n- Off-by-one in the width term `r - l` versus `r - l + 1`.\n- Forgetting to take the running maximum before moving a pointer.\n- Unsigned index arithmetic on an empty or single-element array."}]},{"name":"ąźąĄčł-čéą░ą▒ą╗ąĖčåčŗ","icon":"#","problems":[{"t":"Two Sum","d":"easy","id":1,"desc":"ąØą░ą╣ą┤ąĖ ą┤ą▓ą░ čćąĖčüą╗ą░ čü čüčāą╝ą╝ąŠą╣ target. ąźąĄčł: čćąĖčüą╗ąŠŌåÆąĖąĮą┤ąĄą║čü. complement = target-num.","python":"def twoSum(nums, target):\n    seen = {}\n    for i, num in enumerate(nums):\n        if target-num in seen: return [seen[target-num], i]\n        seen[num] = i","go":"func twoSum(nums []int, target int) []int {\n    seen := map[int]int{}\n    for i, num := range nums {\n        if j, ok := seen[target-num]; ok { return []int{j, i} }\n        seen[num] = i\n    }\n    return nil\n}","rust":"fn two_sum(nums: Vec<i32>, target: i32) -> Vec<i32> {\n    use std::collections::HashMap;\n    let mut seen = HashMap::new();\n    for (i, &num) in nums.iter().enumerate() {\n        if let Some(&j) = seen.get(&(target-num)) {\n            return vec![j as i32, i as i32];\n        }\n        seen.insert(num, i);\n    }\n    vec![]\n}","ts":"function twoSum(nums: number[], target: number): number[] {\n    const seen = new Map<number, number>();\n    for (let i = 0; i < nums.length; i++) {\n        if (seen.has(target-nums[i])) return [seen.get(target-nums[i])!, i];\n        seen.set(nums[i], i);\n    }\n    return [];\n}","info":"## Summary\nGiven an unsorted integer array and a target, return the indices of the two numbers that add up to the target. Exactly one valid pair is assumed to exist, and the same element may not be used twice. Output is the pair of 0-based indices.\n\n## Why it matters\nThe complement-lookup with a hash map is the textbook example of trading space for time to drop a nested loop from O(n^2) to O(n), and it generalizes to many \"have I seen X\" problems.\n\n## Idea\n- Iterate once, maintaining a hash map from each seen value to its index.\n- For the current number, compute `complement = target - num`.\n- If the complement is already in the map, the current index and the stored index form the answer.\n- Otherwise store the current number and index and continue.\n- Checking before inserting guarantees the two indices are distinct even when values repeat.\n\n## Complexity\nTime O(n) average, space O(n): each element triggers one expected O(1) map lookup and insert, and the map can hold up to n entries.\n\n## Pitfalls\n- Inserting the current number before checking for its complement, which can return the same index twice when a value equals half the target.\n- Assuming the array is sorted (this is the hash-map variant, not the two-pointer one).\n- Hash collisions degrading lookups to O(n) in adversarial worst cases.\n- Returning values instead of indices."},{"t":"Valid Anagram","d":"easy","id":242,"desc":"ąÉąĮą░ą│čĆą░ą╝ą╝ą░? ą¤ąŠą┤čüčćąĖčéą░ą╣ čćą░čüčéąŠčéčŗ ą▒čāą║ą▓ ą▓ s, ą▓čŗčćčéąĖ čćą░čüčéąŠčéčŗ ąĖąĘ t. ąÆčüąĄ ą┤ąŠą╗ąČąĮčŗ ą▒čŗčéčī 0.","python":"def isAnagram(s, t):\n    if len(s) != len(t): return False\n    count = {}\n    for c in s: count[c] = count.get(c,0)+1\n    for c in t:\n        count[c] = count.get(c,0)-1\n        if count[c] < 0: return False\n    return True","go":"func isAnagram(s string, t string) bool {\n    if len(s) != len(t) { return false }\n    count := [26]int{}\n    for i := 0; i < len(s); i++ {\n        count[s[i]-'a']++\n        count[t[i]-'a']--\n    }\n    for _, c := range count { if c != 0 { return false } }\n    return true\n}","rust":"fn is_anagram(s: String, t: String) -> bool {\n    if s.len() != t.len() { return false; }\n    let mut count = [0i32; 26];\n    for (a, b) in s.bytes().zip(t.bytes()) {\n        count[(a-b'a') as usize] += 1;\n        count[(b-b'a') as usize] -= 1;\n    }\n    count.iter().all(|&c| c == 0)\n}","ts":"function isAnagram(s: string, t: string): boolean {\n    if (s.length !== t.length) return false;\n    const count: Record<string,number> = {};\n    for (const c of s) count[c] = (count[c]||0)+1;\n    for (const c of t) {\n        count[c] = (count[c]||0)-1;\n        if (count[c] < 0) return false;\n    }\n    return true;\n}","info":"## Summary\nGiven two strings `s` and `t`, determine whether `t` is an anagram of `s` (same letters with the same multiplicities, possibly reordered). Input is two strings; output is a boolean.\n\n## Why it matters\nFrequency counting is a foundational technique for string and array comparison problems, and it appears in deduplication, grouping, and \"permutation of\" style questions.\n\n## Idea\n- First reject quickly: if the lengths differ they cannot be anagrams.\n- Build a frequency tally. Increment the count for each character of `s` and decrement for each character of `t` in a single pass (or count `s`, then subtract `t`).\n- If `t` is a true anagram, every count returns to zero. An early-exit when any count goes negative means `t` has a character that `s` lacks.\n- For a fixed lowercase alphabet a 26-slot array beats a hash map; for arbitrary Unicode use a hash map keyed by character.\n\n## Complexity\nTime O(n) over the string length; space O(1) for a fixed alphabet (26-element array) or O(k) for a hash map with k distinct characters.\n\n## Pitfalls\n- Forgetting the length check lets prefixes pass incorrectly when using early negative exit.\n- The 26-element array variants assume only lowercase ASCII letters; non-`a..z` input would index out of range.\n- Comparing by sorting is correct but slower (O(n log n)).\n- Unicode/case sensitivity must match the problem's definition."},{"t":"Group Anagrams","d":"medium","id":49,"desc":"ąōčĆčāą┐ą┐ąĖčĆčāą╣ ą┐ąŠ ą░ąĮą░ą│čĆą░ą╝ą╝ą░ą╝. ąÜą╗čÄčć = sorted(word). ąĪą╗ąŠą▓ą░čĆčī ą║ą╗čÄčć ŌåÆ čüą┐ąĖčüąŠą║.","python":"def groupAnagrams(strs):\n    groups = {}\n    for s in strs:\n        key = ''.join(sorted(s))\n        groups.setdefault(key, []).append(s)\n    return list(groups.values())","go":"func groupAnagrams(strs []string) [][]string {\n    groups := map[string][]string{}\n    for _, s := range strs {\n        bs := []byte(s)\n        sort.Slice(bs, func(i,j int) bool { return bs[i]<bs[j] })\n        groups[string(bs)] = append(groups[string(bs)], s)\n    }\n    res := make([][]string, 0, len(groups))\n    for _, v := range groups { res = append(res, v) }\n    return res\n}","rust":"fn group_anagrams(strs: Vec<String>) -> Vec<Vec<String>> {\n    use std::collections::HashMap;\n    let mut groups: HashMap<String, Vec<String>> = HashMap::new();\n    for s in strs {\n        let mut key: Vec<u8> = s.bytes().collect();\n        key.sort();\n        groups.entry(String::from_utf8(key).unwrap()).or_default().push(s);\n    }\n    groups.into_values().collect()\n}","ts":"function groupAnagrams(strs: string[]): string[][] {\n    const groups = new Map<string, string[]>();\n    for (const s of strs) {\n        const key = s.split('').sort().join('');\n        if (!groups.has(key)) groups.set(key, []);\n        groups.get(key)!.push(s);\n    }\n    return [...groups.values()];\n}","info":"## Summary\nGiven a list of strings, group together all strings that are anagrams of one another. Input is an array of words; output is a list of groups (lists), one per anagram class, in any order.\n\n## Why it matters\nCanonical-key bucketing is a core hashing pattern: reduce each item to a normalized signature, then group by that signature. It shows up in deduplication, clustering, and equivalence-class problems.\n\n## Idea\n- For each word compute a canonical key that is identical for all anagrams. The simplest key is the sorted sequence of its characters.\n- Use a hash map from key to the list of original words sharing that key, appending each word to its bucket.\n- After one pass, the map's values are exactly the anagram groups.\n- A faster alternative key is a 26-length character-count signature, avoiding the per-word sort.\n\n## Complexity\nTime O(n ┬Ę k log k) where n is the number of words and k the max word length (the sort dominates); the count-signature variant is O(n ┬Ę k). Space O(n ┬Ę k) for the map.\n\n## Pitfalls\n- Reusing a mutable buffer as the map key without copying it can corrupt earlier entries.\n- The sort key must be over characters/bytes consistently; mixing case or encodings breaks grouping.\n- Output order is unspecified, so do not rely on insertion order unless the problem requires it.\n- For Unicode, sorting bytes of a multibyte string can be incorrect; sort by code points."}]},{"name":"ąæąĖąĮą░čĆąĮčŗą╣ ą┐ąŠąĖčüą║","icon":"Ō¤É","problems":[{"t":"Binary Search","d":"easy","id":704,"desc":"left Ōēż right. mid = (l+r)/2. ąĀą░ą▓ąĮąŠ ŌĆö ąĮą░čłą╗ąĖ. ą£ąĄąĮčīčłąĄ ŌĆö left=mid+1. ąæąŠą╗čīčłąĄ ŌĆö right=mid-1.","python":"def search(nums, target):\n    l, r = 0, len(nums)-1\n    while l <= r:\n        mid = (l+r)//2\n        if nums[mid] == target: return mid\n        elif nums[mid] < target: l = mid+1\n        else: r = mid-1\n    return -1","go":"func search(nums []int, target int) int {\n    l, r := 0, len(nums)-1\n    for l <= r {\n        mid := (l+r)/2\n        if nums[mid] == target { return mid }\n        if nums[mid] < target { l = mid+1 } else { r = mid-1 }\n    }\n    return -1\n}","rust":"fn search(nums: Vec<i32>, target: i32) -> i32 {\n    let (mut l, mut r) = (0i32, nums.len() as i32 - 1);\n    while l <= r {\n        let mid = (l+r)/2;\n        if nums[mid as usize] == target { return mid; }\n        if nums[mid as usize] < target { l = mid+1; } else { r = mid-1; }\n    }\n    -1\n}","ts":"function search(nums: number[], target: number): number {\n    let l = 0, r = nums.length-1;\n    while (l <= r) {\n        const mid = (l+r) >> 1;\n        if (nums[mid] === target) return mid;\n        if (nums[mid] < target) l = mid+1; else r = mid-1;\n    }\n    return -1;\n}","info":"## Summary\nGiven a sorted array `nums` and a `target`, return the index of `target` if present, otherwise -1. Input is an ascending array plus the value to find; output is an integer index.\n\n## Why it matters\nBinary search is the archetypal divide-and-conquer search and the basis for \"search on the answer\", lower/upper bound, and rotated-array variants. Getting the loop invariants right is a frequently tested fundamental.\n\n## Idea\n- Maintain an inclusive search window `[l, r]`. Loop while `l <= r`.\n- Compute `mid` and compare `nums[mid]` to `target`: equal means found; if `nums[mid] < target` the answer is to the right (`l = mid + 1`), otherwise to the left (`r = mid - 1`).\n- Each step halves the window, so it terminates in logarithmic time. The `<=` condition with the `+1`/`-1` updates guarantees progress and no infinite loop.\n\n## Complexity\nTime O(log n) because the window halves each iteration; space O(1) for the iterative form.\n\n## Pitfalls\n- Using `l < r` instead of `l <= r` with an inclusive window can miss the last element.\n- `mid = (l + r) / 2` may overflow in fixed-width integer languages; `l + (r - l) / 2` is safer.\n- Off-by-one in the updates (`mid` vs `mid ┬▒ 1`) causes infinite loops or missed elements.\n- The array must actually be sorted for the invariant to hold."},{"t":"Search in Rotated Sorted Array","d":"medium","id":33,"desc":"ą¤ąŠą▓ąĄčĆąĮčāčéčŗą╣ ą╝ą░čüčüąĖą▓. ą×ą┐čĆąĄą┤ąĄą╗ąĖ ąŠčéčüąŠčĆčéąĖčĆąŠą▓ą░ąĮąĮčāčÄ ą┐ąŠą╗ąŠą▓ąĖąĮčā, ąĖčēąĖ target ą▓ ąĮąĄą╣.","python":"def search(nums, target):\n    l, r = 0, len(nums)-1\n    while l <= r:\n        mid = (l+r)//2\n        if nums[mid] == target: return mid\n        if nums[l] <= nums[mid]:\n            if nums[l] <= target < nums[mid]: r = mid-1\n            else: l = mid+1\n        else:\n            if nums[mid] < target <= nums[r]: l = mid+1\n            else: r = mid-1\n    return -1","go":"func search(nums []int, target int) int {\n    l, r := 0, len(nums)-1\n    for l <= r {\n        mid := (l+r)/2\n        if nums[mid] == target { return mid }\n        if nums[l] <= nums[mid] {\n            if nums[l] <= target && target < nums[mid] { r = mid-1 } else { l = mid+1 }\n        } else {\n            if nums[mid] < target && target <= nums[r] { l = mid+1 } else { r = mid-1 }\n        }\n    }\n    return -1\n}","rust":"fn search(nums: Vec<i32>, target: i32) -> i32 {\n    let (mut l, mut r) = (0i32, nums.len() as i32 - 1);\n    while l <= r {\n        let mid = (l+r)/2;\n        let m = mid as usize;\n        if nums[m] == target { return mid; }\n        if nums[l as usize] <= nums[m] {\n            if nums[l as usize] <= target && target < nums[m] { r=mid-1; } else { l=mid+1; }\n        } else {\n            if nums[m] < target && target <= nums[r as usize] { l=mid+1; } else { r=mid-1; }\n        }\n    }\n    -1\n}","ts":"function search(nums: number[], target: number): number {\n    let l = 0, r = nums.length-1;\n    while (l <= r) {\n        const mid = (l+r) >> 1;\n        if (nums[mid] === target) return mid;\n        if (nums[l] <= nums[mid]) {\n            if (nums[l] <= target && target < nums[mid]) r = mid-1; else l = mid+1;\n        } else {\n            if (nums[mid] < target && target <= nums[r]) l = mid+1; else r = mid-1;\n        }\n    }\n    return -1;\n}","info":"## Summary\nGiven an ascending array that has been rotated at some unknown pivot (with distinct values) and a `target`, return the index of `target` or -1. Input is the rotated array plus the value; output is an integer index, achieved in logarithmic time.\n\n## Why it matters\nThis is the classic \"modified binary search\" interview problem: it teaches reasoning about which half is sorted from local comparisons, a pattern reused in find-minimum-in-rotated-array and peak/valley searches.\n\n## Idea\n- Run binary search, but at each `mid` first decide which half is sorted by comparing `nums[l]` with `nums[mid]`.\n- If the left half `[l..mid]` is sorted, check whether `target` lies within `[nums[l], nums[mid])`; if so search left, else search right.\n- Otherwise the right half `[mid..r]` is sorted, so check whether `target` lies within `(nums[mid], nums[r]]`; if so search right, else search left.\n- Exactly one half is always sorted, so each step still halves the range and the logarithmic bound holds.\n\n## Complexity\nTime O(log n) since one half is discarded per iteration; space O(1) iterative.\n\n## Pitfalls\n- Boundary comparisons must use the correct strictness (`<=` vs `<`) or the pivot/equal-to-endpoint cases get misrouted.\n- Using `nums[l] < nums[mid]` instead of `<=` mishandles two-element or equal-endpoint windows.\n- This assumes distinct values; duplicates break the \"which half is sorted\" test and degrade to O(n).\n- Forgetting the early `nums[mid] == target` check before the half-selection logic can skip the answer."}]},{"name":"ąĪą▓čÅąĘąĮčŗąĄ čüą┐ąĖčüą║ąĖ","icon":"Ō¤Č","problems":[{"t":"Reverse Linked List","d":"easy","id":206,"desc":"prev, curr, next. ąØą░ ą║ą░ąČą┤ąŠą╝ čłą░ą│ąĄ: curr.next = prev, čüą┤ą▓ąĖą│ą░ą╣ ą▓ą┐ąĄčĆčæą┤.","python":"def reverseList(head):\n    prev = None\n    curr = head\n    while curr:\n        nxt = curr.next\n        curr.next = prev\n        prev = curr\n        curr = nxt\n    return prev","go":"func reverseList(head *ListNode) *ListNode {\n    var prev *ListNode\n    curr := head\n    for curr != nil {\n        nxt := curr.Next\n        curr.Next = prev\n        prev = curr\n        curr = nxt\n    }\n    return prev\n}","rust":"fn reverse_list(head: Option<Box<ListNode>>) -> Option<Box<ListNode>> {\n    let (mut prev, mut curr) = (None, head);\n    while let Some(mut node) = curr {\n        curr = node.next.take();\n        node.next = prev;\n        prev = Some(node);\n    }\n    prev\n}","ts":"function reverseList(head: ListNode | null): ListNode | null {\n    let prev: ListNode | null = null, curr = head;\n    while (curr) {\n        const nxt = curr.next;\n        curr.next = prev;\n        prev = curr;\n        curr = nxt;\n    }\n    return prev;\n}","info":"## Summary\nGiven the head of a singly linked list, reverse the list and return the new head. Input is a `head` node (or null); output is the head of the reversed list. The reversal is done in place by re-pointing each node's `next`.\n\n## Why it matters\nIn-place pointer reversal is a foundational linked-list manipulation that underlies palindrome checks, reordering, k-group reversal, and many systems-level data-structure tasks where extra memory is not available.\n\n## Idea\n- Keep three references: `prev` (initially null), `curr` (the head), and `nxt`.\n- Each iteration: save `nxt = curr.next`, flip the link with `curr.next = prev`, then advance `prev = curr` and `curr = nxt`.\n- When `curr` becomes null, `prev` points at the old tail, which is the new head.\n- This works because every node's outgoing pointer is redirected exactly once while the rest of the list is still reachable through `nxt`.\n\n## Complexity\nO(n) time (one pass), O(1) extra space (only a constant number of pointers).\n\n## Pitfalls\n- Forgetting to cache `next` before overwriting `curr.next` loses the rest of the list.\n- Returning `curr` (null) instead of `prev` at the end.\n- In Rust, you must `take()` the `next` field to move ownership out of the Box rather than borrow it."},{"t":"Linked List Cycle","d":"easy","id":141,"desc":"Floyd: slow +1, fast +2. ąÆčüčéčĆąĄčéąĖą╗ąĖčüčī ŌĆö čåąĖą║ą╗.","python":"def hasCycle(head):\n    slow = fast = head\n    while fast and fast.next:\n        slow = slow.next\n        fast = fast.next.next\n        if slow == fast: return True\n    return False","go":"func hasCycle(head *ListNode) bool {\n    slow, fast := head, head\n    for fast != nil && fast.Next != nil {\n        slow = slow.Next\n        fast = fast.Next.Next\n        if slow == fast { return true }\n    }\n    return false\n}","rust":"use std::collections::HashSet;\n\n// Safe Rust cannot build a cycle out of Option<Box<ListNode>>, so this\n// mirrors the Floyd intent by walking the list and recording visited nodes\n// by raw pointer; a repeat means a cycle.\nfn has_cycle(head: Option<Box<ListNode>>) -> bool {\n    let mut seen: HashSet<*const ListNode> = HashSet::new();\n    let mut curr = head.as_deref();\n    while let Some(node) = curr {\n        let ptr = node as *const ListNode;\n        if !seen.insert(ptr) {\n            return true;\n        }\n        curr = node.next.as_deref();\n    }\n    false\n}","ts":"function hasCycle(head: ListNode | null): boolean {\n    let slow = head, fast = head;\n    while (fast && fast.next) {\n        slow = slow!.next;\n        fast = fast.next.next;\n        if (slow === fast) return true;\n    }\n    return false;\n}","info":"## Summary\nGiven the head of a linked list, determine whether it contains a cycle (some node's `next` points back to an earlier node). Input is the `head` node; output is a boolean. Return true if traversal can loop forever, false if it reaches null.\n\n## Why it matters\nFloyd's tortoise-and-hare is the canonical O(1)-space cycle detection technique, used for cycle detection in iterators, functional-graph problems, and detecting infinite loops in pointer-following structures.\n\n## Idea\n- Advance a `slow` pointer one step and a `fast` pointer two steps per iteration.\n- If there is a cycle, `fast` eventually laps `slow` and they meet; if there is no cycle, `fast` reaches null first.\n- The loop condition must guard both `fast` and `fast.next` before taking two steps.\n- In safe Rust you cannot construct such a cycle from owned `Box` nodes, so the equivalent solution walks the list and records each node's raw pointer in a `HashSet`; a repeated pointer signals a cycle.\n\n## Complexity\nO(n) time. Floyd's pointer version is O(1) space; the Rust HashSet variant is O(n) space because it stores visited node addresses.\n\n## Pitfalls\n- Checking `slow == fast` before moving the pointers causes an immediate false positive since both start at head.\n- Dereferencing `fast.next.next` without first verifying `fast` and `fast.next` are non-null.\n- Comparing node values instead of node identity/pointers can wrongly report a cycle on lists with duplicate values."},{"t":"Merge Two Sorted Lists","d":"easy","id":21,"desc":"Dummy-čāąĘąĄą╗, čüčĆą░ą▓ąĮąĖą▓ą░ą╣ ą│ąŠą╗ąŠą▓čŗ, čåąĄą┐ą╗čÅą╣ ą╝ąĄąĮčīčłąĖą╣. ąÆ ą║ąŠąĮčåąĄ ŌĆö ąŠčüčéą░čéąŠą║.","python":"def mergeTwoLists(l1, l2):\n    dummy = ListNode(0); curr = dummy\n    while l1 and l2:\n        if l1.val <= l2.val:\n            curr.next = l1; l1 = l1.next\n        else:\n            curr.next = l2; l2 = l2.next\n        curr = curr.next\n    curr.next = l1 or l2\n    return dummy.next","go":"func mergeTwoLists(l1 *ListNode, l2 *ListNode) *ListNode {\n    dummy := &ListNode{}\n    curr := dummy\n    for l1 != nil && l2 != nil {\n        if l1.Val <= l2.Val {\n            curr.Next = l1; l1 = l1.Next\n        } else {\n            curr.Next = l2; l2 = l2.Next\n        }\n        curr = curr.Next\n    }\n    if l1 != nil { curr.Next = l1 } else { curr.Next = l2 }\n    return dummy.Next\n}","rust":"fn merge_two_lists(l1: Option<Box<ListNode>>, l2: Option<Box<ListNode>>) -> Option<Box<ListNode>> {\n    match (l1, l2) {\n        (None, r) => r, (l, None) => l,\n        (Some(mut a), Some(mut b)) => {\n            if a.val <= b.val {\n                a.next = merge_two_lists(a.next, Some(b)); Some(a)\n            } else {\n                b.next = merge_two_lists(Some(a), b.next); Some(b)\n            }\n        }\n    }\n}","ts":"function mergeTwoLists(l1: ListNode|null, l2: ListNode|null): ListNode|null {\n    const dummy = new ListNode(0); let curr = dummy;\n    while (l1 && l2) {\n        if (l1.val <= l2.val) { curr.next = l1; l1 = l1.next; }\n        else { curr.next = l2; l2 = l2.next; }\n        curr = curr.next;\n    }\n    curr.next = l1 || l2;\n    return dummy.next;\n}","info":"## Summary\nGiven the heads of two sorted linked lists, merge them into one sorted list and return its head. Input is two ascending lists `l1` and `l2`; output is a single ascending list built by splicing the existing nodes. No new node values are created (besides an optional sentinel).\n\n## Why it matters\nMerging sorted lists is the merge step of merge sort and underlies external sorting, k-way merges, and combining ordered streams; the dummy-head idiom it teaches simplifies any list-building code.\n\n## Idea\n- Use a `dummy` sentinel node and a `curr` tail pointer so you never special-case the first element.\n- While both lists are non-empty, attach the node with the smaller value to `curr.next` and advance that list and `curr`.\n- When one list is exhausted, append the remaining list directly (it is already sorted).\n- Return `dummy.next`, the real head. The recursive Rust variant expresses the same logic by pattern-matching on which head is smaller.\n\n## Complexity\nO(n + m) time where n, m are the list lengths (each node visited once). O(1) extra space iteratively; the recursive version uses O(n + m) stack depth.\n\n## Pitfalls\n- Forgetting the dummy node forces messy initialization of the result head.\n- Not appending the leftover tail loses the remainder of the longer list.\n- Using `<` instead of `<=` is not wrong here but can change stability for equal values."}]},{"name":"ąöąĄčĆąĄą▓čīčÅ","icon":"­¤ī│","problems":[{"t":"Maximum Depth of Binary Tree","d":"easy","id":104,"desc":"ąĀąĄą║čāčĆčüąĖčÅ: 1 + max(left, right). ąæą░ąĘą░: null ŌåÆ 0.","python":"def maxDepth(root):\n    if not root: return 0\n    return 1 + max(maxDepth(root.left), maxDepth(root.right))","go":"func maxDepth(root *TreeNode) int {\n    if root == nil { return 0 }\n    l, r := maxDepth(root.Left), maxDepth(root.Right)\n    if l > r { return 1+l }\n    return 1+r\n}","rust":"fn max_depth(root: Option<Rc<RefCell<TreeNode>>>) -> i32 {\n    match root {\n        None => 0,\n        Some(n) => {\n            let n = n.borrow();\n            1 + max_depth(n.left.clone()).max(max_depth(n.right.clone()))\n        }\n    }\n}","ts":"function maxDepth(root: TreeNode | null): number {\n    if (!root) return 0;\n    return 1 + Math.max(maxDepth(root.left), maxDepth(root.right));\n}","info":"## Summary\nGiven the root of a binary tree, return its maximum depth: the number of nodes along the longest path from the root down to a leaf. Input is the `root` node (or null); output is an integer depth. An empty tree has depth 0.\n\n## Why it matters\nThis is the simplest tree DFS recurrence and is the template for height, balance checks, diameter, and many other tree-aggregation problems that combine results from both subtrees.\n\n## Idea\n- Base case: a null node contributes depth 0.\n- Recursive case: the depth at a node is `1 + max(depth(left), depth(right))`.\n- Each recursive call solves a smaller subproblem and the maxima propagate back up the call stack, so the root returns the global maximum.\n- This is a post-order DFS: children are evaluated before combining their results at the parent.\n\n## Complexity\nO(n) time (each node visited once). O(h) space for the recursion stack, where h is the tree height ŌĆö O(n) worst case for a skewed tree, O(log n) for a balanced one.\n\n## Pitfalls\n- Returning the count of edges instead of nodes (off-by-one): the node-count convention adds 1 at each level.\n- Forgetting the null base case causes a crash on empty subtrees.\n- In Rust you must `borrow()` the `RefCell` and `clone()` the `Rc` children before recursing."},{"t":"Validate BST","d":"medium","id":98,"desc":"ąĀąĄą║čāčĆčüąĖčÅ čü low/high. ąŻąĘąĄą╗ ą▓ (low, high). ąøąĄą▓ąŠ: high=val, ą┐čĆą░ą▓ąŠ: low=val.","python":"def isValidBST(root):\n    def check(node, lo, hi):\n        if not node: return True\n        if node.val <= lo or node.val >= hi: return False\n        return check(node.left, lo, node.val) and check(node.right, node.val, hi)\n    return check(root, float('-inf'), float('inf'))","go":"func isValidBST(root *TreeNode) bool {\n    var check func(*TreeNode, int, int) bool\n    check = func(n *TreeNode, lo, hi int) bool {\n        if n == nil { return true }\n        if n.Val <= lo || n.Val >= hi { return false }\n        return check(n.Left, lo, n.Val) && check(n.Right, n.Val, hi)\n    }\n    return check(root, -1<<63, 1<<63-1)\n}","rust":"fn is_valid_bst(root: Option<Rc<RefCell<TreeNode>>>) -> bool {\n    fn check(n: &Option<Rc<RefCell<TreeNode>>>, lo: i64, hi: i64) -> bool {\n        match n {\n            None => true,\n            Some(node) => {\n                let v = node.borrow().val as i64;\n                v > lo && v < hi\n                    && check(&node.borrow().left, lo, v)\n                    && check(&node.borrow().right, v, hi)\n            }\n        }\n    }\n    check(&root, i64::MIN, i64::MAX)\n}","ts":"function isValidBST(root: TreeNode | null): boolean {\n    const check = (n: TreeNode|null, lo: number, hi: number): boolean => {\n        if (!n) return true;\n        if (n.val <= lo || n.val >= hi) return false;\n        return check(n.left, lo, n.val) && check(n.right, n.val, hi);\n    };\n    return check(root, -Infinity, Infinity);\n}","info":"## Summary\nGiven the root of a binary tree, decide whether it is a valid binary search tree (BST). A valid BST requires every node's value to be strictly greater than all values in its left subtree and strictly less than all values in its right subtree. Return a boolean.\n\n## Why it matters\nBST validation is a canonical interview check on understanding tree invariants versus local node comparisons; the same bounds-propagation idea reuses in range queries, interval trees, and order-statistics structures.\n\n## Idea\n- Recurse with an open interval `(lo, hi)` that every node value must lie strictly inside.\n- A naive \"node.left.val < node.val < node.right.val\" check is wrong because it only compares neighbors; a deep descendant can still violate the global order.\n- When recursing left, tighten the upper bound to the current value; when recursing right, tighten the lower bound to the current value.\n- The root starts with `(-inf, +inf)`. Any node whose value escapes its inherited bounds fails immediately.\n\n## Complexity\nO(n) time visiting each node once; O(h) space for recursion stack where h is tree height (O(n) worst case, O(log n) balanced).\n\n## Pitfalls\n- Comparing only parent/child instead of propagating inherited bounds.\n- Using `<=`/`>=` incorrectly: duplicates are not allowed, so bounds must be strict.\n- Integer overflow when a node holds the min/max value; use a wide type (e.g. i64) or nullable/optional bounds.\n- Forgetting that an empty tree is valid."}]},{"name":"ąĪčéąĄą║ąĖ","icon":"ŌŖ×","problems":[{"t":"Valid Parentheses","d":"easy","id":20,"desc":"ąĪčéąĄą║: ąŠčéą║čĆčŗą▓ą░čÄčēą░čÅ ŌĆö push. ąŚą░ą║čĆčŗą▓ą░čÄčēą░čÅ ŌĆö pop, ą┐čĆąŠą▓ąĄčĆčī ą┐ą░čĆčā.","python":"def isValid(s):\n    stack = []\n    m = {')':'(', '}':'{', ']':'['}\n    for c in s:\n        if c in m:\n            if not stack or stack.pop() != m[c]: return False\n        else: stack.append(c)\n    return not stack","go":"func isValid(s string) bool {\n    stack := []byte{}\n    m := map[byte]byte{')':'(', '}':'{', ']':'['}\n    for i := 0; i < len(s); i++ {\n        if match, ok := m[s[i]]; ok {\n            if len(stack)==0 || stack[len(stack)-1]!=match { return false }\n            stack = stack[:len(stack)-1]\n        } else { stack = append(stack, s[i]) }\n    }\n    return len(stack) == 0\n}","rust":"fn is_valid(s: String) -> bool {\n    let mut stack = vec![];\n    for ch in s.chars() {\n        match ch {\n            '('|'{'|'[' => stack.push(ch),\n            ')' => { if stack.pop() != Some('(') { return false; } }\n            '}' => { if stack.pop() != Some('{') { return false; } }\n            ']' => { if stack.pop() != Some('[') { return false; } }\n            _ => {}\n        }\n    }\n    stack.is_empty()\n}","ts":"function isValid(s: string): boolean {\n    const stack: string[] = [];\n    const map: Record<string,string> = {')':'(', '}':'{', ']':'['};\n    for (const ch of s) {\n        if (map[ch]) { if (stack.pop() !== map[ch]) return false; }\n        else stack.push(ch);\n    }\n    return stack.length === 0;\n}","info":"## Summary\nGiven a string containing only the bracket characters `()[]{}`, determine whether they are balanced and correctly nested. Return true only if every opening bracket has a matching closing bracket of the same type in the right order.\n\n## Why it matters\nThis is the textbook use of a stack and underlies real parsers, expression evaluators, syntax highlighters, and compiler/linter bracket-matching logic.\n\n## Idea\n- Scan left to right keeping a stack of unmatched opening brackets.\n- On an opening bracket, push it.\n- On a closing bracket, the top of the stack must be its matching opener; pop and compare, failing if the stack is empty or the top mismatches.\n- After the scan the string is valid only if the stack is empty (no openers left dangling).\n\n## Complexity\nO(n) time, single pass over the string; O(n) space for the stack in the worst case (all openers).\n\n## Pitfalls\n- Returning true when the stack is still non-empty at the end (unclosed openers).\n- Popping from an empty stack on a leading closing bracket.\n- Matching only count of brackets, not type/order (e.g. `([)]` must fail).\n- Off-by-one when peeking the top index."},{"t":"Daily Temperatures","d":"medium","id":739,"desc":"ą£ąŠąĮąŠčéąŠąĮąĮčŗą╣ čüčéąĄą║ ąĖąĮą┤ąĄą║čüąŠą▓. Pop ą║ąŠą│ą┤ą░ čéąĄą║čāčēą░čÅ t > t[stack[-1]]. result[prev] = i-prev.","python":"def dailyTemperatures(temps):\n    n = len(temps); res = [0]*n; stack = []\n    for i in range(n):\n        while stack and temps[i] > temps[stack[-1]]:\n            p = stack.pop(); res[p] = i-p\n        stack.append(i)\n    return res","go":"func dailyTemperatures(temps []int) []int {\n    n := len(temps); res := make([]int, n); stack := []int{}\n    for i := 0; i < n; i++ {\n        for len(stack)>0 && temps[i]>temps[stack[len(stack)-1]] {\n            p := stack[len(stack)-1]; stack = stack[:len(stack)-1]\n            res[p] = i-p\n        }\n        stack = append(stack, i)\n    }\n    return res\n}","rust":"fn daily_temperatures(temps: Vec<i32>) -> Vec<i32> {\n    let n = temps.len();\n    let mut res = vec![0i32; n];\n    let mut stack: Vec<usize> = vec![];\n    for i in 0..n {\n        while let Some(&p) = stack.last() {\n            if temps[i] <= temps[p] { break; }\n            stack.pop();\n            res[p] = (i-p) as i32;\n        }\n        stack.push(i);\n    }\n    res\n}","ts":"function dailyTemperatures(temps: number[]): number[] {\n    const n = temps.length, res = new Array(n).fill(0), stack: number[] = [];\n    for (let i = 0; i < n; i++) {\n        while (stack.length && temps[i] > temps[stack[stack.length-1]]) {\n            const p = stack.pop()!; res[p] = i-p;\n        }\n        stack.push(i);\n    }\n    return res;\n}","info":"## Summary\nGiven a list of daily temperatures, return an array where each entry is the number of days you must wait until a warmer temperature. If no warmer day exists ahead, the entry is 0.\n\n## Why it matters\nThis is the classic \"next greater element\" pattern solved with a monotonic stack; it appears in stock-span problems, histogram/largest-rectangle, and any \"nearest larger to the right\" query.\n\n## Idea\n- Keep a stack of indices whose answer is still unknown, with temperatures in decreasing order (a monotonic stack).\n- For each new day `i`, while the current temperature exceeds the temperature at the stack's top index `p`, that earlier day's answer is resolved: `res[p] = i - p`, so pop it.\n- Push the current index `i`; it stays until a strictly warmer day arrives.\n- Each index is pushed and popped at most once, giving linear time.\n\n## Complexity\nO(n) time (amortized, each index pushed/popped once); O(n) space for the stack and result.\n\n## Pitfalls\n- Storing temperatures instead of indices, losing the distance information.\n- Using `>=` instead of `>` when popping (must wait for a strictly warmer day).\n- Leaving indices on the stack at the end; their answers correctly remain 0.\n- Forgetting to push the current index after the pop loop."}]},{"name":"ąĪą║ąŠą╗čīąĘčÅčēąĄąĄ ąŠą║ąĮąŠ","icon":"ŌŖ¤","problems":[{"t":"Longest Substring Without Repeating","d":"medium","id":3,"desc":"ą×ą║ąĮąŠ [l,r]. ąźąĄčł ą┐ąŠčüą╗ąĄą┤ąĮąĄą╣ ą┐ąŠąĘąĖčåąĖąĖ. ąĢčüą╗ąĖ ą┐ąŠą▓čéąŠčĆ >= l ŌĆö čüą┤ą▓ąĖąĮčī l.","python":"def lengthOfLongestSubstring(s):\n    seen = {}; l = mx = 0\n    for r in range(len(s)):\n        if s[r] in seen and seen[s[r]] >= l:\n            l = seen[s[r]] + 1\n        seen[s[r]] = r\n        mx = max(mx, r-l+1)\n    return mx","go":"func lengthOfLongestSubstring(s string) int {\n    seen := map[byte]int{}\n    l, mx := 0, 0\n    for r := 0; r < len(s); r++ {\n        if idx, ok := seen[s[r]]; ok && idx >= l { l = idx+1 }\n        seen[s[r]] = r\n        if r-l+1 > mx { mx = r-l+1 }\n    }\n    return mx\n}","rust":"fn length_of_longest_substring(s: String) -> i32 {\n    use std::collections::HashMap;\n    let mut seen = HashMap::new();\n    let (mut l, mut mx) = (0i32, 0i32);\n    for (r, ch) in s.chars().enumerate() {\n        if let Some(&idx) = seen.get(&ch) {\n            if idx >= l { l = idx + 1; }\n        }\n        seen.insert(ch, r as i32);\n        mx = mx.max(r as i32 - l + 1);\n    }\n    mx\n}","ts":"function lengthOfLongestSubstring(s: string): number {\n    const seen = new Map<string, number>();\n    let l = 0, mx = 0;\n    for (let r = 0; r < s.length; r++) {\n        if (seen.has(s[r]) && seen.get(s[r])! >= l)\n            l = seen.get(s[r])! + 1;\n        seen.set(s[r], r);\n        mx = Math.max(mx, r-l+1);\n    }\n    return mx;\n}","info":"## Summary\nGiven a string, find the length of the longest substring that contains no repeating characters. The output is a single integer (the maximum window length).\n\n## Why it matters\nThis is the prototypical sliding-window-plus-hash-map problem; the same technique drives deduplication scans, rate-limiting windows, and many \"longest/shortest substring with constraint\" interview questions.\n\n## Idea\n- Maintain a window `[l, r]` and a hash map storing the last seen index of each character.\n- Advance the right edge `r` one character at a time. If the current character was seen at a position `>= l`, it lies inside the window, so jump `l` to one past that previous occurrence.\n- Always update the character's stored index to `r`, then record the window length `r - l + 1` against the running maximum.\n- Because `l` only ever moves forward, the scan is linear.\n\n## Complexity\nO(n) time, single pass with O(1) work per character; O(min(n, alphabet)) space for the map.\n\n## Pitfalls\n- Not guarding `seen[c] >= l`: a stale index outside the current window must not shrink it (would move `l` backward).\n- Moving `l` backward and producing windows larger than the valid range.\n- Updating the maximum before refreshing the seen-index, or forgetting the `+1` in the length.\n- Assuming ASCII when the input may be Unicode (iterate by character, not byte)."}]},{"name":"ąōčĆą░čäčŗ","icon":"ŌŚē","problems":[{"t":"Number of Islands","d":"medium","id":200,"desc":"ą¤čĆąĖ ąĮą░čģąŠąČą┤ąĄąĮąĖąĖ '1' ŌĆö DFS, čéąŠą┐ąĖ ąŠčüčéčĆąŠą▓ (ŌåÆ '0'). ąĪčćąĖčéą░ą╣ ąĘą░ą┐čāčüą║ąĖ DFS.","python":"def numIslands(grid):\n    def dfs(i,j):\n        if i<0 or i>=len(grid) or j<0 or j>=len(grid[0]) or grid[i][j]!='1': return\n        grid[i][j]='0'\n        dfs(i+1,j); dfs(i-1,j); dfs(i,j+1); dfs(i,j-1)\n    count = 0\n    for i in range(len(grid)):\n        for j in range(len(grid[0])):\n            if grid[i][j]=='1': dfs(i,j); count+=1\n    return count","go":"func numIslands(grid [][]byte) int {\n    var dfs func(int, int)\n    dfs = func(i, j int) {\n        if i<0||i>=len(grid)||j<0||j>=len(grid[0])||grid[i][j]!='1' { return }\n        grid[i][j] = '0'\n        dfs(i+1,j); dfs(i-1,j); dfs(i,j+1); dfs(i,j-1)\n    }\n    count := 0\n    for i := range grid {\n        for j := range grid[0] {\n            if grid[i][j]=='1' { dfs(i,j); count++ }\n        }\n    }\n    return count\n}","rust":"fn num_islands(grid: &mut Vec<Vec<char>>) -> i32 {\n    fn dfs(g: &mut Vec<Vec<char>>, i: i32, j: i32) {\n        if i<0||i>=g.len() as i32||j<0||j>=g[0].len() as i32 { return; }\n        let (r,c) = (i as usize, j as usize);\n        if g[r][c] != '1' { return; }\n        g[r][c] = '0';\n        dfs(g,i+1,j); dfs(g,i-1,j); dfs(g,i,j+1); dfs(g,i,j-1);\n    }\n    let mut count = 0;\n    for i in 0..grid.len() {\n        for j in 0..grid[0].len() {\n            if grid[i][j]=='1' { dfs(grid,i as i32,j as i32); count+=1; }\n        }\n    }\n    count\n}","ts":"function numIslands(grid: string[][]): number {\n    const dfs = (i: number, j: number) => {\n        if (i<0||i>=grid.length||j<0||j>=grid[0].length||grid[i][j]!=='1') return;\n        grid[i][j] = '0';\n        dfs(i+1,j); dfs(i-1,j); dfs(i,j+1); dfs(i,j-1);\n    };\n    let count = 0;\n    for (let i = 0; i < grid.length; i++)\n        for (let j = 0; j < grid[0].length; j++)\n            if (grid[i][j]==='1') { dfs(i,j); count++; }\n    return count;\n}","info":"## Summary\nGiven a 2D grid of '1' (land) and '0' (water), count the number of connected islands. Cells are connected horizontally and vertically (4-directional). The output is a single integer: the count of distinct land components.\n\n## Why it matters\nFlood-fill over a grid is the canonical way to count connected components and appears in image processing (region labeling), maze/region analysis, and any grid-connectivity problem.\n\n## Idea\n- Scan every cell; when an unvisited '1' is found, increment the island counter and launch a DFS from it.\n- The DFS \"sinks\" the island by marking each reachable '1' as '0', so it is never counted again.\n- It recurses into the four neighbors, with bounds checks and a guard that the cell is still '1'.\n- Because each cell is sunk on first visit, the number of DFS launches equals the number of islands.\n\n## Complexity\nO(rows*cols) time and O(rows*cols) worst-case space for the recursion stack, since each cell is visited once.\n\n## Pitfalls\n- Forgetting to mark a cell visited before recursing causes infinite recursion / revisits.\n- Off-by-one or missing bounds checks on the four neighbor calls.\n- Mutating the input grid in place may be undesirable; use a separate visited set if the grid must be preserved.\n- Deep recursion can overflow the stack on very large grids; an explicit stack or BFS avoids this."}]},{"name":"ąöąĖąĮą░ą╝ąĖčćąĄčüą║ąŠąĄ ą┐čĆąŠą│čĆą░ą╝ą╝ąĖčĆąŠą▓ą░ąĮąĖąĄ","icon":"ŌŚł","problems":[{"t":"Climbing Stairs","d":"easy","id":70,"desc":"ążąĖą▒ąŠąĮą░čćčćąĖ: dp[i] = dp[i-1] + dp[i-2]. ą£ąŠąČąĮąŠ čćąĄčĆąĄąĘ ą┤ą▓ąĄ ą┐ąĄčĆąĄą╝ąĄąĮąĮčŗąĄ.","python":"def climbStairs(n):\n    if n <= 2: return n\n    a, b = 1, 2\n    for _ in range(3, n+1): a, b = b, a+b\n    return b","go":"func climbStairs(n int) int {\n    if n <= 2 { return n }\n    a, b := 1, 2\n    for i := 3; i <= n; i++ { a, b = b, a+b }\n    return b\n}","rust":"fn climb_stairs(n: i32) -> i32 {\n    if n <= 2 { return n; }\n    let (mut a, mut b) = (1, 2);\n    for _ in 3..=n { let t = b; b += a; a = t; }\n    b\n}","ts":"function climbStairs(n: number): number {\n    if (n <= 2) return n;\n    let [a, b] = [1, 2];\n    for (let i = 3; i <= n; i++) [a, b] = [b, a+b];\n    return b;\n}","info":"## Summary\nCount the distinct ways to climb a staircase of n steps when you can take either 1 or 2 steps at a time. The input is the integer n; the output is the number of distinct sequences. The answer is the (n+1)-th Fibonacci number.\n\n## Why it matters\nThis is the entry point to dynamic programming: it shows how overlapping subproblems collapse into a simple recurrence, and the same Fibonacci-style state reduction underlies many counting DPs.\n\n## Idea\n- Let dp[i] be the number of ways to reach step i; dp[i] = dp[i-1] + dp[i-2] because the last move is either one or two steps.\n- Base cases: dp[1] = 1, dp[2] = 2.\n- Since each state depends only on the previous two, keep two rolling variables a and b instead of a full array.\n- Iterate from 3 to n, updating the pair, and return b.\n\n## Complexity\nO(n) time and O(1) space using two rolling variables.\n\n## Pitfalls\n- Mishandling base cases for n <= 2.\n- Updating a and b in the wrong order (without a temporary or simultaneous assignment) corrupts the recurrence.\n- For very large n the value overflows fixed-width integers; use big integers or modular arithmetic if required."},{"t":"Coin Change","d":"medium","id":322,"desc":"dp[x] = min(dp[x], dp[x-coin]+1). dp[0]=0, ąŠčüčéą░ą╗čīąĮčŗąĄ Ōł×.","python":"def coinChange(coins, amount):\n    dp = [float('inf')]*(amount+1)\n    dp[0] = 0\n    for coin in coins:\n        for x in range(coin, amount+1):\n            dp[x] = min(dp[x], dp[x-coin]+1)\n    return dp[amount] if dp[amount] != float('inf') else -1","go":"func coinChange(coins []int, amount int) int {\n    dp := make([]int, amount+1)\n    for i := range dp { dp[i] = amount+1 }\n    dp[0] = 0\n    for _, c := range coins {\n        for x := c; x <= amount; x++ {\n            if dp[x-c]+1 < dp[x] { dp[x] = dp[x-c]+1 }\n        }\n    }\n    if dp[amount] > amount { return -1 }\n    return dp[amount]\n}","rust":"fn coin_change(coins: Vec<i32>, amount: i32) -> i32 {\n    let a = amount as usize;\n    let mut dp = vec![a+1; a+1];\n    dp[0] = 0;\n    for &c in &coins {\n        let c = c as usize;\n        for x in c..=a { dp[x] = dp[x].min(dp[x-c]+1); }\n    }\n    if dp[a] > a { -1 } else { dp[a] as i32 }\n}","ts":"function coinChange(coins: number[], amount: number): number {\n    const dp = new Array(amount+1).fill(amount+1);\n    dp[0] = 0;\n    for (const c of coins)\n        for (let x = c; x <= amount; x++)\n            dp[x] = Math.min(dp[x], dp[x-c]+1);\n    return dp[amount] > amount ? -1 : dp[amount];\n}","info":"## Summary\nGiven coin denominations and a target amount, return the minimum number of coins that sum to the amount, or -1 if it is impossible. Coins may be reused without limit. The output is a single integer.\n\n## Why it matters\nThis is the classic unbounded-knapsack / minimum-coins DP and is the template for \"fewest items to reach a target\" problems where greedy fails for arbitrary denominations.\n\n## Idea\n- Let dp[x] be the fewest coins needed to make amount x; initialize dp[0] = 0 and all others to a sentinel (amount+1 or infinity).\n- For each coin, iterate x from coin up to amount and relax dp[x] = min(dp[x], dp[x-coin] + 1).\n- Iterating x upward (not downward) allows reusing a coin multiple times, which is exactly the unbounded behavior.\n- After processing, dp[amount] holds the answer, or the sentinel meaning unreachable -> return -1.\n\n## Complexity\nO(amount * number_of_coins) time and O(amount) space.\n\n## Pitfalls\n- Using a sentinel that can overflow when you add 1; amount+1 is a safe upper bound.\n- Greedy (always taking the largest coin) is incorrect for general denominations.\n- Confusing this with the 0/1 knapsack: here the inner loop goes upward to permit coin reuse.\n- Off-by-one in the dp array size (must be amount+1)."},{"t":"House Robber","d":"medium","id":198,"desc":"dp[i] = max(dp[i-1], dp[i-2]+nums[i]). ąØąĄ ą│čĆą░ą▒čī čüąŠčüąĄą┤ąĄą╣.","python":"def rob(nums):\n    if len(nums) <= 2: return max(nums)\n    dp = [0]*len(nums)\n    dp[0] = nums[0]; dp[1] = max(nums[0],nums[1])\n    for i in range(2, len(nums)):\n        dp[i] = max(dp[i-1], dp[i-2]+nums[i])\n    return dp[-1]","go":"func rob(nums []int) int {\n    if len(nums) == 1 { return nums[0] }\n    dp := make([]int, len(nums))\n    dp[0] = nums[0]\n    dp[1] = nums[0]; if nums[1] > dp[1] { dp[1] = nums[1] }\n    for i := 2; i < len(nums); i++ {\n        dp[i] = dp[i-1]\n        if dp[i-2]+nums[i] > dp[i] { dp[i] = dp[i-2]+nums[i] }\n    }\n    return dp[len(nums)-1]\n}","rust":"fn rob(nums: Vec<i32>) -> i32 {\n    let n = nums.len();\n    if n == 1 { return nums[0]; }\n    let mut dp = vec![0; n];\n    dp[0] = nums[0]; dp[1] = nums[0].max(nums[1]);\n    for i in 2..n { dp[i] = dp[i-1].max(dp[i-2]+nums[i]); }\n    dp[n-1]\n}","ts":"function rob(nums: number[]): number {\n    if (nums.length <= 2) return Math.max(...nums);\n    const dp = [nums[0], Math.max(nums[0],nums[1])];\n    for (let i = 2; i < nums.length; i++)\n        dp[i] = Math.max(dp[i-1], dp[i-2]+nums[i]);\n    return dp[nums.length-1];\n}","info":"## Summary\nGiven an array of house values along a street, find the maximum total you can rob without robbing two adjacent houses. The input is the array nums; the output is the maximum achievable sum.\n\n## Why it matters\nThis is the foundational \"non-adjacent maximum sum\" DP, and its pattern generalizes to scheduling with cooldowns, the circular House Robber II, and tree DP (House Robber III).\n\n## Idea\n- Let dp[i] be the best loot considering houses 0..i; for each house you either skip it (dp[i-1]) or rob it and add dp[i-2].\n- So dp[i] = max(dp[i-1], dp[i-2] + nums[i]).\n- Base cases: dp[0] = nums[0] and dp[1] = max(nums[0], nums[1]).\n- The recurrence enforces the no-adjacent constraint because robbing house i forbids house i-1.\n\n## Complexity\nO(n) time and O(n) space (reducible to O(1) with two rolling variables).\n\n## Pitfalls\n- Edge cases for arrays of length 0, 1, or 2 must be handled before the main loop.\n- Taking max(dp[i-2] + nums[i]) but forgetting the skip option dp[i-1].\n- Indexing dp[i-2] when i < 2 without proper base initialization."}]},{"name":"Backtracking","icon":"Ōå®","problems":[{"t":"Generate Parentheses","d":"medium","id":22,"desc":"Backtrack: '(' ąĄčüą╗ąĖ open<n, ')' ąĄčüą╗ąĖ close<open. ąöą╗ąĖąĮą░ 2n ŌĆö čĆąĄąĘčāą╗čīčéą░čé.","python":"def generateParenthesis(n):\n    res = []\n    def bt(cur, o, c):\n        if len(cur)==2*n: res.append(cur); return\n        if o < n: bt(cur+'(', o+1, c)\n        if c < o: bt(cur+')', o, c+1)\n    bt('', 0, 0)\n    return res","go":"func generateParenthesis(n int) []string {\n    var res []string\n    var bt func(string, int, int)\n    bt = func(cur string, o, c int) {\n        if len(cur)==2*n { res = append(res, cur); return }\n        if o < n { bt(cur+\"(\", o+1, c) }\n        if c < o { bt(cur+\")\", o, c+1) }\n    }\n    bt(\"\", 0, 0)\n    return res\n}","rust":"fn generate_parenthesis(n: i32) -> Vec<String> {\n    let mut res = vec![];\n    fn bt(cur: &mut String, o: i32, c: i32, n: i32, res: &mut Vec<String>) {\n        if cur.len() == (2*n) as usize { res.push(cur.clone()); return; }\n        if o < n { cur.push('('); bt(cur, o+1, c, n, res); cur.pop(); }\n        if c < o { cur.push(')'); bt(cur, o, c+1, n, res); cur.pop(); }\n    }\n    bt(&mut String::new(), 0, 0, n, &mut res);\n    res\n}","ts":"function generateParenthesis(n: number): string[] {\n    const res: string[] = [];\n    const bt = (cur: string, o: number, c: number) => {\n        if (cur.length === 2*n) { res.push(cur); return; }\n        if (o < n) bt(cur+'(', o+1, c);\n        if (c < o) bt(cur+')', o, c+1);\n    };\n    bt('', 0, 0);\n    return res;\n}","info":"## Summary\nGiven an integer `n`, generate all combinations of `n` pairs of well-formed (balanced) parentheses. The input is one number; the output is a list of strings, each of length `2n`, containing exactly `n` `(` and `n` `)` arranged so every prefix is valid.\n\n## Why it matters\nThis is a canonical backtracking exercise that teaches pruning the search space using invariants instead of generating all `2^(2n)` strings and filtering. The same \"build a valid candidate incrementally, prune early\" pattern appears in constraint generation, expression building, and combinatorial enumeration.\n\n## Idea\n- Track two counters: `open` (number of `(` placed) and `close` (number of `)` placed).\n- You may add `(` only while `open < n`, keeping room for more opening brackets.\n- You may add `)` only while `close < open`, which guarantees the prefix never has more closing than opening brackets.\n- When the current string reaches length `2n`, both counters equal `n`, so it is a complete valid sequence and is recorded.\n- These two simple invariants make every explored path lead to a valid result, so no post-validation is needed.\n\n## Complexity\nTime and space O(4^n / sqrt(n)) ŌĆö the number of valid sequences is the nth Catalan number, and each is built in O(n) work; recursion depth is O(n).\n\n## Pitfalls\n- Allowing `)` when `close >= open` produces invalid strings; the `close < open` guard is essential.\n- Forgetting to backtrack (pop the pushed character) in the mutable-buffer versions (Rust) corrupts sibling branches.\n- The base case must compare against `2*n`, not `n`.\n- Building strings by concatenation is simple but allocates; a shared mutable buffer with push/pop is more efficient."},{"t":"Permutations","d":"medium","id":46,"desc":"Backtrack: ą▒ąĄčĆąĖ čŹą╗ąĄą╝ąĄąĮčé ąĖąĘ remaining, ą┤ąŠą▒ą░ą▓čī ą▓ path. ąĀąĄą║čāčĆčüąĖčÅ. Pop.","python":"def permute(nums):\n    res = []\n    def bt(path, rem):\n        if not rem: res.append(path[:]); return\n        for i in range(len(rem)):\n            path.append(rem[i])\n            bt(path, rem[:i]+rem[i+1:])\n            path.pop()\n    bt([], nums)\n    return res","go":"func permute(nums []int) [][]int {\n    var res [][]int\n    var bt func([]int, []int)\n    bt = func(path, rem []int) {\n        if len(rem)==0 {\n            tmp := make([]int, len(path)); copy(tmp, path)\n            res = append(res, tmp); return\n        }\n        for i := range rem {\n            nr := append(append([]int{}, rem[:i]...), rem[i+1:]...)\n            bt(append(path, rem[i]), nr)\n        }\n    }\n    bt([]int{}, nums)\n    return res\n}","rust":"fn permute(nums: Vec<i32>) -> Vec<Vec<i32>> {\n    let mut res = vec![];\n    fn bt(path: &mut Vec<i32>, rem: &[i32], res: &mut Vec<Vec<i32>>) {\n        if rem.is_empty() { res.push(path.clone()); return; }\n        for i in 0..rem.len() {\n            path.push(rem[i]);\n            let nr: Vec<i32> = rem.iter().enumerate()\n                .filter(|&(j,_)| j!=i).map(|(_,&v)| v).collect();\n            bt(path, &nr, res);\n            path.pop();\n        }\n    }\n    bt(&mut vec![], &nums, &mut res);\n    res\n}","ts":"function permute(nums: number[]): number[][] {\n    const res: number[][] = [];\n    const bt = (path: number[], rem: number[]) => {\n        if (!rem.length) { res.push([...path]); return; }\n        for (let i = 0; i < rem.length; i++) {\n            path.push(rem[i]);\n            bt(path, [...rem.slice(0,i), ...rem.slice(i+1)]);\n            path.pop();\n        }\n    };\n    bt([], nums);\n    return res;\n}","info":"## Summary\nGiven an array of distinct integers `nums`, return all possible permutations in any order. The input is a list of `n` distinct numbers; the output is a list of `n!` lists, each a distinct ordering of all elements.\n\n## Why it matters\nPermutation generation is the textbook example of backtracking over a shrinking candidate set, and the \"choose / recurse / unchoose\" structure underlies many search, scheduling, and exhaustive-enumeration problems. It also illustrates how to snapshot mutable state correctly when collecting results.\n\n## Idea\n- Maintain a `path` (the permutation built so far) and a `rem` (remaining unused elements).\n- At each level, pick each element of `rem` in turn, append it to `path`, and recurse with that element removed from `rem`.\n- When `rem` is empty, `path` is a complete permutation, so a copy/snapshot is appended to the results.\n- After recursing, pop the chosen element to restore `path` for the next choice (backtracking).\n- Because elements are distinct and each is removed before recursing, every leaf is a unique full permutation.\n\n## Complexity\nTime O(n * n!) and space O(n * n!) for output (plus O(n) recursion depth); there are n! permutations and copying each costs O(n).\n\n## Pitfalls\n- You must store a copy of `path` at the leaf, not a reference, or all results alias the same mutable list.\n- In Go, building the reduced remaining slice must avoid accidental aliasing of a shared backing array; constructing a fresh slice per branch is the safe approach.\n- Forgetting `path.pop()` after recursion leaves stale elements and yields wrong/oversized permutations.\n- This formulation assumes distinct inputs; duplicates would require extra dedup logic."}]}];

const IT = [{"name":"ąÉą╗ą│ąŠčĆąĖčéą╝čŗ","icon":"­¤¦«","problems":[{"t":"IntersectionoftwoArrays","d":"easy","desc":"Intersection of Two Arrays: ą▓ąĄčĆąĮčāčéčī čāąĮąĖą║ą░ą╗čīąĮčŗąĄ ąŠą▒čēąĖąĄ čŹą╗ąĄą╝ąĄąĮčéčŗ. ą£ąĮąŠąČąĄčüčéą▓ąŠ ąĖąĘ ą┐ąĄčĆą▓ąŠą│ąŠ ą╝ą░čüčüąĖą▓ą░, čäąĖą╗čīčéčĆčāąĄą╝ ą▓čéąŠčĆąŠą╣.","go":"package main\n\nimport \"fmt\"\n\n// Intersection of Two Arrays: ą▓ąĄčĆąĮčāčéčī čāąĮąĖą║ą░ą╗čīąĮčŗąĄ ąŠą▒čēąĖąĄ čŹą╗ąĄą╝ąĄąĮčéčŗ.\n// ą£ąĮąŠąČąĄčüčéą▓ąŠ ąĖąĘ ą┐ąĄčĆą▓ąŠą│ąŠ ą╝ą░čüčüąĖą▓ą░, čäąĖą╗čīčéčĆčāąĄą╝ ą▓čéąŠčĆąŠą╣.\n\nfunc intersection(nums1, nums2 []int) []int {\n\tset := make(map[int]struct{}, len(nums1))\n\tfor _, x := range nums1 {\n\t\tset[x] = struct{}{}\n\t}\n\tvar res []int\n\tfor _, x := range nums2 {\n\t\tif _, ok := set[x]; ok {\n\t\t\tres = append(res, x)\n\t\t\tdelete(set, x) // čćčéąŠą▒čŗ ąĮąĄ ą┤čāą▒ą╗ąĖčĆąŠą▓ą░čéčī\n\t\t}\n\t}\n\treturn res\n}\n\nfunc main() {\n\tfmt.Println(intersection([]int{1, 2, 2, 1}, []int{2, 2}))       // [2]\n\tfmt.Println(intersection([]int{4, 9, 5}, []int{9, 4, 9, 8, 4})) // [9 4]\n}","info":"## Summary\nGiven two integer arrays `nums1` and `nums2`, return their intersection as a list of the unique values present in both. The input is two arrays (possibly with duplicates); the output contains each common element exactly once, order unspecified.\n\n## Why it matters\nUsing a hash set for membership testing is the standard way to turn an O(n*m) nested-loop comparison into linear time, and \"build a set, then filter\" is one of the most reused patterns in data-processing code (deduplication, joins, allow-lists).\n\n## Idea\n- Insert every element of `nums1` into a hash set, giving O(1) average membership checks.\n- Iterate over `nums2`; if an element is in the set, it is a common value, so add it to the result.\n- Immediately delete that key from the set after emitting it, which guarantees each common value is reported only once even if `nums2` repeats it.\n- This single-pass-per-array approach avoids sorting and avoids quadratic comparison.\n\n## Complexity\nTime O(n + m), space O(n) ŌĆö one set holds the distinct elements of `nums1`, and each array is scanned once.\n\n## Pitfalls\n- Without removing the matched key (or using a separate \"seen\" set), repeated values in `nums2` would produce duplicate output.\n- Using `map[int]bool` works but `map[int]struct{}` better signals a set and uses no value storage.\n- The result order is not guaranteed and should not be relied upon.\n- A `nil` result slice is returned when there is no intersection, which is fine in Go but worth noting for callers expecting an empty (non-nil) slice."}]},{"name":"Concurrency","icon":"ŌÜĪ","problems":[{"t":"Fan-out / Fan-in","d":"hard","desc":"Fan-out / Fan-in","go":"package main\n\nimport (\n\t\"fmt\"\n\t\"sync\"\n\t\"time\"\n)\n\n// ąŚą░ą┤ą░ąĮąĖąĄ 1: Fan-out / Fan-in\n\nfunc gen(data []int, delay time.Duration) <-chan int {\n\tch := make(chan int)\n\tgo func() {\n\t\tdefer close(ch)\n\t\tfor _, val := range data {\n\t\t\ttime.Sleep(delay)\n\t\t\tch <- val\n\t\t}\n\t}()\n\treturn ch\n}\n\nfunc merge(chans ...<-chan int) <-chan int {\n\tout := make(chan int)\n\twg := sync.WaitGroup{}\n\n\tfor _, ch := range chans {\n\t\twg.Add(1)\n\t\tgo func(c <-chan int) {\n\t\t\tdefer wg.Done()\n\t\t\tfor v := range c {\n\t\t\t\tout <- v\n\t\t\t}\n\t\t}(ch)\n\t}\n\n\tgo func() {\n\t\twg.Wait()\n\t\tclose(out)\n\t}()\n\n\treturn out\n}\n\nfunc main() {\n\tc1 := gen([]int{1, 2, 3}, 50*time.Millisecond)\n\tc2 := gen([]int{4, 5, 6}, 50*time.Millisecond)\n\tc3 := gen([]int{7, 8, 9}, 50*time.Millisecond)\n\n\tmerged := merge(c1, c2, c3)\n\tfor v := range merged {\n\t\tfmt.Println(v)\n\t}\n}","rust":"// ąŚą░ą┤ą░ąĮąĖąĄ 1: Fan-Out / Fan-In\n//\n// Fan-Out: ąŠą┤ąĖąĮ ąĖčüčéąŠčćąĮąĖą║ ŌåÆ ąĮąĄčüą║ąŠą╗čīą║ąŠ ą▓ąŠčĆą║ąĄčĆąŠą▓\n// Fan-In: ąĮąĄčüą║ąŠą╗čīą║ąŠ ą▓ąŠčĆą║ąĄčĆąŠą▓ ŌåÆ ąŠą┤ąĖąĮ ą┐čĆąĖčæą╝ąĮąĖą║\n\nuse std::sync::mpsc;\n#[allow(unused_imports)]\nuse std::thread::{self, JoinHandle};\n\nfn producer(tx: mpsc::Sender<i32>, count: i32) {\n    for i in 0..count {\n        tx.send(i).unwrap();\n    }\n    // tx ą┤čĆąŠą┐ą░ąĄčéčüčÅ ąĘą┤ąĄčüčī ŌåÆ ą║ą░ąĮą░ą╗ ąĘą░ą║čĆčŗą▓ą░ąĄčéčüčÅ\n}\n\n#[allow(dead_code)]\nfn worker(id: i32, rx: mpsc::Receiver<i32>, tx: mpsc::Sender<i32>) {\n    for val in rx {\n        let result = val * id;\n        println!(\"worker {} processed {} -> {}\", id, val, result);\n        tx.send(result).unwrap();\n    }\n}\n\nfn fan_out_fan_in(data_count: i32, worker_count: i32) -> Vec<i32> {\n    // ąÜą░ąĮą░ą╗: producer ŌåÆ ą▓ąŠčĆą║ąĄčĆčŗ\n    let (prod_tx, prod_rx) = mpsc::channel();\n\n    // ąÜą░ąĮą░ą╗: ą▓ąŠčĆą║ąĄčĆčŗ ŌåÆ collector\n    let (work_tx, work_rx) = mpsc::channel();\n\n    // ąŚą░ą┐čāčüą║ą░ąĄą╝ producer\n    let prod_handle = thread::spawn(move || {\n        producer(prod_tx, data_count);\n    });\n\n    // Fan-Out: čĆą░ąĘą┤ą░čæą╝ prod_rx ą╝ąĄąČą┤čā ą▓ąŠčĆą║ąĄčĆą░ą╝ąĖ čćąĄčĆąĄąĘ Arc<Mutex>\n    let shared_rx = std::sync::Arc::new(std::sync::Mutex::new(prod_rx));\n\n    let mut handles: Vec<thread::JoinHandle<()>> = Vec::new();\n\n    for _id in 0..worker_count {\n        let rx_clone = shared_rx.clone();\n        let tx_clone = work_tx.clone();\n\n        let handle = thread::spawn(move || {\n            loop {\n                let msg = {\n                    let lock = rx_clone.lock().unwrap();\n                    lock.try_recv()\n                };\n                match msg {\n                    Ok(val) => {\n                        let result = val * val;\n                        tx_clone.send(result).unwrap();\n                    }\n                    Err(mpsc::TryRecvError::Empty) => {\n                        // ą║ą░ąĮą░ą╗ ą┐čāčüčé, ą┐ąŠą┐čĆąŠą▒čāąĄą╝ ąĄčēčæ\n                        thread::sleep(std::time::Duration::from_millis(1));\n                    }\n                    Err(mpsc::TryRecvError::Disconnected) => break,\n                }\n            }\n        });\n        handles.push(handle);\n    }\n\n    // ąöčĆąŠą┐ą░ąĄą╝ ąŠčĆąĖą│ąĖąĮą░ą╗čīąĮčŗą
